}

/* ============================================================
   프로젝트/작업단계 옵션
   - stages        : 부서 전체가 공유하는 단계 이름 목록 (예: ["제작모델링","제작도면","매뉴얼체크리스트"])
   - projectStages : 프로젝트별로 "이 프로젝트는 몇 단계짜리인지" 딱 한 번 등록해두는 곳.
                     예) { "GS-W805": ["제작모델링","제작도면","매뉴얼체크리스트"], "GS-806": ["제작모델링","제작도면"] }
                     이렇게 등록해두면, 그 프로젝트의 진행률 분모(n)가 항상 이 등록된 개수로 고정되고,
                     아직 입력 안 한 단계는 0%로 계산됩니다 (예: 1단계만 80% -> 4단계 중 하나면 20%).
                     한 번 등록하면 다음부터 그 프로젝트명을 적을 때 자동으로 기억되어, 매번 다시 고를 필요 없음.
   - recentProjectsByEmployee : [수정됨] 인원마다 하는 일이 달라서, "최근에 입력한 프로젝트명" 자동완성 기록도
                     인원별로 따로 저장됩니다. { "인원ID": ["최근이름1","최근이름2",...] } 형태이며,
                     각 인원당 최근 5개까지만 저장됩니다.
   부서(department)마다 이 데이터가 한 줄(row)씩 project_options 테이블에 저장됨.
   ============================================================ */
let projectOptions = { stages: [], projectStages: {}, recentProjectsByEmployee: {} }; // 서버에서 불러오기 전 기본값(빈 목록)

// 이 부서의 작업단계 목록을 서버에서 불러옴
async function loadProjectOptions(){
  try {
    const rows = await sb(`project_options?department=eq.${DEPT_Q}&select=data`);
    if(rows.length > 0 && rows[0].data){
      projectOptions = rows[0].data;
      // 예전(프로젝트별 객체) 형식으로 저장된 데이터가 있으면, 새 형식(배열)으로 안전하게 맞춰줌
      if(!Array.isArray(projectOptions.stages)) projectOptions.stages = [];
      if(!projectOptions.projectStages || typeof projectOptions.projectStages !== 'object') projectOptions.projectStages = {};
      if(!projectOptions.recentProjectsByEmployee || typeof projectOptions.recentProjectsByEmployee !== 'object') projectOptions.recentProjectsByEmployee = {};
    }
  } catch(e){
    console.error(e);
    // [진단용] 불러오기 자체가 실패하면(예: 테이블이 아직 없음) 콘솔에 원인을 남겨서
    // "등록해도 실패로 뜬다"는 문제를 진단할 수 있게 함. 화면에는 조용히 빈 목록으로 넘어감.
  }
}

// 작업단계 목록이 추가·삭제될 때마다 서버에 통째로 다시 저장 (upsert)
async function saveProjectOptions(){
  try {
    await sb(
      'project_options?on_conflict=department',
      'POST',
      { department: DEPARTMENT_ID, data: projectOptions, updated_at: new Date().toISOString() },
      { 'Prefer': 'resolution=merge-duplicates,return=representation' }
    );
  } catch(e){
    console.error(e);
    // [수정됨] "저장 실패"라고만 뜨면 원인을 알 수 없어서, 실제 서버 오류 메시지의 앞부분을 같이 보여줌.
    // (자주 나오는 원인: project_options 테이블을 아직 Supabase에서 안 만든 경우 -> 마이그레이션 SQL을 먼저 실행해야 함)
    const detail = (e && e.message) ? String(e.message).slice(0, 120) : '';
    showToast('프로젝트 목록 저장 실패' + (detail ? `: ${detail}` : ''));
  }
}

// 지금 화면에 보여줄 달(currentYear, currentMonth)에 걸쳐있는 모든 주(週)의
// 업무기록과 주간정리 데이터를 한꺼번에 불러옴
async function loadMonthData(){
  const first = monthFirstDate(currentYear, currentMonth); // 이번 달 1일
  const last  = monthLastDate(currentYear, currentMonth);  // 이번 달 말일
  const rangeStart = startOfWeek(first); // 1일이 속한 주의 월요일
  const rangeEnd   = weekEnd(startOfWeek(last)); // 말일이 속한 주의 일요일
  const startStr = toDateStr(rangeStart);
  const endStr   = toDateStr(rangeEnd);

  // ★ [추가됨] 프로젝트 진행률을 "이전 달까지 쭉 이어서" 계산하려면, 이번 달 데이터만으로는 부족합니다.
  // 그래서 업무기록(work_logs)만큼은 "이번 달 + 이전 5개월"(총 6개월치)을 한꺼번에 불러와서
  // logsByEmpDate에 담아둡니다. 이렇게 해두면, 프로젝트가 지난달/지지난달부터 이어져 왔어도
  // computeAutoSummary / computeMonthlySummary가 그 이전 값을 찾아서 이어붙일 수 있게 됩니다.
  // (주간정리(weekly_summaries)는 "이번 달에 보이는 주"들만 화면에 표시되므로, 그 부분은 예전처럼
  //  이번 달 범위만 불러와도 충분합니다 - 굳이 6개월치를 다 불러올 필요 없음)
  const HISTORY_MONTHS_BACK = 5; // 이번 달 포함 총 6개월(이번 달 + 과거 5개월)을 누적 계산 범위로 사용
  let histYear = currentYear, histMonth = currentMonth - HISTORY_MONTHS_BACK;
  while(histMonth <= 0){ histMonth += 12; histYear--; } // 월이 0 이하로 내려가면 작년으로 넘어가도록 보정
  const historyFirst = monthFirstDate(histYear, histMonth);
  const logsRangeStart = startOfWeek(historyFirst); // 과거 달의 1일이 속한 주의 월요일까지 거슬러 올라감
  const logsStartStr = toDateStr(logsRangeStart);
  loadedHistoryStart = logsRangeStart; // computeAutoSummary/computeMonthlySummary에서 이 값을 사용함

  // 업무 기록(work_logs)을 불러와서 "인원ID_날짜" 형태의 이름표를 붙여 정리해둠
  // (조회 범위가 logsStartStr ~ endStr 로, 이번 달 범위보다 더 넓게(과거 5개월치 추가) 불러옵니다)
  logsByEmpDate = {};
  try {
    const logs = await sb(`work_logs?department=eq.${DEPT_Q}&log_date=gte.${logsStartStr}&log_date=lte.${endStr}&order=sort_order.asc`);
    logs.forEach(l => {
      const key = `${l.employee_id}_${l.log_date}`;
      if(!logsByEmpDate[key]) logsByEmpDate[key] = [];
      logsByEmpDate[key].push(l);
    });
  } catch(e){ console.error(e); showToast('업무 기록을 불러오지 못했습니다'); }

  // 주간정리(weekly_summaries)는 이번 달에 실제로 화면에 보이는 주(週)들만 있으면 되므로, 예전처럼
  // "이번 달 범위(startStr~endStr)"만 불러옵니다.
  summariesByEmp = {};
  try {
    const summaries = await sb(`weekly_summaries?department=eq.${DEPT_Q}&week_start=gte.${startStr}&week_start=lte.${endStr}`);
    summaries.forEach(s => { summariesByEmp[`${s.employee_id}_${s.week_start}`] = s; });
  } catch(e){ console.error(e); }
}

// 헤더 오른쪽의 "● 연결됨" 표시를 상황에 맞게 바꿔주는 함수.
// state: 'loading'(서버와 통신 중 - 노란 점) / 'ok'(정상 - 초록 점) / 'error'(오류 - 빨간 점)
// 재고관리 앱의 sync-dot과 같은 방식입니다.
function setSyncStatus(state){
  const dot = document.getElementById('sync-dot');
  const text = document.getElementById('sync-text');
  if(!dot || !text) return;
  dot.classList.remove('loading', 'error'); // 일단 상태 class를 다 지우고
  if(state === 'loading'){
    dot.classList.add('loading');
    text.textContent = '동기화중';
  } else if(state === 'error'){
    dot.classList.add('error');
    text.textContent = '오류';
  } else {
    text.textContent = '연결됨'; // 기본 상태(초록 점)는 CSS의 .sync-dot 기본 배경색을 그대로 사용
  }
}

// "인원 목록"과 "이번 달 데이터"를 전부 새로 불러온 뒤, 화면을 처음부터 다시 그림
async function refreshAll(){
  setSyncStatus('loading'); // 불러오는 동안 헤더에 "동기화중" 노란 점 표시
  try {
    await loadEmployees();
    await loadProjectOptions();
    await loadMonthData();
    render();
    setSyncStatus('ok'); // 다 끝나면 "연결됨" 초록 점으로 되돌림
  } catch(e){
    console.error(e);
    setSyncStatus('error'); // 예상 못한 오류가 나면 빨간 점 표시
  }
}

/* ============================================================
   화면 그리기(렌더링) - 데이터를 실제 HTML 글자/칸으로 바꾸는 부분
   ============================================================ */

// 화면을 새로 그리는 전체 흐름: 상단 연/월 표시 -> 표 헤더(인원 이름 줄) -> 표 본문(날짜 줄들)
// -> 월간일지 탭 내용(항상 최신 상태로 미리 그려둠, 탭을 눌렀을 때 바로 보이도록) 순서로 그림
function render(){
  renderMonthNav();
  renderHead();
  renderBody();
  renderMonthlyTab();
}

// 헤더의 "2026년", "7월" 글자를 지금 currentYear/currentMonth 값에 맞게 채워 넣음
// (이 글자들의 생김새(크기/색)를 바꾸고 싶다면 위쪽 CSS의 .year-label 규칙을 수정하면 됨)
function renderMonthNav(){
  document.getElementById('yearLabel').textContent = `${currentYear}년`;
  document.getElementById('monthLabel').textContent = `${currentMonth}월`;
}

let dragSrcId = null; // 인원 순서를 드래그로 바꿀 때, 지금 "잡고 있는" 인원의 id를 잠깐 기억해두는 변수

// 표 맨 위 "인원 이름 줄"(<thead>)을 그리는 함수. 인원마다 이름/직급 칸을 하나씩 만들고,
// 마우스로 드래그해서 순서를 바꾸는 기능도 여기서 연결함.
function renderHead(){
  const row = document.getElementById('headRow');
  row.innerHTML = '<th class="day-label-col"></th>'; // 맨 왼쪽 빈 칸(날짜 칸 자리) 먼저 넣음
  if(employees.length === 0){
    // 인원이 한 명도 없으면 안내 문구만 표시
    row.innerHTML += `<th style="padding:14px;color:var(--muted);font-weight:500;font-size:13px;">
      인원이 없습니다. 우측 상단 '+ 인원 추가'로 시작하세요.</th>`;
    return;
  }
  employees.forEach(emp => {
    const th = document.createElement('th');
    th.draggable = true; // 이 칸을 마우스로 끌 수 있게 함
    // 아래 innerHTML 안의 class="emp-head" / "emp-name" / "emp-pos" / "emp-menu-btn" 이
    // 각각 위쪽 CSS 규칙과 이름이 연결되어 생김새가 정해짐
    th.innerHTML = `
      <div class="emp-head">
        <div class="emp-name-row">
          <span class="emp-name">${escapeHtml(emp.name)}</span>
          ${emp.position ? `<span class="emp-pos">${escapeHtml(emp.position)}</span>` : ''}
        </div>
        <button class="emp-menu-btn" data-emp="${emp.id}" title="관리">⋯</button>
      </div>`;
    th.querySelector('.emp-menu-btn').addEventListener('click', () => openEmployeeMenu(emp)); // "⋯" 클릭 시 관리 팝업 열기

    // 드래그로 인원 순서를 바꾸는 기능 (마우스로 잡고 - 이동하고 - 놓는 4단계 이벤트)
    th.addEventListener('dragstart', () => {
      dragSrcId = emp.id;
      th.classList.add('dragging'); // CSS의 .dragging 스타일 적용 (반투명하게)
    });
    th.addEventListener('dragend', () => { th.classList.remove('dragging'); });
    th.addEventListener('dragover', (e) => { e.preventDefault(); th.classList.add('drag-over'); }); // 드롭될 위치 강조
    th.addEventListener('dragleave', () => { th.classList.remove('drag-over'); });
    th.addEventListener('drop', async (e) => {
      e.preventDefault();
      th.classList.remove('drag-over');
      if(!dragSrcId || dragSrcId === emp.id) return;
      const fromIdx = employees.findIndex(x => x.id === dragSrcId);
      const toIdx = employees.findIndex(x => x.id === emp.id);
      if(fromIdx === -1 || toIdx === -1) return;
      const [moved] = employees.splice(fromIdx, 1); // 배열에서 기존 위치의 인원을 빼내고
      employees.splice(toIdx, 0, moved);              // 새 위치에 끼워 넣음
      dragSrcId = null;
      render(); // 화면을 먼저 새 순서로 다시 그림 (사용자는 바로 결과를 봄)
      try {
        // 그 다음 서버에도 새 순서(sort_order 숫자)를 저장해서, 새로고침해도 순서가 유지되게 함
        await Promise.all(employees.map((e2, idx) => sb(`employees?id=eq.${e2.id}`, 'PATCH', { sort_order: idx })));
      } catch(err){ console.error(err); showToast('순서 저장 실패'); }
    });

    row.appendChild(th);
  });
}

// 표 본문(<tbody>)을 그리는 함수. 이번 달의 모든 날짜를 한 줄씩 만들고,
// "1(수)" 같은 날짜 라벨(day-cell-label)과 인원별 업무 칸(day-cell)들을 채워 넣은 뒤,
// 매주 끝(일요일 또는 월말)마다 "주간정리" 줄을 추가로 삽입함.
function renderBody(){
  const body = document.getElementById('gridBody');
  body.innerHTML = '';

  if(employees.length === 0){
    body.innerHTML = `<tr><td class="day-label-col"></td><td class="empty-state">인원을 먼저 추가해주세요.</td></tr>`;
    return;
  }

  const totalDays = daysInMonth(currentYear, currentMonth);

  // 특정 주의 "주간정리" 줄 하나를 만들어서 표에 추가하는 내부 함수
  function appendSummaryRow(weekStartDate){
    const sumTr = document.createElement('tr');
    sumTr.className = 'summary-row'; // 이 class 이름 덕분에 위쪽 CSS의 tr.summary-row 스타일이 적용됨
    const sumLabelTd = document.createElement('td');
    sumLabelTd.className = 'day-label-col';
    sumLabelTd.textContent = '주간정리'; // 왼쪽 칸에 "주간정리" 라는 글자 표시
    sumTr.appendChild(sumLabelTd);

    const weekStartStr = toDateStr(weekStartDate);
    employees.forEach(emp => {
      const td = document.createElement('td');
      td.dataset.empId = emp.id;
      renderSummaryCell(td, emp, weekStartStr); // 인원별 요약 내용을 채워 넣음 (아래 함수 참고)
      sumTr.appendChild(td);
    });
    body.appendChild(sumTr);
  }

  let weekStartOfCurrentRun = null;

  // 이번 달의 1일부터 말일까지 하루하루 반복하면서 줄(행)을 하나씩 만듦
  for(let d = 1; d <= totalDays; d++){
    const date = new Date(currentYear, currentMonth-1, d);
    const dateStr = toDateStr(date);
    const dowIdx = (date.getDay()+6) % 7; // 자바스크립트 기본 요일번호(0=일)를 0=월 기준으로 바꿈
    const isWeekend = dowIdx >= 5;         // 5=토, 6=일 이면 주말
    const isToday = isSameDate(date, TODAY);

    if(weekStartOfCurrentRun === null) weekStartOfCurrentRun = startOfWeek(date);

    const tr = document.createElement('tr');
    // 아래 className 에 'weekend' 또는 'is-today' 글자가 들어가면,
    // 위쪽 CSS의 tr.weekend / tr.is-today 규칙이 자동으로 적용되어 배경색 등이 바뀜
    tr.className = (isWeekend ? 'weekend' : '') + (isToday ? ' is-today' : '');
    tr.dataset.date = dateStr;

    // ★ 여기가 바로 "1(수)" 같은 날짜 라벨을 실제로 만들어내는 부분입니다.
    //   class="day-cell-label" 로 감싼 부분이 날짜 숫자(예: 1)를 담당하고,
    //   그 안의 <span class="dow"> 이 요일 글자(예: (수))를 담당합니다.
    //   이 글자들의 "생김새"(크기/색/여백)를 바꾸고 싶다면
    //   위쪽 style(스타일) 안의 .day-cell-label 과 .day-cell-label .dow 규칙을 수정하면 됩니다.
    const labelTd = document.createElement('td');
    labelTd.className = 'day-label-col';
    labelTd.innerHTML = `<div class="day-cell-label">${date.getDate()}<span class="dow">(${DOW_LABELS[dowIdx]})</span></div>`;
    tr.appendChild(labelTd);

    // 인원별로 그 날짜의 업무 칸을 하나씩 만듦
    employees.forEach(emp => {
      const key = `${emp.id}_${dateStr}`;
      const items = logsByEmpDate[key] || [];
      const hasLeave = items.some(it => containsLeaveKeyword(itemSearchText(it))); // 타이틀+내용 모두에서 휴가 관련 단어 검사

      const td = document.createElement('td');
      // 'is-leave' 글자가 class에 들어가면 위쪽 CSS의 .day-cell.is-leave 규칙(살구색 배경)이 적용됨
      td.className = 'day-cell' + (hasLeave ? ' is-leave' : '');
      td.addEventListener('click', () => openDayModal(emp, date)); // 칸을 클릭하면 상세 입력 팝업이 열림

      if(items.length === 0){
        // 아직 아무것도 입력 안 된 칸에는 흐린 "+ 항목 추가" 안내 글자를 보여줌 (CSS: .empty-hint)
        td.innerHTML = `<div class="empty-hint">+ 항목 추가</div>`;
      } else {
        // ★ [수정됨] 같은 프로젝트(타이틀)에 대해 여러 단계(모델링/도면/랜더링 등)를 각각 따로 입력해두면,
        // 예전엔 "프로젝트 - 모델링 100%" / "프로젝트 - 도면 100%" / "프로젝트 - 랜더링 100%" 처럼
        // 프로젝트명이 반복되는 3줄로 나뉘어 보였습니다. 이제는 같은 프로젝트끼리는 한 줄로 모아서
        // "프로젝트 - 모델링 100%, 도면 100%, 랜더링 100%" 형태로 보여줍니다.
        // (다른 프로젝트는 여전히 줄이 따로 나뉘어 보입니다 - 프로젝트명이 다르면 합치지 않음)

        // (1) 프로젝트별로 "단계가 있는 항목"들을 미리 모아둠 (title -> 그 프로젝트의 단계 항목 배열)
        const stageGroups = new Map();
        items.forEach(it => {
          const t = (it.title || '').trim();
          const stages = it.stage ? String(it.stage).split(STAGE_SEP).map(s => s.trim()).filter(Boolean) : [];
          if(t && stages.length > 0){
            if(!stageGroups.has(t)) stageGroups.set(t, []);
            stageGroups.get(t).push(it);
          }
        });

        // (2) 원래 항목 순서를 그대로 따라가면서, "단계가 있는 프로젝트"는 그 프로젝트가 처음 나올 때
        // 딱 한 번만 (그 프로젝트의 모든 단계를 합쳐서) 한 줄로 만들고, 그 다음에 또 나오는 같은 프로젝트의
        // 단계 항목은 이미 합쳐서 보여줬으므로 건너뜀. 단계가 없는 항목(제목만 있거나 메모만 있는 경우)은
        // 예전처럼 한 줄씩 그대로 보여줌.
        const renderedTitles = new Set();
        let html = items.map(it => {
          const title = (it.title || '').trim();
          const stages = it.stage ? String(it.stage).split(STAGE_SEP).map(s => s.trim()).filter(Boolean) : [];

          if(title && stages.length > 0){
            if(renderedTitles.has(title)) return ''; // 이미 이 프로젝트는 한 줄로 합쳐서 출력했으므로 건너뜀
            renderedTitles.add(title);
            const group = stageGroups.get(title);
            // 이 프로젝트의 단계들을 "단계명 진행률%" 형태로 각각 만듦.
            // ★ [수정됨] % 숫자는 <span class="pct">로 감싸서, 원래 스타일(작은 회색 모노스페이스 글꼴)이
            // 그대로 유지되도록 함. (합치기 전에는 각 항목마다 .pct가 따로 있었는데, 한 줄로 합치면서
            // 이 부분을 깜빡하고 그냥 일반 글자로 넣었더니 %가 밋밋하게 보였던 문제를 고침)
            const htmlSegments = group.map(g => {
              const gStages = g.stage ? String(g.stage).split(STAGE_SEP).map(s => s.trim()).filter(Boolean) : [];
              const stageLabel = escapeHtml(gStages.join(' / '));
              const contentPart = (g.content || '').trim() ? `(${escapeHtml(g.content.trim())})` : ''; // 내용이 있으면 괄호로 덧붙임
              const pctHtml = (g.progress !== null && g.progress !== undefined) ? `<span class="pct">${g.progress}%</span>` : '';
              return `${stageLabel}${contentPart}${pctHtml}`;
            });
            // 마우스를 올렸을 때 뜨는 title 속성(툴팁)은 HTML 태그 없이 순수 글자여야 하므로 따로 만듦
            const plainSegments = group.map(g => {
              const gStages = g.stage ? String(g.stage).split(STAGE_SEP).map(s => s.trim()).filter(Boolean) : [];
              const stageLabel = gStages.join(' / ');
              const contentPart = (g.content || '').trim() ? `(${g.content.trim()})` : '';
              const pct = (g.progress !== null && g.progress !== undefined) ? ` ${g.progress}%` : '';
              return `${stageLabel}${contentPart}${pct}`;
            });
            const htmlLabel = `${escapeHtml(title)} - ${htmlSegments.join(', ')}`;
            const plainLabel = `${title} - ${plainSegments.join(', ')}`;
            return `
          <div class="log-item">
            <span class="dot">·</span>
            <span class="txt" title="${escapeHtml(plainLabel)}">${htmlLabel}</span>
          </div>`;
          }

          // 단계가 없는 항목(제목만 있거나, 메모/내용만 있는 경우)은 예전 방식 그대로 한 줄씩 표시
          const label = itemDisplayLabel(it);
          return `
          <div class="log-item">
            <span class="dot">·</span>
            <span class="txt" title="${escapeHtml(label)}">${escapeHtml(label)}</span>
            ${it.progress !== null && it.progress !== undefined ? `<span class="pct">${it.progress}%</span>` : ''}
          </div>`;
        }).filter(Boolean).join('');
        td.innerHTML = html;
      }
      tr.appendChild(td);
    });

    body.appendChild(tr);

    // 그 날이 일요일이거나, 이번 달의 마지막 날이면 -> 그 주의 "주간정리" 줄을 바로 아래에 추가
    const isLastDayOfWeek = dowIdx === 6;
    const isLastDayOfMonth = d === totalDays;
    if(isLastDayOfWeek || isLastDayOfMonth){
      appendSummaryRow(weekStartOfCurrentRun);
      weekStartOfCurrentRun = null;
    }
  }

  // 앱을 맨 처음 열었을 때 딱 한 번만, "오늘" 날짜 줄이 화면 가운데 오도록 자동 스크롤
  if(!didInitialScroll){
    didInitialScroll = true;
    setTimeout(() => {
      const todayStr = toDateStr(TODAY);
      const row = body.querySelector(`tr[data-date="${todayStr}"]`);
      if(row) row.scrollIntoView({ block:'center', behavior:'auto' });
    }, 30);
  }
}

/* ============================================================
   [공통] 여러 날짜의 항목들을 모아서, "프로젝트별 진행률 요약 줄"을 만들어주는 함수.
   주간정리·월간정리 둘 다 이 함수를 함께 씁니다.

   규칙:
   - 프로젝트(title)+작업단계(stage)가 둘 다 있는 항목 -> 프로젝트별로 묶어서 "롤업(합산) %" 계산.
     그 프로젝트에 정의된 단계 개수(n)를 분모로 하고, 아직 입력 안 된 단계는 0%로 쳐서
     (모든 단계 % 합) ÷ n 으로 프로젝트 진행률을 구함.
     예) 모델링/도면/매뉴얼 3단계 중 모델링만 100% 입력 -> (100+0+0)/3 = 33%
   - 프로젝트(타이틀)만 있고 단계가 없는 예전 방식 항목, 또는 내용만 있는 메모는
     예전처럼 "그 라벨의 가장 최근 입력값"만 한 줄로 보여줌.
   ============================================================ */
function buildProgressSummaryLines(dayItemsList){
  const projectStageProgress = new Map(); // 프로젝트명 -> Map(단계명 -> 최근 진행률)
  const projectFirstSeen = [];             // 프로젝트가 처음 등장한 순서를 기억(출력 순서용)
  const simpleProgress = new Map();        // 단계 없는 항목: 라벨 -> 최근 진행률
  let totalCount = 0;

  // 날짜가 이른 것부터 순서대로 훑으면서 값을 계속 덮어씀 -> 결과적으로 "가장 최근 값"만 남음
  dayItemsList.forEach(items => {
    totalCount += items.length;
    items.forEach(it => {
      if(it.progress === null || it.progress === undefined) return; // 진행률 없는 항목은 건너뜀
      const title = (it.title || '').trim();
      const stage = (it.stage || '').trim();
      const content = (it.content || '').trim();
      // [수정됨] 작업단계는 이제 "제작모델링,제작도면" 처럼 여러 개가 콤마로 합쳐져 저장될 수 있음.
      // 콤마로 나눠서, 선택된 단계 각각에 같은 진행률을 등록함.
      const stageNames = stage ? stage.split(STAGE_SEP).map(s => s.trim()).filter(Boolean) : [];
      if(title && stageNames.length > 0){
        if(!projectStageProgress.has(title)){
          projectStageProgress.set(title, new Map());
          projectFirstSeen.push(title);
        }
        const stageMap = projectStageProgress.get(title);
        stageNames.forEach(sn => stageMap.set(sn, it.progress));
      } else {
        const label = title || content;
        if(!label) return;
        simpleProgress.set(label, it.progress);
      }
    });
  });

  if(totalCount === 0) return { totalCount, lines: [] };

  const lines = [];

  // 프로젝트별 롤업 계산 (등장한 순서대로)
  // [수정됨] 프로젝트가 project_options.projectStages 에 "전체 단계"로 등록되어 있으면,
  // 그 등록된 개수(n)를 분모로 쓰고, 아직 입력 안 한 단계는 0%로 계산함.
  // (예: 4단계짜리 프로젝트인데 1단계만 80% 입력 -> (80+0+0+0)/4 = 20%)
  // 아직 등록 안 된(예전 방식) 프로젝트는 예전처럼 "실제로 입력된 단계 개수"만으로 계산함.
  projectFirstSeen.forEach(project => {
    const stageMap = projectStageProgress.get(project);
    const registered = (projectOptions.projectStages && projectOptions.projectStages[project]) || null;
    const denomStages = (registered && registered.length > 0) ? registered : Array.from(stageMap.keys());
    let sum = 0;
    denomStages.forEach(stageName => { sum += stageMap.has(stageName) ? stageMap.get(stageName) : 0; }); // 등록됐지만 미입력이면 0으로 계산
    const rollup = denomStages.length > 0 ? Math.round(sum / denomStages.length) : 0;
    lines.push(`${project} ${rollup}%`);
  });

  // 단계 없는 단순 항목들 (예전 방식 호환)
  simpleProgress.forEach((pct, label) => { lines.push(`${label} ${pct}%`); });

  return { totalCount, lines };
}

// 한 주(週) 동안의 업무 내용을 바탕으로 "자동 요약 글자"를 만들어내는 함수.
// [수정됨] 예전엔 "이번 주 7일치"만 보고 프로젝트 진행률을 계산해서, 지난주에 입력해둔
// 단계(예: 모델링 40%)가 이번 주 계산에는 반영이 안 되고, 이번 주에 입력 안 한 단계는
// 무조건 0%로 쳐서 평균이 내려가버리는 문제가 있었습니다(= "리셋되는 것처럼" 보였던 원인).
// 그래서 이제는 "불러와져 있는 가장 이전 달(loadedHistoryStart)부터 이번 주 끝까지" 전체를 다 보고
// 계산해서, 프로젝트의 단계별 진행률이 예전 달/예전 주에 입력한 값이라도 계속 이어지도록 함.
function computeAutoSummary(empId, weekStartDate){
  const wEnd = weekEnd(weekStartDate); // 이번 주의 일요일

  // (1) "이번 주에 실제로 입력한 게 있는지"는 예전처럼 딱 이번 주 7일만 보고 판단함
  //     (이게 없으면 애초에 "이번 주 입력된 항목이 없습니다"라고 보여줘야 하므로)
  let weekOwnCount = 0;
  for(let i=0;i<7;i++){
    const dateStr = toDateStr(addDays(weekStartDate, i));
    weekOwnCount += (logsByEmpDate[`${empId}_${dateStr}`] || []).length;
  }
  if(weekOwnCount === 0) return '이번 주 입력된 항목이 없습니다.';

  // (2) 실제 진행률(%) 계산은 "불러와져 있는 가장 이전 시점(loadedHistoryStart)부터 이번 주 끝까지"
  //     전체 기간을 다 훑어서 계산함 -> 프로젝트 단계값이 지난달/지난주 것이라도 계속 이어짐
  const histStart = loadedHistoryStart || weekStartDate; // 혹시 못 불러왔으면 안전하게 이번 주부터라도 계산
  const totalDays = Math.round((wEnd - histStart) / 86400000) + 1;
  const dayItemsList = [];
  for(let i=0; i<totalDays; i++){
    const dateStr = toDateStr(addDays(histStart, i));
    dayItemsList.push(logsByEmpDate[`${empId}_${dateStr}`] || []);
  }
  const { lines } = buildProgressSummaryLines(dayItemsList);
  if(lines.length === 0) return '진행률이 입력된 항목이 없습니다.';
  // 한 줄씩 줄바꿈으로 이어붙임 (CSS의 .summary-text가 white-space:pre-wrap 이라서 줄바꿈이 그대로 화면에 표시됨)
  return lines.join('\n');
}

// 주간정리 칸 하나의 내용을 화면에 그리는 함수.
// - 사람이 직접 쓴 글(is_manual=true)이 있으면 그 글을,
// - 없으면 computeAutoSummary()가 계산한 자동 요약 글을 보여줌.
function renderSummaryCell(td, emp, weekStartStr){
  const weekStartDate = new Date(weekStartStr + 'T00:00:00');
  const key = `${emp.id}_${weekStartStr}`;
  const existing = summariesByEmp[key];
  const isManual = existing && existing.is_manual && existing.summary_text;
  const text = isManual ? existing.summary_text : computeAutoSummary(emp.id, weekStartDate);

  // class="summary-text" 부분이 실제 글자 스타일(위쪽 CSS의 .summary-text 규칙)을 담당함.
  // 자동 요약이면 추가로 "auto" class가 붙어서 글자색이 더 흐리게 표시됨 (.summary-text.auto)
  td.innerHTML = `
    <div class="summary-text ${isManual ? '' : 'auto'}">${escapeHtml(text)}</div>
    <button class="summary-edit-btn" data-emp="${emp.id}">${isManual ? '수정' : '직접 작성'}</button>
    ${isManual ? `<button class="summary-edit-btn" data-emp="${emp.id}" data-reset="1" style="margin-left:8px;">자동요약으로 되돌리기</button>` : ''}
  `;
  td.querySelectorAll('.summary-edit-btn').forEach(btn => {
    btn.addEventListener('click', (e) => {
      e.stopPropagation();
      if(btn.dataset.reset){
        resetSummaryToAuto(emp.id, weekStartStr, td);
      } else {
        editSummaryInline(emp, td, weekStartStr);
      }
    });
  });
}

// 주간정리 칸을 "직접 입력할 수 있는 상태"(textarea)로 바꿔주는 함수
function editSummaryInline(emp, td, weekStartStr){
  const weekStartDate = new Date(weekStartStr + 'T00:00:00');
  const key = `${emp.id}_${weekStartStr}`;
  const existing = summariesByEmp[key];
  const startVal = (existing && existing.is_manual) ? existing.summary_text : '';
  td.innerHTML = `
    <textarea class="summary-textarea" placeholder="${escapeHtml(computeAutoSummary(emp.id, weekStartDate))}">${escapeHtml(startVal)}</textarea>
    <div class="summary-actions">
      <button class="cancel-sum">취소</button>
      <button class="primary save-sum">저장</button>
    </div>
  `;
  const textarea = td.querySelector('textarea');
  textarea.focus();
  td.querySelector('.cancel-sum').addEventListener('click', () => renderSummaryCell(td, emp, weekStartStr));
  td.querySelector('.save-sum').addEventListener('click', async () => {
    const val = textarea.value.trim();
    await saveSummary(emp.id, weekStartStr, val);
    renderSummaryCell(td, emp, weekStartStr);
  });
}

// 사람이 직접 쓴 주간정리 내용을 Supabase에 저장함 (이미 있으면 덮어쓰기 = upsert)
async function saveSummary(empId, weekStartStr, text){
  const payload = {
    employee_id: empId,
    week_start: weekStartStr,
    department: DEPARTMENT_ID, // 이 부서 소속임을 표시 (다른 부서 화면에서는 이 값 때문에 안 보임)
    summary_text: text || null,
    is_manual: !!text,
    updated_at: new Date().toISOString()
  };
  try {
    const rows = await sb(
      'weekly_summaries?on_conflict=employee_id,week_start',
      'POST',
      payload,
      { 'Prefer': 'resolution=merge-duplicates,return=representation' }
    );
    summariesByEmp[`${empId}_${weekStartStr}`] = rows[0];
    showToast('주간정리를 저장했습니다');
  } catch(e){ console.error(e); showToast('주간정리 저장 실패'); }
}

// 사람이 직접 쓴 주간정리를 지우고, 다시 "자동 계산 요약"으로 되돌리는 함수
async function resetSummaryToAuto(empId, weekStartStr, td){
  try {
    await sb(`weekly_summaries?department=eq.${DEPT_Q}&employee_id=eq.${empId}&week_start=eq.${weekStartStr}`, 'DELETE');
    delete summariesByEmp[`${empId}_${weekStartStr}`];
    const emp = employees.find(e => e.id === empId);
    renderSummaryCell(td, emp, weekStartStr);
    showToast('자동 요약으로 되돌렸습니다');
  } catch(e){ console.error(e); showToast('되돌리기 실패'); }
}

/* ============================================================
   탭 전환 ("주간일지" ↔ "월간일지") - 재고관리의 switchTab()과 같은 방식
   ============================================================ */
function switchTab(tab){
  // 탭에 따라 두 영역 중 하나만 보이고 나머지는 숨김 (display:none)
  document.getElementById('tab-weekly').style.display  = tab === 'weekly'  ? '' : 'none';
  document.getElementById('tab-monthly').style.display = tab === 'monthly' ? '' : 'none';
  // 탭 버튼 중 지금 선택된 것에만 'active' class를 붙여서 파란 밑줄이 표시되게 함
  document.querySelectorAll('.tab').forEach((t, i) => {
    t.classList.toggle('active', (i === 0 && tab === 'weekly') || (i === 1 && tab === 'monthly'));
  });
  // 방금 화면에 나타난 쪽(주간일지 표 또는 월간일지 목록)의 스크롤 높이를 다시 정확히 재계산함
  // (숨겨져 있는 동안엔 높이를 잴 수 없어서, 다시 보이게 된 직후에 재계산이 필요함)
  adjustScrollAreas();
}

/* ============================================================
   월간일지 자동요약 - 인원 한 명의 "이번 달 전체" 업무를 프로젝트별 진행률로 압축해서 만들어줌
   (위쪽 buildProgressSummaryLines()와 동일한 롤업 계산을 그대로 재사용함)
   [수정됨] 이번 달 데이터만으로 계산하면, 지난 달부터 이어진 프로젝트의 이전 단계값이 반영되지
   않아서 %가 낮게 나오는 문제가 있었습니다. 그래서 이제 "불러와져 있는 가장 이전 시점
   (loadedHistoryStart)부터 이번 달 끝까지" 전체를 다 보고 계산해서, 달을 넘어가는 프로젝트도
   진행률이 자연스럽게 이어지도록 함.
   ============================================================ */
function computeMonthlySummary(empId){
  const first = monthFirstDate(currentYear, currentMonth);
  const last  = monthLastDate(currentYear, currentMonth);
  const rangeEnd = weekEnd(startOfWeek(last));    // 말일이 속한 주의 일요일 (이번 달 계산 범위의 끝)

  // (1) "이번 달에 실제로 입력한 게 있는지"는 예전처럼 이번 달(+월 경계 걸친 주) 범위만 보고 판단함
  const ownRangeStart = startOfWeek(first); // 1일이 속한 주의 월요일 (예: 6월 29일)
  const ownRangeDays = Math.round((rangeEnd - ownRangeStart) / 86400000) + 1;
  let totalCount = 0;
  for(let i=0; i<ownRangeDays; i++){
    const dateStr = toDateStr(addDays(ownRangeStart, i));
    totalCount += (logsByEmpDate[`${empId}_${dateStr}`] || []).length;
  }
  if(totalCount === 0) return '이번 달 입력된 업무가 없습니다.';

  // (2) 실제 진행률(%) 계산은 "불러와져 있는 가장 이전 시점부터 이번 달 끝까지" 전체를 다 훑어서 계산
  const histStart = loadedHistoryStart || ownRangeStart;
  const totalDays = Math.round((rangeEnd - histStart) / 86400000) + 1;
  const dayItemsList = [];
  for(let i = 0; i < totalDays; i++){
    const dateStr = toDateStr(addDays(histStart, i));
    dayItemsList.push(logsByEmpDate[`${empId}_${dateStr}`] || []);
  }
  const { lines } = buildProgressSummaryLines(dayItemsList);

  if(lines.length === 0) return `이번 달 총 ${totalCount}건의 업무를 입력했습니다. (진행률 입력 없음)`;

  // "이번 달 진행률" 이라는 제목 한 줄 + 프로젝트/항목별로 줄바꿈해서 한 줄씩 나열
  return `이번 달 진행률\n${lines.join('\n')}`;
}

// 월간일지 탭 안에, 인원별로 카드를 하나씩 만들어서 채워 넣는 함수
function renderMonthlyTab(){
  const list = document.getElementById('monthlyList');
  if(!list) return; // 아직 화면에 해당 요소가 없으면(초기 로딩 순서 문제) 그냥 넘어감

  if(employees.length === 0){
    list.innerHTML = `<div class="empty-state">인원을 먼저 추가해주세요.</div>`;
    return;
  }

  // class="monthly-card" 부분의 생김새는 위쪽 CSS의 .monthly-card 규칙이 담당함
  list.innerHTML = employees.map(emp => {
    const summary = computeMonthlySummary(emp.id);
    return `
      <div class="monthly-card">
        <div class="monthly-card-head">
          <span class="name">${escapeHtml(emp.name)}</span>
          ${emp.position ? `<span class="pos">${escapeHtml(emp.position)}</span>` : ''}
        </div>
        <div class="summary-para">${escapeHtml(summary)}</div>
      </div>`;
  }).join('');
}

// 사람이 입력한 글자 중에 <, >, &, " 같은 특수문자가 있어도 화면이 깨지지 않도록 안전하게 바꿔주는 함수
function escapeHtml(str){
  if(str === null || str === undefined) return '';
  return String(str)
    .replaceAll('&','&amp;').replaceAll('<','&lt;').replaceAll('>','&gt;')
    .replaceAll('"','&quot;');
}

/* ============================================================
   팝업(모달) 공통 함수
   - 규칙 1: 팝업 바깥의 어두운 배경을 클릭해도 팝업이 닫히지 않음 (실수로 내용을 날리지 않도록)
             -> 오직 "✕" 버튼이나 "취소" 버튼을 눌러야만 닫힘
   - 규칙 2: 입력창 안에서 Enter 키를 누르면, 그 팝업의 파란색 주요 버튼(예: "저장")이 자동으로 눌림
             (단, 여러 줄 입력이 필요한 textarea 안에서는 Enter가 그냥 줄바꿈으로 동작함)
   ============================================================ */
function openModal({ title, bodyHtml, footerHtml, onMount }){
  const root = document.getElementById('modalRoot');
  // 아래 class 이름(modal-overlay / modal-panel / modal-header 등)들이
  // 각각 위쪽 CSS의 같은 이름 규칙과 연결되어 팝업의 생김새를 결정함
  root.innerHTML = `
    <div class="modal-overlay" id="modalOverlay">
      <div class="modal-panel">
        <div class="modal-header">
          <h3>${title}</h3>
          <button class="modal-close" id="modalCloseBtn">✕</button>
        </div>
        <div class="modal-body" id="modalBody">${bodyHtml}</div>
        ${footerHtml ? `<div class="modal-footer">${footerHtml}</div>` : ''}
      </div>
    </div>
  `;
  const close = () => { root.innerHTML = ''; }; // 팝업을 닫는 방법 = 담아뒀던 내용을 통째로 비우는 것
  const overlay = document.getElementById('modalOverlay');
  document.getElementById('modalCloseBtn').addEventListener('click', close);
  // 오버레이(어두운 바깥 배경)를 클릭했을 때 닫는 코드는 "일부러" 넣지 않았음
  // -> 그래서 바깥을 클릭해도 팝업이 안 닫히는 것임
  overlay.addEventListener('keydown', (e) => {
    if(e.key !== 'Enter') return;
    const tag = e.target.tagName;
    if(tag === 'TEXTAREA' || tag === 'BUTTON') return; // textarea에서는 줄바꿈 허용, 버튼은 자체 동작 유지
    e.preventDefault();
    const primaryBtn = overlay.querySelector('.modal-footer .btn.primary');
    if(primaryBtn) primaryBtn.click(); // Enter 키 = 파란색 주요 버튼 클릭과 동일하게 처리
  });
  // ESC 키를 누르면 팝업을 닫음 (바깥 클릭으로는 안 닫히지만, ESC는 "취소"와 같은 의미로 허용함)
  document.addEventListener('keydown', function escHandler(e){
    if(e.key !== 'Escape') return;
    document.removeEventListener('keydown', escHandler); // 한 번 닫히면 이 리스너는 스스로 정리함 (중복 등록 방지)
    close();
  });
  if(onMount) onMount(close); // 팝업이 화면에 뜬 직후 실행할 코드(버튼 이벤트 연결 등)를 실행
  return close;
}

/* ============================================================
   ★ [추가됨] 어떤 인원의 특정 "프로젝트+단계"에 대해, 예전에 마지막으로 입력했던 진행률(%)이
   몇이었는지 찾아주는 함수.
   - 팝업에서 오늘 항목의 단계를 새로 선택할 때, 진행률 칸이 비어있으면 이 값을 자동으로 채워줘서
     "지난번에 몇 %까지 했는지 기억이 안 나는" 문제를 해결하기 위해 씀.
   - 검색 범위는 loadMonthData()가 불러와둔 전체 범위(loadedHistoryStart ~ 이번 달 끝)이고,
     그 안에서 날짜 순서대로 훑어서 "가장 최근에 입력된 값"을 찾음(더 최근 날짜가 있으면 그걸로 덮어씀).
   ============================================================ */
function findLastKnownStageProgress(empId, project, stageName){
  if(!project || !stageName || !loadedHistoryStart) return null;
  const rangeEnd = weekEnd(startOfWeek(monthLastDate(currentYear, currentMonth)));
  const totalDays = Math.round((rangeEnd - loadedHistoryStart) / 86400000) + 1;
  let found = null;
  for(let i=0; i<totalDays; i++){
    const dateStr = toDateStr(addDays(loadedHistoryStart, i));
    const dayItems = logsByEmpDate[`${empId}_${dateStr}`] || [];
    dayItems.forEach(it => {
      if(it.progress === null || it.progress === undefined) return;
      if((it.title || '').trim() !== project) return;
      const stages = it.stage ? String(it.stage).split(STAGE_SEP).map(s => s.trim()).filter(Boolean) : [];
      if(stages.includes(stageName)) found = it.progress; // 날짜 순서대로 훑으므로, 더 최근 값이 있으면 계속 덮어써짐
    });
  }
  return found;
}

/* ============================================================
   모달: 하루 업무 상세 (날짜 칸을 클릭하면 뜨는 팝업)
   ============================================================ */
function openDayModal(emp, date){
  const dateStr = toDateStr(date);
  const key = `${emp.id}_${dateStr}`;
  // 기존 데이터를 그대로 수정하지 않도록 "복사본"을 만들어서 편집용으로 사용
  // (팝업에서 "취소"를 누르면 이 복사본은 버려지고, 원래 데이터는 그대로 유지됨)
  // [수정됨] DB에는 stage가 "제작모델링,제작도면" 처럼 콤마로 합쳐진 글자 하나로 저장되는데,
  // 편집 중에는 다루기 쉽도록 배열(stages)로 풀어서 사용함.
  let items = JSON.parse(JSON.stringify(logsByEmpDate[key] || [])).map(it => ({
    ...it,
    stages: it.stage ? String(it.stage).split(STAGE_SEP).map(s => s.trim()).filter(Boolean) : []
  }));
  if(items.length === 0){
    // 항목이 하나도 없으면, 버튼을 또 누를 필요 없이 바로 빈 입력창을 하나 보여줌
    items.push({ title: '', stages: [], content: '', progress: null, _isNew: true });
  }

  // 항목별로 "작업단계 관리 모드"가 켜져있는지 기억해두는 곳 (idx -> true/false). 평소엔 꺼져있음.

  const dowLabel = DOW_LABELS[(date.getDay()+6)%7];
  const title = `${emp.name} · ${date.getMonth()+1}.${date.getDate()}(${dowLabel})`; // 팝업 맨 위 제목 글자

  // 항목 목록(item-row들)을 HTML 글자로 만들어주는 함수.
  // 구조: 프로젝트(그냥 텍스트로 타이핑, 안 적어도 됨) -> 작업단계(단추 선택기) -> 내용(안 적어도 됨) -> 진행률
  function itemsHtml(){
    if(items.length === 0){
      return `<div class="hint-text" style="margin-bottom:10px;">아직 입력된 항목이 없습니다.</div>`;
    }
    return items.map((it, idx) => `
      <div class="item-row" data-idx="${idx}">
        <button class="item-remove" data-remove="${idx}" title="삭제">✕</button>

        <div class="field">
          <label>프로젝트 타이틀</label>
          <input type="text" data-field="title" data-idx="${idx}" value="${escapeHtml(it.title || '')}" placeholder="예: GS-W805, 주_25031" list="projectNamesDatalist" />
        </div>

        <div class="field">
          <label>프로젝트 진행 구성 <span style="font-weight:400;color:var(--muted);">(눌러서 이 프로젝트에 포함/제외, ×로 완전 삭제)</span></label>
          <div class="tag-wrap" id="stageConfigPicker-${idx}"></div>
          <div class="manage-add-row" style="margin-top:8px;">
            <input type="text" id="newStageInput-${idx}" placeholder="프로젝트 진행 단계 추가 (예: 모델링작업)" />
            <button type="button" data-add-stage="${idx}">추가</button>
          </div>
        </div>

        <div class="field">
          <label>프로젝트 진행 단계 <span style="font-weight:400;color:var(--muted);">(오늘 작업한 단계 하나를 선택하세요 - 다른 걸 누르면 자동으로 바뀝니다)</span></label>
          <div class="tag-wrap" id="stagePicker-${idx}"></div>
        </div>

        <div class="field" style="margin-bottom:20px;">
          <label>내용 (선택)</label>
          <textarea data-field="content" data-idx="${idx}">${escapeHtml(it.content || '')}</textarea>
        </div>
        <div class="field" style="max-width:120px;margin-bottom:0;">
          <label>진행률 (%)</label>
          <input type="number" min="0" max="100" data-field="progress" data-idx="${idx}"
                 value="${it.progress ?? ''}" placeholder="선택입력" />
        </div>
      </div>
    `).join('');
  }

  const close = openModal({
    title,
    bodyHtml: `
      <!-- 프로젝트 타이틀 자동완성 후보 목록 - 이 인원(${escapeHtml(emp.name)})이 최근에 사용했던 프로젝트명(최대 5개)만 후보로 뜸.
           인원마다 하는 일이 다르니, 다른 사람의 프로젝트명은 안 섞여서 나옵니다. -->
      <datalist id="projectNamesDatalist">
        ${((projectOptions.recentProjectsByEmployee && projectOptions.recentProjectsByEmployee[emp.id]) || []).map(p => `<option value="${escapeHtml(p)}">`).join('')}
      </datalist>
      <div style="display:flex; justify-content:flex-end; margin-bottom:6px;">
        <button type="button" class="manage-btn" id="clearRecentProjectsBtn">최근 자동완성 기록 지우기</button>
      </div>
      <div id="itemsContainer">${itemsHtml()}</div>
      <button class="add-item-btn" id="addItemBtn">+ 항목 추가</button>
      <div class="hint-text">프로젝트/내용은 비워둬도 저장됩니다. 작업단계 버튼을 누르면 선택되고,
        선택된 단계를 다시 누르면 선택이 풀립니다.<br>프로젝트/내용에 "연차 / 휴가 / 반차"가 포함되면 해당 날짜 칸이 자동으로 표시됩니다.</div>
    `,
    footerHtml: `
      <button class="btn" id="cancelDayBtn">취소</button>
      <button class="btn primary" id="saveDayBtn">저장</button>
    `,
    onMount: (close) => {
      bindItemEvents();
      document.getElementById('addItemBtn').addEventListener('click', () => {
        items.push({ title: '', stages: [], content: '', progress: null, _isNew: true });
        refreshItemsContainer();
      });
      // "최근 자동완성 기록 지우기" - 이 인원의 최근 프로젝트명 기록만 지움 (실제 업무 기록은 안 지워짐)
      document.getElementById('clearRecentProjectsBtn').addEventListener('click', async () => {
        if(!confirm(`${emp.name}님의 최근 프로젝트 자동완성 기록을 전부 지울까요? (저장된 업무 기록 자체는 지워지지 않습니다)`)) return;
        if(!projectOptions.recentProjectsByEmployee) projectOptions.recentProjectsByEmployee = {};
        projectOptions.recentProjectsByEmployee[emp.id] = [];
        await saveProjectOptions();
        const dl = document.getElementById('projectNamesDatalist');
        if(dl) dl.innerHTML = ''; // 화면에서도 즉시 후보 목록을 비움
        showToast('최근 자동완성 기록을 지웠습니다');
      });
      document.getElementById('cancelDayBtn').addEventListener('click', close);
      document.getElementById('saveDayBtn').addEventListener('click', async () => {
        await persistDay();
        close();
      });
    }
  });

  // 작업단계 "선택됨 / 선택 가능" 두 구역을 다시 그려주는 함수.
  // - 선택됨 구역: 파란 단추. 누르면 선택 해제됨 (선택 가능 쪽으로 돌아감)
  // - 선택 가능 구역: 흰 알약 + × 버튼. 알약을 누르면 선택됨으로 이동, ×를 누르면 부서 목록에서 완전히 삭제됨
  // 작업단계 단추들을 한 줄로 그려주는 함수.
  // - 클릭: 선택/해제 토글 (선택되면 파란색, 해제되면 흰색/회색)
  // - 길게 누르기(약 0.6초): 부서 공용 목록에서 그 단계를 완전히 삭제 (확인창 뜸)
  // "프로젝트 진행 단계" - 오늘 작업한 단계를 고르는 단추들. 항상 "프로젝트 진행 구성"에 등록된 것만 나옴.
  function renderStagePicker(idx){
    const wrap = document.getElementById(`stagePicker-${idx}`);
    if(!wrap) return;
    const selected = items[idx].stages || [];
    const project = (items[idx].title || '').trim();
    // 프로젝트가 있으면 그 프로젝트의 "진행 구성"에 등록된 단계만, 없으면(자유 메모) 부서 전체 목록을 보여줌
    const availableStages = project
      ? ((projectOptions.projectStages && projectOptions.projectStages[project]) || [])
      : projectOptions.stages;

    if(availableStages.length === 0){
      wrap.innerHTML = project
        ? `<span class="hint-text">위 "프로젝트 진행 구성"에서 먼저 단계를 추가해주세요.</span>`
        : `<span class="hint-text">등록된 단계가 없습니다.</span>`;
      return;
    }

    wrap.innerHTML = availableStages.map(s => `
      <button type="button" class="stage-chip${selected.includes(s) ? ' active' : ''}" data-stage-name="${escapeHtml(s)}">${escapeHtml(s)}</button>
    `).join('');

    // 단추 클릭 = 단일 선택 (다른 단계를 누르면 그 단계 하나만 선택되고, 이전에 선택돼있던 건 자동으로 해제됨.
    // 이미 선택된 단계를 다시 누르면 선택이 풀림 - 즉 "라디오 버튼"처럼 동작)
    wrap.querySelectorAll('.stage-chip').forEach(btn => {
      btn.addEventListener('click', () => {
        const name = btn.dataset.stageName;
        const cur = items[idx].stages || [];
        const turningOn = !cur.includes(name); // 지금 누르는 게 "선택"인지("해제"가 아니라) 확인
        // ★ [수정됨] 예전엔 여러 단계를 한꺼번에 선택할 수 있었는데(배열에 계속 추가),
        // 이제는 한 번에 "딱 하나의 단계"만 선택되도록 함. 새 단계를 누르면 그것 하나만 남고,
        // 이미 선택돼있던 단계를 다시 누르면 완전히 해제(빈 배열)됨.
        items[idx].stages = turningOn ? [name] : [];

        // ★ 단계를 새로 "선택"할 때, 진행률 칸이 (1) 아직 완전히 비어있거나,
        // (2) 방금 전 다른 단계를 선택해서 "자동으로 채워진 값"이 그대로 남아있는 경우에는,
        // 지금 새로 선택한 단계의 마지막 진행률로 다시 채워줍니다.
        // (예: 도면을 눌러서 40이 자동으로 채워진 다음, 모델링을 누르면 100으로 다시 바뀜)
        // 단, 사람이 진행률 칸에 직접 타이핑해서 값을 고친 경우에는(_autoFilled가 false로 바뀜)
        // 더 이상 자동으로 덮어쓰지 않고 그 값을 그대로 존중합니다.
        if(turningOn && (items[idx].progress === null || items[idx].progress === undefined || items[idx].progress === '' || items[idx]._autoFilled)){
          const project = (items[idx].title || '').trim();
          const lastKnown = findLastKnownStageProgress(emp.id, project, name);
          if(lastKnown !== null){
            items[idx].progress = lastKnown;
            items[idx]._autoFilled = true; // 이 값은 "자동으로 채워진 값"이라고 표시해둠
            // renderStagePicker()는 진행률 입력칸까지 다시 그리진 않으므로, 화면에 보이는 입력창 값도 직접 갱신해줌
            const progInput = document.querySelector(`input[data-field="progress"][data-idx="${idx}"]`);
            if(progInput) progInput.value = lastKnown;
          }
        }

        renderStagePicker(idx);
      });
    });
  }

  // "프로젝트 진행 구성" - 이 프로젝트가 쓸 전체 단계 목록. 항상 보이고, ×를 누르면 바로 삭제됨(부서 목록엔 남음).
  // "프로젝트 진행 구성" - 부서 전체 단계 목록을 보여주고, 단추 몸통을 누르면 "이 프로젝트에 포함/제외"가 토글됨
  // (포함=파란색, 제외=회색). ×를 누르면 그 단계 이름 자체가 부서 전체 목록에서 완전히 삭제됨(다른 프로젝트에서도 사라짐).
  function renderStageConfigPicker(idx){
    const wrap = document.getElementById(`stageConfigPicker-${idx}`);
    if(!wrap) return;
    const project = (items[idx].title || '').trim();
    const included = project ? ((projectOptions.projectStages && projectOptions.projectStages[project]) || []) : [];

    wrap.innerHTML = projectOptions.stages.length
      ? projectOptions.stages.map(s => `
          <span class="stage-chip${included.includes(s) ? ' active' : ''}" data-config-toggle-stage="${escapeHtml(s)}">
            ${escapeHtml(s)}
            <button type="button" class="stage-chip-del" data-config-del-stage="${escapeHtml(s)}">×</button>
          </span>`).join('')
      : `<span class="hint-text">아직 등록된 단계가 없습니다. 아래에서 추가해보세요.</span>`;

    // 단추 몸통 클릭(× 제외) = 이 프로젝트에 포함/제외 토글
    wrap.querySelectorAll('[data-config-toggle-stage]').forEach(chip => {
      chip.addEventListener('click', async (e) => {
        if(e.target.closest('.stage-chip-del')) return; // × 클릭은 삭제 핸들러가 따로 처리
        if(!project){ showToast('먼저 프로젝트 타이틀을 입력해주세요'); return; }
        const s = chip.dataset.configToggleStage;
        if(!projectOptions.projectStages) projectOptions.projectStages = {};
        const cur = projectOptions.projectStages[project] || [];
        if(cur.includes(s)){
          projectOptions.projectStages[project] = cur.filter(x => x !== s); // 제외 -> 회색으로
          items.forEach(it => { // 오늘 선택돼있던(이 프로젝트) 항목에서도 함께 해제
            if((it.title || '').trim() === project && it.stages) it.stages = it.stages.filter(x => x !== s);
          });
        } else {
          projectOptions.projectStages[project] = [...cur, s]; // 포함 -> 파란색으로
        }
        await saveProjectOptions();
        refreshItemsContainer();
      });
    });
    // × 버튼 클릭 = 부서 전체 목록에서 완전히 삭제 (프로젝트 이름이 없어도 가능)
    wrap.querySelectorAll('[data-config-del-stage]').forEach(btn => {
      btn.addEventListener('click', async (e) => {
        e.stopPropagation();
        const val = btn.dataset.configDelStage;
        if(!confirm(`"${val}" 단계를 부서 전체 목록에서 완전히 삭제할까요? (모든 프로젝트에서 사라집니다)`)) return;
        projectOptions.stages = projectOptions.stages.filter(s => s !== val);
        if(projectOptions.projectStages){
          Object.keys(projectOptions.projectStages).forEach(p => {
            projectOptions.projectStages[p] = projectOptions.projectStages[p].filter(s => s !== val);
          });
        }
        items.forEach(it => { if(it.stages) it.stages = it.stages.filter(s => s !== val); });
        await saveProjectOptions();
        refreshItemsContainer();
      });
    });
  }

  // "추가" 버튼(또는 입력창에서 Enter) - 부서 공용 단계 목록에 새 이름을 추가함.
  // 프로젝트 타이틀이 적혀있으면, 그 프로젝트에도 바로 "포함" 상태로 반영하고 오늘 단계로도 선택해줌.
  async function addStageFor(idx){
    const input = document.getElementById(`newStageInput-${idx}`);
    const val = input.value.trim();
    if(!val) return;
    if(projectOptions.stages.includes(val)){ showToast('이미 있는 단계입니다'); return; }
    projectOptions.stages.push(val); // 부서 공용 풀에 추가

    const project = (items[idx].title || '').trim();
    if(project){
      if(!projectOptions.projectStages) projectOptions.projectStages = {};
      if(!projectOptions.projectStages[project]) projectOptions.projectStages[project] = [];
      projectOptions.projectStages[project].push(val); // 이 프로젝트엔 바로 포함시킴
      if(!items[idx].stages) items[idx].stages = [];
      items[idx].stages.push(val); // 오늘 작업단계로도 바로 선택
    }
    await saveProjectOptions();
    refreshItemsContainer();
  }

  // 항목 입력창(프로젝트/내용/진행률)에 반응하거나, 단계 선택기·추가 버튼을 누를 때 반응하도록 이벤트를 연결
  function bindItemEvents(){
    document.querySelectorAll('[data-field="title"]').forEach(el => {
      el.addEventListener('input', () => { items[el.dataset.idx].title = el.value; });
      // 프로젝트명 입력을 마치면(포커스를 벗어나면) "프로젝트 진행 구성" 영역이 보이거나 내용이 바뀔 수 있으므로 다시 그림
      el.addEventListener('change', () => refreshItemsContainer());
    });
    document.querySelectorAll('[data-field="content"]').forEach(el => {
      el.addEventListener('input', () => { items[el.dataset.idx].content = el.value; });
    });
    document.querySelectorAll('[data-field="progress"]').forEach(el => {
      el.addEventListener('input', () => {
        const v = el.value === '' ? null : Math.max(0, Math.min(100, Number(el.value))); // 0~100 사이로만 값을 제한
        items[el.dataset.idx].progress = v;
        // 사람이 진행률 칸을 직접 고쳤으므로, 더 이상 "자동으로 채워진 값"이 아님 -> 앞으로 다른 단계를
        // 선택해도 이 값을 함부로 덮어쓰지 않도록 표시를 지움
        items[el.dataset.idx]._autoFilled = false;
      });
    });
    document.querySelectorAll('[data-remove]').forEach(el => {
      el.addEventListener('click', () => {
        // [기능] 항목 삭제: 배열에서 해당 항목을 지우고 화면을 다시 그림
        items.splice(Number(el.dataset.remove), 1);
        refreshItemsContainer();
      });
    });
    document.querySelectorAll('[data-add-stage]').forEach(el => {
      el.addEventListener('click', () => addStageFor(el.dataset.addStage));
    });
    document.querySelectorAll('[id^="newStageInput-"]').forEach(el => {
      el.addEventListener('keydown', (e) => {
        if(e.key !== 'Enter') return;
        e.preventDefault(); e.stopPropagation(); // Enter를 눌러도 팝업 전체가 "저장"되지 않고, 여기서만 추가되도록 함
        addStageFor(el.id.replace('newStageInput-', ''));
      });
    });
    // 각 항목의 "프로젝트 진행 구성"(항상 보임)과 "프로젝트 진행 단계"(오늘 선택) 두 영역을 그려줌
    items.forEach((it, idx) => {
      renderStageConfigPicker(idx);
      renderStagePicker(idx);
    });
  }

  // 항목을 추가/삭제했을 때, 항목 목록 부분만 새로 그리고 이벤트를 다시 연결
  function refreshItemsContainer() {
    document.getElementById('itemsContainer').innerHTML = itemsHtml();
    bindItemEvents();
  }

  // [기능] "저장" 버튼을 눌렀을 때: 해당 인원/날짜의 기존 항목을 전부 지우고, 새 목록을 다시 저장함
  // (가장 단순하고 안전한 방식 - 항목이 몇 개든 통째로 지웠다가 다시 넣음)
  // [수정됨] 저장 조건: 프로젝트/작업단계/내용/진행률 중 "무엇이든 하나라도" 채워져 있으면 저장됨.
  // 이제 내용도, 프로젝트도 굳이 안 적어도 (예: 작업단계+진행률만 선택해도) 저장할 수 있음.
  async function persistDay() {
    const validItems = items.filter(it =>
      (it.title || '').trim() !== '' ||
      (it.content || '').trim() !== '' ||
      (it.stages && it.stages.length > 0) ||
      (it.progress !== null && it.progress !== undefined)
    );
    try {
      await sb(`work_logs?department=eq.${DEPT_Q}&employee_id=eq.${emp.id}&log_date=eq.${dateStr}`, 'DELETE'); // 기존 항목 전체 삭제

      // DB에 저장할 데이터(payload)를 먼저 만들어둠. try 블록 바깥에서도 쓸 수 있도록 이 스코프에 선언.
      let payload = [];
      if (validItems.length > 0) {
        payload = validItems.map((it, i) => ({
          employee_id: emp.id,
          log_date: dateStr,
          department: DEPARTMENT_ID, // 이 부서 소속임을 표시 (다른 부서 화면에서는 이 값 때문에 안 보임)
          title: (it.title || '').trim() || null,   // 프로젝트명. 비어있으면 null (자유 메모)
          stage: (it.stages && it.stages.length > 0) ? it.stages.join(STAGE_SEP) : null, // 선택된 단계들을 특수 구분자로 합쳐서 저장 (이름에 쉼표가 있어도 안전)
          content: (it.content || '').trim() || null,
          progress: it.progress,
          sort_order: i // 이 순서 번호가 항목이 화면에 나열되는 순서를 정함
        }));
        await sb('work_logs', 'POST', payload); // 새 항목들을 한꺼번에 저장
      }

      // [수정됨] 이번에 입력한 프로젝트명을, "이 인원(emp.id)"의 최근 자동완성 기록에 추가함.
      // 이미 있던 이름이면 맨 앞(최신)으로 옮기고, 항상 최근 5개까지만 남김.
      let recentChanged = false;
      if(!projectOptions.recentProjectsByEmployee) projectOptions.recentProjectsByEmployee = {};
      validItems.forEach(it => {
        const t = (it.title || '').trim();
        if(!t) return;
        let list = projectOptions.recentProjectsByEmployee[emp.id] || [];
        list = list.filter(name => name !== t); // 이미 있으면 일단 빼고
        list.unshift(t);                         // 맨 앞(가장 최근)에 넣음
        list = list.slice(0, 5);                 // 최근 5개까지만 유지
        projectOptions.recentProjectsByEmployee[emp.id] = list;
        recentChanged = true;
      });
      if(recentChanged) await saveProjectOptions();

      // [버그 수정] 예전엔 여기서 편집 중이던 items(수정 전 stage 값이 남아있을 수 있음)를 그대로 화면 캐시에 넣어서,
      // 저장 직후엔 "새로 고른 작업단계"가 반영 안 되고 새로고침을 해야만 제대로 보이는 문제가 있었음.
      // -> 이제는 실제로 서버에 보낸 payload(정확한 stage 값 포함)를 그대로 화면 캐시에 반영해서, 새로고침 없이도 바로 맞게 보임.
      logsByEmpDate[key] = payload.length > 0 ? payload : null;
      render();
      showToast('저장되었습니다.');
    } catch(e) {
      console.error(e);
      // [수정됨] "저장 실패"라고만 뜨면 원인을 알 수 없어서, 실제 서버 오류 메시지의 앞부분을 같이 보여줌.
      // (자주 나오는 원인: work_logs 테이블에 stage 칸이 아직 없는 경우 -> 프로젝트단계_마이그레이션.sql을 먼저 실행해야 함)
      const detail = (e && e.message) ? String(e.message).slice(0, 120) : '';
      showToast('저장 실패' + (detail ? `: ${detail}` : ''));
    }
  }
}

/* ============================================================
   모달: 인원 관리 (이름/직급 수정 및 삭제) - 인원 이름 옆 "⋯" 버튼을 누르면 뜨는 팝업
   ============================================================ */
function openEmployeeMenu(emp) {
  openModal({
    title: '인원 관리',
    bodyHtml: `
      <div class="field">
        <label>이름</label>
        <input type="text" id="empNameEdit" value="${escapeHtml(emp.name)}" />
      </div>
      <div class="field">
        <label>직책</label>
        <input type="text" id="empPosEdit" value="${escapeHtml(emp.position || '')}" />
      </div>
    `,
    footerHtml: `
      <button class="btn danger" id="deleteEmpBtn" style="margin-right:auto;">삭제</button>
      <button class="btn" id="cancelEmpBtn">취소</button>
      <button class="btn primary" id="saveEmpBtn">저장</button>
    `,
    onMount: (close) => {
      document.getElementById('cancelEmpBtn').addEventListener('click', close);
      document.getElementById('saveEmpBtn').addEventListener('click', async () => {
        const name = document.getElementById('empNameEdit').value.trim();
        const pos = document.getElementById('empPosEdit').value.trim();
        if (!name) return showToast('이름을 입력하세요');
        try {
          await sb(`employees?id=eq.${emp.id}`, 'PATCH', { name, position: pos });
          await refreshAll();
          close();
        } catch(e) { console.error(e); showToast('저장 실패'); }
      });
      document.getElementById('deleteEmpBtn').addEventListener('click', async () => {
        if(!confirm('정말 삭제하시겠습니까?')) return; // 브라우저 기본 확인창으로 한 번 더 확인
        try {
          await sb(`employees?id=eq.${emp.id}`, 'DELETE');
          await refreshAll();
          close();
        } catch(e) { console.error(e); showToast('삭제 실패'); }
      });
    }
  });
}

/* ============================================================
   앱이 처음 켜졌을 때 실행되는 초기화 코드 + 각종 버튼 클릭 이벤트 연결
   ============================================================ */
document.addEventListener('DOMContentLoaded', () => {
  // 연도 이동 버튼(« / »)
  document.getElementById('prevYearBtn').addEventListener('click', () => { currentYear--; refreshAll(); });
  document.getElementById('nextYearBtn').addEventListener('click', () => { currentYear++; refreshAll(); });
  // 월 이동 버튼(‹ / ›) - 1월에서 이전으로 가면 작년 12월로, 12월에서 다음으로 가면 내년 1월로 자동 이동
  document.getElementById('prevMonthBtn').addEventListener('click', () => {
    currentMonth--;
    if(currentMonth < 1) { currentMonth = 12; currentYear--; }
    refreshAll();
  });
  document.getElementById('nextMonthBtn').addEventListener('click', () => {
    currentMonth++;
    if(currentMonth > 12) { currentMonth = 1; currentYear++; }
    refreshAll();
  });
  // "오늘" 버튼 - 오늘이 속한 연/월로 즉시 이동
  document.getElementById('todayBtn').addEventListener('click', () => {
    currentYear = TODAY.getFullYear();
    currentMonth = TODAY.getMonth() + 1;
    refreshAll();
  });

  // "↻ 새로고침" 버튼 - 지금 보고 있는 연/월은 그대로 두고, 서버에서 데이터만 다시 불러옴
  document.getElementById('refreshBtn').addEventListener('click', () => {
    refreshAll();
  });

  // "+ 인원 추가" 버튼을 눌렀을 때 뜨는 팝업
  document.getElementById('addEmployeeBtn').addEventListener('click', () => {
    openModal({
      title: '인원 추가',
      bodyHtml: `
        <div class="field">
          <label>이름</label>
          <input type="text" id="newEmpName" placeholder="홍길동" />
        </div>
        <div class="field">
          <label>직책</label>
          <input type="text" id="newEmpPos" placeholder="연구원" />
        </div>
      `,
      footerHtml: `
        <button class="btn" id="cancelAddEmpBtn">취소</button>
        <button class="btn primary" id="saveAddEmpBtn">추가</button>
      `,
      onMount: (close) => {
        document.getElementById('cancelAddEmpBtn').addEventListener('click', close);
        document.getElementById('saveAddEmpBtn').addEventListener('click', async () => {
          const name = document.getElementById('newEmpName').value.trim();
          const pos = document.getElementById('newEmpPos').value.trim();
          if (!name) return showToast('이름을 입력하세요');
          try {
            await sb('employees', 'POST', { name, position: pos, department: DEPARTMENT_ID, sort_order: employees.length, active: true });
            await refreshAll();
            close();
          } catch(e) { console.error(e); showToast('추가 실패'); }
        });
      }
    });
  });

  // 앱이 켜지자마자 딱 한 번, 서버에서 데이터를 불러와 화면을 처음으로 그림
  refreshAll();
});

/* ============================================================
   ★ 표/목록 높이를 "실제로 화면에 남는 공간"에 맞춰 정확히 계산하는 함수

   [문제였던 부분]
   예전에는 CSS에서 이렇게 고정 숫자로 추측해서 표 높이를 정했었습니다:
     max-height: calc(100vh - 210px);
   근데 210px이라는 숫자는 "헤더+탭바+부서명+툴바를 대충 다 더하면 이쯤 되겠지" 하고
   미리 추측해서 박아넣은 값이라, 실제 높이(특히 모바일처럼 헤더 크기가 달라지는 화면)와
   딱 맞지 않았습니다. 표가 실제보다 살짝 더 크게 계산되면, 페이지 전체 높이가 화면(100vh)을
   넘어버려서 "표 안 스크롤"과는 별개로 "페이지 자체의 바깥 스크롤"이 하나 더 생겼던 것입니다.
   (조금만 남는 정도라도, html/body 자체가 조금이라도 화면보다 크면 스크롤바는 생겨버립니다.)

   [해결 방법 - 최종]
   1) html, body에 overflow:hidden을 줘서 "바깥 스크롤"은 아예 원천적으로 생길 수 없게 막아버림.
   2) 그 대신 지금 화면에 보이는 안쪽 영역(주간일지의 .grid-wrap, 또는 월간일지의 #tab-monthly)에
      "지금 실제로 화면에 남은 공간이 몇 px인지" 직접 재서(getBoundingClientRect) 그만큼만
      높이(max-height)로 지정하고, 그 안에서만(overflow-y:auto) 스크롤되게 함.
   이러면 화면 크기가 얼마든, 헤더가 몇 px든 상관없이 바깥 스크롤은 절대 생기지 않고,
   내용이 넘칠 때는 항상 "표/목록 안"에서만 스크롤됩니다.

   이 함수는 페이지를 처음 열 때, 화면 크기가 바뀔 때(창 크기 조절, 모바일 화면 회전 등),
   그리고 주간일지⇄월간일지 탭을 전환할 때마다 다시 실행되어서 항상 최신 값으로 맞춰줍니다.
   ============================================================ */
function adjustScrollAreas(){
  // 주간일지의 표 박스, 월간일지의 목록 박스 - 둘 중 "지금 화면에 실제로 보이는 쪽"만 계산함
  [document.querySelector('.grid-wrap'), document.getElementById('tab-monthly')].forEach(el => {
    if(!el) return;
    // offsetParent가 null이면 지금 display:none 등으로 숨겨져 있다는 뜻 -> 높이를 잴 수 없으므로 건너뜀
    if(el.offsetParent === null) return;

    // getBoundingClientRect().top = 이 박스의 맨 위쪽이 "브라우저 화면 맨 위"에서부터 몇 px 떨어져 있는지
    const topOffset = el.getBoundingClientRect().top;
    // window.innerHeight = 지금 보이는 브라우저 화면의 세로 높이(px)
    // 박스 위쪽 공간(topOffset)과, 박스 아래쪽에 살짝 남겨둘 여백(16px)을 뺀 나머지를 박스 높이로 지정
    const available = window.innerHeight - topOffset - 16;
    // 화면이 너무 작아서 available이 이상하게 작은 값이 나오는 경우를 대비해 최소 240px은 보장
    el.style.maxHeight = Math.max(available, 240) + 'px';
    el.style.overflowY = 'auto'; // 이 박스 "안에서만" 스크롤되도록 함
  });
}

// 페이지를 처음 열 때 한 번 실행 (화면에 다 그려진 뒤에 정확히 재기 위해 살짝 늦게 실행)
window.addEventListener('load', () => setTimeout(adjustScrollAreas, 50));
// 창 크기가 바뀔 때(브라우저 창 크기 조절, 모바일 화면 회전 등)마다 다시 계산
window.addEventListener('resize', adjustScrollAreas);

/* ============================================================
   헤더 실시간 시계 - 재고관리 앱과 같은 방식.
   "2026-07-02 13:42:27" 처럼 초 단위까지 표시하고, 1초마다 갱신함.
   ============================================================ */
function updateLiveClock(){
  const el = document.getElementById('live-clock');
  if(!el) return;
  const d = new Date();
  const p = n => String(n).padStart(2,'0'); // 한 자리 숫자 앞에 0을 붙여서 두 자리로 맞춤 (예: 3 -> "03")
  el.textContent = `${d.getFullYear()}-${p(d.getMonth()+1)}-${p(d.getDate())} ${p(d.getHours())}:${p(d.getMinutes())}:${p(d.getSeconds())}`;
}
updateLiveClock();                       // 페이지 열리자마자 한 번 즉시 표시
setInterval(updateLiveClock, 1000);      // 이후 1초(1000ms)마다 계속 갱신
</script>
