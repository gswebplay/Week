<!DOCTYPE html>
<html lang="ko">
<head>
<meta charset="UTF-8"/>
<meta name="viewport" content="width=device-width,initial-scale=1.0,maximum-scale=1"/>
<title>기술전략팀 업무관리</title>
<link rel="icon" href="data:image/svg+xml,<svg xmlns=%22http://www.w3.org/2000/svg%22 viewBox=%220 0 100 100%22><text y=%22.9em%22 font-size=%2290%22>📋</text></svg>">
<link rel="preconnect" href="https://cdn.jsdelivr.net" crossorigin>
<link rel="stylesheet" crossorigin href="https://cdn.jsdelivr.net/gh/orioncactus/pretendard@v1.3.9/dist/web/static/pretendard.css"/>
<style>
/* ==============================================================
   CSS 변수 - index.html과 동일한 색상 시스템
   여기 색상 하나만 바꿔도 전체에 반영됩니다
============================================================== */
:root{
  --blueprint:#2B6CB0;        /* 메인 파란색 */
  --blueprint-strong:#1B4D89; /* 파란색 hover */
  --blueprint-bg:#EAF2FB;     /* 연한 파란 배경 */
  --line:#D3DEE9;             /* 테두리 색 */
  --paper:#F5F7FA;            /* 페이지 배경 */
  --ink:#1A2332;              /* 기본 글자색 */
  --muted:#64748B;            /* 보조 글자색 */
  --danger:#C0392B;           /* 삭제·빨간색 */
  --success:#34A853;          /* 초록색 */
  --warning:#FBBC04;          /* 노란색 */
  --plan:#7C5CBF;             /* 보라색 */
  --plan-bg:#F3EEFC;
  --sans:'Pretendard',-apple-system,BlinkMacSystemFont,'Malgun Gothic',sans-serif;
}
*{box-sizing:border-box;}
html,body{margin:0;padding:0;height:100%;overflow:hidden;}
body{
  background:var(--paper);color:var(--ink);
  font-family:var(--sans);font-size:14px;
  -webkit-font-smoothing:antialiased;
  word-break:keep-all;overflow-wrap:break-word;
}

/* ==============================================================
   헤더 - index.html .header와 완전 동일
============================================================== */
.header{
  background:#fff;border-bottom:1px solid var(--line);
  padding:0 20px;display:flex;align-items:center;justify-content:space-between;
  height:60px;position:sticky;top:0;z-index:30;
  box-shadow:0 1px 3px rgba(0,0,0,.12),0 1px 2px rgba(0,0,0,.08);
}
.header h1{
  font-size:18px;font-weight:600;
  display:flex;align-items:center;gap:8px;
  color:var(--ink);white-space:nowrap;
  /* ★ flex:1 + min-width:0 + overflow:hidden — 화면이 좁아지면 제목이 넘쳐서
     오른쪽 요소(연도탭 등) 위로 겹치던 문제 방지. 좁으면 말줄임(…)으로 잘림 */
  flex:1;min-width:0;overflow:hidden;text-overflow:ellipsis;
}
/* "기술전략팀" 글자만 파란색 - index.html과 동일 패턴 */
.header h1 span{color:var(--blueprint);}
/* "업무관리" 부분 — 기본 글자색 유지, 모바일에서는 숨겨서 공간 확보 */
.header h1 .h1-sub{color:var(--ink);}
.header-right{display:flex;align-items:center;gap:14px;flex-shrink:0;min-width:0;}
.app-version{font-size:12px;color:#B8C0CC;white-space:nowrap;}
.sync-status{font-size:12px;color:var(--muted);display:flex;align-items:center;gap:5px;white-space:nowrap;}
.sync-dot{width:8px;height:8px;border-radius:50%;background:var(--success);flex-shrink:0;}
.sync-dot.loading{background:var(--warning);animation:pulse 1s infinite;}
.sync-dot.error{background:var(--danger);}
@keyframes pulse{0%,100%{opacity:1}50%{opacity:.4}}

/* ==============================================================
   탭바 - index.html .tab-bar / .tab과 완전 동일
============================================================== */
.tab-bar{
  background:#fff;border-bottom:1px solid var(--line);
  padding:0 20px;display:flex;
}
.tab{
  padding:14px 20px;font-size:14px;font-weight:500;
  color:var(--muted);border:none;background:none;cursor:pointer;
  border-bottom:3px solid transparent;transition:all .15s;white-space:nowrap;
}
.tab:hover{color:var(--ink);}
.tab.active{color:var(--blueprint);border-bottom-color:var(--blueprint);}

/* ==============================================================
   툴바
============================================================== */
.toolbar{
  display:flex;align-items:center;justify-content:space-between;
  gap:10px;flex-wrap:wrap;padding:10px 20px;
  background:#fff;border-bottom:1px solid var(--line);
}
.toolbar-left{display:flex;align-items:center;gap:8px;flex-wrap:wrap;min-width:0;}
.toolbar-right{display:flex;align-items:center;gap:8px;flex-shrink:0;}

/* 검색창 */
.search-input{
  padding:7px 12px;border:1px solid var(--line);border-radius:7px;
  font-size:13px;font-family:var(--sans);color:var(--ink);
  outline:none;width:400px;transition:border-color .15s;
}
.search-input:focus{border-color:var(--blueprint);}
/* 업무탭 검색창 — 전체 담당자 드롭다운과 함께 넓어지도록 확장 */
.toolbar-left .search-input{ width:480px; }
/* 경비탭 검색창 — 새로고침 버튼 바로 앞까지 꽉 채움 */
.exp-toolbar .search-input{ flex:1; width:auto; }

/* 필터 셀렉트 */
.filter-sel{
  padding:7px 10px;border:1px solid var(--line);border-radius:7px;
  font-size:13px;font-family:var(--sans);color:var(--ink);
  background:#fff;outline:none;cursor:pointer;
}
.filter-sel:focus{border-color:var(--blueprint);}

/* 새로고침 버튼 - index.html .refresh-btn 완전 동일 */
.refresh-btn{
  background:#FDF1F5;color:#D6558C;border:1px solid #F3C4D6;
  font-size:13px;padding:8px 14px;border-radius:7px;cursor:pointer;
  font-family:var(--sans);font-weight:600;
  display:inline-flex;align-items:center;gap:4px;
  white-space:nowrap;transition:background .15s;
}
.refresh-btn:hover{background:#FBE4ED;}

/* 추가 버튼 - 파란 꽉찬 스타일 */
.add-btn{
  background:var(--blueprint);color:#fff;border:1px solid var(--blueprint);
  font-size:13px;padding:8px 14px;border-radius:7px;cursor:pointer;
  font-family:var(--sans);font-weight:600;
  display:inline-flex;align-items:center;gap:4px;
  white-space:nowrap;transition:background .15s;
}
.add-btn:hover{background:var(--blueprint-strong);border-color:var(--blueprint-strong);}

/* 초기 업로드 버튼 삭제됨 */

/* ==============================================================
   상태 필터 버튼 바
   클릭 시 해당 상태만 필터링, 활성화된 버튼은 채워진 스타일
============================================================== */
.filter-bar{
  display:flex; gap:7px; flex-wrap:wrap;
  background:#fff; border-bottom:1px solid var(--line);
  padding:8px 20px;
}
/* 기본 상태 버튼 */
.flt-btn{
  display:inline-flex; align-items:center; gap:5px;
  padding:5px 13px; border-radius:20px; font-size:13px; font-weight:600;
  border:1.5px solid var(--line); background:#fff; color:var(--muted);
  cursor:pointer; transition:all .15s; white-space:nowrap; user-select:none;
}
.flt-btn .flt-num{ font-size:14px; font-weight:700; }
.flt-btn:hover{ border-color:#B0BEC5; color:var(--ink); }
/* 활성화(선택된) 상태 */
.flt-btn.active{ color:#fff; border-color:transparent; }
/* 전체 */
.flt-btn.all          { }
.flt-btn.all.active   { background:#334155; border-color:#334155; }
/* 완료 */
.flt-btn.done         { color:#1565C0; border-color:#B3D9F0; background:#EAF4FB; }
.flt-btn.done.active  { background:#1565C0; border-color:#1565C0; color:#fff; }
/* 진행중 */
.flt-btn.ing          { color:var(--plan); border-color:#C9B8F0; background:var(--plan-bg); }
.flt-btn.ing.active   { background:var(--plan); border-color:var(--plan); color:#fff; }
/* 지속진행 */
.flt-btn.cont         { color:#2E7D52; border-color:#A5D6A7; background:#E8F5E9; }
.flt-btn.cont.active  { background:#2E7D52; border-color:#2E7D52; color:#fff; }
/* 보류 */
.flt-btn.hold         { color:#B7770D; border-color:#FFD54F; background:#FFF8E1; }
.flt-btn.hold.active  { background:#B7770D; border-color:#B7770D; color:#fff; }
/* 요청 */
.flt-btn.req          { color:var(--danger); border-color:#FFCDD2; background:#FFEBEE; }
.flt-btn.req.active   { background:var(--danger); border-color:var(--danger); color:#fff; }
@media(max-width:480px){ .filter-bar{padding:6px 14px;} }

/* ==============================================================
   탭 패널
============================================================== */
.main{display:flex;flex-direction:column;height:calc(100vh - 60px);}
.tab-panel{display:none;flex:1;flex-direction:column;overflow:hidden;}
.tab-panel.active{display:flex;}

/* ==============================================================
   인라인 편집 테이블
============================================================== */
.table-wrap{flex:1;overflow:auto;}
#taskTableWrap table{width:100%;border-collapse:collapse;min-width:1929px;font-size:13px;}  /* min-width = 고정컬럼합(1729px)+프로젝트명최소(200px). 이 미만 화면에서는 표 안 가로스크롤 */
#taskTableWrap thead th{
  background:#F0F4FA;padding:9px 2px;
  font-size:12px;font-weight:700;color:var(--blueprint);
  text-align:center;border-bottom:2px solid var(--line);
  border-right:1px solid var(--line);white-space:nowrap;
  position:sticky;top:0;z-index:5;
}
#taskTableWrap thead th:last-child{border-right:none;}
#taskTableWrap tbody tr{border-bottom:1px solid var(--line);transition:background .1s;}
#taskTableWrap tbody tr:hover{background:var(--blueprint-bg);}
#taskTableWrap tbody tr.editing-row{background:#FFFDE7;}
#taskTableWrap tbody tr.editing-row:hover{background:#FFF9C4;}
#taskTableWrap tbody td{padding:0;border-right:1px solid #EEF1F5;vertical-align:middle;}
#taskTableWrap tbody td:last-child{border-right:none;}

/* 셀 뷰 (클릭 전) */
.cell-view{
  padding:8px 10px;min-height:36px;
  display:flex;align-items:center;gap:4px;
  white-space:nowrap;overflow:hidden;text-overflow:ellipsis;max-width:280px;
}

/* 셀 인풋 (클릭 후 - 인라인 편집) */
.cell-input{
  width:100%;padding:7px 10px;border:none;
  border-bottom:2px solid var(--blueprint);
  background:#FFFDE7;font-size:13px;font-family:var(--sans);
  color:var(--ink);outline:none;min-height:36px;
}
.cell-select{
  width:100%;padding:7px 8px;border:none;
  border-bottom:2px solid var(--blueprint);
  background:#FFFDE7;font-size:13px;font-family:var(--sans);
  color:var(--ink);outline:none;cursor:pointer;
}

/* ==============================================================
   뱃지
============================================================== */
.badge{display:inline-flex;align-items:center;padding:2px 8px;border-radius:20px;font-size:11px;font-weight:700;white-space:nowrap;}
/* ★ 업무일정표 표 안의 뱃지만 가독성을 위해 2pt 크게 (11→13px).
   상태·주담당자·보조담당자·영업담당·분류 단추에 적용됨.
   드롭다운 팝업·⚙옵션모달·경비항목 뱃지는 전역 11px 그대로 유지되므로 여기서만 키움.
   글자가 커진 만큼 위아래 여백(padding)도 살짝 늘려 알약 모양 균형 유지 */
#taskTableWrap .badge{ font-size:13px; padding:3px 9px; }
.b-done{background:#E3F2FD;color:#1565C0;}
.b-ing{background:var(--plan-bg);color:var(--plan);}
.b-hold{background:#FFF8E1;color:#B7770D;}
.b-cont{background:#E8F5E9;color:#2E7D52;}
.b-req{background:#FFEBEE;color:var(--danger);}

/* pb/ib 스타일은 아래 알약형 CSS 블록에서 통합 정의됨 */

/* ==============================================================
   행 관리 버튼
============================================================== */
.row-action-cell{padding:5px 8px !important;white-space:nowrap;}
.btn-row-save{padding:4px 10px;background:var(--blueprint);color:#fff;border:none;border-radius:5px;font-size:12px;font-weight:600;cursor:pointer;font-family:var(--sans);margin-right:4px;}
.btn-row-save:hover{background:var(--blueprint-strong);}
.btn-row-del{padding:4px 10px;background:#FFEBEE;color:var(--danger);border:1px solid #FFCDD2;border-radius:5px;font-size:12px;font-weight:600;cursor:pointer;font-family:var(--sans);}
.btn-row-del:hover{background:#FFCDD2;}
.btn-row-edit{padding:4px 10px;background:var(--paper);color:var(--muted);border:1px solid var(--line);border-radius:5px;font-size:12px;font-weight:500;cursor:pointer;font-family:var(--sans);white-space:nowrap;}
.btn-row-edit:hover{background:var(--blueprint-bg);color:var(--blueprint);border-color:var(--blueprint);}

/* ==============================================================
   연도 선택 탭 (헤더 오른쪽)
============================================================== */
.year-tab-group{
  display:flex; align-items:center; gap:4px; flex-shrink:0;
}
.year-tab{
  padding:4px 12px; border-radius:20px; font-size:13px; font-weight:600;
  border:1.5px solid var(--line); background:#fff; color:var(--muted);
  cursor:pointer; transition:all .15s; white-space:nowrap;
}
.year-tab:hover{ border-color:var(--blueprint); color:var(--blueprint); }
.year-tab.active{ background:var(--blueprint); border-color:var(--blueprint); color:#fff; }
.year-new-btn{
  padding:4px 10px; border-radius:20px; font-size:12px; font-weight:600;
  border:1.5px dashed var(--blueprint); background:transparent; color:var(--blueprint);
  cursor:pointer; transition:all .15s; white-space:nowrap;
}
.year-new-btn:hover{ background:var(--blueprint-bg); }

/* ==============================================================
   경비사용내역 — 카드 방식 (max-width 900px 중앙 정렬)
============================================================== */
.exp-wrap{
  flex:1; overflow-y:auto; padding:20px;
  display:flex; flex-direction:column; align-items:center;
}
/* 예산 현황 카드 */
.budget-summary{
  width:100%; max-width:900px;
  display:grid; grid-template-columns:repeat(4,1fr); gap:12px;
  margin-bottom:16px;
}
.budget-card{
  background:#fff; border:1px solid var(--line); border-radius:10px;
  padding:14px 18px;
}
.budget-card .bc-label{ font-size:11px; color:var(--muted); margin-bottom:4px; }
.budget-card .bc-value{ font-size:18px; font-weight:700; color:var(--ink); }
.budget-card .bc-value.spent{ color:var(--danger); }
.budget-card .bc-value.remain{ color:#2E7D52; }
/* 집행률 프로그레스 */
.budget-progress-card{
  width:100%; max-width:900px;
  background:#fff; border:1px solid var(--line); border-radius:10px;
  padding:12px 18px; margin-bottom:16px;
  display:flex; align-items:center; gap:14px;
}
.budget-progress-card .bp-label{ font-size:12px; color:var(--muted); white-space:nowrap; }
.budget-progress-card .bp-bar-wrap{
  flex:1; background:#EEF1F5; border-radius:20px; height:8px; overflow:hidden;
}
.budget-progress-card .bp-fill{
  height:100%; background:linear-gradient(90deg,var(--blueprint),var(--plan));
  border-radius:20px; transition:width .5s;
}
.budget-progress-card .bp-rate{ font-size:14px; font-weight:700; color:var(--ink); white-space:nowrap; }
/* 경비 툴바 */
.exp-toolbar{
  width:100%; max-width:900px;
  display:flex; align-items:center; justify-content:space-between;
  gap:10px; margin-bottom:12px; flex-wrap:wrap;
}
/* 경비 테이블 컨테이너 */
.exp-table-wrap{
  width:100%; max-width:900px;
  background:#fff; border:1px solid var(--line); border-radius:10px;
  /* 좁은 화면에서는 가로 스크롤 (업무일정표와 동일한 방식).
     세로는 잘리지 않게 hidden 유지 → 둥근 모서리도 그대로 유지됨 */
  overflow-x:auto; overflow-y:hidden;
}
.exp-table-wrap table{
  width:100%; border-collapse:collapse; font-size:13px; table-layout:fixed;
  /* ★ 최소폭 — 이게 없으면 모바일에서 컬럼이 40px대로 찌그러져
     "2026-01-14", "1,080,000원" 같은 내용이 잘립니다.
     좁으면 표를 줄이지 말고 가로로 스크롤해서 봅니다. */
  min-width:740px;
}
.exp-table-wrap thead th{
  background:#F0F4FA; padding:9px 8px;
  font-size:12px; font-weight:700; color:var(--blueprint);
  text-align:center; border-bottom:2px solid var(--line);
  white-space:normal; word-break:keep-all;  /* ★ nowrap 제거 — 헤더가 폭을 강제 확장하지 않음 */
}
/* 경비한도/집행액/잔액 헤더는 아래 금액 데이터와 맞춰 오른쪽 정렬 (5,6,7번째 컬럼) */
.exp-table-wrap thead tr:last-child th:nth-child(5),
.exp-table-wrap thead tr:last-child th:nth-child(6),
.exp-table-wrap thead tr:last-child th:nth-child(7){ text-align:right; }
.exp-table-wrap tbody tr{ border-bottom:1px solid #EEF1F5; transition:background .1s; position:relative; }
.exp-table-wrap tbody tr:last-child{ border-bottom:none; }
.exp-table-wrap tbody tr:hover{ background:var(--blueprint-bg); }
.exp-table-wrap tbody td{ padding:0; vertical-align:middle; }
/* 사용일자 입력값 가운데 정렬 — .c-date는 width:100%라 부모의 justify-content:center가 무효화되므로
   경비탭 안에서만 별도로 text-align:center 지정 (업무탭 날짜 컬럼은 영향받지 않음) */
.exp-table-wrap .c-date{ text-align:center; }
/* 비고 셀 — 삭제 버튼이 hover 시 오른쪽에 나타남, 내용은 가운데 정렬 */
/* 프로젝트명/업무내용 셀 — 내용이 길면 최대 3줄까지 줄바꿈, 넘치면 말줄임(…) */
#taskTableWrap td .c-text[contenteditable]{
  white-space:normal;        /* 줄바꿈 허용 */
  word-break:break-all;      /* 긴 단어/영문도 칸 안에서 강제 줄바꿈 */
  display:-webkit-box;
  -webkit-line-clamp:3;      /* 최대 3줄 */
  -webkit-box-orient:vertical;
  overflow:hidden;
}
/* 편집 중(포커스)일 땐 줄수 제한 해제 — 전체 내용 보이게 */
#taskTableWrap td .c-text[contenteditable]:focus{
  display:block;
  -webkit-line-clamp:unset;
  overflow:visible;
  white-space:pre-wrap;
}
.exp-note-cell{ position:relative; }
.exp-note-cell .c-text{ text-align:center; }
.exp-del-btn{
  display:none; position:absolute; right:4px; top:50%; transform:translateY(-50%);
  background:none; border:none; color:#CBD5E1; cursor:pointer; font-size:14px; padding:2px 4px;
  transition:color .1s; line-height:1;
}
.exp-del-btn:hover{ color:var(--danger); }
.exp-table-wrap tbody tr:hover .exp-del-btn{ display:block; }
/* "+ 경비 추가" 버튼 — 업무탭과 동일한 .add-row-btn-wrap / .add-row-btn 클래스 재사용 (균형감 통일, 별도 스타일 불필요) */
@media(max-width:768px){
  .budget-summary{ grid-template-columns:repeat(2,1fr); }
  .exp-wrap{ padding:12px; }
}

/* ==============================================================
   빈 데이터
============================================================== */
.empty-msg{text-align:center;padding:48px 20px;color:#B0BEC5;font-size:14px;}

/* ==============================================================
   모달 - index.html .modal-overlay / .modal-panel과 동일
   배경 클릭해도 닫히지 않음
============================================================== */
.modal-overlay{
  display:none;position:fixed;inset:0;
  background:rgba(0,0,0,.4);z-index:1000;
  align-items:center;justify-content:center;
}
.modal-overlay.open{display:flex;}
.modal-panel{
  background:#fff;border-radius:12px;
  width:90%;max-width:560px;max-height:88vh;overflow-y:auto;
  box-shadow:0 8px 40px rgba(0,0,0,.18);
}
.modal-header{
  padding:16px 20px;border-bottom:1px solid var(--line);
  display:flex;align-items:center;justify-content:space-between;
}
.modal-header h3{margin:0;font-size:15px;font-weight:700;}
.modal-close{border:none;background:none;font-size:18px;cursor:pointer;color:var(--muted);}
.modal-body{padding:16px 20px;}
.modal-footer{padding:12px 20px;border-top:1px solid var(--line);display:flex;justify-content:flex-end;gap:8px;}

/* 폼 필드 */
.field{margin-bottom:14px;}
.field label{display:block;font-size:12px;font-weight:600;color:var(--muted);margin-bottom:5px;}
.field input,.field select,.field textarea{
  width:100%;padding:8px 11px;border:1px solid var(--line);border-radius:7px;
  font-size:13px;font-family:var(--sans);color:var(--ink);
  outline:none;background:#fff;transition:border-color .15s;
}
.field input:focus,.field select:focus,.field textarea:focus{border-color:var(--blueprint);}
.field textarea{resize:vertical;min-height:60px;}
.field-row{display:grid;grid-template-columns:1fr 1fr;gap:12px;}

/* 모달 버튼 - index.html .btn과 동일 */
.btn{padding:8px 18px;border-radius:7px;font-size:13px;font-weight:600;cursor:pointer;font-family:var(--sans);border:1px solid var(--line);background:#fff;color:var(--ink);}
.btn:hover{background:var(--paper);}
.btn.primary{background:var(--blueprint);border-color:var(--blueprint);color:#fff;}
.btn.primary:hover{background:var(--blueprint-strong);}
.btn.danger{color:var(--danger);border-color:#F0CBC5;}
.btn.danger:hover{background:#FDEEEC;}

/* ==============================================================
   토스트 - index.html .toast와 동일
============================================================== */
.toast{
  position:fixed;bottom:24px;left:50%;transform:translateX(-50%);
  background:#0B1220;color:#fff;padding:10px 20px;border-radius:8px;
  font-size:13px;font-weight:500;opacity:0;transition:opacity .25s;
  z-index:9999;pointer-events:none;white-space:nowrap;
}
.toast.show{opacity:1;}

/* ==============================================================
   모바일 반응형
============================================================== */
/* ---- 태블릿 이하 (768px 이하) ----
   검색창을 고정폭(480px) 대신 남는 공간에 맞춰 늘어나게 함.
   ※ 데스크톱에서 "완료" 버튼에 맞춰 폭을 계산하는 alignFilterSelToDone()은
     이 구간에서 실행되지 않습니다(JS 쪽에서 768px 이하면 건너뜀). */
@media(max-width:768px){
  .toolbar-left{flex:1;min-width:0;}
  .toolbar-left .search-input{width:auto;flex:1;min-width:110px;}
}

/* ---- 모바일 (480px 이하) ---- */
@media(max-width:480px){
  .header{padding:0 12px;height:56px;gap:8px;}
  .header h1{font-size:15px;}
  /* 제목 뒤 "업무관리"는 숨김 → "📋 기술전략팀"만 표시해 연도탭 공간 확보 */
  .header h1 .h1-sub{display:none;}
  /* 헤더 우측 요소 간격 축소 + 버전 표기 숨김 */
  .header-right{gap:8px;}
  .app-version{display:none;}
  /* 동기화 상태는 점(●)만 남기고 글자는 숨김 */
  .sync-status span{display:none;}
  .year-tab{padding:4px 9px;font-size:12px;}
  .year-new-btn{padding:4px 7px;font-size:11px;}

  .toolbar{padding:8px 12px;gap:8px;}
  .tab{padding:12px 14px;font-size:13px;}
  .budget-bar{padding:10px 14px;gap:12px;}
  .filter-bar{padding:6px 12px;gap:5px;}
  .flt-btn{padding:5px 9px;font-size:11px;}
}

/* ==============================================================
   상태별 행 배경색 - 원본색 대비 30% 강도 (더 연하게)
   요청=분홍, 진행중=보라, 지속=초록, 보류=노랑, 완료=파랑
============================================================== */
tbody tr.row-req  { background:#FFFCFD; }   /* 요청: 분홍 30% */
tbody tr.row-ing  { background:#FDFCFF; }   /* 진행중: 보라 30% */
tbody tr.row-cont { background:#FCFEFD; }   /* 지속진행: 초록 30% */
tbody tr.row-hold { background:#FFFEFA; }   /* 보류: 노랑 30% */
tbody tr.row-done { background:#FBFDFE; }   /* 완료: 파랑 30% */
/* 호버 시 조금 더 진하게 (45%) */
tbody tr.row-req:hover  { background:#FFFAFB; }
tbody tr.row-ing:hover  { background:#FCFAFF; }
tbody tr.row-cont:hover { background:#FAFDFB; }
tbody tr.row-hold:hover { background:#FFFEF8; }
tbody tr.row-done:hover { background:#FAFCFE; }
/* 편집 중인 행은 노란빛으로 강조 */
tbody tr.editing-row { background:#FFFDE7 !important; }



/* ==============================================================
   알약 뱃지 - 모든 드롭다운 값에 통일 적용
   기존 뱃지와 같은 border-radius:20px 스타일
============================================================== */
/* 모델링/제작도/매뉴얼 진행상태 뱃지 */
.pb{ display:inline-block; padding:3px 9px; border-radius:20px; font-size:11px; font-weight:700; white-space:nowrap; }
.pb-완료   { background:#E3F4FB; color:#2E86AB; }
.pb-진행중 { background:#F0EBFF; color:#7C5CBF; }
.pb-미적용 { background:#F0F0F0; color:#999; }
.pb-보류   { background:#FFF5E0; color:#D48806; }
/* 강도 뱃지 - 알약형으로 통일 */
.ib{ display:inline-block; padding:3px 9px; border-radius:20px; font-size:11px; font-weight:700; white-space:nowrap; }
.ib-최상 { background:#FFE0E0; color:#C0392B; }
.ib-상   { background:#FFE8CC; color:#D35400; }
.ib-중   { background:#FFF5CC; color:#B7770D; }
.ib-하   { background:#E8F5E9; color:#2E7D32; }
.ib-최하 { background:#F0F0F0; color:#666; }
/* 영업담당 뱃지 */
.sb{ display:inline-block; padding:3px 9px; border-radius:20px; font-size:11px; font-weight:600; white-space:nowrap; background:#EDF2FF; color:#3B5BDB; }
/* 분류 뱃지 */
.cb{ display:inline-block; padding:3px 9px; border-radius:20px; font-size:11px; font-weight:600; white-space:nowrap; background:#FFF0F6; color:#C2255C; }
/* 파생값 셀 (리드/워크/세이브타임) */
.dval { font-size:12px; font-weight:700; color:var(--muted); text-align:center; }
.dval.save-pos { color:#2E7D32; }  /* 세이브타임 양수 = 초록 */
.dval.save-neg { color:#C0392B; }  /* 세이브타임 음수 = 빨강 */

/* ============================================================
   ★★ 셀 단위 편집 UI (2026-07 개편) ★★
   아래 스타일들은 "행 전체가 편집모드로 바뀌던 방식"을 없애고
   클릭한 셀 하나만 바로 편집되게 만드는 데 쓰입니다.
============================================================ */

/* ---- 테이블 컬럼 폭 조절(리사이즈) ----
   table-layout:fixed 여야 colgroup>col 의 너비가 그대로 먹습니다.
   width:100% 로 전체 폭을 고정 → 양끝은 안 움직이고 중간만 조절됨 */
#taskTableWrap table{ table-layout:fixed; width:100%; }
/* th 안에 핸들을 절대배치하므로 position:relative 필수.
   ★ th에 overflow:hidden 주면 핸들이 잘리므로 절대 금지! */
#taskTableWrap th{ position:relative; user-select:none; }
/* 컬럼 경계선을 잡아 끄는 손잡이 */
/* ---- 셀 공통 박스 ----
   뷰/편집 상관없이 높이가 같아야 행이 안 흔들립니다. */
.c-box{
  min-height:38px; padding:6px 8px;
  display:flex; align-items:center;
  font-size:13px; color:var(--ink);
}
.c-box > *{ min-width:0; }  /* ★ 자식 요소(날짜input/뱃지/텍스트)가 콘텐츠 크기만큼 폭을 강제하지 않게 함 — table-layout:fixed가 실제로 % 폭을 지키게 하는 핵심 */

/* ---- 글자 직접 입력 셀 (프로젝트명/출고지 등) ----
   contenteditable = 클릭하면 그 자리에서 바로 타이핑됨 */
.c-text{
  outline:none; cursor:text; flex:1;
  border-radius:3px; transition:background .12s;
  overflow:hidden; text-overflow:ellipsis; white-space:nowrap;
}
.c-text:focus{                        /* 편집 중일 때만 파란 테두리 */
  background:var(--blueprint-bg);
  box-shadow:inset 0 0 0 2px var(--blueprint);
  white-space:normal;                 /* 편집 중엔 전체 내용 보이게 */
}
.c-text:empty::before{                /* 빈 칸 안내문구 */
  content:attr(data-ph); color:#B0BEC5; pointer-events:none;
}

/* ---- 날짜 입력 셀 ---- */
.c-date{
  border:none; background:transparent; width:100%; min-width:0;
  font-size:12px; font-family:var(--sans); color:var(--ink);
  outline:none; cursor:pointer; padding:2px;
  border-radius:3px;
}
.c-date:focus{ background:var(--blueprint-bg); box-shadow:inset 0 0 0 2px var(--blueprint); }

/* ---- 드롭다운 뱃지 버튼 (상태/담당자/영업/분류) ---- */
.dd-btn{
  cursor:pointer; display:inline-flex; align-items:center; gap:3px;
  transition:opacity .12s; max-width:100%;
}
.dd-btn:hover{ opacity:.72; }
.dd-btn::after{ content:'▾'; font-size:9px; color:var(--muted); flex-shrink:0; }
.dd-btn .badge{ overflow:hidden; text-overflow:ellipsis; }




/* ---- 드롭다운 팝업 ----
   ★ position:fixed + body 바로 아래에 두어야 표 밖으로 안 잘립니다 */
.dd-popup{
  display:none; position:fixed;
  background:#fff; border:1px solid var(--line); border-radius:8px;
  box-shadow:0 4px 20px rgba(0,0,0,.15); z-index:900;
  min-width:150px; max-height:320px; overflow-y:auto;
  padding:4px 0; white-space:nowrap;
}
.dd-popup.open{ display:block; }
.dd-item{
  padding:7px 12px; font-size:12px; color:var(--ink);
  cursor:pointer; display:flex; align-items:center; gap:8px;
  transition:background .08s;
}
.dd-item:hover{ background:var(--paper); }
.dd-item.selected{ background:var(--blueprint-bg); font-weight:600; }

/* ---- 토글 버튼 그룹 (강도 / 진행상태) ----
   선택 안 된 건 회색, 선택된 것만 불이 켜짐 */
.tog-group{ display:flex; flex-wrap:nowrap; gap:3px; padding:5px 6px; }  /* nowrap: 컬럼이 좁아져도 버튼이 세로로 쌓이지 않음 → 행 높이 고정 */
.tog{
  display:inline-block; padding:2px 7px; border-radius:20px;
  font-size:10px; font-weight:600; cursor:pointer;
  border:1.5px solid #E2E8F0; background:#F8FAFC; color:#94A3B8;
  transition:all .12s; white-space:nowrap; user-select:none;
  flex-shrink:0;   /* 좁은 칸에서도 버튼 자체가 찌그러지지 않음 */
}
.tog:hover{ border-color:#CBD5E1; color:#64748B; }
/* .tog.on 일 때의 색은 JS가 DB 색상값을 직접 style로 넣어줍니다 */

/* ---- 진행상태 3줄(모델링/제작도/매뉴얼) ---- */
.prog-group{ display:flex; flex-direction:column; gap:3px; padding:5px 6px; }
.prog-row{ display:flex; align-items:center; gap:5px; flex-wrap:nowrap; }  /* 각 줄 안에서도 줄바꿈 금지 → 항상 정확히 3줄 */
.prog-lbl{ font-size:9px; color:var(--muted); width:28px; flex-shrink:0; }

/* ---- 컬럼 헤더 드래그앤드롭 ----
   th를 잡아 끌어서 컬럼 순서를 바꿉니다.
   리사이즈 핸들(경계선)을 제외한 헤더 본문 영역이 드래그 대상입니다. */
#taskTableWrap thead tr:last-child th[draggable="true"]{
  /* 드래그 가능한 th 표시 — 커서 변경 */
  cursor: grab;
}
#taskTableWrap thead tr:last-child th[draggable="true"]:active{
  cursor: grabbing;
}
/* 고정 컬럼(삭제 등)은 grab 커서 안 씀 */
#taskTableWrap thead tr:last-child th.col-fixed{
  cursor: default;
}
/* 드래그 중인 원본 컬럼 — 투명하게 */
#taskTableWrap thead tr:last-child th.col-dragging{
  opacity: .35;
}
/* 드롭 위치 표시 — 파란 세로선
   ★ position:sticky th 에서 box-shadow는 인접 셀에 가려지므로
     border + z-index 조합으로 대체합니다 */
#taskTableWrap thead tr:last-child th.col-drop-left{
  border-left: 3px solid var(--blueprint) !important;
  background: var(--blueprint-bg) !important;
  z-index: 10;
}
#taskTableWrap thead tr:last-child th.col-drop-right{
  border-right: 3px solid var(--blueprint) !important;
  background: var(--blueprint-bg) !important;
  z-index: 10;
}

/* ---- 헤더의 ⚙ 옵션관리 버튼 ---- */
.gear-btn{
  border:none; background:none; cursor:pointer;
  color:#CBD5E1; font-size:11px; padding:1px 3px;
  transition:color .1s; vertical-align:middle;
}
.gear-btn:hover{ color:var(--blueprint); }

/* ---- 표 맨 위 "+ 업무 추가" 버튼 ----
   전체 가로를 채우는 tr 안에서 가운데 정렬된 1000px 라운드박스 */
.add-row-btn-wrap{
  width:100%; padding:10px 0;
  display:flex; align-items:center; justify-content:center;
  background:#fff; border-bottom:1.5px solid var(--line);
}
.add-row-btn{
  width:1000px; max-width:calc(100% - 40px);
  padding:9px 0;
  background:var(--blueprint-bg); border:1.5px dashed var(--blueprint);
  border-radius:10px;
  color:var(--blueprint); font-size:13px; font-weight:600; font-family:var(--sans);
  cursor:pointer; display:flex; align-items:center; justify-content:center; gap:6px;
  transition:background .15s, border-color .15s;
}
.add-row-btn:hover{
  background:#D6E8F8; border-color:var(--blueprint-strong); border-style:solid;
}

/* ---- ⚙ 옵션 관리 모달 ---- */
.opt-overlay{
  display:none; position:fixed; inset:0;
  background:rgba(0,0,0,.35); z-index:1500;
  align-items:center; justify-content:center;
}
.opt-overlay.open{ display:flex; }
.opt-modal{
  background:#fff; border-radius:12px;
  width:400px;
  max-height:80vh; display:flex; flex-direction:column;
  box-shadow:0 8px 32px rgba(0,0,0,.18);
}
.opt-head{
  padding:14px 20px; border-bottom:1px solid var(--line);
  display:flex; align-items:center; justify-content:space-between; flex-shrink:0;
}
.opt-head h3{ font-size:14px; font-weight:700; }
.opt-x{ border:none; background:none; font-size:17px; cursor:pointer; color:var(--muted); }
.opt-body{ padding:14px 20px; overflow-y:auto; flex:1; }

/* 옵션 한 줄 — 중앙정렬 라운드박스 */
.opt-item{
  border:1px solid var(--line); border-radius:10px;
  margin-bottom:8px; padding:11px 14px; background:#fff;
  /* 항목 내부 전체를 가운데 정렬 */
  display:flex; flex-direction:column; align-items:center;
}
.opt-top{
  display:flex; align-items:center; gap:8px; margin-bottom:10px;
  width:100%; justify-content:center;   /* 드래그핸들 + 뱃지 + 삭제 가로 중앙 */
}
/* 드래그 손잡이 — 여기를 잡아야만 순서 이동됨 */
.drag-handle{
  cursor:grab; color:#CBD5E1; font-size:14px; line-height:1;
  padding:2px 4px; user-select:none; flex-shrink:0;
}
.drag-handle:hover{ color:var(--blueprint); }
.drag-handle:active{ cursor:grabbing; }
.opt-item.dragging{ opacity:.4; }
.opt-item.drop-target{
  outline:2px solid var(--blueprint); outline-offset:-1px;
  background:var(--blueprint-bg);
}
.opt-del{
  border:none; background:none; color:#CBD5E1; cursor:pointer;
  font-size:15px; padding:0 2px; line-height:1; margin-left:auto; transition:color .1s;
}
.opt-del:hover{ color:var(--danger); }

/* 색상 동그라미 줄 — 1줄 고정, 중앙정렬
   ★ flex-wrap:nowrap 으로 절대 2줄 안 됨
   동그라미 20px × 12개 + gap 5px × 11 = 295px
   opt-item 내부 가용폭(~330px)보다 작으므로 1줄에 딱 들어감 */
.color-row{
  display:flex; flex-wrap:nowrap; gap:5px;
  justify-content:center;
  width:100%;
}
.color-dot{
  width:20px; height:20px; flex:0 0 20px;
  border-radius:50%; cursor:pointer;
  border:2px solid transparent; transition:transform .1s;
}
.color-dot:hover{ transform:scale(1.2); }
.color-dot.selected{ border-color:#333; }

/* 새 옵션 추가 입력줄 */
.opt-add-row{ display:flex; gap:6px; margin-top:10px; }
.opt-add-input{
  flex:1; padding:8px 10px; border:1px solid var(--line); border-radius:7px;
  font-size:13px; font-family:var(--sans); color:var(--ink); outline:none;
}
.opt-add-input:focus{ border-color:var(--blueprint); }
.opt-add-btn{
  padding:8px 14px; background:var(--blueprint); color:#fff; border:none;
  border-radius:7px; font-size:13px; font-weight:600; font-family:var(--sans); cursor:pointer;
}
.opt-add-btn:hover{ background:var(--blueprint-strong); }

</style>
</head>
<body>

<!-- ============================================================
     헤더
============================================================ -->
<div class="header">
  <h1>📋 <span>기술전략팀</span> <span class="h1-sub">업무관리</span></h1>
  <div class="header-right">
    <!-- 연도 선택 탭 — 클릭 시 해당 연도 데이터만 표시 -->
    <div class="year-tab-group" id="yearTabGroup"></div>
    <button class="year-new-btn" onclick="addNewYear()" title="새 연도 시작">+ 연도 추가</button>
    <span class="app-version">v3.0 · 260717</span>
    <div class="sync-status">
      <div class="sync-dot" id="syncDot"></div>
      <span id="syncText">연결중...</span>
    </div>
  </div>
</div>

<!-- ============================================================
     탭바
============================================================ -->
<div class="tab-bar">
  <button class="tab active" id="tab-task" onclick="switchTab('task')">📋 업무일정표</button>
  <button class="tab" id="tab-expense" onclick="switchTab('expense')">💰 경비사용내역</button>
</div>

<!-- ============================================================
     메인
============================================================ -->
<div class="main">

  <!-- ======== 업무일정표 패널 ======== -->
  <div class="tab-panel active" id="panel-task">
    <!-- 상태 필터 버튼 바 (클릭 시 해당 상태만 필터링) -->
    <div class="filter-bar">
      <button class="flt-btn all active" id="flt-all"  onclick="setStatusFilter('')">
        <span class="flt-num" id="cnt-all">-</span> 전체

const COL_DEFS_SIGNATURE = COL_DEFS_DEFAULT.length + '_'

  + COL_DEFS_DEFAULT.map(c=>c[0][0]).join('');  /* 각 컬럼 첫 글자 연결 — 순서 변경도 감지 */

(function clearIfChanged(){

   저장된 게 없거나 컬럼 수가 다르면 기본 순서 그대로 반환 */
function loadColOrder(){
  try{

    if(!saved) return [...COL_DEFS_DEFAULT];
    const order = JSON.parse(saved);
    const byName = Object.fromEntries(COL_DEFS_DEFAULT.map(c=>[c[0],c]));
    const reordered = order.map(n=>byName[n]).filter(Boolean);
    COL_DEFS_DEFAULT.forEach(c=>{ if(!reordered.includes(c)) reordered.push(c); });
    return reordered;
  }catch(e){ return [...COL_DEFS_DEFAULT]; }
}

/* ★★ 2026-07 개편: 옵션을 코드에 박아두지 않고 Supabase에서 불러옵니다 ★★
   app_options 테이블에 저장 → ⚙ 버튼으로 추가/삭제/색상/순서 변경 → 팀 전체 공유

let OPTIONS = { status:[], lead:[], sub:[], sales:[], category:[], prog:[], intensity:[] };

/* ------------------------------------------------------------
   옵션 전체를 Supabase에서 읽어오기
   opt_type(종류)별로 sort_order(순서)대로 정렬해서 가져옵니다.
------------------------------------------------------------ */
async function loadOptions(){
  /* ★ 옵션 로드 실패해도 앱 전체가 멈추지 않게 try-catch로 감쌉니다.
     실패 시 OPTIONS는 빈 상태로 유지되고, 경고 토스트만 띄웁니다. */
  try{
    const res = await fetch(SB_URL+'/rest/v1/app_options?order=opt_type.asc,sort_order.asc', {headers:H});
    if(!res.ok){
      const errText = await res.text();
      console.warn('옵션 로드 실패:', errText);
      /* RLS 오류면 콘솔에 SQL 안내 출력 */
      if(errText.includes('42501') || errText.includes('row-level security')){
        console.error(
          '▼▼▼ app_options 테이블 RLS 오류 — Supabase SQL Editor에서 실행하세요 ▼▼▼\n'
          +'ALTER TABLE app_options DISABLE ROW LEVEL SECURITY;\n'
          +'GRANT ALL ON app_options TO anon;\n'
          +'GRANT ALL ON app_options TO authenticated;\n'
          +'▲▲▲▲▲▲▲▲▲▲▲▲▲▲▲▲▲▲▲▲▲▲▲▲▲▲▲▲▲▲▲▲▲▲▲▲▲'
        );
        toast('⚠️ app_options RLS 오류 — 브라우저 콘솔(F12)에서 SQL을 확인하세요', 5000);
      } else {
        toast('⚠️ 옵션 로드 실패 — app_options 테이블을 확인하세요');
      }
      renderLeadFilterOptions();
      return;   /* OPTIONS는 빈 상태로 두고 계속 진행 */
    }
    const rows = await res.json();
    Object.keys(OPTIONS).forEach(k => OPTIONS[k] = []);   /* 비우고 */
    rows.forEach(r => { if(OPTIONS[r.opt_type]) OPTIONS[r.opt_type].push(r); });  /* 다시 채우기 */
  }catch(e){
    console.warn('옵션 로드 중 네트워크 오류:', e);
    toast('⚠️ 옵션 로드 실패 (네트워크 오류)');
  }
  renderLeadFilterOptions();   /* "전체 담당자" 검색 필터도 OPTIONS.lead 기준으로 채움 */
}

/* ------------------------------------------------------------
   "전체 담당자" 검색 필터 드롭다운을 OPTIONS.lead 기준으로 동적 렌더링
   (예전엔 HTML에 4명이 하드코딩되어 있었음 → ⚙ 옵션관리에서 담당자를
   추가/삭제해도 반영이 안 되는 문제가 있어서 동적으로 바꿈)
   ⚙ 모달에서 담당자 옵션을 추가/삭제/순서변경할 때도 다시 호출됨(renderOptList 안에서)
------------------------------------------------------------ */
function renderLeadFilterOptions(){
  const sel = document.getElementById('fLead');
  if(!sel) return;
  const current = sel.value;   /* 지금 선택돼 있던 값 기억 */
  let html = '<option value="">전체 담당자</option>';
  (OPTIONS['lead']||[]).forEach(o=>{
    html += '<option value="'+esc(o.value)+'">'+esc(o.label||o.value)+'</option>';
  });
  sel.innerHTML = html;
  /* 새 목록에도 이전 선택값이 여전히 있으면 유지 (없어졌으면 "전체 담당자"로 자동 복귀) */
  if(Array.from(sel.options).some(op=>op.value===current)) sel.value = current;
}

/* 특정 종류에서 값 하나 찾기 */
function findOpt(type, value){
  return (OPTIONS[type]||[]).find(o => o.value === value) || null;
}
/* 화면에 보여줄 이름 (label 없으면 value 그대로) */
function optLabel(type, value){
  const o = findOpt(type, value);
  return o ? (o.label || o.value) : (value || '');
}
/* 뱃지 색상 {bg:배경, fg:글자} */
function optColor(type, value){
  const o = findOpt(type, value);
  return o ? { bg:o.color_bg||'#F0F0F0', fg:o.color_fg||'#555555' }
           : { bg:'#F0F0F0', fg:'#999999' };
}
/* <select> 만들 때 쓰는 형태로 변환 (업무추가 모달에서 사용) */
function optsFor(type){
  return (OPTIONS[type]||[]).map(o => ({ val:o.value, label:o.label||o.value }));
}

============================================================ */
function toast(msg, dur=2200){

  el.classList.add('show');

============================================================ */
// 날짜 문자열 "YYYY-MM-DD" → "MM/DD" 형식으로 변환
function fmtDate(d){ if(!d) return '-'; const p=d.split('-'); return p.length>=3?p[1]+'/'+p[2]:d; }

// 숫자 → "1,234원" 형식으로 변환
function fmtMoney(n){ if(n===null||n===undefined||n==='') return '-'; return Number(n).toLocaleString('ko-KR')+'원'; }

// HTML 특수문자 이스케이프 (XSS 방지 + 따옴표 오류 방지)
function esc(s){ return (s||'').replace(/&/g,'&amp;').replace(/"/g,'&quot;').replace(/</g,'&lt;').replace(/>/g,'&gt;'); }

/* ============================================================
   상태 뱃지 HTML 생성
   상태 문자열에 따라 색깔 있는 뱃지를 만들어 반환
============================================================ */
function statusBadge(s){
  if(!s) return '<span style="color:#CCC">-</span>';
  const c = optColor('status', s);          /* DB에 저장된 색 */
  const l = optLabel('status', s);          /* DB에 저장된 표시명 */
  return '<span class="badge" style="background:'+c.bg+';color:'+c.fg+'">'+esc(l)+'</span>';
}

/* 진행상태 뱃지 (모델링/제작도/매뉴얼 공용) */
function pbadge(v){
  if(!v || v==='-') return '<span style="color:#CCC">-</span>';
  const c = optColor('prog', v);
  return '<span class="pb" style="background:'+c.bg+';color:'+c.fg+'">'+esc(optLabel('prog',v))+'</span>';
}

/* 업무강도 뱃지 */
function ibadge(v){
  if(!v) return '<span style="color:#CCC">-</span>';
  const c = optColor('intensity', v);
  return '<span class="ib" style="background:'+c.bg+';color:'+c.fg+'">'+esc(optLabel('intensity',v))+'</span>';
}

/* ============================================================
   SELECT 옵션 HTML 생성 헬퍼
   opts: 옵션 배열, cur: 현재 선택값, empty: 빈 옵션 라벨
============================================================ */
function mkOpts(opts, cur, empty=''){
  let h = empty ? '<option value="">'+empty+'</option>' : '';
  opts.forEach(o=>{
    const v=typeof o==='object'?o.val:o;
    const l=typeof o==='object'?o.label:o;
    h+='<option value="'+esc(v)+'" '+(cur===v?'selected':'')+'>'+l+'</option>';
  });
  return h;
}

/* ============================================================
   업무일정표 데이터 로드 (Supabase → taskData 배열)
============================================================ */
async function loadTasks(){
  /* year 컬럼이 DB에 있으면 해당 연도만, 없으면 전체를 가져옵니다.
     컬럼이 없을 때 Supabase는 400을 반환하므로 폴백으로 전체 로드합니다. */
  let res = await fetch(
    SB_URL+'/rest/v1/task_schedule?year=eq.'+activeYear+'&order=created_at.asc',
    {headers:H}
  );
  /* year 컬럼 없음(400) → 전체 로드로 폴백 */
  if(!res.ok){
    res = await fetch(
      SB_URL+'/rest/v1/task_schedule?order=created_at.asc',
      {headers:H}
    );
  }
  if(!res.ok) throw new Error('task load fail');
  taskData = await res.json();
  renderTask();
  updateSummary();
}

/* ============================================================
   ★ 연도 관리 ★
============================================================ */

/* DB에 존재하는 연도 목록 조회 */
async function loadYears(){
  try{
    const res = await fetch(
      SB_URL+'/rest/v1/task_schedule?select=year&order=year.asc',
      {headers:{...H, 'Prefer':'count=none'}}
    );
    /* year 컬럼이 없거나 오류 → 현재 연도만 탭으로 표시하고 계속 진행 */
    if(!res.ok){
      availableYears = [activeYear];
      renderYearTabs();
      return;
    }
    const rows = await res.json();
    const years = [...new Set(rows.map(r=>r.year).filter(Boolean))].sort();
    if(!years.includes(activeYear)) years.push(activeYear);
    availableYears = years.sort();
    activeYear = availableYears[availableYears.length-1];
    renderYearTabs();
  }catch(e){
    availableYears = [activeYear];
    renderYearTabs();
  }
}

/* 연도 탭 버튼 렌더링 */
function renderYearTabs(){
  const wrap = document.getElementById('yearTabGroup');
  if(!wrap) return;
  wrap.innerHTML = availableYears.map(y=>
    '<button class="year-tab'+(y===activeYear?' active':'')+'" onclick="setYear('+y+')">'+y+'</button>'
  ).join('');
}

/* 연도 전환 — 클릭 시 해당 연도 데이터 다시 로드 */
async function setYear(y){
  if(activeYear === y) return;
  activeYear = y;
  renderYearTabs();
  setSyncStatus('loading','로딩중...');
  try{
    await Promise.all([loadTasks(), loadExpenses()]);
    setSyncStatus('ok','연결됨');
  }catch(e){ setSyncStatus('error','오류'); }
}

/* 새 연도 추가 버튼 — 다음 연도를 목록에 추가하고 전환 */
async function addNewYear(){
  const nextYear = Math.max(...availableYears) + 1;
  if(!confirm(nextYear+'년을 새로 시작합니다.\n업무·경비 데이터는 비어있는 상태로 시작됩니다.\n계속할까요?')) return;
  if(!availableYears.includes(nextYear)) availableYears.push(nextYear);
  availableYears.sort();
  activeYear = nextYear;
  renderYearTabs();
  /* 새 연도엔 데이터가 없으므로 빈 상태로 렌더 */
  taskData = [];
  expData = [];
  renderTask();
  renderExpense();
  updateSummary();
  updateBudget();
  toast('✅ '+nextYear+'년이 추가됐습니다. 업무·경비를 새로 추가해주세요.');
}

/* ============================================================
   상태 필터 — 전역 변수로 관리 (기존 select#fStatus 대체)
============================================================ */
let activeStatusFilter = '';

function setStatusFilter(val){
  activeStatusFilter = val;
  const map = { '':'all', '요청':'req', '진행중':'ing', '지속':'cont', '보류':'hold', '완료':'done' };
  Object.entries(map).forEach(([k, cls])=>{
    const btn = document.getElementById('flt-'+cls);
    if(btn) btn.classList.toggle('active', k === val);
  });
  renderTask();
}

/* ============================================================
   요약 카드 숫자 업데이트
============================================================ */
function updateSummary(){
  const c={done:0,ing:0,hold:0,cont:0,req:0};
  taskData.forEach(t=>{
    const s=(t.status||'').toLowerCase();
    if(s.includes('완료'))       c.done++;
    else if(s.includes('진행중')) c.ing++;
    else if(s.includes('보류'))  c.hold++;
    else if(s.includes('지속'))  c.cont++;
    else if(s.includes('요청'))  c.req++;
  });
  document.getElementById('cnt-done').textContent=c.done;
  document.getElementById('cnt-ing').textContent=c.ing;
  document.getElementById('cnt-hold').textContent=c.hold;
  document.getElementById('cnt-cont').textContent=c.cont;
  document.getElementById('cnt-req').textContent=c.req;
  document.getElementById('cnt-all').textContent=taskData.length;
  /* 카운트 숫자가 바뀌면 "완료" 버튼 폭도 바뀌므로, 정렬을 다음 프레임에 다시 계산 */
  requestAnimationFrame(alignFilterSelToDone);
}

/* 검색창 폭을 조정해서 "전체 담당자" 드롭다운의 시작 위치가
   "완료" 버튼 왼쪽 끝과 맞춰지도록 함 (상태 필터 줄과 툴바 줄의 시각적 정렬용) */
function alignFilterSelToDone(){
  const doneBtn = document.getElementById('flt-done');
  const search = document.getElementById('taskSearch');
  const fLead = document.getElementById('fLead');
  if(!doneBtn || !search || !fLead) return;
  /* ★ 태블릿·모바일(768px 이하)에서는 상태 버튼이 두 줄로 접히므로
     "완료" 버튼 위치에 맞추면 엉뚱한 폭이 나옵니다.
     이 구간에서는 인라인 폭을 지우고 CSS(flex:1)에 맡깁니다. */
  if(window.innerWidth <= 768){ search.style.width = ''; return; }
  const doneRect = doneBtn.getBoundingClientRect();
  const searchRect = search.getBoundingClientRect();
  const gap = 8;   /* .toolbar-left gap 값과 동일 */
  const targetWidth = Math.round(doneRect.left - searchRect.left - gap);
  if(targetWidth > 200){   /* 화면이 너무 좁을 때 검색창이 과하게 줄어드는 것 방지 */
    search.style.width = targetWidth + 'px';
  }
}
window.addEventListener('resize', () => requestAnimationFrame(alignFilterSelToDone));

/* ============================================================
   정렬 함수
   컬럼 헤더 클릭 시 호출됨
   같은 컬럼 두 번 클릭하면 방향 반전
============================================================ */
function sortBy(col){
  if(sortCol===col) sortDir = sortDir==='asc'?'desc':'asc';
  else { sortCol=col; sortDir='asc'; }
  renderTask();
}

/* ============================================================
   데이터 정렬 로직
============================================================ */
function sortedData(data){
  return [...data].sort((a,b)=>{
    let va, vb;
    if(sortCol==='status'){
      // 상태는 커스텀 순서(STATUS_ORDER)로 정렬
      va = STATUS_ORDER[a.status] || 99;
      vb = STATUS_ORDER[b.status] || 99;
    } else {
      va = a[sortCol] || '';
      vb = b[sortCol] || '';
    }
    if(va<vb) return sortDir==='asc'?-1:1;
    if(va>vb) return sortDir==='asc'?1:-1;
    return 0;
  });
}

/* ============================================================
   정렬 표시 아이콘 생성
   현재 정렬 중인 컬럼에만 화살표 표시
============================================================ */
function sortIcon(col){
  if(sortCol!==col) return '';   /* ⇅ 제거 — 정렬 안 된 컬럼엔 아무 기호도 표시 안 함 */
  return sortDir==='asc'
    ? ' <span style="color:var(--blueprint);font-size:10px">▲</span>'
    : ' <span style="color:var(--blueprint);font-size:10px">▼</span>';
}

/* ============================================================
   업무 테이블 렌더링 (엑셀 스타일 인라인 편집)

   동작 방식:
   - 기본: 뷰 모드 (텍스트/뱃지 표시)
   - 셀 클릭: 해당 셀만 편집 컨트롤로 전환
   - 행 밖 클릭 / Enter: 자동 저장
   - 헤더 클릭: 해당 컬럼 기준 정렬
============================================================ */
function renderTask(){
  /* DOM 요소가 없으면 조용히 종료 (탭 전환 전 호출 시 방어) */
  const wrap = document.getElementById('taskTableWrap');
  if(!wrap) return;

  const search=((document.getElementById('taskSearch')||{value:''}).value||'').toLowerCase();
  const fSt = activeStatusFilter;
  const fLd=((document.getElementById('fLead')||{value:''}).value||'');

  // 필터 적용
  let filtered=taskData.filter(t=>{
    const ms=!search||(t.title||'').toLowerCase().includes(search)
      ||(t.lead||'').toLowerCase().includes(search)
      ||(t.location||'').toLowerCase().includes(search)
      ||(t.sub||'').toLowerCase().includes(search)
      ||(t.sales||'').toLowerCase().includes(search);
    const mst=!fSt||(t.status||'').toLowerCase().includes(fSt.toLowerCase());
    const mld=!fLd||t.lead===fLd;
    return ms&&mst&&mld;
  });

  // 정렬 적용
  filtered = sortedData(filtered);

  /* ------------------------------------------------------------
     COL_DEFS 전역 변수에서 현재 컬럼 순서를 가져옵니다.
     드래그앤드롭으로 순서가 바뀌면 COL_DEFS도 함께 바뀝니다.
     localStorage에 저장된 순서가 있으면 그걸로 복원합니다.
  ------------------------------------------------------------ */
  const cols = COL_DEFS;

  /* ---- 표 맨 위 "+ 업무 추가" 가로 전체 버튼 ----
     thead 안에 td colspan 으로 넣어서 표 폭 전체를 차지하게 함 */
  const addBtnRow =
    '<tr><td colspan="'+cols.length+'" style="padding:0;border:none">'
    +'<div class="add-row-btn-wrap">'
    +'<button class="add-row-btn" onclick="quickAddTask()">'
    +'<svg width="13" height="13" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5">'
    +'<line x1="12" y1="5" x2="12" y2="19"/><line x1="5" y1="12" x2="19" y2="12"/></svg>'
    +'업무 추가</button></div></td></tr>';

  /* 조건에 맞는 게 없어도 "추가" 버튼은 보여야 하므로 표는 항상 그립니다 */
  if(!filtered.length){
    wrap.innerHTML=
      '<table><thead>'+addBtnRow+'</thead></table>'
      +'<div class="empty-msg">📭 조건에 맞는 업무가 없습니다.</div>';
    return;
  }

  let html='<table><thead>'+addBtnRow+'<tr>';
  cols.forEach(([label,key,w,optType])=>{
    /* ⚙ 버튼: 그 컬럼의 선택지를 추가/삭제/색상변경/순서변경 */
    const gear = optType
      ? ' <button class="gear-btn" onclick="event.stopPropagation();openOptModal(\'' + optType + '\')" title="'+OPT_TITLE[optType]+' 옵션 관리">⚙</button>'
      : '';
    if(key){
      /* ★ onclick 대신 data-sort-key 속성으로 정렬키를 기록합니다.
         실제 클릭 이벤트는 initColResize() 안에서 addEventListener로 붙입니다.
         이렇게 해야 리사이즈 핸들 드래그 중에 정렬이 실수로 실행되는 걸 막을 수 있습니다. */
      html+='<th style="width:'+w+'px;cursor:pointer" data-sort-key="'+key+'">'
        +label+sortIcon(key)+gear+'</th>';
    } else {
      html+='<th style="width:'+w+'px">'+label+gear+'</th>';
    }
  });
  html+='</tr></thead><tbody>';

  filtered.forEach(t=>{
    const id = t.id;
    const ddayVal=(t.dday!==null&&t.dday!==undefined&&t.dday!==-33015)?t.dday:null;
    const ddayTxt=ddayVal===null?'-':ddayVal>=0?'D+'+ddayVal:'D'+ddayVal;
    const ddayStyle=ddayVal!==null&&ddayVal>=0&&ddayVal<=7?'color:#D48806;font-weight:700':
                    ddayVal!==null&&ddayVal<0&&(t.status||'').includes('진행')?'color:var(--danger);font-weight:700':'';

    /* 상태에 따라 행 배경색 결정 */
    const rowCls = (t.status||'').includes('완료') ? 'row-done'
                 : (t.status||'').includes('진행중') ? 'row-ing'
                 : (t.status||'').includes('지속') ? 'row-cont'
                 : (t.status||'').includes('보류') ? 'row-hold'
                 : (t.status||'').includes('요청') ? 'row-req' : '';

    /* 파생값 계산 (날짜 차이, 단위: 일) */
    const diffDays = (a, b) => {
      if (!a || !b) return null;
      return Math.round((new Date(b) - new Date(a)) / 86400000);
    };
    const lt = t.lead_time   || diffDays(t.request_date, t.deadline);
    const wt = t.work_time   || diffDays(t.start_date, t.end_date);
    const st = t.save_time   !== undefined && t.save_time !== null ? t.save_time
             : (lt !== null && wt !== null ? lt - wt : null);

    html+='<tr id="row-'+id+'" class="'+rowCls+'">';

    /* ---- COL_DEFS 순서대로 td를 동적으로 생성합니다 ----
       드래그앤드롭으로 컬럼 순서가 바뀌어도 이 루프가 그 순서를 따릅니다 */
    cols.forEach(([label, key])=>{
      switch(key || label){
        /* 드롭다운 셀들 */
        case 'status':    html+=tdDropdown(id,'status',   t.status,   'center'); break;
        case 'lead':      html+=tdDropdown(id,'lead',     t.lead,     'center'); break;
        case 'sub':       html+=tdSubCell(id, t.sub); break;  /* 복수선택 전용 셀 */
        case 'sales':     html+=tdDropdown(id,'sales',    t.sales,    'center'); break;
        case 'category':  html+=tdDropdown(id,'category', t.category, 'center'); break;
        /* 텍스트 직접입력 셀 */
        case 'title':     html+=tdText(id,'title',    t.title,    '업무내용 입력'); break;
        case 'location':  html+=tdText(id,'location', t.location, '출고지');       break;
        /* 날짜 셀 */
        case 'request_date': html+=tdDate(id,'request_date', t.request_date); break;
        case 'deadline':     html+=tdDate(id,'deadline',     t.deadline);     break;
        case 'start_date':   html+=tdDate(id,'start_date',   t.start_date);   break;
        case 'end_date':     html+=tdDate(id,'end_date',     t.end_date);     break;
        /* 읽기전용 파생값 */
        case 'dday':
          html+='<td><div class="c-box" style="justify-content:center;font-size:12px;'+ddayStyle+'">'+ddayTxt+'</div></td>'; break;
        case 'lead_time':
          html+='<td><div class="dval">'+(lt!==null?lt+'일':'-')+'</div></td>'; break;
        case 'work_time':
          html+='<td><div class="dval">'+(wt!==null?wt+'일':'-')+'</div></td>'; break;
        case 'save_time':
          html+='<td><div class="dval '+(st===null?'':(st>=0?'save-pos':'save-neg'))+'">'+(st!==null?st+'일':'-')+'</div></td>'; break;
        /* 진행상태 (모델링/제작도/매뉴얼 3줄) */
        case '진행상태':
          html+='<td><div class="prog-group">'
            + progRow(id,'modeling','모델링', t.modeling)
            + progRow(id,'drawing', '제작도', t.drawing)
            + progRow(id,'manual',  '매뉴얼', t.manual)
            + '</div></td>'; break;
        /* 강도 토글 */
        case 'intensity':
          html+='<td>'+togGroup(id,'intensity','intensity',t.intensity)+'</td>'; break;
        /* 삭제 버튼 */
        case '삭제':
          html+='<td style="padding:5px 6px;text-align:center">'
            +'<button class="btn-row-del" onclick="deleteTask(\''+id+'\')">🗑</button>'
            +'</td>'; break;
        default:
          html+='<td></td>';
      }
    });

    html+='</tr>';
  });

  html+='</tbody></table>';
  wrap.innerHTML=html;

  /* 표를 새로 그렸으니 컬럼 폭 조절 손잡이도 다시 붙임 */
  initColResize();
}

/* ============================================================
   ★ 셀 생성 헬퍼들 ★
   행 전체가 아니라 "셀 하나"만 편집되도록 만드는 부품들입니다.
============================================================ */

/* ---- 글자 입력 셀 ----
   contenteditable="true" → 클릭하면 그 자리에서 바로 타이핑
   onblur(칸 밖 클릭) 시 자동 저장 */
function tdText(id, field, value, placeholder){
  return '<td><div class="c-box"><div class="c-text" contenteditable="true"'
    +' data-ph="'+placeholder+'"'
    +' title="'+esc(value)+'"'
    +' onblur="saveField(\''+id+'\',\''+field+'\',this.innerText.trim())"'
    +' onkeydown="textCellKey(event,this)"'
    +'>'+esc(value)+'</div></div></td>';
}

/* 글자 셀에서 Enter=저장(줄바꿈 방지), Esc=취소 */
function textCellKey(e, el){
  if(e.key==='Enter'){ e.preventDefault(); el.blur(); }
  if(e.key==='Escape'){ e.preventDefault(); renderTask(); }
}

/* ---- 날짜 입력 셀 ---- */
function tdDate(id, field, value){
  return '<td><div class="c-box" style="justify-content:center">'
    +'<input type="date" class="c-date" value="'+(value||'')+'"'
    +' onchange="saveField(\''+id+'\',\''+field+'\',this.value||null)">'
    +'</div></td>';
}

/* ---- 드롭다운 셀 (상태/담당자/영업/분류) ----
   평소엔 뱃지만 보이다가, 클릭하면 팝업이 뜹니다.
   ★ 팝업은 표 밖(body)에 fixed로 뜨므로 절대 잘리지 않습니다 */
function tdDropdown(id, field, value, align='left'){
  const type = field;                 /* 필드명 = 옵션 종류명 (동일하게 맞춰둠) */
  const c = optColor(type, value);
  const l = value ? optLabel(type, value) : '-';
  const badge = value
    ? '<span class="badge" style="background:'+c.bg+';color:'+c.fg+'">'+esc(l)+'</span>'
    : '<span style="color:#CCC">-</span>';
  return '<td><div class="c-box" style="justify-content:'+align+'">'
    +'<span class="dd-btn" onclick="openDD(event,\''+id+'\',\''+field+'\')">'+badge+'</span>'
    +'</div></td>';
}


/* ---- 보조담당자 전용 셀 ----
   ★ 주담당자(tdDropdown)와 완전히 동일한 1줄 구조
   여러 명이어도 뱃지를 가로로 나란히 표시 (줄바꿈 없음 → 행 높이 항상 동일)
   이름이 많아 칸 폭을 넘치면 잘려 보임 — 컬럼 경계를 끌어 넓히면 다 보임 */
function tdSubCell(id, value){
  const names = value ? value.split(',').map(s=>s.trim()).filter(Boolean) : [];

  const inner = names.length
    ? names.map(n=>{
        const c = optColor('sub', n);
        return '<span class="badge" style="font-size:11px;background:'+c.bg+';color:'+c.fg+'">'+esc(n)+'</span>';
      }).join('')
    : '<span style="color:#CCC">-</span>';

/* ---- 토글 버튼 그룹 ----
   선택지를 전부 나열하고, 지금 값인 것만 색이 켜집니다. */
function togGroup(id, field, type, value, extraStyle=''){
  let h='<div class="tog-group" style="'+extraStyle+'">';
  (OPTIONS[type]||[]).forEach(o=>{
    const on = (value === o.value);
    /* 켜진 버튼만 DB에 저장된 색을 입힘 */
    const st = on ? 'background:'+o.color_bg+';color:'+o.color_fg+';border-color:'+o.color_bg+';' : '';
    h+='<span class="tog'+(on?' on':'')+'" style="'+st+'"'
      +' onclick="saveField(\''+id+'\',\''+field+'\',\''+esc(o.value).replace(/'/g,"\\'")+'\')">'
      +esc(o.label||o.value)+'</span>';
  });
  return h+'</div>';
}

/* ---- 진행상태 한 줄 (라벨 + 토글버튼들) ---- */
function progRow(id, field, label, value){
  return '<div class="prog-row"><span class="prog-lbl">'+label+'</span>'
    + togGroup(id, field, 'prog', value, 'padding:0;gap:2px;')
    + '</div>';
}

/* ============================================================
   ★ 셀 하나만 저장 (PATCH) ★
   예전엔 행 전체를 한꺼번에 저장했지만, 이제 바뀐 칸 하나만 저장합니다.
   id: 행 UUID / field: 컬럼명 / value: 새 값
============================================================ */
async function saveField(id, field, value){
  const row = taskData.find(x=>x.id===id);
  if(!row) return;
  const newVal = (value === '' ? null : value);
  if(row[field] === newVal) return;            /* 안 바뀌었으면 저장 안 함 */

  setSyncStatus('loading','저장중...');
  try{
    const res = await fetch(SB_URL+'/rest/v1/task_schedule?id=eq.'+id,
      {method:'PATCH', headers:H, body:JSON.stringify({[field]:newVal})});
    if(!res.ok) throw new Error(await res.text());

    /* 로컬 캐시 즉시 반영 → 새로고침 없이 화면에 바로 적용 */
    row[field] = newVal;

    renderTask();
    updateSummary();
    setSyncStatus('ok','연결됨');
  } catch(e){
    setSyncStatus('error','오류');
    toast('❌ 저장 실패: '+e.message);
  }
}

/* ============================================================
   ★ 표 맨 위 "+ 업무 추가" — 빈 행을 바로 추가 ★
   모달 없이 즉시 행이 생기고, 프로젝트명 칸에 커서가 갑니다.
============================================================ */
async function quickAddTask(){
  const firstStatus = OPTIONS.status[0] ? OPTIONS.status[0].value : '1. 요청';
  setSyncStatus('loading','추가중...');
  try{
    const res = await fetch(SB_URL+'/rest/v1/task_schedule',
      {method:'POST', headers:{...H,'Prefer':'return=representation'},
       body:JSON.stringify({status:firstStatus, year:activeYear})});
    if(!res.ok) throw new Error(await res.text());
    const [created] = await res.json();
    taskData.push(created);
    renderTask(); updateSummary();
    setSyncStatus('ok','연결됨');
    /* 새로 생긴 행의 프로젝트명 칸에 커서 놓기 */
    setTimeout(()=>{
      const tr = document.getElementById('row-'+created.id);
      if(tr){
        tr.scrollIntoView({block:'center', behavior:'smooth'});
        const cell = tr.querySelectorAll('.c-text')[0];
        if(cell) cell.focus();
      }
    }, 80);
  } catch(e){
    setSyncStatus('error','오류');
    toast('❌ 추가 실패: '+e.message);
  }
}

async function deleteTask(id){
  if(!confirm('정말 삭제하시겠습니까?')) return;
  setSyncStatus('loading','삭제중...');
  try{
    const res=await fetch(SB_URL+'/rest/v1/task_schedule?id=eq.'+id,{method:'DELETE',headers:H});
    if(!res.ok) throw new Error();
    taskData=taskData.filter(x=>x.id!==id);
    renderTask(); updateSummary();
    setSyncStatus('ok','연결됨');
    toast('🗑️ 삭제되었습니다.');
  } catch(e){ setSyncStatus('error','오류'); toast('❌ 삭제 실패'); }
}

/* ============================================================
   예산 현황 카드 업데이트
============================================================ */
function updateBudget(){
  const spent=expData.reduce((s,e)=>s+(Number(e.amount)||0),0);
  const remain=budgetTotal-spent;
  const rate=budgetTotal?Math.min(100,Math.round(spent/budgetTotal*100)):0;
  document.getElementById('bTotal').textContent=fmtMoney(budgetTotal);
  document.getElementById('bSpent').textContent=fmtMoney(spent);
  document.getElementById('bRemain').textContent=fmtMoney(remain);
  document.getElementById('bRate').textContent=rate+'%';
  if(document.getElementById('bRateBar'))
    document.getElementById('bRateBar').textContent=rate+'%';
  document.getElementById('bBar').style.width=rate+'%';
}

/* ============================================================
   총 배정금액 로드/저장 — app_options 테이블에 연도별로 저장
   (opt_type='budget_total', label=연도, value=금액)
============================================================ */
async function loadBudgetTotal(){
  try{
    const res = await fetch(
      SB_URL+'/rest/v1/app_options?opt_type=eq.budget_total&label=eq.'+activeYear,
      {headers:H}
    );
    if(res.ok){
      const rows = await res.json();
      if(rows.length){
        budgetTotal = Number(rows[0].value)||1080000;
        budgetTotalRowId = rows[0].id;
      } else {
        budgetTotal = 1080000;   // 아직 이 연도 설정값이 없으면 기본값
        budgetTotalRowId = null;
      }
    }
  }catch(e){
    console.error('총 배정금액 로드 실패:', e);
    budgetTotal = 1080000;
    budgetTotalRowId = null;
  }
}

/* 총 배정금액 저장 + 기존 경비 행들의 한도/잔액 재계산 */
async function saveBudgetTotal(n){
  setSyncStatus('loading','저장중...');
  try{
    if(budgetTotalRowId){
      const res = await fetch(SB_URL+'/rest/v1/app_options?id=eq.'+budgetTotalRowId,
        {method:'PATCH',headers:H,body:JSON.stringify({value:String(n)})});
      if(!res.ok) throw new Error(await res.text());
    } else {
      const res = await fetch(SB_URL+'/rest/v1/app_options',
        {method:'POST',headers:{...H,'Prefer':'return=representation'},
         body:JSON.stringify({opt_type:'budget_total', label:String(activeYear), value:String(n)})});
      if(!res.ok) throw new Error(await res.text());
      const [created]=await res.json();
      budgetTotalRowId = created.id;
    }
    await recalcBudgetCascade();
    setSyncStatus('ok','연결됨');
  }catch(e){
    setSyncStatus('error','오류');
    toast('❌ 총 배정금액 저장 실패: '+e.message);
  }
}

/* 총 배정금액이 바뀌면 기존 행들의 경비한도·잔액을 seq 순서대로 다시 계산해서 저장
   (신규 행 추가할 때와 같은 방식 — 누적 집행액을 빼가며 순서대로 깎임) */
async function recalcBudgetCascade(){
  let prevSpent = 0;
  const sorted = [...expData].sort((a,b)=>(a.seq||0)-(b.seq||0));
  for(const row of sorted){
    const amt = Number(row.amount)||0;
    const newLimit = budgetTotal - prevSpent;
    const newBalance = budgetTotal - prevSpent - amt;
    prevSpent += amt;
    if(row.budget_limit!==newLimit || row.balance!==newBalance){
      try{
        const res = await fetch(SB_URL+'/rest/v1/dept_expense?id=eq.'+row.id,
          {method:'PATCH',headers:H,body:JSON.stringify({budget_limit:newLimit, balance:newBalance})});
        if(res.ok){ row.budget_limit=newLimit; row.balance=newBalance; }
      }catch(e){ console.error('잔액 재계산 실패:', row.id, e); }
    }
  }
  renderExpense();
  updateBudget();
}

/* 총 배정금액 카드 — 클릭하면 숫자만, 블러하면 포맷 + 저장 (참석인원/집행액과 동일 방식) */
function budgetTotalFocus(el){
  el.innerText = budgetTotal ? String(budgetTotal) : '';
}
function budgetTotalKey(e, el){
  if(e.key==='Enter'){ e.preventDefault(); el.blur(); }
  if(e.key==='Escape'){ e.preventDefault(); el.innerText=fmtMoney(budgetTotal); el.blur(); }
}
async function budgetTotalBlur(el){
  const n = Number(el.innerText.replace(/[^0-9]/g,'')) || 0;
  el.innerText = fmtMoney(n);
  if(n === budgetTotal) return;   // 변경 없으면 저장 스킵
  budgetTotal = n;
  await saveBudgetTotal(n);
}

  html += '</tbody></table>';
  expWrap.innerHTML = html;
}

/* ============================================================
   경비 — 빠른 행 추가 (표 상단 버튼)
============================================================ */
async function quickAddExp(){
  const prevSpent=expData.reduce((s,e)=>s+(Number(e.amount)||0),0);
  const maxSeq=expData.length?Math.max(...expData.map(e=>e.seq||0)):0;
  const payload={ seq:maxSeq+1, budget_limit:budgetTotal-prevSpent, balance:budgetTotal-prevSpent, amount:0, year:activeYear };
  setSyncStatus('loading','추가중...');
  try{
    const res=await fetch(SB_URL+'/rest/v1/dept_expense',
      {method:'POST',headers:{...H,'Prefer':'return=representation'},body:JSON.stringify(payload)});
    if(!res.ok) throw new Error(await res.text());
    const [created]=await res.json();
    expData.push(created);
    renderExpense(); updateBudget();
    setSyncStatus('ok','연결됨');
    /* 새 행의 집행액 칸에 포커스 */
    setTimeout(()=>{
      const row=document.getElementById('exprow-'+created.id);
      if(row){ const c=row.querySelectorAll('.c-text')[1]; if(c) c.focus(); }
    },80);
  }catch(e){ setSyncStatus('error','오류'); toast('❌ 추가 실패: '+e.message); }
}

/* 집행액 셀 포커스 — 숫자만 표시 */
function expAmtFocus(el){
  const raw = el.dataset.raw;
  el.innerText = (raw && raw !== '0') ? raw : '';
}

/* 집행액 셀 블러 — 포맷팅 후 저장 */
function expAmtBlur(el){

  el.dataset.raw = n;
  el.innerText = n ? Number(n).toLocaleString('ko-KR')+'원' : '';
  saveExpAmount(el.dataset.id, n);

/* ============================================================
   경비 — 셀 하나 저장
============================================================ */
async function saveExpField(id, field, value){
  const row=expData.find(x=>x.id===id);
  if(!row) return;
  const newVal=(value===''?null:value);
  if(String(row[field])===String(newVal)) return;
  setSyncStatus('loading','저장중...');
  try{
    const res=await fetch(SB_URL+'/rest/v1/dept_expense?id=eq.'+id,
      {method:'PATCH',headers:H,body:JSON.stringify({[field]:newVal})});
    if(!res.ok) throw new Error(await res.text());
    row[field]=newVal;
    renderExpense(); updateBudget();
    setSyncStatus('ok','연결됨');
  }catch(e){ setSyncStatus('error','오류'); toast('❌ 저장 실패: '+e.message); }
}

/* 집행액 변경 시 잔액 자동 재계산
   rawVal: 숫자 문자열 (쉼표/원 제거된 상태로 넘어옴) */
async function saveExpAmount(id, rawVal){
  /* 쉼표·원·공백 제거 후 숫자 변환 */
  const amount = Number((rawVal||'').replace(/[^0-9]/g,'')) || 0;
  const row = expData.find(x=>x.id===id);
  if(!row) return;
  if(row.amount === amount) return;
  /* 이 행 제외한 나머지 집행 합계 */
  const prevSpent = expData.filter(x=>x.id!==id).reduce((s,e)=>s+(Number(e.amount)||0),0);
  const balance = budgetTotal - prevSpent - amount;
  setSyncStatus('loading','저장중...');
  try{
    const res = await fetch(SB_URL+'/rest/v1/dept_expense?id=eq.'+id,
      {method:'PATCH', headers:H, body:JSON.stringify({amount, balance})});
    if(!res.ok) throw new Error(await res.text());
    row.amount = amount;
    row.balance = balance;
    renderExpense();
    updateBudget();
    setSyncStatus('ok','연결됨');
  }catch(e){ setSyncStatus('error','오류'); toast('❌ 저장 실패: '+e.message); }
}

/* ============================================================
   ★ 드롭다운 팝업 ★
   뱃지를 클릭하면 그 뱃지 바로 아래에 선택지 목록이 뜹니다.
   팝업은 표 안이 아니라 화면(body) 기준으로 뜨기 때문에
   표 바깥으로 나가도 잘리지 않습니다. (position:fixed)
============================================================ */
let ddCtx = { id:null, field:null };   /* 지금 어느 셀의 팝업이 열려있는지 */

/* ============================================================
   ★ 드롭다운 팝업 ★
   - 단일선택 필드(status/lead/sales/category): 항목 클릭 시 즉시 닫힘
   - 복수선택 필드(sub): 항목 클릭해도 안 닫힘 → 바깥 클릭/ESC 시 닫힘
     선택값은 "주종현,김태훈" 처럼 쉼표 구분 저장
============================================================ */
function openDD(e, id, field){
  e.stopPropagation();
  const popup = document.getElementById('ddPopup');

  /* 같은 셀을 또 누르면 닫기 */
  if(popup.classList.contains('open') && ddCtx.id===id && ddCtx.field===field){
    closeDD(); return;
  }
  ddCtx = { id, field };

  const row = taskData.find(x=>x.id===id);

  if(field === 'sub'){
    /* ---- 복수선택 모드 (보조담당자) ---- */
    /* 현재 선택된 이름 Set */
    const names = (row && row.sub) ? row.sub.split(',').map(s=>s.trim()).filter(Boolean) : [];

    function buildSubContent(){
      /* data-sub-id / data-sub-val 속성으로 값 전달 → onclick 이스케이프 문제 원천 차단 */
      let h = '<div class="dd-item" data-sub-id="'+esc(id)+'" data-sub-val="" onclick="pickSubDD(this)">'
            + '<span style="color:#BBB;font-size:12px">— 비우기 —</span></div>';
      (OPTIONS['sub']||[]).forEach(o=>{
        const curNames = (row && row.sub) ? row.sub.split(',').map(s=>s.trim()).filter(Boolean) : [];
        const on = curNames.includes(o.value);
        h += '<div class="dd-item'+(on?' selected':'')+'" style="display:flex;align-items:center"'
           + ' data-sub-id="'+esc(id)+'" data-sub-val="'+esc(o.value)+'" onclick="pickSubDD(this)">'
           + '<span class="badge" style="background:'+o.color_bg+';color:'+o.color_fg+'">'
           + esc(o.label||o.value)+'</span>'
           + (on ? '<span style="margin-left:auto;padding-left:8px;color:var(--blueprint);font-size:13px;font-weight:700">✓</span>' : '')
           + '</div>';
      });
      return h;
    }
    popup.innerHTML = buildSubContent();

  } else {
    /* ---- 단일선택 모드 (status/lead/sales/category) ---- */
    const cur = row ? row[field] : null;
    let h = '<div class="dd-item'+(!cur?' selected':'')+'" onclick="pickDD(null)">'
          + '<span style="color:#BBB;font-size:12px">— 비우기 —</span></div>';
    (OPTIONS[field]||[]).forEach(o=>{
      const sel = (cur===o.value) ? ' selected' : '';
      h += '<div class="dd-item'+sel+'" onclick="pickDD(\''+esc(o.value).replace(/'/g,"\\'")+'\')">'+
           '<span class="badge" style="background:'+o.color_bg+';color:'+o.color_fg+'">'+
           esc(o.label||o.value)+'</span></div>';
    });
    popup.innerHTML = h;
  }

  /* 클릭한 뱃지 바로 아래에 팝업 위치시키기 */
  const r = e.currentTarget.getBoundingClientRect();
  popup.classList.add('open');
  const ph = popup.offsetHeight || 200;
  const top = (r.bottom + ph + 8 > window.innerHeight) ? (r.top - ph - 4) : (r.bottom + 4);
  popup.style.top  = Math.max(4, top) + 'px';
  popup.style.left = Math.min(r.left, window.innerWidth - popup.offsetWidth - 8) + 'px';
}

/* 단일선택: 고르면 바로 닫고 저장 */
function pickDD(value){
  const { id, field } = ddCtx;
  closeDD();
  if(id && field) saveField(id, field, value);
}

/* 복수선택(sub): 클릭해도 닫히지 않음
   ★ el.dataset으로 id/value를 읽어 onclick 이스케이프 문제 완전 제거
   ★ saveField를 먼저 호출하고 로컬캐시는 saveField 내부에서 갱신
      (pickSubDD에서 row.sub를 먼저 바꾸면 saveField가 "변경없음"으로 건너뜀) */
function pickSubDD(el){
  const id    = el.dataset.subId;
  const value = el.dataset.subVal || null;
  const row   = taskData.find(x=>x.id===id);
  if(!row) return;

  let newVal;
  if(!value){
    newVal = null;   /* 비우기 */
  } else {
    let names = (row.sub||'').split(',').map(s=>s.trim()).filter(Boolean);
    const idx = names.indexOf(value);
    if(idx === -1) names.push(value);
    else           names.splice(idx, 1);
    newVal = names.length ? names.join(',') : null;
  }

  /* ★ saveField를 먼저 호출해야 내부의 '변경없음' 체크를 통과합니다.
     saveField 내부에서 row[field] = newVal 로 로컬 캐시를 갱신합니다. */
  saveField(id, 'sub', newVal);

  if(!value){ closeDD(); return; }

  /* 팝업 전체 재렌더 — saveField가 비동기이므로 newVal로 직접 계산 */
  const popup = document.getElementById('ddPopup');
  let h = '<div class="dd-item" data-sub-id="'+esc(id)+'" data-sub-val="" onclick="pickSubDD(this)">'
        + '<span style="color:#BBB;font-size:12px">— 비우기 —</span></div>';
  const curNames = newVal ? newVal.split(',').map(s=>s.trim()).filter(Boolean) : [];
  (OPTIONS['sub']||[]).forEach(o=>{
    const on = curNames.includes(o.value);
    h += '<div class="dd-item'+(on?' selected':'')+'" style="display:flex;align-items:center"'
       + ' data-sub-id="'+esc(id)+'" data-sub-val="'+esc(o.value)+'" onclick="pickSubDD(this)">'
       + '<span class="badge" style="background:'+o.color_bg+';color:'+o.color_fg+'">'
       + esc(o.label||o.value)+'</span>'
       + (on ? '<span style="margin-left:auto;padding-left:8px;color:var(--blueprint);font-size:13px;font-weight:700">✓</span>' : '')
       + '</div>';
  });
  popup.innerHTML = h;
}

function closeDD(){
  document.getElementById('ddPopup').classList.remove('open');
  ddCtx = { id:null, field:null };
}

}

/* ---- 옵션 추가 ---- */
async function addOpt(){
  const val = document.getElementById('optInput').value.trim();
  if(!val) return;
  if((OPTIONS[optType]||[]).some(o=>o.value===val)){ toast('❗ 이미 있는 항목입니다'); return; }
  const order = (OPTIONS[optType]||[]).length + 1;
  setSyncStatus('loading','추가중...');
  try{
    const res = await fetch(SB_URL+'/rest/v1/app_options',
      {method:'POST', headers:{...H,'Prefer':'return=representation'},
       body:JSON.stringify({opt_type:optType, value:val, label:val,
                            color_bg:'#F0F0F0', color_fg:'#555555', sort_order:order})});
    if(!res.ok) throw new Error(await res.text());
    const [created] = await res.json();
    OPTIONS[optType].push(created);
    document.getElementById('optInput').value='';
    renderOptList();
    setSyncStatus('ok','연결됨');
  }catch(e){
    setSyncStatus('error','오류');
    /* RLS(Row Level Security) 정책 위반 오류인지 확인 */
    const msg = e.message || '';
    if(msg.includes('42501') || msg.includes('row-level security')){
      /* RLS 때문에 막힌 경우: Supabase에서 실행할 SQL을 안내합니다 */
      toast('❌ RLS 오류 — Supabase SQL에서 아래 명령을 실행하세요 (콘솔에 출력됨)', 5000);
      console.error(
        '▼▼▼ Supabase SQL Editor에서 아래 SQL을 실행하세요 ▼▼▼\n\n'
        +'-- app_options 테이블 RLS 비활성화\n'
        +'ALTER TABLE app_options DISABLE ROW LEVEL SECURITY;\n\n'
        +'-- 또는 anon 역할에 모든 권한 부여\n'
        +'GRANT ALL ON app_options TO anon;\n'
        +'GRANT ALL ON app_options TO authenticated;\n'
        +'▲▲▲▲▲▲▲▲▲▲▲▲▲▲▲▲▲▲▲▲▲▲▲▲▲▲▲▲▲▲▲▲▲▲▲▲▲▲▲▲'
      );
    } else {
      toast('❌ 추가 실패: '+msg);
    }
  }
}

/* ---- 옵션 삭제 ---- */
async function delOpt(i){
  const o = OPTIONS[optType][i];
  if(!confirm('"'+(o.label||o.value)+'" 항목을 삭제할까요?\n\n※ 이미 이 값을 쓰고 있는 업무는 그대로 남아있지만,\n   목록에서는 더 이상 고를 수 없게 됩니다.')) return;
  setSyncStatus('loading','삭제중...');
  try{
    const res = await fetch(SB_URL+'/rest/v1/app_options?id=eq.'+o.id, {method:'DELETE', headers:H});
    if(!res.ok) throw new Error(await res.text());
    OPTIONS[optType].splice(i,1);
    renderOptList();
    setSyncStatus('ok','연결됨');
  }catch(e){ setSyncStatus('error','오류'); toast('❌ 삭제 실패'); }
}

/* 옵션 한 건 수정 (PATCH) */
async function patchOpt(optId, payload){
  try{
    await fetch(SB_URL+'/rest/v1/app_options?id=eq.'+optId,
      {method:'PATCH', headers:H, body:JSON.stringify(payload)});
  }catch(e){ toast('❌ 저장 실패'); }
}


/* ============================================================
   ★ 옵션 순서 드래그앤드롭 ★
   ⠿ 손잡이를 잡고 끌어서 순서를 바꿉니다.
   위/아래 절반을 따지지 않고, 그냥 "놓은 자리"로 이동시킵니다.
   (splice가 방향을 알아서 처리해줍니다)
============================================================ */
let optDragFrom = null;

function optDragStart(e, i){
  optDragFrom = i;
  e.currentTarget.classList.add('dragging');
  e.dataTransfer.effectAllowed = 'move';
}
function optDragOver(e, i){
  e.preventDefault();                       /* 이게 없으면 drop이 안 일어남 */
  if(optDragFrom===null || optDragFrom===i) return;
  clearOptMarks();
  e.currentTarget.classList.add('drop-target');   /* 놓일 자리에 파란 테두리 */
}
function optDragLeave(e){ e.currentTarget.classList.remove('drop-target'); }
function optDragEnd(e){ e.currentTarget.classList.remove('dragging'); clearOptMarks(); optDragFrom=null; }
function clearOptMarks(){
  document.querySelectorAll('.opt-item').forEach(el=>el.classList.remove('drop-target'));
}

async function optDrop(e, i){
  e.preventDefault();
  clearOptMarks();
  if(optDragFrom===null || optDragFrom===i) return;

  const arr = OPTIONS[optType];
  const [moved] = arr.splice(optDragFrom, 1);   /* 빼서 */
  arr.splice(i, 0, moved);                      /* 놓은 자리에 끼워넣기 */
  optDragFrom = null;
  renderOptList();

  /* 바뀐 순서를 DB에 저장 (sort_order 를 1,2,3... 으로 다시 매김) */
  setSyncStatus('loading','순서 저장중...');
  try{
    await Promise.all(arr.map((o,idx)=>{
      o.sort_order = idx+1;
      return patchOpt(o.id, {sort_order: idx+1});
    }));
    setSyncStatus('ok','연결됨');
  }catch(err){ setSyncStatus('error','오류'); }
}


/* ============================================================
   ★ 컬럼 폭 조절 (엑셀처럼 경계선 끌기) ★
   - 표 전체 폭은 고정 (양끝은 안 움직임)
   - 어떤 경계선을 끌면, 왼쪽 칸이 넓어진 만큼 오른쪽 칸이 좁아짐
   - 너비는 th가 아니라 colgroup>col 로 조절해야 브라우저가 확실히 따릅니다
   - localStorage에 저장해서 새로고침해도 유지됩니다
   - 헤더 클릭 정렬도 여기서 addEventListener로 붙입니다
     (th onclick="" 방식은 핸들 드래그와 충돌하므로 사용하지 않습니다)
============================================================ */

/* 로컬스토리지 키 — 이 이름으로 컬럼 폭이 저장됩니다 */
/* 컬럼 순서 드래그앤드롭 중 여부 — 드래그 후 click(정렬) 실수 실행 방지 */
let _colDragDragging = false;

function initColResize(){
  const tbl = document.querySelector('#taskTableWrap table');
  if(!tbl) return;

  /* thead 안에 "추가 버튼 줄"과 "진짜 헤더 줄" 2개가 있으므로
     :last-child 로 진짜 헤더 줄만 정확히 집습니다 */
  const ths = [...tbl.querySelectorAll('thead tr:last-child th')];
  if(ths.length < 2) return;

  /* ---- colgroup 생성 또는 재사용 ----
     renderTask()가 innerHTML로 표를 새로 그리므로 colgroup도 매번 새로 만듭니다.
     단, 로컬스토리지에 저장된 폭이 있으면 그걸로 복원합니다. */
  let cg = tbl.querySelector('colgroup');
  if(!cg){
    cg = document.createElement('colgroup');
    ths.forEach(()=>{
      cg.appendChild(document.createElement('col'));
    });
    tbl.insertBefore(cg, tbl.firstChild);
  }
  const cols = [...cg.querySelectorAll('col')];

  /* requestAnimationFrame 2중 중첩 — 브라우저가 레이아웃을 완전히 계산한 뒤 실행 */
  requestAnimationFrame(()=>{
    requestAnimationFrame(()=>{
      /* ★ 항상 COL_DEFS의 px 고정값으로 컬럼 폭 설정
         프로젝트명(값=0)은 다른 컬럼 합산 후 남는 공간 전부 채움 */
      const tableW = tbl.getBoundingClientRect().width || window.innerWidth;
      const fixedTotal = COL_DEFS.reduce((s,c)=>s+(c[2]||0), 0);
      const flexPx = Math.max(120, tableW - fixedTotal);
      cols.forEach((col, i)=>{
        const defPx = COL_DEFS[i] ? COL_DEFS[i][2] : 0;
        col.style.width = (defPx === 0 ? flexPx : defPx) + 'px';
      });

      /* ---- 정렬 클릭 이벤트 부착 ----
         th에 onclick="" 직접 넣으면 리사이즈 핸들 드래그 후 mouseup 시점에
         click 이벤트가 실수로 발생합니다.
         addEventListener로 붙이고, 드래그 중이면 차단합니다. */
      ths.forEach(th=>{
        const key = th.dataset.sortKey;  /* data-sort-key 속성값 */
        if(!key) return;
        th.addEventListener('click', e=>{
          /* 컬럼 드래그 직후에 발생하는 click이면 무시 */
          if(_colDragDragging) return;
          sortBy(key);
        });
      });

      /* ---- 컬럼 헤더 드래그앤드롭 ----
         th를 잡아 끌어서 컬럼 순서를 바꿉니다.
         고정 컬럼(삭제 버튼 등)은 이동 불가입니다.
      ---- */
      let colDragFrom = null;   /* 드래그 시작한 컬럼 인덱스 */

      ths.forEach((th, i)=>{
        const colDef = COL_DEFS[i];
        const isFixed = colDef && colDef[4];   /* 5번째 요소 = 고정 여부 */

        if(isFixed){
          th.classList.add('col-fixed');
          return;   /* 고정 컬럼은 드래그 이벤트 안 붙임 */
        }

        th.setAttribute('draggable', 'true');

        /* 드래그 시작 */
        th.addEventListener('dragstart', e=>{
          colDragFrom = i;
          _colDragDragging = false;
          e.dataTransfer.effectAllowed = 'move';
          setTimeout(()=>th.classList.add('col-dragging'), 0);
        });

        /* 드래그 중 — 다른 th 위를 지날 때 */
        th.addEventListener('dragover', e=>{
          e.preventDefault();
          if(colDragFrom === null || colDragFrom === i) return;
          _colDragDragging = true;
          /* 모든 th에서 drop 표시 제거 후 현재 위치에만 표시 */
          ths.forEach(t=>t.classList.remove('col-drop-left','col-drop-right'));
          /* 드래그 출발 컬럼이 현재보다 왼쪽에 있으면 오른쪽 테두리, 반대면 왼쪽 테두리 */
          th.classList.add(colDragFrom < i ? 'col-drop-right' : 'col-drop-left');
        });

        th.addEventListener('dragleave', e=>{
          th.classList.remove('col-drop-left','col-drop-right');
        });

        /* 드롭 완료 */
        th.addEventListener('drop', e=>{
          e.preventDefault();
          ths.forEach(t=>t.classList.remove('col-drop-left','col-drop-right','col-dragging'));
          if(colDragFrom === null || colDragFrom === i){ colDragFrom=null; return; }

          /* COL_DEFS 배열에서 꺼내서 새 위치에 끼워넣기 */
          const [moved] = COL_DEFS.splice(colDragFrom, 1);
          /* 고정 컬럼(삭제) 바로 앞까지만 허용 */
          const fixedIdx = COL_DEFS.findIndex(c=>c[4]);
          let targetIdx = i > colDragFrom ? i - 1 : i;   /* splice 후 인덱스 보정 */
          if(fixedIdx !== -1) targetIdx = Math.min(targetIdx, fixedIdx);
          COL_DEFS.splice(targetIdx, 0, moved);

          colDragFrom = null;
          /* 순서 저장 후 표 다시 그리기 */
          saveColOrder();
          renderTask();
        });

        /* 드래그 끝 (드롭 안 되고 취소된 경우도 포함) */
        th.addEventListener('dragend', e=>{
          th.classList.remove('col-dragging');
          ths.forEach(t=>t.classList.remove('col-drop-left','col-drop-right'));
          colDragFrom = null;
          /* dragend 직후 click 이벤트(정렬) 차단 */
          setTimeout(()=>{ _colDragDragging = false; }, 100);
        });
      });
    });
  });
}

</script>
