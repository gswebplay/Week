<!DOCTYPE html>
<html lang="ko">
<head>
<meta charset="UTF-8"/>
<meta name="viewport" content="width=device-width,initial-scale=1.0,maximum-scale=1"/>
<title>기술전략팀 업무관리</title>
<link rel="icon" href="data:image/svg+xml,<svg xmlns=%22http://www.w3.org/2000/svg%22 viewBox=%220 0 100 100%22><text y=%22.9em%22 font-size=%2290%22>📋</text></svg>">
<link rel="preconnect" href="https://cdn.jsdelivr.net" crossorigin>
<link rel="stylesheet" crossorigin href="https://cdn.jsdelivr.net/gh/orioncactus/pretendard@v1.3.9/dist/web/static/pretendard.css"/>
<style>
/* ==============================================================
   CSS 변수 - index.html과 동일한 색상 시스템
   여기 색상 하나만 바꿔도 전체에 반영됩니다
============================================================== */
:root{
  --blueprint:#2B6CB0;        /* 메인 파란색 */
  --blueprint-strong:#1B4D89; /* 파란색 hover */
  --blueprint-bg:#EAF2FB;     /* 연한 파란 배경 */
  --line:#D3DEE9;             /* 테두리 색 */
  --paper:#F5F7FA;            /* 페이지 배경 */
  --ink:#1A2332;              /* 기본 글자색 */
  --muted:#64748B;            /* 보조 글자색 */
  --danger:#C0392B;           /* 삭제·빨간색 */
  --success:#34A853;          /* 초록색 */
  --warning:#FBBC04;          /* 노란색 */
  --plan:#7C5CBF;             /* 보라색 */
  --plan-bg:#F3EEFC;
  --sans:'Pretendard',-apple-system,BlinkMacSystemFont,'Malgun Gothic',sans-serif;
  /* ↓ 업무일지(주간/월간) 전용 색상 변수 */
  --navy:#0B1220;             /* 업무일지 토스트 배경 등에 쓰이는 짙은 남색 */
  --navy-light:#16213A;
  --amber:#B9781F;            /* 휴가/연차 표시 주황색 */
  --amber-bg:#FDF6EC;         /* 휴가/주말 칸 연한 배경 */
  --amber-line:#E8C08B;
  --radius:10px;              /* 업무일지 표 박스 모서리 둥글기 */
  --mono:'JetBrains Mono','D2Coding',monospace; /* 업무일지 날짜/숫자용 글씨체 */
}
*{box-sizing:border-box;}
html,body{margin:0;padding:0;height:100%;overflow:hidden;}
/* ★ body를 flex 세로 배치로 — 헤더+탭바+main 합이 정확히 화면 높이(100%)에 맞음.
   예전엔 .main{height:calc(100vh - 60px)}이 탭바 높이(약 50px)를 빼먹어서
   페이지가 화면보다 50px 커졌고, 렌더 후 자동 스크롤 시 탭바가 sticky 헤더
   뒤로 밀려 사라지는 버그가 있었음 → flex로 근본 해결 */
body{display:flex;flex-direction:column;}
.header,.tab-bar{flex-shrink:0;}
body{
  background:var(--paper);color:var(--ink);
  font-family:var(--sans);font-size:14px;
  -webkit-font-smoothing:antialiased;
  word-break:keep-all;overflow-wrap:break-word;
}

/* ==============================================================
   헤더 - index.html .header와 완전 동일
============================================================== */
.header{
  background:#fff;border-bottom:1px solid var(--line);
  padding:0 20px;display:flex;align-items:center;justify-content:space-between;
  height:60px;position:sticky;top:0;z-index:30;
  box-shadow:0 1px 3px rgba(0,0,0,.12),0 1px 2px rgba(0,0,0,.08);
}
.header h1{
  font-size:18px;font-weight:600;
  display:flex;align-items:center;gap:8px;
  color:var(--ink);white-space:nowrap;
  /* ★ flex:1 + min-width:0 + overflow:hidden — 화면이 좁아지면 제목이 넘쳐서
     오른쪽 요소(연도탭 등) 위로 겹치던 문제 방지. 좁으면 말줄임(…)으로 잘림 */
  flex:1;min-width:0;overflow:hidden;text-overflow:ellipsis;
}
/* "기술전략팀" 글자만 파란색 - index.html과 동일 패턴 */
.header h1 span{color:var(--blueprint);}
/* "업무관리" 부분 — 기본 글자색 유지, 모바일에서는 숨겨서 공간 확보 */
.header h1 .h1-sub{color:var(--ink);}
/* 실시간 시계 — 업무일지에서 가져온 요소, 흐린 회색 작은 글자로 표시 */
.header h1 span.live-clock{color:var(--muted);font-size:12px;font-weight:400;margin-left:2px;white-space:nowrap;}
@media (max-width:480px){ .header h1 span.live-clock{display:none;} } /* 좁은 화면에서는 숨겨서 공간 확보 */
.header-right{display:flex;align-items:center;gap:14px;flex-shrink:0;min-width:0;}
.app-version{font-size:12px;color:#B8C0CC;white-space:nowrap;}
.sync-status{font-size:12px;color:var(--muted);display:flex;align-items:center;gap:5px;white-space:nowrap;}
.sync-dot{width:8px;height:8px;border-radius:50%;background:var(--success);flex-shrink:0;}
.sync-dot.loading{background:var(--warning);animation:pulse 1s infinite;}
.sync-dot.error{background:var(--danger);}
@keyframes pulse{0%,100%{opacity:1}50%{opacity:.4}}

/* ==============================================================
   탭바 - index.html .tab-bar / .tab과 완전 동일
============================================================== */
.tab-bar{
  background:#fff;border-bottom:1px solid var(--line);
  padding:0 20px;display:flex;
}
.tab{
  padding:14px 20px;font-size:14px;font-weight:500;
  color:var(--muted);border:none;background:none;cursor:pointer;
  border-bottom:3px solid transparent;transition:all .15s;white-space:nowrap;
}
.tab:hover{color:var(--ink);}
.tab.active{color:var(--blueprint);border-bottom-color:var(--blueprint);}

/* ==============================================================
   툴바
============================================================== */
.toolbar{
  display:flex;align-items:center;justify-content:space-between;
  gap:10px;flex-wrap:wrap;padding:10px 20px;
  background:#fff;border-bottom:1px solid var(--line);
}
.toolbar-left{display:flex;align-items:center;gap:8px;flex-wrap:wrap;min-width:0;}
.toolbar-right{display:flex;align-items:center;gap:8px;flex-shrink:0;}

/* 검색창 */
.search-input{
  padding:7px 12px;border:1px solid var(--line);border-radius:7px;
  font-size:13px;font-family:var(--sans);color:var(--ink);
  outline:none;width:400px;transition:border-color .15s;
}
.search-input:focus{border-color:var(--blueprint);}
/* 업무탭 검색창 — 전체 담당자 드롭다운과 함께 넓어지도록 확장 */
.toolbar-left .search-input{ width:480px; }
/* 경비탭 검색창 — 새로고침 버튼 바로 앞까지 꽉 채움 */
.exp-toolbar .search-input{ flex:1; width:auto; }

/* 필터 셀렉트 */
.filter-sel{
  padding:7px 10px;border:1px solid var(--line);border-radius:7px;
  font-size:13px;font-family:var(--sans);color:var(--ink);
  background:#fff;outline:none;cursor:pointer;
}
.filter-sel:focus{border-color:var(--blueprint);}

/* 새로고침 버튼 - index.html .refresh-btn 완전 동일 */
.refresh-btn{
  background:#FDF1F5;color:#D6558C;border:1px solid #F3C4D6;
  font-size:13px;padding:8px 14px;border-radius:7px;cursor:pointer;
  font-family:var(--sans);font-weight:600;
  display:inline-flex;align-items:center;gap:4px;
  white-space:nowrap;transition:background .15s;
}
.refresh-btn:hover{background:#FBE4ED;}

/* 📅 공휴일 관리 버튼 — 새로고침과 같은 크기/스타일, 파란 계열 */
.holiday-btn{
  background:#EAF2FB; color:var(--blueprint); border:1px solid #BFD9F2;
  font-size:13px; padding:8px 12px; border-radius:7px; cursor:pointer;
  font-family:var(--sans); font-weight:600;
  display:inline-flex; align-items:center; gap:4px;
  white-space:nowrap; transition:background .15s;
}
.holiday-btn:hover{ background:#D3E8F8; }

/* 공휴일 관리 팝업 오버레이 */
.holiday-overlay{
  display:none; position:fixed; inset:0;
  background:rgba(0,0,0,.35); z-index:1500;
  align-items:center; justify-content:center;
}
.holiday-overlay.open{ display:flex; }

/* 팝업 모달 */
.holiday-modal{
  background:#fff; border-radius:12px;
  width:420px; max-height:80vh;
  display:flex; flex-direction:column;
  box-shadow:0 8px 32px rgba(0,0,0,.18);
}
.holiday-head{
  padding:14px 20px; border-bottom:1px solid var(--line);
  display:flex; align-items:center; justify-content:space-between; flex-shrink:0;
}
.holiday-head h3{ font-size:14px; font-weight:700; }
.holiday-head .opt-x{ border:none; background:none; font-size:17px; cursor:pointer; color:var(--muted); }
.holiday-body{
  padding:14px 20px; overflow-y:auto; flex:1;
  display:flex; flex-direction:column; gap:8px;
}
.holiday-foot{
  padding:12px 20px; border-top:1px solid var(--line);
  display:flex; justify-content:flex-end; flex-shrink:0;
}

/* 공휴일 한 행 */
.holiday-row{
  display:flex; align-items:center; gap:8px;
  padding:10px 12px; border:1px solid var(--line);
  border-radius:8px; background:#FAFBFC;
}
/* 날짜 클릭 영역 — 숫자처럼 보이지만 클릭하면 달력 피커 */
.holiday-date-btn{
  font-size:14px; font-weight:600; color:var(--blueprint);
  cursor:pointer; background:none; border:none;
  font-family:var(--sans); padding:2px 4px; border-radius:4px;
  transition:background .12s;
  white-space:nowrap;
}
.holiday-date-btn:hover{ background:var(--blueprint-bg); }
/* 날짜 input — 버튼 위에 완전히 겹쳐서 숨김
   showPicker() 호출 시 달력이 버튼 위치에서 뜨도록 position:absolute 사용
   opacity:0 + pointer-events:none 으로 보이지 않게 처리 */
.holiday-date-input{
  position:absolute; opacity:0; pointer-events:none;
  width:1px; height:1px; top:0; left:0;
}
.holiday-tilde{
  font-size:14px; color:var(--muted); flex-shrink:0;
}
.holiday-name-input{
  flex:1; border:none; border-bottom:1px solid var(--line);
  font-size:13px; font-family:var(--sans); padding:2px 4px;
  background:transparent; outline:none; color:var(--ink);
  min-width:60px;
}
.holiday-name-input:focus{ border-bottom-color:var(--blueprint); }
.holiday-del-btn{
  border:none; background:none; cursor:pointer;
  font-size:14px; color:#CBD5E1; padding:2px 4px; border-radius:4px;
  transition:color .12s;
}
.holiday-del-btn:hover{ color:var(--danger); }

/* 추가 버튼 — 점선 박스 스타일 (add-row-btn 계열) */
.holiday-add-btn{
  width:100%; padding:10px; border:1.5px dashed #CBD5E1;
  border-radius:8px; background:#FAFBFC; cursor:pointer;
  font-size:13px; color:var(--muted); font-family:var(--sans);
  display:flex; align-items:center; justify-content:center; gap:6px;
  transition:border-color .15s, color .15s;
}
.holiday-add-btn:hover{ border-color:var(--blueprint); color:var(--blueprint); }

/* 추가 버튼 - 파란 꽉찬 스타일 */
.add-btn{
  background:var(--blueprint);color:#fff;border:1px solid var(--blueprint);
  font-size:13px;padding:8px 14px;border-radius:7px;cursor:pointer;
  font-family:var(--sans);font-weight:600;
  display:inline-flex;align-items:center;gap:4px;
  white-space:nowrap;transition:background .15s;
}
.add-btn:hover{background:var(--blueprint-strong);border-color:var(--blueprint-strong);}

/* 초기 업로드 버튼 삭제됨 */

/* ==============================================================
   상태 필터 버튼 바
   클릭 시 해당 상태만 필터링, 활성화된 버튼은 채워진 스타일
============================================================== */
.filter-bar{
  display:flex; gap:7px; flex-wrap:wrap;
  background:#fff; border-bottom:1px solid var(--line);
  padding:8px 20px;
}
/* 기본 상태 버튼 */
.flt-btn{
  display:inline-flex; align-items:center; gap:5px;
  padding:5px 13px; border-radius:20px; font-size:13px; font-weight:600;
  border:1.5px solid var(--line); background:#fff; color:var(--muted);
  cursor:pointer; transition:all .15s; white-space:nowrap; user-select:none;
}
.flt-btn .flt-num{ font-size:14px; font-weight:700; }
.flt-btn:hover{ border-color:#B0BEC5; color:var(--ink); }
/* 활성화(선택된) 상태 */
.flt-btn.active{ color:#fff; border-color:transparent; }
/* 전체 */
.flt-btn.all          { }
.flt-btn.all.active   { background:#334155; border-color:#334155; }
/* 완료 */
.flt-btn.done         { color:#1565C0; border-color:#B3D9F0; background:#EAF4FB; }
.flt-btn.done.active  { background:#1565C0; border-color:#1565C0; color:#fff; }
/* 진행중 */
.flt-btn.ing          { color:var(--plan); border-color:#C9B8F0; background:var(--plan-bg); }
.flt-btn.ing.active   { background:var(--plan); border-color:var(--plan); color:#fff; }
/* 지속진행 */
.flt-btn.cont         { color:#2E7D52; border-color:#A5D6A7; background:#E8F5E9; }
.flt-btn.cont.active  { background:#2E7D52; border-color:#2E7D52; color:#fff; }
/* 보류 */
.flt-btn.hold         { color:#B7770D; border-color:#FFD54F; background:#FFF8E1; }
.flt-btn.hold.active  { background:#B7770D; border-color:#B7770D; color:#fff; }
/* 요청 */
.flt-btn.req          { color:var(--danger); border-color:#FFCDD2; background:#FFEBEE; }
.flt-btn.req.active   { background:var(--danger); border-color:var(--danger); color:#fff; }
@media(max-width:480px){ .filter-bar{padding:6px 14px;} }

/* ==============================================================
   탭 패널
============================================================== */
.main{display:flex;flex-direction:column;flex:1;min-height:0;}
.tab-panel{display:none;flex:1;flex-direction:column;overflow:hidden;}
.tab-panel.active{display:flex;}

/* ==============================================================
   인라인 편집 테이블
============================================================== */
.table-wrap{flex:1;overflow:auto;}
#taskTableWrap table{width:100%;border-collapse:collapse;min-width:1929px;font-size:13px;}  /* min-width = 고정컬럼합(1729px)+프로젝트명최소(200px). 이 미만 화면에서는 표 안 가로스크롤 */
#taskTableWrap thead th{
  background:#F0F4FA;padding:9px 2px;
  font-size:12px;font-weight:700;color:var(--blueprint);
  text-align:center;border-bottom:2px solid var(--line);
  border-right:1px solid var(--line);white-space:nowrap;
  position:sticky;top:0;z-index:5;
}
#taskTableWrap thead th:last-child{border-right:none;}
#taskTableWrap tbody tr{border-bottom:1px solid var(--line);transition:background .1s;}
#taskTableWrap tbody tr:hover{background:var(--blueprint-bg);}
#taskTableWrap tbody tr.editing-row{background:#FFFDE7;}
#taskTableWrap tbody tr.editing-row:hover{background:#FFF9C4;}
#taskTableWrap tbody td{padding:0;border-right:1px solid #EEF1F5;vertical-align:middle;}
#taskTableWrap tbody td:last-child{border-right:none;}

/* 셀 뷰 (클릭 전) */
.cell-view{
  padding:8px 10px;min-height:36px;
  display:flex;align-items:center;gap:4px;
  white-space:nowrap;overflow:hidden;text-overflow:ellipsis;max-width:280px;
}

/* 셀 인풋 (클릭 후 - 인라인 편집) */
.cell-input{
  width:100%;padding:7px 10px;border:none;
  border-bottom:2px solid var(--blueprint);
  background:#FFFDE7;font-size:13px;font-family:var(--sans);
  color:var(--ink);outline:none;min-height:36px;
}
.cell-select{
  width:100%;padding:7px 8px;border:none;
  border-bottom:2px solid var(--blueprint);
  background:#FFFDE7;font-size:13px;font-family:var(--sans);
  color:var(--ink);outline:none;cursor:pointer;
}

/* ==============================================================
   뱃지
============================================================== */
.badge{display:inline-flex;align-items:center;padding:2px 8px;border-radius:20px;font-size:11px;font-weight:700;white-space:nowrap;}
/* ★ 업무일정표 표 안의 뱃지만 가독성을 위해 2pt 크게 (11→13px).
   상태·주담당자·보조담당자·영업담당·분류 단추에 적용됨.
   드롭다운 팝업·⚙옵션모달·경비항목 뱃지는 전역 11px 그대로 유지되므로 여기서만 키움.
   글자가 커진 만큼 위아래 여백(padding)도 살짝 늘려 알약 모양 균형 유지 */
#taskTableWrap .badge{ font-size:13px; padding:3px 9px; }
.b-done{background:#E3F2FD;color:#1565C0;}
.b-ing{background:var(--plan-bg);color:var(--plan);}
.b-hold{background:#FFF8E1;color:#B7770D;}
.b-cont{background:#E8F5E9;color:#2E7D52;}
.b-req{background:#FFEBEE;color:var(--danger);}

/* pb/ib 스타일은 아래 알약형 CSS 블록에서 통합 정의됨 */

/* ==============================================================
   행 관리 버튼
============================================================== */
.row-action-cell{padding:5px 8px !important;white-space:nowrap;}
.btn-row-save{padding:4px 10px;background:var(--blueprint);color:#fff;border:none;border-radius:5px;font-size:12px;font-weight:600;cursor:pointer;font-family:var(--sans);margin-right:4px;}
.btn-row-save:hover{background:var(--blueprint-strong);}
.btn-row-del{padding:4px 10px;background:#FFEBEE;color:var(--danger);border:1px solid #FFCDD2;border-radius:5px;font-size:12px;font-weight:600;cursor:pointer;font-family:var(--sans);}
.btn-row-del:hover{background:#FFCDD2;}
.btn-row-edit{padding:4px 10px;background:var(--paper);color:var(--muted);border:1px solid var(--line);border-radius:5px;font-size:12px;font-weight:500;cursor:pointer;font-family:var(--sans);white-space:nowrap;}
.btn-row-edit:hover{background:var(--blueprint-bg);color:var(--blueprint);border-color:var(--blueprint);}

/* ==============================================================
   연도 선택 탭 (헤더 오른쪽)
============================================================== */
/* 업무일정표/경비사용내역 탭에서만 보이도록 switchTab()이 display를 토글함 */
.year-tab-wrap{ display:flex; align-items:center; gap:8px; flex-shrink:0; }
.year-tab-group{
  display:flex; align-items:center; gap:4px; flex-shrink:0;
}
.year-tab{
  padding:4px 12px; border-radius:20px; font-size:13px; font-weight:600;
  border:1.5px solid var(--line); background:#fff; color:var(--muted);
  cursor:pointer; transition:all .15s; white-space:nowrap;
}
.year-tab:hover{ border-color:var(--blueprint); color:var(--blueprint); }
.year-tab.active{ background:var(--blueprint); border-color:var(--blueprint); color:#fff; }
.year-new-btn{
  padding:4px 10px; border-radius:20px; font-size:12px; font-weight:600;
  border:1.5px dashed var(--blueprint); background:transparent; color:var(--blueprint);
  cursor:pointer; transition:all .15s; white-space:nowrap;
}
.year-new-btn:hover{ background:var(--blueprint-bg); }

/* ==============================================================
   경비사용내역 — 카드 방식 (max-width 900px 중앙 정렬)
============================================================== */
.exp-wrap{
  flex:1; overflow-y:auto; padding:20px;
  display:flex; flex-direction:column; align-items:center;
}
/* 예산 현황 카드 */
.budget-summary{
  width:100%; max-width:900px;
  display:grid; grid-template-columns:repeat(4,1fr); gap:12px;
  margin-bottom:16px;
}
.budget-card{
  background:#fff; border:1px solid var(--line); border-radius:10px;
  padding:14px 18px;
}
.budget-card .bc-label{ font-size:11px; color:var(--muted); margin-bottom:4px; }
.budget-card .bc-value{ font-size:18px; font-weight:700; color:var(--ink); }
.budget-card .bc-value.spent{ color:var(--danger); }
.budget-card .bc-value.remain{ color:#2E7D52; }
/* 집행률 프로그레스 */
.budget-progress-card{
  width:100%; max-width:900px;
  background:#fff; border:1px solid var(--line); border-radius:10px;
  padding:12px 18px; margin-bottom:16px;
  display:flex; align-items:center; gap:14px;
}
.budget-progress-card .bp-label{ font-size:12px; color:var(--muted); white-space:nowrap; }
.budget-progress-card .bp-bar-wrap{
  flex:1; background:#EEF1F5; border-radius:20px; height:8px; overflow:hidden;
}
.budget-progress-card .bp-fill{
  height:100%; background:linear-gradient(90deg,var(--blueprint),var(--plan));
  border-radius:20px; transition:width .5s;
}
.budget-progress-card .bp-rate{ font-size:14px; font-weight:700; color:var(--ink); white-space:nowrap; }
/* 경비 툴바 */
.exp-toolbar{
  width:100%; max-width:900px;
  display:flex; align-items:center; justify-content:space-between;
  gap:10px; margin-bottom:12px; flex-wrap:wrap;
}
/* 경비 테이블 컨테이너 */
.exp-table-wrap{
  width:100%; max-width:900px;
  background:#fff; border:1px solid var(--line); border-radius:10px;
  /* 좁은 화면에서는 가로 스크롤 (업무일정표와 동일한 방식).
     세로는 잘리지 않게 hidden 유지 → 둥근 모서리도 그대로 유지됨 */
  overflow-x:auto; overflow-y:hidden;
}
.exp-table-wrap table{
  width:100%; border-collapse:collapse; font-size:13px; table-layout:fixed;
  /* ★ 최소폭 — 이게 없으면 모바일에서 컬럼이 40px대로 찌그러져
     "2026-01-14", "1,080,000원" 같은 내용이 잘립니다.
     좁으면 표를 줄이지 말고 가로로 스크롤해서 봅니다. */
  min-width:820px;
}
.exp-table-wrap thead th{
  background:#F0F4FA; padding:9px 8px;
  font-size:12px; font-weight:700; color:var(--blueprint);
  text-align:center; border-bottom:2px solid var(--line);
  white-space:normal; word-break:keep-all;  /* ★ nowrap 제거 — 헤더가 폭을 강제 확장하지 않음 */
}
/* 경비한도/집행액/잔액 헤더는 아래 금액 데이터와 맞춰 오른쪽 정렬 (5,6,7번째 컬럼) */
.exp-table-wrap thead tr:last-child th:nth-child(5),
.exp-table-wrap thead tr:last-child th:nth-child(6),
.exp-table-wrap thead tr:last-child th:nth-child(7){ text-align:right; }
.exp-table-wrap tbody tr{ border-bottom:1px solid #EEF1F5; transition:background .1s; position:relative; }
.exp-table-wrap tbody tr:last-child{ border-bottom:none; }
.exp-table-wrap tbody tr:hover{ background:var(--blueprint-bg); }
.exp-table-wrap tbody td{ padding:0; vertical-align:middle; }
/* 사용일자 입력값 가운데 정렬 — .c-date는 width:100%라 부모의 justify-content:center가 무효화되므로
   경비탭 안에서만 별도로 text-align:center 지정 (업무탭 날짜 컬럼은 영향받지 않음) */
.exp-table-wrap .c-date{ text-align:center; }
/* 비고 셀 — 삭제 버튼이 hover 시 오른쪽에 나타남, 내용은 가운데 정렬 */
/* 프로젝트명/업무내용 셀 — 내용이 길면 최대 3줄까지 줄바꿈, 넘치면 말줄임(…) */
#taskTableWrap td .c-text[contenteditable]{
  white-space:normal;        /* 줄바꿈 허용 */
  word-break:break-all;      /* 긴 단어/영문도 칸 안에서 강제 줄바꿈 */
  display:-webkit-box;
  -webkit-line-clamp:3;      /* 최대 3줄 */
  -webkit-box-orient:vertical;
  overflow:hidden;
}
/* 편집 중(포커스)일 땐 줄수 제한 해제 — 전체 내용 보이게 */
#taskTableWrap td .c-text[contenteditable]:focus{
  display:block;
  -webkit-line-clamp:unset;
  overflow:visible;
  white-space:pre-wrap;
}
.exp-note-cell{ position:relative; }
.exp-note-cell .c-text{ text-align:center; }
.exp-del-btn{
  display:none; position:absolute; right:4px; top:50%; transform:translateY(-50%);
  background:none; border:none; color:#CBD5E1; cursor:pointer; font-size:14px; padding:2px 4px;
  transition:color .1s; line-height:1;
}
.exp-del-btn:hover{ color:var(--danger); }
.exp-table-wrap tbody tr:hover .exp-del-btn{ display:block; }

/* ==============================================================
   영수증 첨부 칸
============================================================== */
/* 첨부 셀 안 아이콘들을 가로로 배치 */
.exp-attach-cell{ text-align:center; }
.exp-attach-box{
  display:flex; align-items:center; justify-content:center; gap:4px;
  min-height:38px;
}
/* 첨부 버튼 공통 (📎 / 👁 / ⬇ / ✕) */
.attach-btn{
  border:none; background:none; cursor:pointer;
  font-size:15px; line-height:1; padding:3px 4px;
  border-radius:5px; transition:background .12s, transform .1s;
  color:var(--muted);
}
.attach-btn:hover{ background:var(--blueprint-bg); transform:scale(1.15); }
/* 파일 없을 때 — 옅은 클립 */
.attach-btn.empty{ color:#CBD5E1; }
.attach-btn.empty:hover{ color:var(--blueprint); }
/* 첨부됨 표시 — 진한 클립 */
.attach-btn.has-file{ color:var(--blueprint); }
/* 삭제(✕) — 빨강 계열 */
.attach-btn.del{ color:#CBD5E1; }
.attach-btn.del:hover{ color:var(--danger); background:#FFEBEE; }
/* 업로드 중 스피너 표시용 */
.attach-btn.uploading{ pointer-events:none; opacity:.6; }

/* 숨겨진 실제 파일 input */
.attach-file-input{ display:none; }

/* 영수증 미리보기 모달 (이미지 전용, PDF는 새 탭) */
.receipt-overlay{
  display:none; position:fixed; inset:0;
  background:rgba(0,0,0,.75); z-index:2000;
  align-items:center; justify-content:center; padding:24px;
}
.receipt-overlay.open{ display:flex; }
.receipt-box{
  max-width:90vw; max-height:90vh;
  display:flex; flex-direction:column; align-items:center; gap:12px;
}
.receipt-box img{
  max-width:100%; max-height:80vh;
  border-radius:8px; box-shadow:0 8px 40px rgba(0,0,0,.5);
  background:#fff;
}
.receipt-toolbar{ display:flex; gap:10px; }
.receipt-toolbar button{
  padding:8px 18px; border-radius:8px; font-size:13px; font-weight:600;
  font-family:var(--sans); cursor:pointer; border:none;
}
.receipt-dl-btn{ background:var(--blueprint); color:#fff; }
.receipt-dl-btn:hover{ background:var(--blueprint-strong); }
.receipt-close-btn{ background:#fff; color:var(--ink); }
.receipt-close-btn:hover{ background:#F0F0F0; }
/* "+ 경비 추가" 버튼 — 업무탭과 동일한 .add-row-btn-wrap / .add-row-btn 클래스 재사용 (균형감 통일, 별도 스타일 불필요) */
@media(max-width:768px){
  .budget-summary{ grid-template-columns:repeat(2,1fr); }
  .exp-wrap{ padding:12px; }
}

/* ==============================================================
   빈 데이터
============================================================== */
.empty-msg{text-align:center;padding:48px 20px;color:#B0BEC5;font-size:14px;}

/* ==============================================================
   모달 - index.html .modal-overlay / .modal-panel과 동일
   배경 클릭해도 닫히지 않음
============================================================== */
.modal-overlay{
  display:none;position:fixed;inset:0;
  background:rgba(0,0,0,.4);z-index:1000;
  align-items:center;justify-content:center;
}
.modal-overlay.open{display:flex;}
.modal-panel{
  background:#fff;border-radius:12px;
  width:90%;max-width:560px;max-height:88vh;overflow-y:auto;
  box-shadow:0 8px 40px rgba(0,0,0,.18);
}
.modal-header{
  padding:16px 20px;border-bottom:1px solid var(--line);
  display:flex;align-items:center;justify-content:space-between;
}
.modal-header h3{margin:0;font-size:15px;font-weight:700;}
.modal-close{border:none;background:none;font-size:18px;cursor:pointer;color:var(--muted);}
.modal-body{padding:16px 20px;}
.modal-footer{padding:12px 20px;border-top:1px solid var(--line);display:flex;justify-content:flex-end;gap:8px;}

/* 폼 필드 */
.field{margin-bottom:14px;}
.field label{display:block;font-size:12px;font-weight:600;color:var(--muted);margin-bottom:5px;}
.field input,.field select,.field textarea{
  width:100%;padding:8px 11px;border:1px solid var(--line);border-radius:7px;
  font-size:13px;font-family:var(--sans);color:var(--ink);
  outline:none;background:#fff;transition:border-color .15s;
}
.field input:focus,.field select:focus,.field textarea:focus{border-color:var(--blueprint);}
.field textarea{resize:vertical;min-height:60px;}
.field-row{display:grid;grid-template-columns:1fr 1fr;gap:12px;}

/* 모달 버튼 - index.html .btn과 동일 */
.btn{padding:8px 18px;border-radius:7px;font-size:13px;font-weight:600;cursor:pointer;font-family:var(--sans);border:1px solid var(--line);background:#fff;color:var(--ink);}
.btn:hover{background:var(--paper);}
.btn.primary{background:var(--blueprint);border-color:var(--blueprint);color:#fff;}
.btn.primary:hover{background:var(--blueprint-strong);}
.btn.danger{color:var(--danger);border-color:#F0CBC5;}
.btn.danger:hover{background:#FDEEEC;}

/* ==============================================================
   토스트 - index.html .toast와 동일
============================================================== */
.toast{
  position:fixed;bottom:24px;left:50%;transform:translateX(-50%);
  background:#0B1220;color:#fff;padding:10px 20px;border-radius:8px;
  font-size:13px;font-weight:500;opacity:0;transition:opacity .25s;
  z-index:9999;pointer-events:none;white-space:nowrap;
}
.toast.show{opacity:1;}

/* ==============================================================
   모바일 반응형
============================================================== */
/* ---- 태블릿 이하 (768px 이하) ----
   검색창을 고정폭(480px) 대신 남는 공간에 맞춰 늘어나게 함.
   ※ 데스크톱에서 "완료" 버튼에 맞춰 폭을 계산하는 alignFilterSelToDone()은
     이 구간에서 실행되지 않습니다(JS 쪽에서 768px 이하면 건너뜀). */
@media(max-width:768px){
  .toolbar-left{flex:1;min-width:0;}
  .toolbar-left .search-input{width:auto;flex:1;min-width:110px;}
}

/* ---- 모바일 (480px 이하) ---- */
@media(max-width:480px){
  .header{padding:0 12px;height:56px;gap:8px;}
  .header h1{font-size:15px;}
  /* 제목 뒤 "업무관리"는 숨김 → "📋 기술전략팀"만 표시해 연도탭 공간 확보 */
  .header h1 .h1-sub{display:none;}
  /* 헤더 우측 요소 간격 축소 + 버전 표기 숨김 */
  .header-right{gap:8px;}
  .app-version{display:none;}
  /* 동기화 상태는 점(●)만 남기고 글자는 숨김 */
  .sync-status span{display:none;}
  .year-tab{padding:4px 9px;font-size:12px;}
  .year-new-btn{padding:4px 7px;font-size:11px;}

  .toolbar{padding:8px 12px;gap:8px;}
  .tab{padding:12px 14px;font-size:13px;}
  .budget-bar{padding:10px 14px;gap:12px;}
  .filter-bar{padding:6px 12px;gap:5px;}
  .flt-btn{padding:5px 9px;font-size:11px;}
}

/* ==============================================================
   줄무늬(Zebra Stripe) — 홀수 행은 흰색, 짝수 행은 연한 회색
   상태별 배경색은 제거하고 줄무늬로만 칸 구분
   (편집 중인 행은 노란빛으로 강조, !important로 줄무늬 덮어씀)
============================================================== */
/* 홀수 행: 흰색 */
#taskTableWrap tbody tr:nth-child(odd)  { background:#FFFFFF; }
/* 짝수 행: 진한 무채색 */
#taskTableWrap tbody tr:nth-child(even) { background:#F4F4F4; }
/* 호버 시: 연한 파란색 (홀짝 공통) */
#taskTableWrap tbody tr:hover           { background:var(--blueprint-bg) !important; }
/* 편집 중인 행은 노란빛으로 강조 */
#taskTableWrap tbody tr.editing-row     { background:#FFFDE7 !important; }

/* 상태 그룹 경계 구분선 — 정렬이 status일 때 JS가 .status-group-top 클래스 추가함 */
#taskTableWrap tbody tr.status-group-top td {
  border-top: 2px solid #94A3B8 !important;   /* 중간 굵기 회색선으로 그룹 구분 */
}



/* ==============================================================
   알약 뱃지 - 모든 드롭다운 값에 통일 적용
   기존 뱃지와 같은 border-radius:20px 스타일
============================================================== */
/* 모델링/제작도/매뉴얼 진행상태 뱃지 */
.pb{ display:inline-block; padding:3px 9px; border-radius:20px; font-size:11px; font-weight:700; white-space:nowrap; }
.pb-완료   { background:#E3F4FB; color:#2E86AB; }
.pb-진행중 { background:#F0EBFF; color:#7C5CBF; }
.pb-미적용 { background:#F0F0F0; color:#999; }
.pb-보류   { background:#FFF5E0; color:#D48806; }
/* 강도 뱃지 - 알약형으로 통일 */
.ib{ display:inline-block; padding:3px 9px; border-radius:20px; font-size:11px; font-weight:700; white-space:nowrap; }
.ib-최상 { background:#FFE0E0; color:#C0392B; }
.ib-상   { background:#FFE8CC; color:#D35400; }
.ib-중   { background:#FFF5CC; color:#B7770D; }
.ib-하   { background:#E8F5E9; color:#2E7D32; }
.ib-최하 { background:#F0F0F0; color:#666; }
/* 영업담당 뱃지 */
.sb{ display:inline-block; padding:3px 9px; border-radius:20px; font-size:11px; font-weight:600; white-space:nowrap; background:#EDF2FF; color:#3B5BDB; }
/* 분류 뱃지 */
.cb{ display:inline-block; padding:3px 9px; border-radius:20px; font-size:11px; font-weight:600; white-space:nowrap; background:#FFF0F6; color:#C2255C; }
/* 파생값 셀 (리드/워크/세이브타임) */
.dval { font-size:12px; font-weight:700; color:var(--muted); text-align:center; }
.dval.save-pos { color:#2E7D32; }  /* 세이브타임 양수 = 초록 */
.dval.save-neg { color:#C0392B; }  /* 세이브타임 음수 = 빨강 */

/* ============================================================
   ★★ 셀 단위 편집 UI (2026-07 개편) ★★
   아래 스타일들은 "행 전체가 편집모드로 바뀌던 방식"을 없애고
   클릭한 셀 하나만 바로 편집되게 만드는 데 쓰입니다.
============================================================ */

/* ---- 테이블 컬럼 폭 조절(리사이즈) ----
   table-layout:fixed 여야 colgroup>col 의 너비가 그대로 먹습니다.
   width:100% 로 전체 폭을 고정 → 양끝은 안 움직이고 중간만 조절됨 */
#taskTableWrap table{ table-layout:fixed; width:100%; }
/* th 안에 핸들을 절대배치하므로 position:relative 필수.
   ★ th에 overflow:hidden 주면 핸들이 잘리므로 절대 금지! */
#taskTableWrap th{ position:relative; user-select:none; }
/* 컬럼 경계선을 잡아 끄는 손잡이 */
/* ---- 셀 공통 박스 ----
   뷰/편집 상관없이 높이가 같아야 행이 안 흔들립니다. */
.c-box{
  min-height:38px; padding:6px 8px;
  display:flex; align-items:center;
  font-size:13px; color:var(--ink);
}
.c-box > *{ min-width:0; }  /* ★ 자식 요소(날짜input/뱃지/텍스트)가 콘텐츠 크기만큼 폭을 강제하지 않게 함 — table-layout:fixed가 실제로 % 폭을 지키게 하는 핵심 */

/* ---- 글자 직접 입력 셀 (프로젝트명/출고지 등) ----
   contenteditable = 클릭하면 그 자리에서 바로 타이핑됨 */
.c-text{
  outline:none; cursor:text; flex:1;
  border-radius:3px; transition:background .12s;
  overflow:hidden; text-overflow:ellipsis; white-space:nowrap;
}
.c-text:focus{                        /* 편집 중일 때만 파란 테두리 */
  background:var(--blueprint-bg);
  box-shadow:inset 0 0 0 2px var(--blueprint);
  white-space:normal;                 /* 편집 중엔 전체 내용 보이게 */
}
.c-text:empty::before{                /* 빈 칸 안내문구 */
  content:attr(data-ph); color:#B0BEC5; pointer-events:none;
}

/* ---- 날짜 입력 셀 ---- */
.c-date{
  border:none; background:transparent; width:100%; min-width:0;
  font-size:12px; font-family:var(--sans); color:var(--ink);
  outline:none; cursor:pointer; padding:2px;
  border-radius:3px;
}
.c-date:focus{ background:var(--blueprint-bg); box-shadow:inset 0 0 0 2px var(--blueprint); }

/* ---- 드롭다운 뱃지 버튼 (상태/담당자/영업/분류) ---- */
.dd-btn{
  cursor:pointer; display:inline-flex; align-items:center; gap:3px;
  transition:opacity .12s; max-width:100%;
}
.dd-btn:hover{ opacity:.72; }
.dd-btn::after{ content:'▾'; font-size:9px; color:var(--muted); flex-shrink:0; }
.dd-btn .badge{ overflow:hidden; text-overflow:ellipsis; }




/* ---- 드롭다운 팝업 ----
   ★ position:fixed + body 바로 아래에 두어야 표 밖으로 안 잘립니다 */
.dd-popup{
  display:none; position:fixed;
  background:#fff; border:1px solid var(--line); border-radius:8px;
  box-shadow:0 4px 20px rgba(0,0,0,.15); z-index:900;
  min-width:150px; max-height:320px; overflow-y:auto;
  padding:4px 0; white-space:nowrap;
}
.dd-popup.open{ display:block; }
.dd-item{
  padding:7px 12px; font-size:12px; color:var(--ink);
  cursor:pointer; display:flex; align-items:center; gap:8px;
  transition:background .08s;
}
.dd-item:hover{ background:var(--paper); }
.dd-item.selected{ background:var(--blueprint-bg); font-weight:600; }

/* ---- 토글 버튼 그룹 (강도 / 진행상태) ----
   선택 안 된 건 회색, 선택된 것만 불이 켜짐 */
.tog-group{ display:flex; flex-wrap:nowrap; gap:3px; padding:5px 6px; }  /* nowrap: 컬럼이 좁아져도 버튼이 세로로 쌓이지 않음 → 행 높이 고정 */
.tog{
  display:inline-block; padding:2px 7px; border-radius:20px;
  font-size:10px; font-weight:600; cursor:pointer;
  border:1.5px solid #E2E8F0; background:#F8FAFC; color:#94A3B8;
  transition:all .12s; white-space:nowrap; user-select:none;
  flex-shrink:0;   /* 좁은 칸에서도 버튼 자체가 찌그러지지 않음 */
}
.tog:hover{ border-color:#CBD5E1; color:#64748B; }
/* .tog.on 일 때의 색은 JS가 DB 색상값을 직접 style로 넣어줍니다 */

/* ---- 진행상태 3줄(모델링/제작도/매뉴얼) ---- */
.prog-group{ display:flex; flex-direction:column; gap:3px; padding:5px 6px; }
.prog-row{ display:flex; align-items:center; gap:5px; flex-wrap:nowrap; }  /* 각 줄 안에서도 줄바꿈 금지 → 항상 정확히 3줄 */
.prog-lbl{ font-size:9px; color:var(--muted); width:28px; flex-shrink:0; }

/* ---- 컬럼 헤더 드래그앤드롭 ----
   th를 잡아 끌어서 컬럼 순서를 바꿉니다.
   리사이즈 핸들(경계선)을 제외한 헤더 본문 영역이 드래그 대상입니다. */
#taskTableWrap thead tr:last-child th[draggable="true"]{
  /* 드래그 가능한 th 표시 — 커서 변경 */
  cursor: grab;
}
#taskTableWrap thead tr:last-child th[draggable="true"]:active{
  cursor: grabbing;
}
/* 고정 컬럼(삭제 등)은 grab 커서 안 씀 */
#taskTableWrap thead tr:last-child th.col-fixed{
  cursor: default;
}
/* 드래그 중인 원본 컬럼 — 투명하게 */
#taskTableWrap thead tr:last-child th.col-dragging{
  opacity: .35;
}
/* 드롭 위치 표시 — 파란 세로선
   ★ position:sticky th 에서 box-shadow는 인접 셀에 가려지므로
     border + z-index 조합으로 대체합니다 */
#taskTableWrap thead tr:last-child th.col-drop-left{
  border-left: 3px solid var(--blueprint) !important;
  background: var(--blueprint-bg) !important;
  z-index: 10;
}
#taskTableWrap thead tr:last-child th.col-drop-right{
  border-right: 3px solid var(--blueprint) !important;
  background: var(--blueprint-bg) !important;
  z-index: 10;
}

/* ---- 헤더의 ⚙ 옵션관리 버튼 ---- */
.gear-btn{
  border:none; background:none; cursor:pointer;
  color:#CBD5E1; font-size:11px; padding:1px 3px;
  transition:color .1s; vertical-align:middle;
}
.gear-btn:hover{ color:var(--blueprint); }

/* ---- 표 맨 위 "+ 업무 추가" 버튼 ----
   전체 가로를 채우는 tr 안에서 가운데 정렬된 1000px 라운드박스 */
.add-row-btn-wrap{
  width:100%; padding:10px 0;
  display:flex; align-items:center; justify-content:center;
  background:#fff; border-bottom:1.5px solid var(--line);
}
.add-row-btn{
  width:1000px; max-width:calc(100% - 40px);
  padding:9px 0;
  background:var(--blueprint-bg); border:1.5px dashed var(--blueprint);
  border-radius:10px;
  color:var(--blueprint); font-size:13px; font-weight:600; font-family:var(--sans);
  cursor:pointer; display:flex; align-items:center; justify-content:center; gap:6px;
  transition:background .15s, border-color .15s;
}
.add-row-btn:hover{
  background:#D6E8F8; border-color:var(--blueprint-strong); border-style:solid;
}

/* ---- ⚙ 옵션 관리 모달 ---- */
.opt-overlay{
  display:none; position:fixed; inset:0;
  background:rgba(0,0,0,.35); z-index:1500;
  align-items:center; justify-content:center;
}
.opt-overlay.open{ display:flex; }
.opt-modal{
  background:#fff; border-radius:12px;
  width:400px;
  max-height:80vh; display:flex; flex-direction:column;
  box-shadow:0 8px 32px rgba(0,0,0,.18);
}
.opt-head{
  padding:14px 20px; border-bottom:1px solid var(--line);
  display:flex; align-items:center; justify-content:space-between; flex-shrink:0;
}
.opt-head h3{ font-size:14px; font-weight:700; }
.opt-x{ border:none; background:none; font-size:17px; cursor:pointer; color:var(--muted); }
.opt-body{ padding:14px 20px; overflow-y:auto; flex:1; }

/* 옵션 한 줄 — 중앙정렬 라운드박스 */
.opt-item{
  border:1px solid var(--line); border-radius:10px;
  margin-bottom:8px; padding:11px 14px; background:#fff;
  /* 항목 내부 전체를 가운데 정렬 */
  display:flex; flex-direction:column; align-items:center;
}
.opt-top{
  display:flex; align-items:center; gap:8px; margin-bottom:10px;
  width:100%; justify-content:center;   /* 드래그핸들 + 뱃지 + 삭제 가로 중앙 */
}
/* 드래그 손잡이 — 여기를 잡아야만 순서 이동됨 */
.drag-handle{
  cursor:grab; color:#CBD5E1; font-size:14px; line-height:1;
  padding:2px 4px; user-select:none; flex-shrink:0;
}
.drag-handle:hover{ color:var(--blueprint); }
.drag-handle:active{ cursor:grabbing; }
.opt-item.dragging{ opacity:.4; }
.opt-item.drop-target{
  outline:2px solid var(--blueprint); outline-offset:-1px;
  background:var(--blueprint-bg);
}
.opt-del{
  border:none; background:none; color:#CBD5E1; cursor:pointer;
  font-size:15px; padding:0 2px; line-height:1; margin-left:auto; transition:color .1s;
}
.opt-del:hover{ color:var(--danger); }

/* 색상 피커 줄 — 배경색/글자색 각각 input[type=color]로 자유 선택 */
.color-row{
  display:flex; align-items:center; gap:10px;
  justify-content:center; width:100%;
  flex-wrap:wrap;
}
/* 피커 한 쌍 (라벨 + input) */
.color-pick-pair{
  display:flex; align-items:center; gap:5px;
  font-size:11px; color:var(--muted);
}
/* 색상 input — 작은 동그라미 */
.color-pick-pair input[type="color"]{
  width:20px; height:20px; border-radius:50%;
  border:2px solid var(--line); padding:0;
  cursor:pointer; background:none;
  appearance:none; -webkit-appearance:none;
  overflow:hidden; flex-shrink:0;
}
.color-pick-pair input[type="color"]::-webkit-color-swatch-wrapper{ padding:0; }
.color-pick-pair input[type="color"]::-webkit-color-swatch{ border:none; border-radius:50%; }
.color-pick-pair input[type="color"]:hover{ border-color:var(--blueprint); }

/* 모달 상단 공용 팔레트 — 10×2 격자 배치 */
.opt-palette-bar{
  padding:12px 20px 10px;
  border-bottom:1px solid var(--line);
  display:flex; flex-direction:column; gap:7px;
}
.opt-palette-bar .pal-label{
  font-size:11px; color:#B0BEC5; margin-bottom:2px;
}
/* 동그라미 10개씩 한 줄 — 중앙정렬, 간격 6px */
.pal-row{
  display:flex; justify-content:center; align-items:center; gap:6px;
}
/* 팔레트 동그라미 */
.pal-dot{
  width:20px; height:20px; flex:0 0 20px;
  border-radius:50%; cursor:pointer;
  border:1.5px solid rgba(0,0,0,.10);
  transition:transform .12s, border-color .12s;
}
.pal-dot:hover{ transform:scale(1.2); border-color:#555; }
/* 빈 슬롯 — 색이 아직 없는 자리 */
.pal-dot.empty{
  background:#F0F0F0;
  border:1.5px dashed #CBD5E1;
  cursor:default;
}
.pal-dot.empty:hover{ transform:none; border-color:#CBD5E1; }
/* 드래그 중 팔레트 슬롯 위에 올라왔을 때 강조 */
.pal-dot.drag-over{
  border-color:var(--blueprint) !important;
  transform:scale(1.25);
  box-shadow:0 0 0 3px var(--blueprint-bg);
}
/* 피커 동그라미 — draggable 표시 */
.color-pick-pair input[type="color"]{
  cursor:grab;
}
/* 팔레트 영역 전체 드롭 가능 표시 */
.opt-palette-bar.drag-active{
  background:var(--blueprint-bg);
  border-radius:8px;
}

/* 새 옵션 추가 입력줄 */
.opt-add-row{ display:flex; gap:6px; margin-top:10px; }
.opt-add-input{
  flex:1; padding:8px 10px; border:1px solid var(--line); border-radius:7px;
  font-size:13px; font-family:var(--sans); color:var(--ink); outline:none;
}
.opt-add-input:focus{ border-color:var(--blueprint); }
.opt-add-btn{
  padding:8px 14px; background:var(--blueprint); color:#fff; border:none;
  border-radius:7px; font-size:13px; font-weight:600; font-family:var(--sans); cursor:pointer;
}
.opt-add-btn:hover{ background:var(--blueprint-strong); }


/* ==============================================================
   업무일지(주간일지/월간일지) 전용 CSS — index.html(업무일지)에서 이식
   헤더/탭바/모달/토스트/버튼 등 공통 요소는 위쪽 base CSS를 그대로 재사용하고,
   여기는 업무일지 표(그리드)·툴바·월간카드 등 고유 스타일만 남겼습니다.
============================================================== */

  /* ★ 탭바(.tab-bar/.tab)는 base의 통합 탭바를 그대로 재사용하므로 여기서 별도 정의하지 않음 */

  /* ========================================================================
     ▣ 부서명 타이틀 - "기술전략부" 처럼, main 맨 위 / 날짜 이동 버튼 바로 위에 표시되는 작은 글자
     ======================================================================== */
  .dept-title{
    font-size:18px;        /* 부서명 글자 크기 */
    font-weight:700;        /* 글자 굵기 */
    color:var(--blueprint); /* 글자색 = 포인트 파란색 (헤더 제목과 어울리게) */
    letter-spacing:0.3px;
    margin-bottom:10px;     /* 아래쪽 날짜 이동 버튼과의 간격 */
    white-space:nowrap;      /* 부서명 글자가 줄바꿈되지 않도록 함 */
  }

  /* ========================================================================
     ▣ 툴바 - 연/월 이동 버튼과 "+ 인원 추가" 버튼이 있는 줄 (main 맨 위, 표 바로 위)
     ======================================================================== */
  .toolbar-nav{
    display:flex; align-items:center; justify-content:space-between; flex-wrap:wrap;
    gap:10px; margin-bottom:14px;
  }
  .toolbar-nav .nav-group{ display:flex; align-items:center; gap:8px; } /* «, 연도, », ‹, 월, ›, 오늘 을 묶는 그룹 */
  .toolbar-nav .right-group{ display:flex; align-items:center; gap:8px; } /* 새로고침 + 인원 추가 버튼을 묶는 그룹 (오른쪽) */

  /* «(이전 해) »(다음 해) ‹(이전 달) ›(다음 달) 버튼 하나하나의 모양 - 이제 흰 배경 위에 있으므로 밝은 테마로 변경 */
  .toolbar-nav button.nav-btn{
    background:#fff;
    border:1px solid var(--line);
    color:var(--ink);
    width:30px; height:30px;
    border-radius:7px;
    cursor:pointer;
    font-size:14px;
    display:flex; align-items:center; justify-content:center;
    transition:background .15s;
  }
  .toolbar-nav button.nav-btn:hover{ background:var(--paper); }

  /* "2026년" / "7월" 처럼 표시되는 연도·월 글자 */
  .toolbar-nav .year-label{
    font-family:var(--mono);
    font-size:13px;
    letter-spacing:0.3px;
    min-width:44px;
    text-align:center;
    color:var(--ink);
    white-space:nowrap;
  }

  /* "오늘" 버튼 모양 */
  .toolbar-nav .today-btn{
    background:#fff;
    border:1px solid var(--line);
    color:var(--blueprint);
    font-size:12px;
    padding:6px 12px;
    border-radius:7px;
    cursor:pointer;
    font-family:var(--sans);
    white-space:nowrap;
  }
  .toolbar-nav .today-btn:hover{ background:var(--blueprint-bg); }

  /* ★ 새로고침 버튼은 base(.refresh-btn)와 완전 동일하므로 여기서 별도 정의하지 않음 */

  /* "+ 인원 추가" 버튼 - 파란 꽉찬 버튼 (흰 배경 위에서도 그대로 잘 보임) */
  .add-employee-btn{
    background:var(--blueprint);
    color:#fff;
    border:none;
    font-size:13px;
    padding:8px 14px;
    border-radius:7px;
    cursor:pointer;
    font-weight:600;
    display:flex; align-items:center; gap:6px;
    white-space:nowrap;
  }
  .add-employee-btn:hover{ background:var(--blueprint-strong); }

  /* ========================================================================
     ▣ 월간일지 탭 - 인원별 한 달 요약 카드 목록
     ======================================================================== */
  .monthly-card{
    background:#fff;
    border:1px solid var(--line);
    border-radius:var(--radius);
    padding:16px 18px;
    margin-bottom:10px;
  }
  .monthly-card-head{ display:flex; align-items:baseline; gap:8px; margin-bottom:8px; }
  .monthly-card-head .name{ font-weight:700; font-size:15px; color:var(--ink); } /* 인원 이름 */
  .monthly-card-head .pos{ font-size:12px; color:var(--muted); font-weight:500; } /* 인원 직급 */
  .monthly-card .summary-para{ font-size:13.5px; line-height:1.7; color:var(--ink); white-space:pre-wrap; } /* 자동요약 글자 - white-space:pre-wrap 덕분에 줄바꿈이 그대로 표시됨 */

  /* ========================================================================
     ▣ 표(달력) 영역 - 날짜, 인원 이름, 업무 내용이 표시되는 큰 표
     ======================================================================== */

  /* 헤더 바로 아래, 표가 들어있는 본문 영역의 좌우/전체 여백 */
  /* .wl-main: panel-worklog(.tab-panel) 안에서 세로 전체를 차지하는 flex 컨테이너.
     dept-title/toolbar-nav는 고정 높이, wlTabWeekly/wlTabMonthly가 남는 공간(flex:1)을 차지 */
  .wl-main{
    max-width:1400px; margin:0 auto; padding:20px; width:100%;
    flex:1; min-height:0;
    display:flex; flex-direction:column;
  }
  /* 주간일지/월간일지 내용 영역 - 표시된 쪽만 남는 세로 공간을 채움 */
  #wlTabWeekly, #wlTabMonthly{ flex:1; min-height:0; display:flex; flex-direction:column; }
  /* 월간일지 카드 목록은 자체적으로 스크롤 */
  #monthlyList{ flex:1; min-height:0; overflow:auto; }

  /* 표 전체를 감싸는 흰색 박스(테두리 있는 카드).
     [변경됨] max-height 계산식 대신, task-manager와 동일하게 flex:1 + overflow:auto로
     ".wl-main" 안에서 남는 세로 공간을 그대로 차지하도록 통일했습니다. */
  .grid-wrap{
    flex:1; min-height:0; overflow:auto;
    border:1px solid var(--line); /* 표 박스 테두리선 */
    border-radius:var(--radius);  /* 표 박스 모서리 둥글기 (위 :root 에서 정한 --radius 값 사용) */
    background:#fff;               /* 표 박스 배경 = 흰색 */
  }

  /* 실제 표(<table>) 크기 규칙 */
  table.log-grid{
    border-collapse:separate; border-spacing:0; /* 표 안쪽 셀 사이에 이중 테두리가 생기지 않도록 하는 설정 */
    width:100%;             /* 표는 화면(박스) 너비를 항상 꽉 채움 */
    table-layout:fixed;      /* [핵심] 칸 폭을 "내용 길이"가 아니라 "지정한 크기(min-width)" 기준으로만 계산하게 함.
       이 설정 덕분에: (1) 인원이 적으면 남는 공간을 모든 인원 칸에 "똑같이" 나눠서 화면을 꽉 채우고,
       (2) 인원이 많아서 min-width 합이 화면보다 커지면, 그때부터는 각 칸이 min-width 밑으로
           줄어들지 않고 표 전체가 옆으로 길어지면서 가로 스크롤이 생깁니다. */
    min-width:640px; /* 표는 아무리 좁아도 최소 640px은 유지 */
  }
  /* 표 안의 모든 칸(th, td) 공통 테두리 */
  table.log-grid th, table.log-grid td{
    border-bottom:1px solid var(--line); /* 칸 아래쪽 테두리선 */
    border-right:1px solid var(--line);  /* 칸 오른쪽 테두리선 */
    vertical-align:top;                  /* 칸 안의 내용을 위쪽 기준으로 정렬 */
  }
  table.log-grid th:last-child, table.log-grid td:last-child{ border-right:none; } /* 표의 맨 오른쪽 칸은 오른쪽 테두리 생략 */

  /* 표 맨 왼쪽에 있는 "날짜 칸" 전체 열(세로줄)의 공통 스타일.
     (예: "1(수)" 처럼 보이는 칸이 위치한 세로줄 전체를 가리킴) */
  .day-label-col{
    width:78px; min-width:78px;  /* 날짜 칸의 가로 폭 = 78px 고정. 이 숫자를 키우면 왼쪽 날짜 칸이 넓어짐 */
    position:sticky; left:0; z-index:5; /* 표를 옆으로(가로) 스크롤해도 날짜 칸은 항상 왼쪽에 붙어있게 함 */
    background:var(--blueprint-bg);      /* 날짜 칸 배경색 = 연한 하늘색 */
  }
  #logGrid thead .day-label-col{ z-index:15; } /* 표 맨 위 헤더 줄의 날짜 칸은 다른 것들보다 더 위에 보이도록 우선순위(z-index)를 높임 */

  /* 표 맨 위, 인원 이름이 나열된 줄(<thead>) 전체를 화면 스크롤 시 위에 고정시키는 설정.
     top:0 이므로, .grid-wrap 박스 안에서 스크롤할 때 이 줄이 항상 박스 맨 위에 붙어있게 됨. */
  #logGrid thead th{
    background:#fff;         /* 인원 이름 줄의 배경 = 흰색 (아래 내용과 겹쳐 보이지 않도록) */
    position:sticky; top:0;
    z-index:10;
    padding:0;                /* 바깥쪽 여백은 0으로 두고, 안쪽 여백은 .emp-head 에서 따로 지정 */
    min-width:220px;          /* [추가됨] table-layout:fixed는 이 th 자체의 폭을 기준으로 칸 크기를 계산하므로,
       (안쪽 .emp-head의 min-width만으로는 반영이 안 됨) 여기 직접 지정함.
       날짜 칸(.day-label-col)은 바로 아래에서 78px로 별도 지정되어 이 값을 덮어씀 */
  }
  #logGrid thead th.day-label-col{ min-width:78px; } /* 날짜 칸은 위 220px 대신 원래 크기(78px) 유지 */

  /* 인원 이름 한 칸(예: "주종현 / 차장")의 안쪽 내용 배치.
     실제 HTML 구조: <div class="emp-head"> <div>이름+직급</div> <button>⋯</button> </div> */
  .emp-head{
    padding:12px 14px;   /* 이름 칸 안쪽 여백 (위아래 12px, 좌우 14px) */
    min-width:220px;      /* [수정됨] 최소 폭만 지정. 인원이 적어 화면에 여유가 있으면 table-layout:fixed가
       모든 칸에 남는 공간을 똑같이 나눠줘서 화면을 꽉 채우고, 인원이 많아지면 이 220px 밑으로는 안 줄어듦 */
    display:flex; align-items:center; justify-content:space-between; gap:6px;
    /* justify-content:space-between = 왼쪽엔 이름/직급, 오른쪽 끝엔 "⋯" 관리버튼이 오도록 양쪽으로 배치 */
  }
  /* 이름과 직급을 한 줄에 나란히 배치하는 줄 (예: "주종현 차장") */
  .emp-name-row{ display:flex; align-items:baseline; gap:6px; }
  .emp-name{ font-weight:700; font-size:14px; }  /* 인원 "이름" 글자 (예: "주종현") - 굵고 14px (기존과 동일) */
  .emp-pos{ font-size:11px; color:var(--muted); font-weight:500; } /* 인원 "직급" 글자 (예: "차장") - 작고 흐린 회색 (기존과 동일, 이제 이름 옆에 나란히 표시) */
  .emp-menu-btn{
    border:none; background:none; color:var(--muted); cursor:pointer;
    font-size:16px; padding:2px 6px; border-radius:5px; line-height:1;
  } /* 인원 이름 옆 "⋯" (점 세 개) 관리 버튼 모양 */
  .emp-menu-btn:hover{ background:var(--paper); color:var(--ink); } /* "⋯" 버튼에 마우스 올리면 배경이 살짝 생기고 글자색이 진해짐 */

  /* 인원 순서를 마우스로 끌어서(드래그) 바꿀 때 나타나는 시각 효과 */
  #logGrid thead th.dragging{ opacity:0.4; }  /* 드래그 중인 칸은 반투명하게(40%) 보이도록 */
  #logGrid thead th.drag-over{ background:var(--blueprint-bg); box-shadow:inset 0 0 0 2px var(--blueprint); } /* 드롭될 위치는 하늘색 배경 + 파란 테두리로 강조 */
  .emp-head{ cursor:grab; }          /* 인원 이름 칸 위에서는 마우스 커서가 "잡을 수 있음" 모양으로 바뀜 */
  .emp-head:active{ cursor:grabbing; } /* 실제로 마우스를 누르고 끄는 동안엔 "잡고 있음" 모양 커서 */

  /* ★★★ "1(수)" 처럼 표시되는 날짜 숫자 + 요일 글자를 담당하는 CSS ★★★
     실제 HTML 구조(자바스크립트가 자동으로 만들어냄):
       <div class="day-cell-label">
         1                          <!-- 날짜 숫자 -->
         <span class="dow">(수)</span> <!-- 요일 글자 -->
       </div>
     즉, "1"이라는 숫자와 "(수)"라는 요일 글자는 서로 다른 CSS 규칙이 각각 담당합니다. */
  .day-cell-label{
    padding:10px 8px;      /* 날짜 칸 안쪽 여백(위아래 10px, 좌우 8px). 숫자를 키우면 칸이 위아래로 더 넓어짐 */
    text-align:center;      /* 날짜 숫자를 칸 가운데로 정렬 */
    font-size:12px;         /* "1" 숫자의 글자 크기. 이 숫자를 키우면 날짜 숫자가 커짐 */
    font-weight:700;        /* "1" 숫자를 굵게(볼드) 표시 */
    color:var(--blueprint-strong); /* "1" 숫자의 글자색 = 진한 파란색 */
    font-family:var(--mono); /* 숫자 전용 글씨체 사용 (자릿수가 달라도 정렬이 깔끔함) */
  }
  /* "(수)" 처럼 날짜 숫자 밑에 작게 붙는 요일 글자 담당 */
  .day-cell-label .dow{
    display:block;          /* "(수)" 글자를 숫자 아래 "새 줄"에 표시 (숫자 옆이 아니라 아래로 내림) */
    font-size:11px;          /* "(수)" 글자 크기 (날짜 숫자 12px보다 살짝 더 작음) */
    color:var(--muted);      /* "(수)" 글자색 = 흐린 회색 (날짜 숫자보다 연하게) */
    font-weight:500;         /* "(수)" 글자 굵기 = 보통보다 약간만 굵게 */
    margin-top:1px;          /* 날짜 숫자와 요일 글자 사이의 위아래 간격 */
  }

  /* 토요일/일요일에 해당하는 행(줄) 전체에 적용되는 스타일 - 주말 행은 살구색 배경으로 구분됨 */
  #logGrid tr.weekend .day-cell-label{ color:var(--muted); }     /* 주말 날짜 숫자는 좀 더 흐린 회색으로 */
  #logGrid tr.weekend td { background:var(--amber-bg); }          /* 주말 행의 모든 칸 배경을 연한 살구색으로 */
  #logGrid tr.weekend td.day-cell:hover{ background:#FBEEDA; }    /* 주말 행의 업무 칸에 마우스를 올리면 조금 더 진한 살구색 */

  /* "오늘"에 해당하는 날짜 행(줄) 전체를 강조하는 스타일 */
  #logGrid tr.is-today .day-label-col{ background:var(--blueprint); color:#fff; } /* 오늘 행의 왼쪽 날짜 칸 배경 = 파란색, 글자 = 흰색 */
  #logGrid tr.is-today .day-cell-label{ color:#fff; }                              /* 오늘 행의 날짜 숫자도 흰색으로 */
  #logGrid tr.is-today .day-cell-label .dow{ color:rgba(255,255,255,0.8); }        /* 오늘 행의 요일 글자는 살짝 반투명한 흰색 */

  /* 인원별 하루 업무를 입력하는 칸(=클릭하면 팝업이 뜨는 칸) 자체의 스타일 */
  .day-cell{
    padding:8px 10px;      /* 업무 칸 안쪽 여백 */
    min-width:220px;        /* [수정됨] 최소 폭만 지정. 인원 이름 칸(.emp-head)과 동일한 방식으로 균등 분배됨 */
    cursor:pointer;          /* 마우스를 올리면 클릭 가능한 손가락 모양으로 */
    transition:background .12s; /* 배경색이 바뀔 때 부드럽게 변하는 효과 */
  }
  .day-cell:hover{ background:var(--blueprint-bg); }         /* 업무 칸에 마우스를 올리면 연한 하늘색 배경 */
  .day-cell.is-leave{ background:var(--amber-bg); }           /* "연차/휴가/반차" 글자가 포함된 칸은 자동으로 살구색 배경 */
  .day-cell.is-leave:hover{ background:#FBEEDA; }              /* 휴가 칸에 마우스를 올리면 좀 더 진한 살구색 */

  /* 업무 칸 안에 표시되는 항목 한 줄 (예: "· 견적서 작성  50%").
     [수정됨] 예전엔 flex로 한 줄에 다 늘어놓고 넘치면 "..."으로 잘랐는데,
     이제는 일반 문단처럼 자연스럽게 줄바꿈되도록 바꿨습니다. 칸 폭(220px)은 고정이라
     내용이 길면 항목 하나가 여러 줄을 차지하게 됩니다. */
  .log-item{
    font-size:12.5px;        /* 업무 내용 글자 크기 */
    line-height:1.5;          /* 줄과 줄 사이 세로 간격(줄 높이) */
    margin-bottom:6px;        /* 항목과 항목 사이의 위아래 간격 */
    word-break:break-word;    /* 띄어쓰기 없이 긴 글자(예: 코드번호)도 칸을 넘지 않도록 중간에서 줄바꿈 */
  }
  .log-item .dot{ color:var(--blueprint); margin-right:4px; }  /* 항목 앞의 "·" 점 색깔 = 파란색 */
  .log-item .txt{
    /* 이제 특별한 설정 없이 일반 글자처럼 흘러가며 자동으로 줄바꿈됨 */
  }
  .log-item .pct{
    font-family:var(--mono); font-size:11px; color:var(--muted);
    margin-left:6px; white-space:nowrap; /* "50%" 숫자 자체는 중간에서 줄바꿈되지 않도록 함 */
    /* 진행률 "50%" 같은 숫자 글자 스타일 - 작고 흐린 회색 */
  }
  .is-leave .log-item .dot{ color:var(--amber); }  /* 휴가 칸에서는 "·" 점 색깔이 파란색 대신 주황색으로 바뀜 */

  .more-link{
    font-size:11px; color:var(--blueprint); font-weight:600; margin-top:2px;
    /* "+2개 더보기" 처럼, 항목이 3개 이상일 때 나오는 안내 글자 스타일 */
  }
  .empty-hint{
    font-size:11.5px; color:#B8C0CC;
    /* 아직 아무것도 입력 안 된 빈 칸에 보이는 "+ 항목 추가" 흐린 안내 글자 스타일 */
  }

  /* ========================================================================
     ▣ 주간정리 행 - 한 주가 끝날 때마다(일요일 또는 월말) 표시되는 요약 줄
     ======================================================================== */
  #logGrid tr.summary-row .day-label-col{
    font-size:12px; font-weight:700; color:var(--navy);
    background:var(--blueprint-bg); /* "주간정리" 글자가 있는 왼쪽 칸 배경 */
    padding:10px 8px;
    text-align:center;
    vertical-align:middle;
    line-height:1.3;
  }
  #logGrid tr.summary-row td:not(.day-label-col){
    background:#FBFCFE;     /* 주간정리 줄의 오른쪽(인원별) 칸 배경색 */
    padding:10px 12px;
    font-size:12.5px; line-height:1.5;
  }
  .summary-text{ color:var(--ink); white-space:pre-wrap; } /* 주간정리 내용 글자. white-space:pre-wrap 덕분에 줄바꿈이 그대로 반영됨 */
  .summary-text.auto{ color:var(--muted); }                  /* 자동으로 계산된 요약글은 (사람이 직접 안 쓴 글은) 흐린 회색으로 표시 */
  .summary-edit-btn{
    font-size:11px; color:var(--blueprint); background:none; border:none;
    cursor:pointer; padding:0; margin-top:4px; font-weight:600;
    /* "직접 작성" / "수정" 같은 작은 텍스트 버튼 스타일 */
  }
  .summary-textarea{
    width:100%; min-height:56px; font-family:var(--sans); font-size:12.5px;
    border:1px solid var(--line); border-radius:6px; padding:6px 8px; resize:vertical;
    /* 주간정리를 직접 수정할 때 나타나는 입력창(textarea) 스타일 */
  }
  .summary-actions{ display:flex; gap:8px; margin-top:6px; } /* "취소"/"저장" 버튼을 나란히 배치하는 줄 */
  .summary-actions button{
    font-size:11px; padding:4px 9px; border-radius:5px; border:1px solid var(--line);
    background:#fff; cursor:pointer;
  }
  .summary-actions button.primary{ background:var(--blueprint); color:#fff; border-color:var(--blueprint); } /* "저장" 버튼은 파란색으로 강조 */

  .empty-state{
    text-align:center; padding:60px 20px; color:var(--muted);
    /* 인원이 한 명도 없을 때 표 대신 보이는 안내 문구 스타일 */
  }

  /* ========================================================================
     ▣ 차주계획 행 - "주간정리" 바로 아래에 표시되는, 다음 주 계획을 적는 줄
     ★ [추가됨] 주간정리와 헷갈리지 않도록 배경색을 보라 계열(--plan-bg)로 다르게 줌
     ======================================================================== */
  #logGrid tr.plan-row .day-label-col{
    font-size:12px; font-weight:700; color:var(--plan);
    background:var(--plan-bg); /* "차주계획" 글자가 있는 왼쪽 칸 배경 - 주간정리(하늘색)와 다른 보라색 */
    padding:10px 8px;
    text-align:center;
    vertical-align:middle;
    line-height:1.3;
  }
  #logGrid tr.plan-row td:not(.day-label-col){
    background:#FCFBFE;     /* 차주계획 줄의 오른쪽(인원별) 칸 배경색 - 주간정리(#FBFCFE)와 미세하게 다른 톤 */
    padding:10px 12px;
    font-size:12.5px; line-height:1.5;
  }
  .plan-text{ color:var(--ink); white-space:pre-wrap; } /* 차주계획 내용 글자 */
  .plan-text.empty{ color:var(--muted); } /* 아직 아무것도 안 적었을 때 흐린 회색 안내 문구 */

  /* ========================================================================
     ▣ 팝업창(모달) - 날짜 클릭 시 뜨는 상세 입력창, 인원 추가/관리 창 등 공통 스타일
     ======================================================================== */

  
  /* ========================================================================
     ★ [추가됨] 프로젝트명 자동완성 - 직접 만든 드롭다운 (브라우저 기본 datalist 대체)
     - 예전엔 <input list="..."> + <datalist>라는 브라우저 기본 기능을 썼는데, 이건 크롬이
       "입력창과 똑같은 폭"으로 목록을 그리고, 그 폭보다 긴 글자는 강제로 "..."로 잘라버립니다.
       이 폭/줄바꿈은 CSS로 전혀 손댈 수 없는 브라우저 내부 UI라서, 프로젝트명이 길면 다 안 보이는
       문제가 있었습니다.
     - 그래서 진짜 <datalist>를 쓰지 않고, 그냥 평범한 <div>로 "드롭다운처럼 보이는" 목록을 직접
       만들었습니다. 이러면 폭(width), 줄바꿈 여부, 글자 크기까지 전부 우리 마음대로 정할 수 있어서,
       프로젝트명이 아무리 길어도 절대 안 잘리고 다 보이게 만들 수 있습니다.
     ======================================================================== */
  .autocomplete-wrap{ position:relative; }
  .autocomplete-dropdown{
    display:none;
    position:absolute;
    top:calc(100% + 4px);
    left:0;
    min-width:100%;
    width:max-content;
    max-width:480px;
    background:#fff;
    border:1px solid var(--line);
    border-radius:8px;
    box-shadow:0 10px 30px rgba(0,0,0,0.15);
    z-index:200;
    max-height:220px;
    overflow-y:auto;
  }
  .autocomplete-dropdown.show{ display:block; }
  .autocomplete-item{
    padding:9px 12px;
    font-size:13.5px;
    cursor:pointer;
    white-space:normal;
    word-break:break-word;
    border-bottom:1px solid var(--line);
  }
  .autocomplete-item:last-child{ border-bottom:none; }
  .autocomplete-item:hover{ background:var(--blueprint-bg); }

  /* ========================================================================
     ★ [추가됨] 단계별 진행률 입력 행 - "프로젝트 진행 단계"에서 체크한 단계 개수만큼 이 줄이 생김
     예: [100] 모델링 진행률(%)  /  [100] 랜더링 진행률(%)  /  [50] 도면 진행률(%)
     ======================================================================== */
  .stage-progress-row{
    display:flex; align-items:center; gap:10px;
    margin-bottom:8px;
  }
  .stage-progress-row input{
    width:70px; flex-shrink:0;
    padding:8px 10px; border:1px solid var(--line); border-radius:7px;
    font-family:var(--sans); font-size:13.5px; background:#fff;
  }
  .stage-progress-row label{
    font-size:13px; color:var(--ink); font-weight:500;
  }
  .stage-progress-empty-hint{ font-size:12px; color:var(--muted); }

  /* ★ 프로젝트/작업단계 선택줄 - <select> 드롭다운과 "+ 관리" 버튼을 가로로 나란히 배치 */
  .select-with-manage{ display:flex; align-items:center; gap:8px; }
  .select-with-manage select{ flex:1; }
  /* "+ 관리" 텍스트 버튼 - 재고관리 앱과 동일한 방식 (누르면 아래에 관리 패널이 펼쳐짐/닫힘) */
  .manage-btn{
    border:none; background:none; color:var(--blueprint); font-size:12px; font-weight:600;
    cursor:pointer; white-space:nowrap; padding:4px 2px;
  }
  .manage-btn:hover{ text-decoration:underline; }
  /* "+ 관리"를 눌렀을 때 펼쳐지는 패널 - 기존 태그 목록 + 새로 추가하는 입력창 */
  .manage-panel{
    margin-top:8px; padding:10px; border:1px solid var(--line); border-radius:8px; background:var(--paper);
  }
  .tag-wrap{ display:flex; flex-wrap:wrap; gap:6px; margin-bottom:8px; } /* 알약 태그들을 여러 줄로 나란히 배치 */
  /* 프로젝트/단계 이름표 하나 (예: "GS-W805 ×") - 파란 알약 모양 */
  .tag-chip{
    display:inline-flex; align-items:center; gap:5px;
    background:var(--blueprint-bg); color:var(--blueprint-strong);
    border-radius:14px; padding:4px 6px 4px 10px; font-size:12px; font-weight:600;
  }
  .tag-chip button{
    border:none; background:none; color:var(--blueprint-strong); cursor:pointer;
    font-size:13px; line-height:1; padding:2px 4px; border-radius:50%;
  }
  .tag-chip button:hover{ background:rgba(43,108,176,0.18); } /* × 버튼에 마우스 올리면 은은한 파란 배경 */

  /* ★ 작업단계 "단추형" 선택기 - 한 줄에 전부 나열, 선택 여부에 따라 색만 바뀜 (공간 절약)
     - 선택 안 됨: 흰 배경 + 회색 테두리/글자
     - 선택됨: 파란 배경(채워짐) + 흰 글자
     - 삭제: 단추를 길게 누르면(약 0.6초) 부서 목록에서 완전히 삭제됨 (확인창 뜸) */
  .stage-chip{
    display:inline-block; margin:0 6px 6px 0; padding:6px 14px;
    border-radius:16px; border:1px solid var(--line);

/* ============================================================
   컬럼 정의 — 전역 배열 COL_DEFS
   [표시명, 정렬키, 기본너비(px), 옵션종류, 고정여부]
   - 정렬키 null → 헤더 클릭 정렬 안 됨
   - 옵션종류 있으면 헤더에 ⚙ 버튼 붙음
   - 고정여부 true → 드래그앤드롭 순서 변경 불가 (삭제 버튼 등)
   ★ 이 배열의 순서가 실제 표 컬럼 순서입니다.
      드래그앤드롭으로 바꾸면 여기가 업데이트되고 localStorage에 저장됩니다.
============================================================ */
const COL_DEFS_DEFAULT = [
  /* [표시명,              정렬키,         기본너비(px), 옵션종류,   고정]
     ★ 기본너비는 initColResize()에서 px 고정값으로 직접 적용됩니다.
        프로젝트명만 0으로 설정 → 다른 컬럼 폭 합산 후 남는 공간 전부 배정 */
  ['상태',                'status',         90, 'status',    false],
  ['주담당자',            'lead',           90, 'lead',      false],
  ['보조담당자',          'sub',            90, 'sub',       false],

  ['시작일',              'start_date',    110, null,        false],

  ['영업담당',            'sales',          90, 'sales',     false],
  ['분류',                'category',      100, 'category',  false],
  ['진행상태',            null,            200, 'prog',      false],
  ['강도',                'intensity',     165, 'intensity', false],
  ['삭제',                null,             44, null,        true ],
];

/* 컬럼 순서 localStorage 키 */
const COL_ORDER_KEY   = 'taskMgr_colOrder';
/* 컬럼 구조 변경 감지용 서명 — 컬럼 수 + 기본폭 합계 + 순서 해시로 만듦
   이 값이 localStorage에 저장된 값과 다르면 순서·폭을 전부 초기화해서
   "이전 저장값이 새 컬럼 정의를 덮어씌워 지정한 폭이 안 먹히는" 문제를 방지함 */
const COL_DEFS_SIGNATURE = COL_DEFS_DEFAULT.length + '_'
  + COL_DEFS_DEFAULT.reduce((s,c)=>s+(c[2]||0),0) + '_'
  + COL_DEFS_DEFAULT.map(c=>c[0][0]).join('');  /* 각 컬럼 첫 글자 연결 — 순서 변경도 감지 */
const COL_SIGNATURE_KEY  = 'taskMgr_colSignature';

/* 컬럼 구조가 바뀌었으면 순서·폭 localStorage를 모두 초기화 */
(function clearIfChanged(){
  try{
    const saved = localStorage.getItem(COL_SIGNATURE_KEY);
    if(saved !== COL_DEFS_SIGNATURE){
      localStorage.removeItem(COL_ORDER_KEY);
      localStorage.setItem(COL_SIGNATURE_KEY, COL_DEFS_SIGNATURE);
    }
  }catch(e){}
})();

/* 저장된 컬럼 순서를 불러와 COL_DEFS_DEFAULT를 재배열해서 반환
   저장된 게 없거나 컬럼 수가 다르면 기본 순서 그대로 반환 */
function loadColOrder(){
  try{
    const saved = localStorage.getItem(COL_ORDER_KEY);
    if(!saved) return [...COL_DEFS_DEFAULT];
    const order = JSON.parse(saved);
    const byName = Object.fromEntries(COL_DEFS_DEFAULT.map(c=>[c[0],c]));
    const reordered = order.map(n=>byName[n]).filter(Boolean);
    COL_DEFS_DEFAULT.forEach(c=>{ if(!reordered.includes(c)) reordered.push(c); });
    return reordered;
  }catch(e){ return [...COL_DEFS_DEFAULT]; }
}

/* 현재 COL_DEFS 순서를 localStorage에 저장 */
function saveColOrder(){
  try{
    localStorage.setItem(COL_ORDER_KEY, JSON.stringify(COL_DEFS.map(c=>c[0])));
  }catch(e){}
}

/* ★ 앱 전체에서 쓰는 실제 컬럼 배열 — 초기값은 저장된 순서 or 기본 순서 */
let COL_DEFS = loadColOrder();

/* ============================================================

let sortDir = 'asc';

const STATUS_ORDER = {

};

/* ============================================================
   드롭다운 옵션 정의
   각 셀에서 공통으로 쓰는 선택지들
============================================================ */
/* ★★ 2026-07 개편: 옵션을 코드에 박아두지 않고 Supabase에서 불러옵니다 ★★
   app_options 테이블에 저장 → ⚙ 버튼으로 추가/삭제/색상/순서 변경 → 팀 전체 공유

   OPTIONS 안에는 이렇게 들어갑니다:
   OPTIONS.status = [ {id, opt_type, value, label, color_bg, color_fg, sort_order}, ... ] */
let OPTIONS = { status:[], lead:[], sub:[], sales:[], category:[], prog:[], intensity:[] };

/* ⚙ 모달 제목에 쓸 한글 이름 */
const OPT_TITLE = {
  status:'상태', lead:'주담당자', sub:'보조담당자', sales:'영업담당',
  category:'분류', prog:'진행상태 (모델링·제작도·매뉴얼 공용)', intensity:'강도'
};

/* ------------------------------------------------------------
   옵션 전체를 Supabase에서 읽어오기
   opt_type(종류)별로 sort_order(순서)대로 정렬해서 가져옵니다.
------------------------------------------------------------ */
async function loadOptions(){
  /* ★ 옵션 로드 실패해도 앱 전체가 멈추지 않게 try-catch로 감쌉니다.
     실패 시 OPTIONS는 빈 상태로 유지되고, 경고 토스트만 띄웁니다. */
  try{
    const res = await fetch(SB_URL+'/rest/v1/app_options?order=opt_type.asc,sort_order.asc', {headers:H});
    if(!res.ok){
      const errText = await res.text();
      console.warn('옵션 로드 실패:', errText);
      /* RLS 오류면 콘솔에 SQL 안내 출력 */
      if(errText.includes('42501') || errText.includes('row-level security')){
        console.error(
          '▼▼▼ app_options 테이블 RLS 오류 — Supabase SQL Editor에서 실행하세요 ▼▼▼\n'
          +'ALTER TABLE app_options DISABLE ROW LEVEL SECURITY;\n'
          +'GRANT ALL ON app_options TO anon;\n'
          +'GRANT ALL ON app_options TO authenticated;\n'
          +'▲▲▲▲▲▲▲▲▲▲▲▲▲▲▲▲▲▲▲▲▲▲▲▲▲▲▲▲▲▲▲▲▲▲▲▲▲'
        );
        toast('⚠️ app_options RLS 오류 — 브라우저 콘솔(F12)에서 SQL을 확인하세요', 5000);
      } else {
        toast('⚠️ 옵션 로드 실패 — app_options 테이블을 확인하세요');
      }
      renderLeadFilterOptions();
      return;   /* OPTIONS는 빈 상태로 두고 계속 진행 */
    }
    const rows = await res.json();
    Object.keys(OPTIONS).forEach(k => OPTIONS[k] = []);   /* 비우고 */
    rows.forEach(r => { if(OPTIONS[r.opt_type]) OPTIONS[r.opt_type].push(r); });  /* 다시 채우기 */
  }catch(e){
    console.warn('옵션 로드 중 네트워크 오류:', e);
    toast('⚠️ 옵션 로드 실패 (네트워크 오류)');
  }
  renderLeadFilterOptions();   /* "전체 담당자" 검색 필터도 OPTIONS.lead 기준으로 채움 */
  applyStatusFilterColors();   /* 상태 옵션 색상을 필터 버튼에 초기 반영 */
}

/* ------------------------------------------------------------
   "전체 담당자" 검색 필터 드롭다운을 OPTIONS.lead 기준으로 동적 렌더링
   (예전엔 HTML에 4명이 하드코딩되어 있었음 → ⚙ 옵션관리에서 담당자를
   추가/삭제해도 반영이 안 되는 문제가 있어서 동적으로 바꿈)
   ⚙ 모달에서 담당자 옵션을 추가/삭제/순서변경할 때도 다시 호출됨(renderOptList 안에서)
------------------------------------------------------------ */
function renderLeadFilterOptions(){
  const sel = document.getElementById('fLead');
  if(!sel) return;
  const current = sel.value;   /* 지금 선택돼 있던 값 기억 */
  let html = '<option value="">전체 담당자</option>';
  (OPTIONS['lead']||[]).forEach(o=>{
    html += '<option value="'+esc(o.value)+'">'+esc(o.label||o.value)+'</option>';
  });
  sel.innerHTML = html;
  /* 새 목록에도 이전 선택값이 여전히 있으면 유지 (없어졌으면 "전체 담당자"로 자동 복귀) */
  if(Array.from(sel.options).some(op=>op.value===current)) sel.value = current;
}

/* 특정 종류에서 값 하나 찾기 */
function findOpt(type, value){
  return (OPTIONS[type]||[]).find(o => o.value === value) || null;
}
/* 화면에 보여줄 이름 (label 없으면 value 그대로) */
function optLabel(type, value){
  const o = findOpt(type, value);
  return o ? (o.label || o.value) : (value || '');
}
/* 뱃지 색상 {bg:배경, fg:글자} */
function optColor(type, value){
  const o = findOpt(type, value);
  return o ? { bg:o.color_bg||'#F0F0F0', fg:o.color_fg||'#555555' }
           : { bg:'#F0F0F0', fg:'#999999' };
}
/* <select> 만들 때 쓰는 형태로 변환 (업무추가 모달에서 사용) */
function optsFor(type){
  return (OPTIONS[type]||[]).map(o => ({ val:o.value, label:o.label||o.value }));
}

/* ============================================================
   탭 전환 (주간일지 / 월간일지 / 업무일정표 / 경비사용내역)
   - 주간일지·월간일지는 panel-worklog 하나를 공유하고,
     wlSwitchTab()이 내부적으로 #wlTabWeekly / #wlTabMonthly 중
     어느 쪽을 보여줄지만 전환합니다.
============================================================ */
function switchTab(tab){
  document.querySelectorAll('.tab').forEach(b=>b.classList.remove('active'));
  document.querySelectorAll('.tab-panel').forEach(p=>p.classList.remove('active'));
  document.getElementById('tab-'+tab).classList.add('active');

  // 업무일정표/경비사용내역 탭에서만 헤더의 "연도 선택 탭"을 보여줌
  // (주간일지/월간일지는 자체 연/월 이동 버튼을 쓰므로 불필요)
  const yearWrap = document.getElementById('yearTabWrap');
  if(yearWrap) yearWrap.style.display = (tab === 'task' || tab === 'expense') ? '' : 'none';

  if(tab === 'weekly' || tab === 'monthly'){
    document.getElementById('panel-worklog').classList.add('active');
    wlSwitchTab(tab);
  } else {
    document.getElementById('panel-'+tab).classList.add('active');
  }
}

// 날짜 문자열 "YYYY-MM-DD" → "MM/DD" 형식으로 변환
function fmtDate(d){ if(!d) return '-'; const p=d.split('-'); return p.length>=3?p[1]+'/'+p[2]:d; }

// 숫자 → "1,234원" 형식으로 변환
function fmtMoney(n){ if(n===null||n===undefined||n==='') return '-'; return Number(n).toLocaleString('ko-KR')+'원'; }

// HTML 특수문자 이스케이프 (XSS 방지 + 따옴표 오류 방지)
function esc(s){ return (s||'').replace(/&/g,'&amp;').replace(/"/g,'&quot;').replace(/</g,'&lt;').replace(/>/g,'&gt;'); }

/* ============================================================
   상태 뱃지 HTML 생성
   상태 문자열에 따라 색깔 있는 뱃지를 만들어 반환
============================================================ */
function statusBadge(s){
  if(!s) return '<span style="color:#CCC">-</span>';
  const c = optColor('status', s);          /* DB에 저장된 색 */
  const l = optLabel('status', s);          /* DB에 저장된 표시명 */
  return '<span class="badge" style="background:'+c.bg+';color:'+c.fg+'">'+esc(l)+'</span>';
}

/* 진행상태 뱃지 (모델링/제작도/매뉴얼 공용) */
function pbadge(v){
  if(!v || v==='-') return '<span style="color:#CCC">-</span>';
  const c = optColor('prog', v);
  return '<span class="pb" style="background:'+c.bg+';color:'+c.fg+'">'+esc(optLabel('prog',v))+'</span>';
}

/* 업무강도 뱃지 */
function ibadge(v){
  if(!v) return '<span style="color:#CCC">-</span>';
  const c = optColor('intensity', v);
  return '<span class="ib" style="background:'+c.bg+';color:'+c.fg+'">'+esc(optLabel('intensity',v))+'</span>';
}

/* ============================================================
   SELECT 옵션 HTML 생성 헬퍼
   opts: 옵션 배열, cur: 현재 선택값, empty: 빈 옵션 라벨
============================================================ */
function mkOpts(opts, cur, empty=''){
  let h = empty ? '<option value="">'+empty+'</option>' : '';
  opts.forEach(o=>{
    const v=typeof o==='object'?o.val:o;
    const l=typeof o==='object'?o.label:o;
    h+='<option value="'+esc(v)+'" '+(cur===v?'selected':'')+'>'+l+'</option>';
  });
  return h;
}

/* ============================================================
   업무일정표 데이터 로드 (Supabase → taskData 배열)
============================================================ */
async function loadTasks(){
  /* year 컬럼이 DB에 있으면 해당 연도만, 없으면 전체를 가져옵니다.
     컬럼이 없을 때 Supabase는 400을 반환하므로 폴백으로 전체 로드합니다. */
  let res = await fetch(
    SB_URL+'/rest/v1/task_schedule?year=eq.'+activeYear+'&order=created_at.asc',
    {headers:H}
  );
  /* year 컬럼 없음(400) → 전체 로드로 폴백 */
  if(!res.ok){
    res = await fetch(
      SB_URL+'/rest/v1/task_schedule?order=created_at.asc',
      {headers:H}
    );
  }
  if(!res.ok) throw new Error('task load fail');
  taskData = await res.json();
  renderTask();
  updateSummary();
}

   ★ 연도 관리 ★
============================================================ */

/* DB에 존재하는 연도 목록 조회 */
async function loadYears(){
  try{
    const res = await fetch(
      SB_URL+'/rest/v1/task_schedule?select=year&order=year.asc',
      {headers:{...H, 'Prefer':'count=none'}}
    );
    /* year 컬럼이 없거나 오류 → 현재 연도만 탭으로 표시하고 계속 진행 */
    if(!res.ok){
      availableYears = [activeYear];
      renderYearTabs();
      return;
    }
    const rows = await res.json();
    const years = [...new Set(rows.map(r=>r.year).filter(Boolean))].sort();
    if(!years.includes(activeYear)) years.push(activeYear);
    availableYears = years.sort();
    activeYear = availableYears[availableYears.length-1];
    renderYearTabs();
  }catch(e){
    availableYears = [activeYear];
    renderYearTabs();
  }
}

/* 연도 탭 버튼 렌더링 */
function renderYearTabs(){
  const wrap = document.getElementById('yearTabGroup');
  if(!wrap) return;
  wrap.innerHTML = availableYears.map(y=>
    '<button class="year-tab'+(y===activeYear?' active':'')+'" onclick="setYear('+y+')">'+y+'</button>'
  ).join('');
}

/* 연도 전환 — 클릭 시 해당 연도 데이터 다시 로드 */
async function setYear(y){
  if(activeYear === y) return;
  activeYear = y;
  renderYearTabs();
  setSyncStatus('loading','로딩중...');
  try{
    await Promise.all([loadTasks(), loadExpenses()]);
    setSyncStatus('ok','연결됨');
  }catch(e){ setSyncStatus('error','오류'); }
}

/* 새 연도 추가 버튼 — 다음 연도를 목록에 추가하고 전환 */
async function addNewYear(){
  const nextYear = Math.max(...availableYears) + 1;
  if(!confirm(nextYear+'년을 새로 시작합니다.\n업무·경비 데이터는 비어있는 상태로 시작됩니다.\n계속할까요?')) return;
  if(!availableYears.includes(nextYear)) availableYears.push(nextYear);
  availableYears.sort();
  activeYear = nextYear;
  renderYearTabs();
  /* 새 연도엔 데이터가 없으므로 빈 상태로 렌더 */
  taskData = [];
  expData = [];
  renderTask();
  renderExpense();
  updateSummary();
  updateBudget();
  toast('✅ '+nextYear+'년이 추가됐습니다. 업무·경비를 새로 추가해주세요.');
}

/* ============================================================

let activeStatusFilter = '';

function setStatusFilter(val){

  const map = { '':'all', '요청':'req', '진행중':'ing', '지속':'cont', '보류':'hold', '완료':'done' };
  Object.entries(map).forEach(([k, cls])=>{

     (active 여부에 따라 배경·글자색을 다르게 표시해야 하므로) */
  applyStatusFilterColors();
