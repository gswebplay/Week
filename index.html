<!DOCTYPE html>
<html lang="ko">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1" />
<title>업무일지</title>

<link rel="preconnect" href="https://cdn.jsdelivr.net" crossorigin>
<link rel="stylesheet" as="style" crossorigin
  href="https://cdn.jsdelivr.net/gh/orioncactus/pretendard@v1.3.9/dist/web/static/pretendard.css" />
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=JetBrains+Mono:wght@400;500;600&display=swap" rel="stylesheet">

<style>
/* ============================================================================
   [이 파일 사용법 - 아주 쉽게 설명]

   이 안의 <style> ~ </style> 사이는 전부 "CSS"라는 것으로,
   화면에 보이는 글자/버튼/칸의 "생김새"(크기, 색깔, 위치, 여백)를 정하는 부분입니다.
   (글자 내용 자체나 버튼을 눌렀을 때 동작은 CSS가 아니라 훨씬 아래쪽 <script> 안의
    JS(자바스크립트) 코드가 담당합니다.)

   CSS 규칙은 항상 이런 모양으로 생겼습니다:

     .어떤이름{
       속성이름: 값;
       속성이름: 값;
     }

   자주 나오는 속성 이름 뜻 (이것만 알아도 대부분 찾아 고칠 수 있어요):
   - font-size    : 글자 크기 (숫자가 클수록 글자가 커짐, 단위는 px = 픽셀)
   - font-weight  : 글자 굵기 (400=보통, 600~700=진하게/볼드)
   - color        : 글자 색깔
   - background   : 배경 색깔 (글자 뒤 칸/버튼의 색)
   - padding      : "안쪽" 여백 (테두리와 글자 사이 간격)
   - margin       : "바깥쪽" 여백 (이 요소와 다른 요소 사이 간격)
   - gap          : 여러 요소를 나란히 배치할 때, 요소들 사이의 간격
   - border       : 테두리 선 (굵기, 종류, 색)
   - border-radius: 테두리 모서리를 얼마나 둥글게 깎을지 (숫자가 클수록 더 둥글어짐)
   - width/height : 가로/세로 크기
   - position     : 화면에서 어떻게 배치할지 (sticky=스크롤해도 붙어있음, fixed=화면에 고정)
   - text-align   : 글자를 왼쪽/가운데/오른쪽 중 어디로 정렬할지
   - display:flex : 안에 있는 요소들을 가로 또는 세로로 나란히 줄세우는 방법

   ★ 어떤 CSS 규칙이 화면의 어떤 글자인지 찾는 가장 쉬운 방법 ★
   1) 크롬 브라우저에서 고치고 싶은 글자(예: "업무일지")를 마우스 오른쪽 버튼으로 클릭
   2) "검사(Inspect)" 클릭
   3) 화면 오른쪽에 파란색으로 강조되는 class 이름(예: class="app-title")이 뜸
   4) 그 이름을 이 파일에서 Ctrl+F(찾기)로 검색하면 (예: .app-title) 바로 그 CSS 규칙으로 이동함

   ============================================================================ */

  /* ----------------------------------------------------------------------
     :root { ... } 는 "색상 이름표 모음"입니다.
     예를 들어 --navy 라는 이름표에 색상 #0B1220(짙은 남색)을 붙여놓고,
     아래에서는 var(--navy) 라고 적으면 그 색이 그대로 사용됩니다.
     장점: 여기 있는 색상 코드 하나만 바꾸면, 그 색을 쓰는 화면의 모든 곳이 한 번에 바뀝니다.
     (예: --blueprint 값을 바꾸면 "인원 추가" 버튼 색, 오늘 날짜 강조 색 등이 전부 같이 바뀜)
     ---------------------------------------------------------------------- */
  :root{
    --navy:#0B1220;          /* 헤더(맨 위 검남색 바) 배경색, 아주 짙은 남색 */
    --navy-light:#16213A;    /* 남색 계열의 조금 더 밝은 색 (현재 코드에서는 직접 사용되는 곳 없음, 예비용) */
    --blueprint:#2B6CB0;     /* 앱의 메인 포인트 색(파란색). "인원 추가" 버튼, 링크, 오늘 강조색 등에 쓰임 */
    --blueprint-strong:#1B4D89; /* 포인트색보다 더 진한 파란색. 버튼에 마우스를 올렸을 때(hover) 색 */
    --blueprint-bg:#EAF2FB;  /* 아주 연한 하늘색. 셀에 마우스를 올렸을 때 배경, 좌측 날짜 칸 배경 등 */
    --line:#D3DEE9;          /* 표의 테두리 선 색깔 (연한 회청색) */
    --paper:#F5F7FA;         /* 전체 페이지 배경색 (아주 연한 회색, 종이 느낌) */
    --ink:#1A2332;           /* 일반 글자 색 (거의 검정에 가까운 남색) */
    --muted:#64748B;         /* 덜 중요한 글자(직급, 안내문구 등)에 쓰는 흐린 회색 글자색 */
    --amber:#B9781F;         /* 휴가/연차 표시에 쓰이는 주황/황토색 */
    --amber-bg:#FDF6EC;      /* 휴가/연차 칸과 주말 칸의 연한 배경색 (아주 연한 살구색) */
    --amber-line:#E8C08B;    /* 휴가 관련 테두리용 색 (현재 직접 쓰이는 곳은 적음, 예비용) */
    --danger:#C0392B;        /* "삭제" 같은 위험한 동작 버튼의 빨간색 */
    --radius:10px;           /* 표 전체 테두리의 둥근 정도 (숫자를 키우면 모서리가 더 둥글어짐) */
    --sans:'Pretendard', -apple-system, BlinkMacSystemFont, 'Malgun Gothic', sans-serif; /* 기본 글씨체(일반 텍스트용) */
    --mono:'JetBrains Mono', 'D2Coding', monospace; /* 숫자/날짜용 글씨체 (글자 폭이 일정해서 숫자 정렬이 깔끔함) */
  }

  /* 모든 요소에 대해 "padding과 border를 width/height 계산에 포함시킨다"는 기술적 설정.
     보통 건드릴 필요 없는 부분입니다. */
  *{ box-sizing:border-box; }

  /* 페이지의 기본 여백을 0으로 만듦 (브라우저마다 기본으로 약간의 여백이 있는데 그걸 없애는 것) */
  html,body{ margin:0; padding:0; }

  /* body = 웹페이지 전체 바탕화면.
     여기서 페이지 전체의 "기본 배경색"과 "기본 글자색", "기본 글씨체"를 정함. */
  body{
    background:var(--paper);   /* 페이지 전체 바탕 배경색 = 위 --paper 색상(연회색) */
    color:var(--ink);          /* 페이지 전체 기본 글자색 */
    font-family:var(--sans);   /* 페이지 전체 기본 글씨체 */
    -webkit-font-smoothing:antialiased; /* 글자를 좀 더 부드럽게(안티앨리어싱) 보이게 하는 설정 */
  }

  /* ========================================================================
     ▣ 상단 헤더 영역 (맨 위 검남색 바) - "업무일지", "기술전략부", 날짜 이동 버튼들이 있는 곳
     ======================================================================== */

  /* 헤더 전체를 감싸는 검남색 바 자체.
     "업무일지" 글자의 뒤쪽 배경(검남색)이 바로 이 규칙 때문에 생김. */
  header.app-header{
    background:var(--navy);   /* 헤더 바탕색 = 짙은 남색. 이 값을 바꾸면 헤더 전체 배경색이 바뀜 */
    color:#fff;                /* 헤더 안의 기본 글자색 = 흰색 */
    padding:16px 20px;         /* 헤더의 안쪽 여백. 위아래 16px, 좌우 20px. 숫자를 키우면 헤더가 더 두꺼워짐 */
    position:sticky; top:0; z-index:30; /* 스크롤을 내려도 화면 맨 위에 계속 붙어있게 하는 설정 */
  }

  /* 헤더 "안쪽 내용물"(타이틀 / 날짜이동버튼 / 인원추가버튼)을 가로로 배치하는 줄.
     justify-content:space-between = 왼쪽 끝, 가운데, 오른쪽 끝으로 최대한 벌려서 배치 */
  .header-row{
    display:flex; align-items:center; justify-content:space-between;
    max-width:1400px; margin:0 auto;  /* 화면이 아주 넓어도 내용은 최대 1400px까지만, 나머지는 가운데 정렬 */
    flex-wrap:wrap; gap:10px;          /* 화면이 좁으면 다음 줄로 자동으로 줄바꿈, 요소 사이 간격 10px */
  }

  /* ★★★ "업무일지" 글자를 담당하는 CSS ★★★
     실제 HTML에서는 아래쪽 <body> 부분에 <div class="app-title">업무일지 <span class="tag">기술전략부</span></div>
     라고 적혀 있어서, 이 규칙이 "업무일지" 글자(그리고 뒤에 붙는 "기술전략부" 태그까지 포함한 한 줄 전체)의
     스타일을 담당합니다. */
  .app-title{
    font-size:17px;      /* "업무일지" 글자 크기. 이 숫자를 키우면(예:20px) 글자가 커짐 */
    font-weight:700;     /* "업무일지" 글자 굵기. 700=꽤 두꺼운 볼드체 (숫자가 클수록 더 두꺼움, 최대 900) */
    letter-spacing:0.2px; /* 글자와 글자 사이의 간격을 아주 살짝 벌림 */
    display:flex; align-items:center; gap:8px; /* "업무일지" 글자와 "기술전략부" 태그를 가로로 나란히, 8px 간격으로 배치 */
    /* 참고: "업무일지" 글자 자체의 색깔은 별도로 지정하지 않았기 때문에,
       위 header.app-header 에서 정한 color:#fff (흰색)를 그대로 물려받아 사용합니다. */
  }

  /* ★★★ "기술전략부" 글자(작은 알약 모양 태그)를 담당하는 CSS ★★★
     HTML에서 <span class="tag">기술전략부</span> 부분입니다. */
  .app-title .tag{
    font-family:var(--mono); /* "기술전략부" 글자는 숫자용 글씨체(모노스페이스)를 사용 - 조금 더 각지고 타이핑체 느낌 */
    font-size:11px;          /* "기술전략부" 글자 크기 (업무일지 글자보다 훨씬 작음, 17px -> 11px) */
    color:var(--blueprint-bg); /* "기술전략부" 글자색 = 연한 하늘색 */
    background:rgba(255,255,255,0.08); /* "기술전략부" 뒤쪽 알약 배경 = 흰색을 아주 살짝(8%)만 섞은 반투명 배경 */
    padding:2px 6px;          /* "기술전략부" 글자 주위 안쪽 여백 (위아래 2px, 좌우 6px) - 이걸 키우면 알약이 커짐 */
    border-radius:4px;        /* "기술전략부" 알약 테두리를 둥글게 깎는 정도 */
    letter-spacing:0.5px;     /* "기술전략부" 글자 사이 간격을 조금 더 벌림 */
  }

  /* 날짜 이동 버튼들(«, ›, 오늘 등)을 감싸는 가로줄 영역 (헤더 가운데 부분) */
  .month-nav{
    display:flex; align-items:center; gap:8px; /* 버튼들을 가로로 나란히, 8px 간격 */
  }

  /* «(이전 해) »(다음 해) ‹(이전 달) ›(다음 달) 버튼 하나하나의 모양 */
  .month-nav button.nav-btn{
    background:rgba(255,255,255,0.08); /* 버튼 배경 = 흰색을 살짝 섞은 반투명 (헤더가 검남색이라 은은하게 도드라짐) */
    border:1px solid rgba(255,255,255,0.15); /* 버튼 테두리선 굵기 1px, 반투명 흰색 */
    color:#fff;                 /* 버튼 안 화살표 글자색 = 흰색 */
    width:30px; height:30px;    /* 버튼 크기 = 가로 30px, 세로 30px (정사각형에 가까움) */
    border-radius:7px;          /* 버튼 모서리 둥글기 */
    cursor:pointer;              /* 마우스를 올리면 손가락 모양 커서로 바뀜 (클릭 가능함을 표시) */
    font-size:14px;              /* 버튼 안 화살표(« › 등) 글자 크기 */
    display:flex; align-items:center; justify-content:center; /* 화살표를 버튼 정중앙에 배치 */
    transition:background .15s;  /* 배경색이 바뀔 때 0.15초 동안 부드럽게 변하는 애니메이션 효과 */
  }
  /* 위 버튼에 마우스를 올렸을 때(hover) 배경을 조금 더 밝게 */
  .month-nav button.nav-btn:hover{ background:rgba(255,255,255,0.18); }

  /* "2026년" 처럼 표시되는 연도 글자 (그리고 아래 HTML에서 월(月) 표시에도 같은 class를 재사용 중) */
  .year-label{
    font-family:var(--mono); /* 숫자용 글씨체 사용 */
    font-size:13px;           /* 연도/월 글자 크기 */
    letter-spacing:0.3px;
    min-width:44px;           /* 글자 폭이 최소 44px은 되도록 해서, 숫자가 바뀌어도(1월~12월) 버튼들이 흔들리지 않게 함 */
    text-align:center;        /* 글자를 가운데 정렬 */
  }

  /* "오늘" 버튼의 모양 */
  .today-btn{
    background:none;                 /* 배경 없음(투명) */
    border:1px solid rgba(255,255,255,0.3); /* 흰색 테두리선만 있음 */
    color:#fff;                       /* 글자색 흰색 */
    font-size:12px;                   /* "오늘" 글자 크기 */
    padding:6px 12px;                 /* 버튼 안쪽 여백 (이 숫자를 키우면 버튼이 커짐) */
    border-radius:7px;
    cursor:pointer;
    font-family:var(--sans);
  }
  .today-btn:hover{ background:rgba(255,255,255,0.1); } /* 마우스 올리면 살짝 밝아짐 */

  /* 헤더 맨 오른쪽 "+ 인원 추가" 버튼 */
  .add-employee-btn{
    background:var(--blueprint); /* 버튼 배경 = 파란색(포인트색) */
    color:#fff;                   /* 글자색 흰색 */
    border:none;                  /* 테두리선 없음 */
    font-size:13px;               /* "+ 인원 추가" 글자 크기 */
    padding:8px 14px;             /* 버튼 안쪽 여백 */
    border-radius:7px;
    cursor:pointer;
    font-weight:600;              /* 글자를 약간 굵게 */
    display:flex; align-items:center; gap:6px;
  }
  .add-employee-btn:hover{ background:var(--blueprint-strong); } /* 마우스 올리면 더 진한 파란색 */

  /* ========================================================================
     ▣ 표(달력) 영역 - 날짜, 인원 이름, 업무 내용이 표시되는 큰 표
     ======================================================================== */

  /* 헤더 바로 아래, 표가 들어있는 본문 영역의 좌우/전체 여백 */
  main{ max-width:1400px; margin:0 auto; padding:20px; }

  /* 표 전체를 감싸는 흰색 박스(테두리 있는 카드).
     overflow:auto + max-height 조합 때문에, 표 내용이 화면보다 많아지면
     이 박스 "안에서만" 스크롤이 생기고(위/아래 헤더는 안 잘리고), 표 헤더(인원 이름 줄)는
     이 박스 기준으로 sticky(고정)됩니다. */
  .grid-wrap{
    overflow:auto;
    max-height:calc(100vh - var(--header-h, 64px) - 40px); /* 화면 높이(100vh)에서 헤더 높이와 여백을 뺀 만큼만 표시 */
    border:1px solid var(--line); /* 표 박스 테두리선 */
    border-radius:var(--radius);  /* 표 박스 모서리 둥글기 (위 :root 에서 정한 --radius 값 사용) */
    background:#fff;               /* 표 박스 배경 = 흰색 */
  }

  /* 실제 표(<table>) 크기 규칙 */
  table.log-grid{
    border-collapse:separate; border-spacing:0; /* 표 안쪽 셀 사이에 이중 테두리가 생기지 않도록 하는 설정 */
    width:100%; min-width:640px; /* 표는 박스 너비만큼 채우되, 아무리 좁아도 최소 640px은 유지 (그 이하면 가로 스크롤 생김) */
  }
  /* 표 안의 모든 칸(th, td) 공통 테두리 */
  table.log-grid th, table.log-grid td{
    border-bottom:1px solid var(--line); /* 칸 아래쪽 테두리선 */
    border-right:1px solid var(--line);  /* 칸 오른쪽 테두리선 */
    vertical-align:top;                  /* 칸 안의 내용을 위쪽 기준으로 정렬 */
  }
  table.log-grid th:last-child, table.log-grid td:last-child{ border-right:none; } /* 표의 맨 오른쪽 칸은 오른쪽 테두리 생략 */

  /* 표 맨 왼쪽에 있는 "날짜 칸" 전체 열(세로줄)의 공통 스타일.
     (예: "1(수)" 처럼 보이는 칸이 위치한 세로줄 전체를 가리킴) */
  .day-label-col{
    width:78px; min-width:78px;  /* 날짜 칸의 가로 폭 = 78px 고정. 이 숫자를 키우면 왼쪽 날짜 칸이 넓어짐 */
    position:sticky; left:0; z-index:5; /* 표를 옆으로(가로) 스크롤해도 날짜 칸은 항상 왼쪽에 붙어있게 함 */
    background:var(--blueprint-bg);      /* 날짜 칸 배경색 = 연한 하늘색 */
  }
  thead .day-label-col{ z-index:15; } /* 표 맨 위 헤더 줄의 날짜 칸은 다른 것들보다 더 위에 보이도록 우선순위(z-index)를 높임 */

  /* 표 맨 위, 인원 이름이 나열된 줄(<thead>) 전체를 화면 스크롤 시 위에 고정시키는 설정.
     top:0 이므로, .grid-wrap 박스 안에서 스크롤할 때 이 줄이 항상 박스 맨 위에 붙어있게 됨. */
  thead th{
    background:#fff;         /* 인원 이름 줄의 배경 = 흰색 (아래 내용과 겹쳐 보이지 않도록) */
    position:sticky; top:0;
    z-index:10;
    padding:0;                /* 바깥쪽 여백은 0으로 두고, 안쪽 여백은 .emp-head 에서 따로 지정 */
  }

  /* 인원 이름 한 칸(예: "주종현 / 차장")의 안쪽 내용 배치.
     실제 HTML 구조: <div class="emp-head"> <div>이름+직급</div> <button>⋯</button> </div> */
  .emp-head{
    padding:12px 14px;   /* 이름 칸 안쪽 여백 (위아래 12px, 좌우 14px) */
    min-width:190px;      /* 인원 한 명당 칸의 최소 가로 폭 */
    display:flex; align-items:center; justify-content:space-between; gap:6px;
    /* justify-content:space-between = 왼쪽엔 이름/직급, 오른쪽 끝엔 "⋯" 관리버튼이 오도록 양쪽으로 배치 */
  }
  .emp-name{ font-weight:700; font-size:14px; }  /* 인원 "이름" 글자 (예: "주종현") - 굵고 14px */
  .emp-pos{ font-size:11px; color:var(--muted); font-weight:500; margin-top:2px; } /* 인원 "직급" 글자 (예: "차장") - 작고 흐린 회색 */
  .emp-menu-btn{
    border:none; background:none; color:var(--muted); cursor:pointer;
    font-size:16px; padding:2px 6px; border-radius:5px; line-height:1;
  } /* 인원 이름 옆 "⋯" (점 세 개) 관리 버튼 모양 */
  .emp-menu-btn:hover{ background:var(--paper); color:var(--ink); } /* "⋯" 버튼에 마우스 올리면 배경이 살짝 생기고 글자색이 진해짐 */

  /* 인원 순서를 마우스로 끌어서(드래그) 바꿀 때 나타나는 시각 효과 */
  thead th.dragging{ opacity:0.4; }  /* 드래그 중인 칸은 반투명하게(40%) 보이도록 */
  thead th.drag-over{ background:var(--blueprint-bg); box-shadow:inset 0 0 0 2px var(--blueprint); } /* 드롭될 위치는 하늘색 배경 + 파란 테두리로 강조 */
  .emp-head{ cursor:grab; }          /* 인원 이름 칸 위에서는 마우스 커서가 "잡을 수 있음" 모양으로 바뀜 */
  .emp-head:active{ cursor:grabbing; } /* 실제로 마우스를 누르고 끄는 동안엔 "잡고 있음" 모양 커서 */

  /* ★★★ "1(수)" 처럼 표시되는 날짜 숫자 + 요일 글자를 담당하는 CSS ★★★
     실제 HTML 구조(자바스크립트가 자동으로 만들어냄):
       <div class="day-cell-label">
         1                          <!-- 날짜 숫자 -->
         <span class="dow">(수)</span> <!-- 요일 글자 -->
       </div>
     즉, "1"이라는 숫자와 "(수)"라는 요일 글자는 서로 다른 CSS 규칙이 각각 담당합니다. */
  .day-cell-label{
    padding:10px 8px;      /* 날짜 칸 안쪽 여백(위아래 10px, 좌우 8px). 숫자를 키우면 칸이 위아래로 더 넓어짐 */
    text-align:center;      /* 날짜 숫자를 칸 가운데로 정렬 */
    font-size:12px;         /* "1" 숫자의 글자 크기. 이 숫자를 키우면 날짜 숫자가 커짐 */
    font-weight:700;        /* "1" 숫자를 굵게(볼드) 표시 */
    color:var(--blueprint-strong); /* "1" 숫자의 글자색 = 진한 파란색 */
    font-family:var(--mono); /* 숫자 전용 글씨체 사용 (자릿수가 달라도 정렬이 깔끔함) */
  }
  /* "(수)" 처럼 날짜 숫자 밑에 작게 붙는 요일 글자 담당 */
  .day-cell-label .dow{
    display:block;          /* "(수)" 글자를 숫자 아래 "새 줄"에 표시 (숫자 옆이 아니라 아래로 내림) */
    font-size:11px;          /* "(수)" 글자 크기 (날짜 숫자 12px보다 살짝 더 작음) */
    color:var(--muted);      /* "(수)" 글자색 = 흐린 회색 (날짜 숫자보다 연하게) */
    font-weight:500;         /* "(수)" 글자 굵기 = 보통보다 약간만 굵게 */
    margin-top:1px;          /* 날짜 숫자와 요일 글자 사이의 위아래 간격 */
  }

  /* 토요일/일요일에 해당하는 행(줄) 전체에 적용되는 스타일 - 주말 행은 살구색 배경으로 구분됨 */
  tr.weekend .day-cell-label{ color:var(--muted); }     /* 주말 날짜 숫자는 좀 더 흐린 회색으로 */
  tr.weekend td { background:var(--amber-bg); }          /* 주말 행의 모든 칸 배경을 연한 살구색으로 */
  tr.weekend td.day-cell:hover{ background:#FBEEDA; }    /* 주말 행의 업무 칸에 마우스를 올리면 조금 더 진한 살구색 */

  /* "오늘"에 해당하는 날짜 행(줄) 전체를 강조하는 스타일 */
  tr.is-today .day-label-col{ background:var(--blueprint); color:#fff; } /* 오늘 행의 왼쪽 날짜 칸 배경 = 파란색, 글자 = 흰색 */
  tr.is-today .day-cell-label{ color:#fff; }                              /* 오늘 행의 날짜 숫자도 흰색으로 */
  tr.is-today .day-cell-label .dow{ color:rgba(255,255,255,0.8); }        /* 오늘 행의 요일 글자는 살짝 반투명한 흰색 */

  /* 인원별 하루 업무를 입력하는 칸(=클릭하면 팝업이 뜨는 칸) 자체의 스타일 */
  .day-cell{
    padding:8px 10px;      /* 업무 칸 안쪽 여백 */
    min-width:190px;        /* 업무 칸의 최소 가로 폭 */
    cursor:pointer;          /* 마우스를 올리면 클릭 가능한 손가락 모양으로 */
    transition:background .12s; /* 배경색이 바뀔 때 부드럽게 변하는 효과 */
  }
  .day-cell:hover{ background:var(--blueprint-bg); }         /* 업무 칸에 마우스를 올리면 연한 하늘색 배경 */
  .day-cell.is-leave{ background:var(--amber-bg); }           /* "연차/휴가/반차" 글자가 포함된 칸은 자동으로 살구색 배경 */
  .day-cell.is-leave:hover{ background:#FBEEDA; }              /* 휴가 칸에 마우스를 올리면 좀 더 진한 살구색 */

  /* 업무 칸 안에 표시되는 항목 한 줄 (예: "· 견적서 작성  50%") */
  .log-item{
    font-size:12.5px;        /* 업무 내용 글자 크기 */
    line-height:1.5;          /* 줄과 줄 사이 세로 간격(줄 높이) */
    margin-bottom:4px;        /* 항목과 항목 사이의 위아래 간격 */
    display:flex; gap:5px; align-items:baseline; /* "·" 점, 내용 글자, "50%" 를 가로로 나란히 배치 */
  }
  .log-item .dot{ color:var(--blueprint); flex-shrink:0; }  /* 항목 앞의 "·" 점 색깔 = 파란색 */
  .log-item .txt{
    overflow:hidden; text-overflow:ellipsis; white-space:nowrap; max-width:150px;
    /* 업무 내용 글자가 너무 길면 칸을 넘어가지 않도록 "..." 으로 줄여서 표시 (최대 150px 폭까지만) */
  }
  .log-item .pct{
    font-family:var(--mono); font-size:11px; color:var(--muted); flex-shrink:0;
    /* 진행률 "50%" 같은 숫자 글자 스타일 - 작고 흐린 회색 */
  }
  .is-leave .log-item .dot{ color:var(--amber); }  /* 휴가 칸에서는 "·" 점 색깔이 파란색 대신 주황색으로 바뀜 */

  .more-link{
    font-size:11px; color:var(--blueprint); font-weight:600; margin-top:2px;
    /* "+2개 더보기" 처럼, 항목이 3개 이상일 때 나오는 안내 글자 스타일 */
  }
  .empty-hint{
    font-size:11.5px; color:#B8C0CC;
    /* 아직 아무것도 입력 안 된 빈 칸에 보이는 "+ 항목 추가" 흐린 안내 글자 스타일 */
  }

  /* ========================================================================
     ▣ 주간정리 행 - 한 주가 끝날 때마다(일요일 또는 월말) 표시되는 요약 줄
     ======================================================================== */
  tr.summary-row .day-label-col{
    font-size:12px; font-weight:700; color:var(--navy);
    background:var(--blueprint-bg); /* "주간정리" 글자가 있는 왼쪽 칸 배경 */
    padding:10px 8px;
    text-align:center;
    vertical-align:middle;
    line-height:1.3;
  }
  tr.summary-row td:not(.day-label-col){
    background:#FBFCFE;     /* 주간정리 줄의 오른쪽(인원별) 칸 배경색 */
    padding:10px 12px;
    font-size:12.5px; line-height:1.5;
  }
  .summary-text{ color:var(--ink); white-space:pre-wrap; } /* 주간정리 내용 글자. white-space:pre-wrap 덕분에 줄바꿈이 그대로 반영됨 */
  .summary-text.auto{ color:var(--muted); }                  /* 자동으로 계산된 요약글은 (사람이 직접 안 쓴 글은) 흐린 회색으로 표시 */
  .summary-edit-btn{
    font-size:11px; color:var(--blueprint); background:none; border:none;
    cursor:pointer; padding:0; margin-top:4px; font-weight:600;
    /* "직접 작성" / "수정" 같은 작은 텍스트 버튼 스타일 */
  }
  .summary-textarea{
    width:100%; min-height:56px; font-family:var(--sans); font-size:12.5px;
    border:1px solid var(--line); border-radius:6px; padding:6px 8px; resize:vertical;
    /* 주간정리를 직접 수정할 때 나타나는 입력창(textarea) 스타일 */
  }
  .summary-actions{ display:flex; gap:8px; margin-top:6px; } /* "취소"/"저장" 버튼을 나란히 배치하는 줄 */
  .summary-actions button{
    font-size:11px; padding:4px 9px; border-radius:5px; border:1px solid var(--line);
    background:#fff; cursor:pointer;
  }
  .summary-actions button.primary{ background:var(--blueprint); color:#fff; border-color:var(--blueprint); } /* "저장" 버튼은 파란색으로 강조 */

  .empty-state{
    text-align:center; padding:60px 20px; color:var(--muted);
    /* 인원이 한 명도 없을 때 표 대신 보이는 안내 문구 스타일 */
  }

  /* ========================================================================
     ▣ 팝업창(모달) - 날짜 클릭 시 뜨는 상세 입력창, 인원 추가/관리 창 등 공통 스타일
     ======================================================================== */

  /* 팝업이 뜰 때 화면 전체를 덮는 어두운 반투명 배경 */
  .modal-overlay{
    position:fixed; inset:0; background:rgba(11,18,32,0.45); /* 화면 전체를 45% 짙기의 남색 반투명으로 어둡게 덮음 */
    display:flex; align-items:center; justify-content:center; /* 팝업창을 화면 정중앙에 배치 */
    z-index:100; padding:16px;
  }
  /* 실제 팝업 흰색 박스(카드) 자체 */
  .modal-panel{
    background:#fff; border-radius:12px; width:100%; max-width:460px; /* 팝업 최대 가로폭 460px */
    max-height:86vh; overflow-y:auto; /* 팝업 내용이 화면보다 길면 팝업 안에서만 위아래 스크롤 */
    box-shadow:0 20px 50px rgba(0,0,0,0.25); /* 팝업 아래에 은은한 그림자 효과를 줘서 붕 떠 보이게 함 */
  }
  .modal-header{
    padding:16px 20px; border-bottom:1px solid var(--line); /* 팝업 제목 영역, 아래쪽에 구분선 */
    display:flex; align-items:center; justify-content:space-between; /* 제목은 왼쪽, "✕" 닫기 버튼은 오른쪽 */
  }
  .modal-header h3{ margin:0; font-size:15px; } /* 팝업 제목 글자 크기 */
  .modal-close{ border:none; background:none; font-size:18px; cursor:pointer; color:var(--muted); } /* "✕" 닫기 버튼 모양 */
  .modal-body{ padding:16px 20px; } /* 팝업 안쪽 본문 내용의 여백 */
  .modal-footer{
    padding:14px 20px; border-top:1px solid var(--line); /* 팝업 하단, "취소"/"저장" 버튼이 있는 영역 */
    display:flex; justify-content:flex-end; gap:8px; /* 버튼들을 오른쪽 끝으로 정렬 */
  }
  .btn{
    font-size:13px; padding:8px 16px; border-radius:7px; border:1px solid var(--line);
    background:#fff; cursor:pointer; font-family:var(--sans);
    /* 팝업 안의 일반 버튼(예: "취소") 기본 모양 */
  }
  .btn:hover{ background:var(--paper); }
  .btn.primary{ background:var(--blueprint); border-color:var(--blueprint); color:#fff; font-weight:600; } /* "저장" 같은 주요(파란색 강조) 버튼 */
  .btn.primary:hover{ background:var(--blueprint-strong); }
  .btn.danger{ color:var(--danger); border-color:#F0CBC5; } /* "삭제" 같은 위험한 버튼은 빨간 글자 */
  .btn.danger:hover{ background:#FDEEEC; }

  /* 팝업 안, 입력창 하나(라벨 + input) 묶음의 여백 */
  .field{ margin-bottom:12px; }
  .field label{ display:block; font-size:12px; color:var(--muted); margin-bottom:5px; font-weight:600; } /* "이름", "직급" 같은 항목 이름표 글자 */
  .field input[type=text], .field input[type=number], .field textarea{
    width:100%; padding:9px 11px; border:1px solid var(--line); border-radius:7px;
    font-family:var(--sans); font-size:13.5px;
    /* 실제 글자를 입력하는 입력창(input, textarea)의 모양 */
  }
  .field textarea{ min-height:64px; resize:vertical; } /* 여러 줄 입력창(textarea)은 세로로만 크기 조절 가능하게 */
  .field-row{ display:flex; gap:10px; }          /* 입력창 두 개를 가로로 나란히 배치할 때 쓰는 줄 */
  .field-row .field{ flex:1; }

  /* 하루 업무 상세 팝업 안, 항목 하나(내용+진행률+삭제버튼)를 감싸는 박스 */
  .item-row{
    border:1px solid var(--line); border-radius:8px; padding:10px 12px; margin-bottom:8px;
    position:relative;
  }
  .item-row .item-remove{
    position:absolute; top:8px; right:8px; border:none; background:none;
    color:var(--muted); cursor:pointer; font-size:14px;
    /* 항목 박스 우측 상단의 "✕" 삭제 버튼 위치/모양 */
  }
  .item-row .item-remove:hover{ color:var(--danger); } /* 삭제 버튼에 마우스 올리면 빨간색으로 */
  .add-item-btn{
    width:100%; padding:9px; border:1px dashed var(--line); border-radius:8px;
    background:none; color:var(--blueprint); font-size:13px; cursor:pointer; font-weight:600;
    /* "+ 항목 추가" 점선 테두리 버튼 모양 */
  }
  .add-item-btn:hover{ background:var(--blueprint-bg); }

  .hint-text{ font-size:11.5px; color:var(--muted); margin-top:4px; } /* 팝업 하단의 작은 안내문구(도움말) 글자 스타일 */

  /* 화면 하단에 잠깐 나타났다 사라지는 알림 메시지("저장했습니다" 등) */
  .toast{
    position:fixed; bottom:22px; left:50%; transform:translateX(-50%); /* 화면 하단 정중앙에 위치 */
    background:var(--navy); color:#fff; padding:10px 18px; border-radius:8px;
    font-size:13px; z-index:200; opacity:0; transition:opacity .2s; /* 평소엔 투명(0), show 클래스가 붙으면 나타남 */
    pointer-events:none; /* 알림 메시지는 클릭이 안 되게(마우스 이벤트를 무시하게) 설정 */
  }
  .toast.show{ opacity:1; } /* JS가 이 클래스를 붙였다 뗐다 하면서 알림을 보였다/숨겼다 함 */

  /* 화면 폭이 640px 이하(휴대폰처럼 좁은 화면)일 때만 적용되는 스타일 - 좁은 화면에 맞게 살짝 축소 */
  @media (max-width:640px){

  }
</style>

<!-- ============================================================
     ▣ 화면에 실제로 보이는 상단 헤더 부분 (HTML)
     - "업무일지" 글자, "기술전략부" 태그, 날짜 이동 버튼, "+ 인원 추가" 버튼이

<!-- ============================================================
     ▣ 표(달력) 영역
     - 이 안의 실제 날짜 줄, 인원 이름 줄, 업무 내용 등은 모두 비어있는 상태로 시작해서
       아래 <script> 안의 JS 코드(render 관련 함수들)가 실행되면서 자동으로 채워 넣습니다.
     - 즉, "1(수)" 같은 글자는 이 HTML에 직접 적혀있는 게 아니라,
       JS의 renderBody() 함수 안에서 day-cell-label 이라는 class를 붙여서 자동으로 만들어냅니다.
       (그 글자의 생김새를 바꾸고 싶으면 위쪽 CSS의 .day-cell-label 규칙을 고치면 됩니다)
     ============================================================ -->
<main>

</main>

<!-- 팝업창(모달)이 뜰 때 내용이 채워지는 빈 그릇 -->
<div id="modalRoot"></div>
<!-- 하단에 잠깐 뜨는 알림 메시지가 표시되는 자리 -->
<div class="toast" id="toast"></div>

<script>
/* ============================================================================
   [아래 <script> 태그 안은 "JS(자바스크립트)" 코드입니다]

   위쪽 CSS가 "생김새(모양)"를 담당한다면, 여기 JS는
   - 화면에 어떤 글자를 넣을지(예: 오늘 날짜가 몇 일인지 계산해서 "1(수)"라는 글자를 만듦)
   - 버튼을 눌렀을 때 무슨 일이 벌어지는지(예: 저장, 삭제, 화면 이동)
   - 서버(Supabase)에 데이터를 저장하고 불러오는 일
   을 담당합니다.

   글자의 "내용"이 이상하면 이 JS 부분을, 글자의 "생김새(크기/색/여백)"가 이상하면
   위쪽 <style> CSS 부분을 고치면 됩니다.
   ============================================================================ */

/* ============================================================
   Supabase 설정 — 본인의 프로젝트 값으로 교체하세요.
   (Supabase = 이 앱이 데이터를 저장해두는 온라인 데이터베이스 서비스)
   ============================================================ */
const SUPABASE_URL = 'https://zrhwdvuehaelintkfoqn.supabase.co'; // 우리 Supabase 프로젝트의 주소
const SUPABASE_KEY = 'sb_publishable_oQ7F4Q9KRS22lpiE9uILFA_zN7n2V4V'; // 우리 프로젝트에 접속하기 위한 공개용 열쇠(키)

// Supabase에게 데이터를 "달라"(GET) 또는 "저장해라"(POST/PATCH/DELETE) 라고 요청하는 공통 함수.
// SDK(외부 라이브러리)를 쓰지 않고 fetch()로 직접 요청을 보내는 방식 - 다른 코드와 변수명이 겹치는 문제를 피하기 위함.
async function sb(path, method='GET', body=null, extraHeaders={}) {
  const res = await fetch(SUPABASE_URL + '/rest/v1/' + path, {
    method,
    headers: {
      'apikey': SUPABASE_KEY,
      'Authorization': 'Bearer ' + SUPABASE_KEY,
      'Content-Type': 'application/json',
      'Prefer': 'return=representation', // 저장/수정 후 결과 데이터를 바로 돌려받기 위한 옵션
      ...extraHeaders,
    },
    body: body ? JSON.stringify(body) : null,
  });
  if (!res.ok) throw new Error(await res.text()); // 요청이 실패하면 에러를 발생시킴
  const text = await res.text();
  return text ? JSON.parse(text) : []; // 응답 내용을 실제 자바스크립트 데이터(배열/객체)로 변환해서 돌려줌
}

/* ---------- 앱이 기억하고 있는 "현재 상태" 값들 ---------- */
const TODAY = new Date();                    // 오늘 날짜 (앱을 처음 연 시점 기준으로 한 번만 계산됨)
let currentYear = TODAY.getFullYear();        // 지금 화면에 보여주고 있는 "연도" (예: 2026)
let currentMonth = TODAY.getMonth() + 1;      // 지금 화면에 보여주고 있는 "월" (1~12)
let didInitialScroll = false;                 // 앱을 처음 열었을 때 "오늘" 위치로 자동 스크롤을 이미 했는지 여부
let employees = [];                           // 전체 인원 목록을 담아두는 배열
let logsByEmpDate = {};      // key: "인원ID_날짜" -> [그 날짜에 그 인원이 입력한 업무 항목들]
let summariesByEmp = {};     // key: "인원ID_주시작일" -> 그 주의 주간정리 데이터

// 이 단어들이 업무 내용에 포함되어 있으면, 그 날짜 칸을 자동으로 "휴가 색"으로 표시함
const LEAVE_KEYWORDS = ['연차', '휴가', '반차', '연 차', '휴 가', '반 차', '연휴', '연 휴'];
// 요일 이름표. 배열의 0번째가 "월"이므로, 날짜의 요일 번호를 월요일=0 기준으로 바꿔서 이 배열에 대입해 사용함
const DOW_LABELS = ['월', '화', '수', '목', '금', '토', '일'];

/* ---------- 날짜 계산을 도와주는 함수들 ---------- */

// 어떤 날짜가 속한 "그 주의 월요일" 날짜를 구해줌
function startOfWeek(date){
  const d = new Date(date);
  const day = d.getDay(); // 0=일요일, 1=월요일, ... 6=토요일
  const diff = (day === 0 ? -6 : 1) - day; // 일요일이면 6일 전으로, 그 외엔 월요일까지 며칠을 빼야하는지 계산
  d.setDate(d.getDate() + diff);
  d.setHours(0,0,0,0);
  return d;
}
// 어떤 날짜에서 n일을 더한(음수면 뺀) 날짜를 구해줌
function addDays(date, n){
  const d = new Date(date);
  d.setDate(d.getDate() + n);
  return d;
}
// Date 객체를 'YYYY-MM-DD' 형태의 글자로 바꿔줌 (Supabase에 저장되는 날짜 형식과 맞추기 위함)
function toDateStr(d){
  const y = d.getFullYear();
  const m = String(d.getMonth()+1).padStart(2,'0');
  const day = String(d.getDate()).padStart(2,'0');
  return `${y}-${m}-${day}`;
}
function toDisplay(d){
  return `${d.getMonth()+1}.${d.getDate()}`;
}
function weekEnd(weekStart){ return addDays(weekStart, 6); } // 월요일 시작일 + 6일 = 그 주의 일요일
function daysInMonth(year, month){ return new Date(year, month, 0).getDate(); } // 그 달이 며칠까지 있는지 (28~31)
function monthFirstDate(year, month){ return new Date(year, month-1, 1); }      // 그 달의 1일
function monthLastDate(year, month){ return new Date(year, month-1, daysInMonth(year, month)); } // 그 달의 말일
function isSameDate(a, b){ // 두 날짜가 "같은 날"인지 비교 (연,월,일이 모두 같아야 true)
  return a.getFullYear()===b.getFullYear() && a.getMonth()===b.getMonth() && a.getDate()===b.getDate();
}

// 어떤 글자(업무 내용) 안에 "연차/휴가/반차" 관련 단어가 들어있는지 검사
function containsLeaveKeyword(text){
  if(!text) return false;
  return LEAVE_KEYWORDS.some(k => text.includes(k));
}

// 화면 하단에 잠깐 뜨는 알림 메시지(토스트)를 보여주는 함수
function showToast(msg){
  const t = document.getElementById('toast');
  t.textContent = msg;                 // 알림 안에 표시할 글자 내용을 넣음
  t.classList.add('show');              // CSS의 .toast.show 규칙이 적용되어 화면에 나타남
  clearTimeout(showToast._timer);
  showToast._timer = setTimeout(()=> t.classList.remove('show'), 2200); // 2.2초 뒤에 다시 숨김
}

/* ============================================================
   데이터 불러오기 (Supabase에서 읽어오는 부분)
   ============================================================ */

// 활성 상태인(삭제되지 않은) 인원 목록을 정해진 순서대로 불러옴
async function loadEmployees(){
  try {
    employees = await sb('employees?active=eq.true&order=sort_order.asc');
  } catch(e){ console.error(e); showToast('인원 목록을 불러오지 못했습니다'); }
}

// 지금 화면에 보여줄 달(currentYear, currentMonth)에 걸쳐있는 모든 주(週)의
// 업무기록과 주간정리 데이터를 한꺼번에 불러옴
async function loadMonthData(){
  const first = monthFirstDate(currentYear, currentMonth); // 이번 달 1일
  const last  = monthLastDate(currentYear, currentMonth);  // 이번 달 말일
  const rangeStart = startOfWeek(first); // 1일이 속한 주의 월요일
  const rangeEnd   = weekEnd(startOfWeek(last)); // 말일이 속한 주의 일요일
  const startStr = toDateStr(rangeStart);
  const endStr   = toDateStr(rangeEnd);

  // 업무 기록(work_logs)을 불러와서 "인원ID_날짜" 형태의 이름표를 붙여 정리해둠
  logsByEmpDate = {};
  try {
    const logs = await sb(`work_logs?log_date=gte.${startStr}&log_date=lte.${endStr}&order=sort_order.asc`);
    logs.forEach(l => {
      const key = `${l.employee_id}_${l.log_date}`;
      if(!logsByEmpDate[key]) logsByEmpDate[key] = [];
      logsByEmpDate[key].push(l);
    });
  } catch(e){ console.error(e); showToast('업무 기록을 불러오지 못했습니다'); }

  // 주간정리(weekly_summaries)도 같은 방식으로 불러와서 정리해둠
  summariesByEmp = {};
  try {
    const summaries = await sb(`weekly_summaries?week_start=gte.${startStr}&week_start=lte.${endStr}`);
    summaries.forEach(s => { summariesByEmp[`${s.employee_id}_${s.week_start}`] = s; });
  } catch(e){ console.error(e); }
}

// "인원 목록"과 "이번 달 데이터"를 전부 새로 불러온 뒤, 화면을 처음부터 다시 그림
async function refreshAll(){
  await loadEmployees();
  await loadMonthData();
  render();
}

/* ============================================================
   화면 그리기(렌더링) - 데이터를 실제 HTML 글자/칸으로 바꾸는 부분
   ============================================================ */

// 화면을 새로 그리는 전체 흐름: 상단 연/월 표시 -> 표 헤더(인원 이름 줄) -> 표 본문(날짜 줄들) 순서로 그림
function render(){
  renderMonthNav();
  renderHead();
  renderBody();
}

// 헤더의 "2026년", "7월" 글자를 지금 currentYear/currentMonth 값에 맞게 채워 넣음
// (이 글자들의 생김새(크기/색)를 바꾸고 싶다면 위쪽 CSS의 .year-label 규칙을 수정하면 됨)
function renderMonthNav(){
  document.getElementById('yearLabel').textContent = `${currentYear}년`;
  document.getElementById('monthLabel').textContent = `${currentMonth}월`;
}

let dragSrcId = null; // 인원 순서를 드래그로 바꿀 때, 지금 "잡고 있는" 인원의 id를 잠깐 기억해두는 변수

// 표 맨 위 "인원 이름 줄"(<thead>)을 그리는 함수. 인원마다 이름/직급 칸을 하나씩 만들고,
// 마우스로 드래그해서 순서를 바꾸는 기능도 여기서 연결함.
function renderHead(){
  const row = document.getElementById('headRow');
  row.innerHTML = '<th class="day-label-col"></th>'; // 맨 왼쪽 빈 칸(날짜 칸 자리) 먼저 넣음
  if(employees.length === 0){
    // 인원이 한 명도 없으면 안내 문구만 표시
    row.innerHTML += `<th style="padding:14px;color:var(--muted);font-weight:500;font-size:13px;">
      인원이 없습니다. 우측 상단 '+ 인원 추가'로 시작하세요.</th>`;
    return;
  }
  employees.forEach(emp => {
    const th = document.createElement('th');
    th.draggable = true; // 이 칸을 마우스로 끌 수 있게 함
    // 아래 innerHTML 안의 class="emp-head" / "emp-name" / "emp-pos" / "emp-menu-btn" 이
    // 각각 위쪽 CSS 규칙과 이름이 연결되어 생김새가 정해짐
    th.innerHTML = `
      <div class="emp-head">
        <div>
          <div class="emp-name">${escapeHtml(emp.name)}</div>
          ${emp.position ? `<div class="emp-pos">${escapeHtml(emp.position)}</div>` : ''}
        </div>
        <button class="emp-menu-btn" data-emp="${emp.id}" title="관리">⋯</button>
      </div>`;
    th.querySelector('.emp-menu-btn').addEventListener('click', () => openEmployeeMenu(emp)); // "⋯" 클릭 시 관리 팝업 열기

    // 드래그로 인원 순서를 바꾸는 기능 (마우스로 잡고 - 이동하고 - 놓는 4단계 이벤트)
    th.addEventListener('dragstart', () => {
      dragSrcId = emp.id;
      th.classList.add('dragging'); // CSS의 .dragging 스타일 적용 (반투명하게)
    });
    th.addEventListener('dragend', () => { th.classList.remove('dragging'); });
    th.addEventListener('dragover', (e) => { e.preventDefault(); th.classList.add('drag-over'); }); // 드롭될 위치 강조
    th.addEventListener('dragleave', () => { th.classList.remove('drag-over'); });
    th.addEventListener('drop', async (e) => {
      e.preventDefault();
      th.classList.remove('drag-over');
      if(!dragSrcId || dragSrcId === emp.id) return;
      const fromIdx = employees.findIndex(x => x.id === dragSrcId);
      const toIdx = employees.findIndex(x => x.id === emp.id);
      if(fromIdx === -1 || toIdx === -1) return;
      const [moved] = employees.splice(fromIdx, 1); // 배열에서 기존 위치의 인원을 빼내고
      employees.splice(toIdx, 0, moved);              // 새 위치에 끼워 넣음
      dragSrcId = null;
      render(); // 화면을 먼저 새 순서로 다시 그림 (사용자는 바로 결과를 봄)
      try {
        // 그 다음 서버에도 새 순서(sort_order 숫자)를 저장해서, 새로고침해도 순서가 유지되게 함
        await Promise.all(employees.map((e2, idx) => sb(`employees?id=eq.${e2.id}`, 'PATCH', { sort_order: idx })));
      } catch(err){ console.error(err); showToast('순서 저장 실패'); }
    });

    row.appendChild(th);
  });
}

// 표 본문(<tbody>)을 그리는 함수. 이번 달의 모든 날짜를 한 줄씩 만들고,
// "1(수)" 같은 날짜 라벨(day-cell-label)과 인원별 업무 칸(day-cell)들을 채워 넣은 뒤,
// 매주 끝(일요일 또는 월말)마다 "주간정리" 줄을 추가로 삽입함.
function renderBody(){
  const body = document.getElementById('gridBody');
  body.innerHTML = '';

  if(employees.length === 0){
    body.innerHTML = `<tr><td class="day-label-col"></td><td class="empty-state">인원을 먼저 추가해주세요.</td></tr>`;
    return;
  }

  const totalDays = daysInMonth(currentYear, currentMonth);

  // 특정 주의 "주간정리" 줄 하나를 만들어서 표에 추가하는 내부 함수
  function appendSummaryRow(weekStartDate){
    const sumTr = document.createElement('tr');
    sumTr.className = 'summary-row'; // 이 class 이름 덕분에 위쪽 CSS의 tr.summary-row 스타일이 적용됨
    const sumLabelTd = document.createElement('td');
    sumLabelTd.className = 'day-label-col';
    sumLabelTd.textContent = '주간정리'; // 왼쪽 칸에 "주간정리" 라는 글자 표시
    sumTr.appendChild(sumLabelTd);

    const weekStartStr = toDateStr(weekStartDate);
    employees.forEach(emp => {
      const td = document.createElement('td');
      td.dataset.empId = emp.id;
      renderSummaryCell(td, emp, weekStartStr); // 인원별 요약 내용을 채워 넣음 (아래 함수 참고)
      sumTr.appendChild(td);
    });
    body.appendChild(sumTr);
  }

  let weekStartOfCurrentRun = null;

  // 이번 달의 1일부터 말일까지 하루하루 반복하면서 줄(행)을 하나씩 만듦
  for(let d = 1; d <= totalDays; d++){
    const date = new Date(currentYear, currentMonth-1, d);
    const dateStr = toDateStr(date);
    const dowIdx = (date.getDay()+6) % 7; // 자바스크립트 기본 요일번호(0=일)를 0=월 기준으로 바꿈
    const isWeekend = dowIdx >= 5;         // 5=토, 6=일 이면 주말
    const isToday = isSameDate(date, TODAY);

    if(weekStartOfCurrentRun === null) weekStartOfCurrentRun = startOfWeek(date);

    const tr = document.createElement('tr');
    // 아래 className 에 'weekend' 또는 'is-today' 글자가 들어가면,
    // 위쪽 CSS의 tr.weekend / tr.is-today 규칙이 자동으로 적용되어 배경색 등이 바뀜
    tr.className = (isWeekend ? 'weekend' : '') + (isToday ? ' is-today' : '');
    tr.dataset.date = dateStr;

    // ★ 여기가 바로 "1(수)" 같은 날짜 라벨을 실제로 만들어내는 부분입니다.
    //   class="day-cell-label" 로 감싼 부분이 날짜 숫자(예: 1)를 담당하고,
    //   그 안의 <span class="dow"> 이 요일 글자(예: (수))를 담당합니다.
    //   이 글자들의 "생김새"(크기/색/여백)를 바꾸고 싶다면
    //   위쪽 <style> 안의 .day-cell-label 과 .day-cell-label .dow 규칙을 수정하면 됩니다.
    const labelTd = document.createElement('td');
    labelTd.className = 'day-label-col';
    labelTd.innerHTML = `<div class="day-cell-label">${date.getDate()}<span class="dow">(${DOW_LABELS[dowIdx]})</span></div>`;
    tr.appendChild(labelTd);

    // 인원별로 그 날짜의 업무 칸을 하나씩 만듦
    employees.forEach(emp => {
      const key = `${emp.id}_${dateStr}`;
      const items = logsByEmpDate[key] || [];
      const hasLeave = items.some(it => containsLeaveKeyword(it.content)); // 휴가 관련 단어가 있는지 검사

      const td = document.createElement('td');
      // 'is-leave' 글자가 class에 들어가면 위쪽 CSS의 .day-cell.is-leave 규칙(살구색 배경)이 적용됨
      td.className = 'day-cell' + (hasLeave ? ' is-leave' : '');
      td.addEventListener('click', () => openDayModal(emp, date)); // 칸을 클릭하면 상세 입력 팝업이 열림

      if(items.length === 0){
        // 아직 아무것도 입력 안 된 칸에는 흐린 "+ 항목 추가" 안내 글자를 보여줌 (CSS: .empty-hint)
        td.innerHTML = `<div class="empty-hint">+ 항목 추가</div>`;
      } else {
        const shown = items.slice(0, 2); // 칸 안에는 최대 2개 항목만 미리보기로 보여줌
        let html = shown.map(it => `
          <div class="log-item">
            <span class="dot">·</span>
            <span class="txt" title="${escapeHtml(it.content)}">${escapeHtml(it.content)}</span>
            ${it.progress !== null && it.progress !== undefined ? `<span class="pct">${it.progress}%</span>` : ''}
          </div>`).join('');
        if(items.length > 2){
          html += `<div class="more-link">+${items.length - 2}개 더보기</div>`;
        }
        td.innerHTML = html;
      }
      tr.appendChild(td);
    });

    body.appendChild(tr);

    // 그 날이 일요일이거나, 이번 달의 마지막 날이면 -> 그 주의 "주간정리" 줄을 바로 아래에 추가
    const isLastDayOfWeek = dowIdx === 6;
    const isLastDayOfMonth = d === totalDays;
    if(isLastDayOfWeek || isLastDayOfMonth){
      appendSummaryRow(weekStartOfCurrentRun);
      weekStartOfCurrentRun = null;
    }
  }

  // 앱을 맨 처음 열었을 때 딱 한 번만, "오늘" 날짜 줄이 화면 가운데 오도록 자동 스크롤
  if(!didInitialScroll){
    didInitialScroll = true;
    setTimeout(() => {
      const todayStr = toDateStr(TODAY);
      const row = body.querySelector(`tr[data-date="${todayStr}"]`);
      if(row) row.scrollIntoView({ block:'center', behavior:'auto' });
    }, 30);
  }
}

// 한 주(週) 동안의 업무 내용을 바탕으로 "자동 요약 글자"를 만들어내는 함수.
// 예: "총 5건 입력 · 평균 진행률 42% · 연차/휴가 1일"
function computeAutoSummary(empId, weekStartDate){
  let count = 0;          // 이번 주에 입력된 전체 항목 개수
  let progressSum = 0;    // 진행률이 입력된 항목들의 진행률 합계 (평균 계산용)
  let progressCount = 0;  // 진행률이 입력된 항목의 개수
  let leaveDays = 0;      // 연차/휴가 단어가 포함된 날짜의 개수
  for(let i=0;i<7;i++){
    const dateStr = toDateStr(addDays(weekStartDate, i));
    const items = logsByEmpDate[`${empId}_${dateStr}`] || [];
    count += items.length;
    let dayHasLeave = false;
    items.forEach(it => {
      if(it.progress !== null && it.progress !== undefined){
        progressSum += it.progress; progressCount++;
      }
      if(containsLeaveKeyword(it.content)) dayHasLeave = true;
    });
    if(dayHasLeave) leaveDays++;
  }
  if(count === 0) return '이번 주 입력된 항목이 없습니다.';
  let text = `총 ${count}건 입력`;
  if(progressCount > 0){
    text += ` · 평균 진행률 ${Math.round(progressSum/progressCount)}%`;
  }
  if(leaveDays > 0){
    text += ` · 연차/휴가 ${leaveDays}일`;
  }
  return text;
}

// 주간정리 칸 하나의 내용을 화면에 그리는 함수.
// - 사람이 직접 쓴 글(is_manual=true)이 있으면 그 글을,
// - 없으면 computeAutoSummary()가 계산한 자동 요약 글을 보여줌.
function renderSummaryCell(td, emp, weekStartStr){
  const weekStartDate = new Date(weekStartStr + 'T00:00:00');
  const key = `${emp.id}_${weekStartStr}`;
  const existing = summariesByEmp[key];
  const isManual = existing && existing.is_manual && existing.summary_text;
  const text = isManual ? existing.summary_text : computeAutoSummary(emp.id, weekStartDate);

  // class="summary-text" 부분이 실제 글자 스타일(위쪽 CSS의 .summary-text 규칙)을 담당함.
  // 자동 요약이면 추가로 "auto" class가 붙어서 글자색이 더 흐리게 표시됨 (.summary-text.auto)
  td.innerHTML = `
    <div class="summary-text ${isManual ? '' : 'auto'}">${escapeHtml(text)}</div>
    <button class="summary-edit-btn" data-emp="${emp.id}">${isManual ? '수정' : '직접 작성'}</button>
    ${isManual ? `<button class="summary-edit-btn" data-emp="${emp.id}" data-reset="1" style="margin-left:8px;">자동요약으로 되돌리기</button>` : ''}
  `;
  td.querySelectorAll('.summary-edit-btn').forEach(btn => {
    btn.addEventListener('click', (e) => {
      e.stopPropagation();
      if(btn.dataset.reset){
        resetSummaryToAuto(emp.id, weekStartStr, td);
      } else {
        editSummaryInline(emp, td, weekStartStr);
      }
    });
  });
}

// 주간정리 칸을 "직접 입력할 수 있는 상태"(textarea)로 바꿔주는 함수
function editSummaryInline(emp, td, weekStartStr){
  const weekStartDate = new Date(weekStartStr + 'T00:00:00');
  const key = `${emp.id}_${weekStartStr}`;
  const existing = summariesByEmp[key];
  const startVal = (existing && existing.is_manual) ? existing.summary_text : '';
  td.innerHTML = `
    <textarea class="summary-textarea" placeholder="${escapeHtml(computeAutoSummary(emp.id, weekStartDate))}">${escapeHtml(startVal)}</textarea>
    <div class="summary-actions">
      <button class="cancel-sum">취소</button>
      <button class="primary save-sum">저장</button>
    </div>
  `;
  const textarea = td.querySelector('textarea');
  textarea.focus();
  td.querySelector('.cancel-sum').addEventListener('click', () => renderSummaryCell(td, emp, weekStartStr));
  td.querySelector('.save-sum').addEventListener('click', async () => {
    const val = textarea.value.trim();
    await saveSummary(emp.id, weekStartStr, val);
    renderSummaryCell(td, emp, weekStartStr);
  });
}

// 사람이 직접 쓴 주간정리 내용을 Supabase에 저장함 (이미 있으면 덮어쓰기 = upsert)
async function saveSummary(empId, weekStartStr, text){
  const payload = {
    employee_id: empId,
    week_start: weekStartStr,
    summary_text: text || null,
    is_manual: !!text,
    updated_at: new Date().toISOString()
  };
  try {
    const rows = await sb(
      'weekly_summaries?on_conflict=employee_id,week_start',
      'POST',
      payload,
      { 'Prefer': 'resolution=merge-duplicates,return=representation' }
    );
    summariesByEmp[`${empId}_${weekStartStr}`] = rows[0];
    showToast('주간정리를 저장했습니다');
  } catch(e){ console.error(e); showToast('주간정리 저장 실패'); }
}

// 사람이 직접 쓴 주간정리를 지우고, 다시 "자동 계산 요약"으로 되돌리는 함수
async function resetSummaryToAuto(empId, weekStartStr, td){
  try {
    await sb(`weekly_summaries?employee_id=eq.${empId}&week_start=eq.${weekStartStr}`, 'DELETE');
    delete summariesByEmp[`${empId}_${weekStartStr}`];
    const emp = employees.find(e => e.id === empId);
    renderSummaryCell(td, emp, weekStartStr);
    showToast('자동 요약으로 되돌렸습니다');
  } catch(e){ console.error(e); showToast('되돌리기 실패'); }
}

// 사람이 입력한 글자 중에 <, >, &, " 같은 특수문자가 있어도 화면이 깨지지 않도록 안전하게 바꿔주는 함수
function escapeHtml(str){
  if(str === null || str === undefined) return '';
  return String(str)
    .replaceAll('&','&amp;').replaceAll('<','&lt;').replaceAll('>','&gt;')
    .replaceAll('"','&quot;');
}

/* ============================================================
   팝업(모달) 공통 함수
   - 규칙 1: 팝업 바깥의 어두운 배경을 클릭해도 팝업이 닫히지 않음 (실수로 내용을 날리지 않도록)
             -> 오직 "✕" 버튼이나 "취소" 버튼을 눌러야만 닫힘
   - 규칙 2: 입력창 안에서 Enter 키를 누르면, 그 팝업의 파란색 주요 버튼(예: "저장")이 자동으로 눌림
             (단, 여러 줄 입력이 필요한 textarea 안에서는 Enter가 그냥 줄바꿈으로 동작함)
   ============================================================ */
function openModal({ title, bodyHtml, footerHtml, onMount }){
  const root = document.getElementById('modalRoot');
  // 아래 class 이름(modal-overlay / modal-panel / modal-header 등)들이
  // 각각 위쪽 CSS의 같은 이름 규칙과 연결되어 팝업의 생김새를 결정함
  root.innerHTML = `
    <div class="modal-overlay" id="modalOverlay">
      <div class="modal-panel">
        <div class="modal-header">
          <h3>${title}</h3>
          <button class="modal-close" id="modalCloseBtn">✕</button>
        </div>
        <div class="modal-body" id="modalBody">${bodyHtml}</div>
        ${footerHtml ? `<div class="modal-footer">${footerHtml}</div>` : ''}
      </div>
    </div>
  `;
  const close = () => { root.innerHTML = ''; }; // 팝업을 닫는 방법 = 담아뒀던 내용을 통째로 비우는 것
  const overlay = document.getElementById('modalOverlay');
  document.getElementById('modalCloseBtn').addEventListener('click', close);
  // 오버레이(어두운 바깥 배경)를 클릭했을 때 닫는 코드는 "일부러" 넣지 않았음
  // -> 그래서 바깥을 클릭해도 팝업이 안 닫히는 것임
  overlay.addEventListener('keydown', (e) => {
    if(e.key !== 'Enter') return;
    const tag = e.target.tagName;
    if(tag === 'TEXTAREA' || tag === 'BUTTON') return; // textarea에서는 줄바꿈 허용, 버튼은 자체 동작 유지
    e.preventDefault();
    const primaryBtn = overlay.querySelector('.modal-footer .btn.primary');
    if(primaryBtn) primaryBtn.click(); // Enter 키 = 파란색 주요 버튼 클릭과 동일하게 처리
  });
  if(onMount) onMount(close); // 팝업이 화면에 뜬 직후 실행할 코드(버튼 이벤트 연결 등)를 실행
  return close;
}

/* ============================================================
   모달: 하루 업무 상세 (날짜 칸을 클릭하면 뜨는 팝업)
   ============================================================ */
function openDayModal(emp, date){
  const dateStr = toDateStr(date);
  const key = `${emp.id}_${dateStr}`;
  // 기존 데이터를 그대로 수정하지 않도록 "복사본"을 만들어서 편집용으로 사용
  // (팝업에서 "취소"를 누르면 이 복사본은 버려지고, 원래 데이터는 그대로 유지됨)
  let items = JSON.parse(JSON.stringify(logsByEmpDate[key] || []));
  if(items.length === 0){
    // 항목이 하나도 없으면, 버튼을 또 누를 필요 없이 바로 빈 입력창을 하나 보여줌
    items.push({ content: '', progress: null, _isNew: true });
  }

  const dowLabel = DOW_LABELS[(date.getDay()+6)%7];
  const title = `${emp.name} · ${date.getMonth()+1}.${date.getDate()}(${dowLabel})`; // 팝업 맨 위 제목 글자

  // 항목 목록(item-row들)을 HTML 글자로 만들어주는 함수
  function itemsHtml(){
    if(items.length === 0){
      return `<div class="hint-text" style="margin-bottom:10px;">아직 입력된 항목이 없습니다.</div>`;
    }
    return items.map((it, idx) => `
      <div class="item-row" data-idx="${idx}">
        <button class="item-remove" data-remove="${idx}" title="삭제">✕</button>
        <div class="field">
          <label>내용</label>
          <textarea data-field="content" data-idx="${idx}">${escapeHtml(it.content)}</textarea>
        </div>
        <div class="field" style="max-width:120px;">
          <label>진행률 (%)</label>
          <input type="number" min="0" max="100" data-field="progress" data-idx="${idx}"
                 value="${it.progress ?? ''}" placeholder="선택입력" />
        </div>
      </div>
    `).join('');
  }

  const close = openModal({
    title,
    bodyHtml: `
      <div id="itemsContainer">${itemsHtml()}</div>
      <button class="add-item-btn" id="addItemBtn">+ 항목 추가</button>
      <div class="hint-text">내용에 "연차 / 휴가 / 반차"가 포함되면 해당 날짜 칸이 자동으로 표시됩니다.</div>
    `,
    footerHtml: `
      <button class="btn" id="cancelDayBtn">취소</button>
      <button class="btn primary" id="saveDayBtn">저장</button>
    `,
    onMount: (close) => {
      bindItemEvents();
      document.getElementById('addItemBtn').addEventListener('click', () => {
        items.push({ content: '', progress: null, _isNew: true });
        refreshItemsContainer();
      });
      document.getElementById('cancelDayBtn').addEventListener('click', close);
      document.getElementById('saveDayBtn').addEventListener('click', async () => {
        await persistDay();
        close();
      });
    }
  });

  // 항목 입력창(내용/진행률)에 글자를 입력하거나, 삭제 버튼을 누를 때 반응하도록 이벤트를 연결
  function bindItemEvents(){
    document.querySelectorAll('[data-field="content"]').forEach(el => {
      el.addEventListener('input', () => { items[el.dataset.idx].content = el.value; });
    });
    document.querySelectorAll('[data-field="progress"]').forEach(el => {
      el.addEventListener('input', () => {
        const v = el.value === '' ? null : Math.max(0, Math.min(100, Number(el.value))); // 0~100 사이로만 값을 제한
        items[el.dataset.idx].progress = v;
      });
    });
    document.querySelectorAll('[data-remove]').forEach(el => {
      el.addEventListener('click', () => {
        // [기능] 항목 삭제: 배열에서 해당 항목을 지우고 화면을 다시 그림
        items.splice(Number(el.dataset.remove), 1);
        refreshItemsContainer();
      });
    });
  }

  // 항목을 추가/삭제했을 때, 항목 목록 부분만 새로 그리고 이벤트를 다시 연결
  function refreshItemsContainer() {
    document.getElementById('itemsContainer').innerHTML = itemsHtml();
    bindItemEvents();
  }

  // [기능] "저장" 버튼을 눌렀을 때: 해당 인원/날짜의 기존 항목을 전부 지우고, 새 목록을 다시 저장함
  // (가장 단순하고 안전한 방식 - 항목이 몇 개든 통째로 지웠다가 다시 넣음)
  async function persistDay() {
    const validItems = items.filter(it => it.content.trim() !== ''); // 내용이 빈 항목은 저장하지 않음
    try {
      await sb(`work_logs?employee_id=eq.${emp.id}&log_date=eq.${dateStr}`, 'DELETE'); // 기존 항목 전체 삭제

      if (validItems.length > 0) {
        const payload = validItems.map((it, i) => ({
          employee_id: emp.id,
          log_date: dateStr,
          content: it.content.trim(),
          progress: it.progress,
          sort_order: i // 이 순서 번호가 주간정리 등에서 "몇 번째 항목인지" 판단하는 기준이 됨
        }));
        await sb('work_logs', 'POST', payload); // 새 항목들을 한꺼번에 저장
      }

      // 서버뿐 아니라 화면이 참고하는 메모리 상의 데이터도 갱신
      logsByEmpDate[key] = validItems.length > 0 ? validItems : null;
      render();
      showToast('저장되었습니다.');
    } catch(e) {
      console.error(e);
      showToast('저장 실패');
    }
  }
}

/* ============================================================
   모달: 인원 관리 (이름/직급 수정 및 삭제) - 인원 이름 옆 "⋯" 버튼을 누르면 뜨는 팝업
   ============================================================ */
function openEmployeeMenu(emp) {
  openModal({
    title: '인원 관리',
    bodyHtml: `
      <div class="field">
        <label>이름</label>
        <input type="text" id="empNameEdit" value="${escapeHtml(emp.name)}" />
      </div>
      <div class="field">
        <label>직책</label>
        <input type="text" id="empPosEdit" value="${escapeHtml(emp.position || '')}" />
      </div>
    `,
    footerHtml: `
      <button class="btn danger" id="deleteEmpBtn" style="margin-right:auto;">삭제</button>
      <button class="btn" id="cancelEmpBtn">취소</button>
      <button class="btn primary" id="saveEmpBtn">저장</button>
    `,
    onMount: (close) => {
      document.getElementById('cancelEmpBtn').addEventListener('click', close);
      document.getElementById('saveEmpBtn').addEventListener('click', async () => {
        const name = document.getElementById('empNameEdit').value.trim();
        const pos = document.getElementById('empPosEdit').value.trim();
        if (!name) return showToast('이름을 입력하세요');
        try {
          await sb(`employees?id=eq.${emp.id}`, 'PATCH', { name, position: pos });
          await refreshAll();
          close();
        } catch(e) { console.error(e); showToast('저장 실패'); }
      });
      document.getElementById('deleteEmpBtn').addEventListener('click', async () => {
        if(!confirm('정말 삭제하시겠습니까?')) return; // 브라우저 기본 확인창으로 한 번 더 확인
        try {
          await sb(`employees?id=eq.${emp.id}`, 'DELETE');
          await refreshAll();
          close();
        } catch(e) { console.error(e); showToast('삭제 실패'); }
      });
    }
  });
}

/* ============================================================
   앱이 처음 켜졌을 때 실행되는 초기화 코드 + 각종 버튼 클릭 이벤트 연결
   ============================================================ */
document.addEventListener('DOMContentLoaded', () => {
  // 연도 이동 버튼(« / »)
  document.getElementById('prevYearBtn').addEventListener('click', () => { currentYear--; refreshAll(); });
  document.getElementById('nextYearBtn').addEventListener('click', () => { currentYear++; refreshAll(); });
  // 월 이동 버튼(‹ / ›) - 1월에서 이전으로 가면 작년 12월로, 12월에서 다음으로 가면 내년 1월로 자동 이동
  document.getElementById('prevMonthBtn').addEventListener('click', () => {
    currentMonth--;
    if(currentMonth < 1) { currentMonth = 12; currentYear--; }
    refreshAll();
  });
  document.getElementById('nextMonthBtn').addEventListener('click', () => {
    currentMonth++;
    if(currentMonth > 12) { currentMonth = 1; currentYear++; }
    refreshAll();
  });
  // "오늘" 버튼 - 오늘이 속한 연/월로 즉시 이동
  document.getElementById('todayBtn').addEventListener('click', () => {
    currentYear = TODAY.getFullYear();
    currentMonth = TODAY.getMonth() + 1;
    refreshAll();
  });

  // "+ 인원 추가" 버튼을 눌렀을 때 뜨는 팝업
  document.getElementById('addEmployeeBtn').addEventListener('click', () => {
    openModal({
      title: '인원 추가',
      bodyHtml: `
        <div class="field">
          <label>이름</label>
          <input type="text" id="newEmpName" placeholder="홍길동" />
        </div>
        <div class="field">
          <label>직책</label>
          <input type="text" id="newEmpPos" placeholder="연구원" />
        </div>
      `,
      footerHtml: `
        <button class="btn" id="cancelAddEmpBtn">취소</button>
        <button class="btn primary" id="saveAddEmpBtn">추가</button>
      `,
      onMount: (close) => {
        document.getElementById('cancelAddEmpBtn').addEventListener('click', close);
        document.getElementById('saveAddEmpBtn').addEventListener('click', async () => {
          const name = document.getElementById('newEmpName').value.trim();
          const pos = document.getElementById('newEmpPos').value.trim();
          if (!name) return showToast('이름을 입력하세요');
          try {
            await sb('employees', 'POST', { name, position: pos, sort_order: employees.length, active: true });
            await refreshAll();
            close();
          } catch(e) { console.error(e); showToast('추가 실패'); }
        });
      }
    });
  });

  // 앱이 켜지자마자 딱 한 번, 서버에서 데이터를 불러와 화면을 처음으로 그림
  refreshAll();
});
</script>
</body>
</html>
