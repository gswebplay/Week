/* ============================================================
   요약 카드 숫자 업데이트
============================================================ */
function updateSummary(){
  const c={done:0,ing:0,hold:0,cont:0,req:0};
  taskData.forEach(t=>{
    const s=(t.status||'').toLowerCase();
    if(s.includes('완료'))       c.done++;
    else if(s.includes('진행중')) c.ing++;
    else if(s.includes('보류'))  c.hold++;
    else if(s.includes('지속'))  c.cont++;
    else if(s.includes('요청'))  c.req++;
  });
  document.getElementById('cnt-done').textContent=c.done;
  document.getElementById('cnt-ing').textContent=c.ing;
  document.getElementById('cnt-hold').textContent=c.hold;
  document.getElementById('cnt-cont').textContent=c.cont;
  document.getElementById('cnt-req').textContent=c.req;
  document.getElementById('cnt-all').textContent=taskData.length;
  /* 카운트 숫자가 바뀌면 "완료" 버튼 폭도 바뀌므로, 정렬을 다음 프레임에 다시 계산 */
  requestAnimationFrame(alignFilterSelToDone);
}

/* 검색창 폭을 조정해서 "전체 담당자" 드롭다운의 시작 위치가
   "완료" 버튼 왼쪽 끝과 맞춰지도록 함 (상태 필터 줄과 툴바 줄의 시각적 정렬용) */
function alignFilterSelToDone(){
  const doneBtn = document.getElementById('flt-done');
  const search = document.getElementById('taskSearch');
  const fLead = document.getElementById('fLead');
  if(!doneBtn || !search || !fLead) return;
  /* ★ 태블릿·모바일(768px 이하)에서는 상태 버튼이 두 줄로 접히므로
     "완료" 버튼 위치에 맞추면 엉뚱한 폭이 나옵니다.
     이 구간에서는 인라인 폭을 지우고 CSS(flex:1)에 맡깁니다. */
  if(window.innerWidth <= 768){ search.style.width = ''; return; }
  const doneRect = doneBtn.getBoundingClientRect();
  const searchRect = search.getBoundingClientRect();
  const gap = 8;   /* .toolbar-left gap 값과 동일 */
  const targetWidth = Math.round(doneRect.left - searchRect.left - gap);
  if(targetWidth > 200){   /* 화면이 너무 좁을 때 검색창이 과하게 줄어드는 것 방지 */
    search.style.width = targetWidth + 'px';
  }
}
window.addEventListener('resize', () => requestAnimationFrame(alignFilterSelToDone));

/* ============================================================
   정렬 함수
   컬럼 헤더 클릭 시 호출됨
   같은 컬럼 두 번 클릭하면 방향 반전
============================================================ */
function sortBy(col){
  if(sortCol===col) sortDir = sortDir==='asc'?'desc':'asc';
  else { sortCol=col; sortDir='asc'; }
  renderTask();
}

/* ============================================================
   데이터 정렬 로직
============================================================ */
function sortedData(data){
  return [...data].sort((a,b)=>{
    let va, vb;
    if(sortCol==='status'){
      // 상태는 커스텀 순서(STATUS_ORDER)로 정렬
      va = STATUS_ORDER[a.status] || 99;
      vb = STATUS_ORDER[b.status] || 99;
    } else {
      va = a[sortCol] || '';
      vb = b[sortCol] || '';
    }
    if(va<vb) return sortDir==='asc'?-1:1;
    if(va>vb) return sortDir==='asc'?1:-1;
    return 0;
  });
}

/* ============================================================
   정렬 표시 아이콘 생성
   현재 정렬 중인 컬럼에만 화살표 표시
============================================================ */
function sortIcon(col){
  if(sortCol!==col) return '';   /* ⇅ 제거 — 정렬 안 된 컬럼엔 아무 기호도 표시 안 함 */
  return sortDir==='asc'
    ? ' <span style="color:var(--blueprint);font-size:10px">▲</span>'
    : ' <span style="color:var(--blueprint);font-size:10px">▼</span>';
}

/* ============================================================
   업무 테이블 렌더링 (엑셀 스타일 인라인 편집)

   동작 방식:
   - 기본: 뷰 모드 (텍스트/뱃지 표시)
   - 셀 클릭: 해당 셀만 편집 컨트롤로 전환
   - 행 밖 클릭 / Enter: 자동 저장
   - 헤더 클릭: 해당 컬럼 기준 정렬
============================================================ */
function renderTask(){
  /* DOM 요소가 없으면 조용히 종료 (탭 전환 전 호출 시 방어) */
  const wrap = document.getElementById('taskTableWrap');
  if(!wrap) return;

  const search=((document.getElementById('taskSearch')||{value:''}).value||'').toLowerCase();
  const fSt = activeStatusFilter;
  const fLd=((document.getElementById('fLead')||{value:''}).value||'');

  // 필터 적용
  let filtered=taskData.filter(t=>{
    const ms=!search||(t.title||'').toLowerCase().includes(search)
      ||(t.lead||'').toLowerCase().includes(search)
      ||(t.location||'').toLowerCase().includes(search)
      ||(t.sub||'').toLowerCase().includes(search)
      ||(t.sales||'').toLowerCase().includes(search);
    const mst=!fSt||(t.status||'').toLowerCase().includes(fSt.toLowerCase());
    const mld=!fLd||t.lead===fLd;
    return ms&&mst&&mld;
  });

  // 정렬 적용
  filtered = sortedData(filtered);

  /* ------------------------------------------------------------
     COL_DEFS 전역 변수에서 현재 컬럼 순서를 가져옵니다.
     드래그앤드롭으로 순서가 바뀌면 COL_DEFS도 함께 바뀝니다.
     localStorage에 저장된 순서가 있으면 그걸로 복원합니다.
  ------------------------------------------------------------ */
  const cols = COL_DEFS;

  /* ---- 표 맨 위 "+ 업무 추가" 가로 전체 버튼 ----
     thead 안에 td colspan 으로 넣어서 표 폭 전체를 차지하게 함 */
  const addBtnRow =
    '<tr><td colspan="'+cols.length+'" style="padding:0;border:none">'
    +'<div class="add-row-btn-wrap">'
    +'<button class="add-row-btn" onclick="quickAddTask()">'
    +'<svg width="13" height="13" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5">'
    +'<line x1="12" y1="5" x2="12" y2="19"/><line x1="5" y1="12" x2="19" y2="12"/></svg>'
    +'업무 추가</button></div></td></tr>';

  /* 조건에 맞는 게 없어도 "추가" 버튼은 보여야 하므로 표는 항상 그립니다 */
  if(!filtered.length){
    wrap.innerHTML=
      '<table><thead>'+addBtnRow+'</thead></table>'
      +'<div class="empty-msg">📭 조건에 맞는 업무가 없습니다.</div>';
    return;
  }

  let html='<table><thead>'+addBtnRow+'<tr>';
  cols.forEach(([label,key,w,optType])=>{
    /* ⚙ 버튼: 그 컬럼의 선택지를 추가/삭제/색상변경/순서변경 */
    const gear = optType
      ? ' <button class="gear-btn" onclick="event.stopPropagation();openOptModal(\'' + optType + '\')" title="'+OPT_TITLE[optType]+' 옵션 관리">⚙</button>'
      : '';
    if(key){
      /* ★ onclick 대신 data-sort-key 속성으로 정렬키를 기록합니다.
         실제 클릭 이벤트는 initColResize() 안에서 addEventListener로 붙입니다.
         이렇게 해야 리사이즈 핸들 드래그 중에 정렬이 실수로 실행되는 걸 막을 수 있습니다. */
      html+='<th style="width:'+w+'px;cursor:pointer" data-sort-key="'+key+'">'
        +label+sortIcon(key)+gear+'</th>';
    } else {
      html+='<th style="width:'+w+'px">'+label+gear+'</th>';
    }
  });
  html+='</tr></thead><tbody>';

  /* 상태 그룹 구분선: 정렬이 status일 때 상태값이 바뀌는 첫 행에 .status-group-top 추가 */
  const isSortedByStatus = (sortCol === 'status');

  filtered.forEach((t, idx)=>{
    const id = t.id;
    const ddayVal=(t.dday!==null&&t.dday!==undefined&&t.dday!==-33015)?t.dday:null;
    const ddayTxt=ddayVal===null?'-':ddayVal>=0?'D+'+ddayVal:'D'+ddayVal;
    const ddayStyle=ddayVal!==null&&ddayVal>=0&&ddayVal<=7?'color:#D48806;font-weight:700':
                    ddayVal!==null&&ddayVal<0&&(t.status||'').includes('진행')?'color:var(--danger);font-weight:700':'';

    /* ★ 파생값 4개 — DB 저장값 무시하고 날짜 컬럼 기준 실시간 계산
       워크타임  = 종료일 - 시작일 (영업일, 주말 제외)
       리드타임  = 요청마감 - 요청일 (영업일, 주말 제외)
       세이브타임 = 리드타임 - 워크타임
       D-day    = 요청마감 - 오늘 (달력 일수, 마감까지 남은 날) */

    /* 영업일 계산 — 시작일 포함, 종료일도 포함 (당일 = 1일)
       토/일 + HOLIDAYS Set에 등록된 공휴일 제외
       시작 > 종료(역순 입력)이면 null 반환 → '-' 표시 */
    const diffBizDays = (a, b) => {
      if(!a || !b) return null;
      let start = new Date(a + 'T00:00:00Z');
      const end  = new Date(b + 'T00:00:00Z');
      if(start > end) return null;   /* 역순이면 null (잘못된 입력) */
      let count = 0;
      while(start <= end){
        const dow = start.getUTCDay();
        const ds  = start.toISOString().slice(0,10);
        /* 토(6)/일(0) 이 아니고, 등록된 공휴일도 아닌 날만 카운트 */
        if(dow !== 0 && dow !== 6 && !HOLIDAYS.has(ds)) count++;
        start.setUTCDate(start.getUTCDate() + 1);
      }
      return count;
    };

    /* D-day는 달력 일수 그대로 (주말 포함, 남은 날 체감 기준) */
    const diffDays = (a, b) => {
      if(!a || !b) return null;
      const da = new Date(a + 'T00:00:00Z');
      const db = new Date(b + 'T00:00:00Z');
      return Math.round((db - da) / 86400000);
    };

    const wt = diffBizDays(t.start_date,   t.end_date);        /* 워크타임 (영업일) */
    const lt = diffBizDays(t.request_date, t.deadline);        /* 리드타임 (영업일) */
    const st = (lt !== null && wt !== null) ? lt - wt : null;  /* 세이브타임 */

    /* D-day: 오늘(로컬 날짜) 기준으로 요청마감까지 남은 달력 일수 */
    const todayStr = new Date().toLocaleDateString('sv-SE');
    const dday = t.deadline ? diffDays(todayStr, t.deadline) : null;
    const ddayCalcTxt = dday === null ? '-'
                      : dday === 0   ? 'D-day'
                      : dday > 0     ? 'D-' + dday
                      :                '-';   /* 마감 지난 D+는 표시 안 함 */
    const ddayCalcStyle = dday !== null && dday >= 0 && dday <= 7
                          ? 'color:#D48806;font-weight:700' : '';

    /* 상태 기준 정렬 중일 때: 이전 행과 상태가 다르면 구분선 클래스 추가 (첫 행 제외) */
    const isGroupTop = isSortedByStatus && idx > 0 && (filtered[idx-1].status || '') !== (t.status || '');
    const trCls = isGroupTop ? ' status-group-top' : '';

    html+='<tr id="row-'+id+'" class="'+trCls+'">';

    /* ---- COL_DEFS 순서대로 td를 동적으로 생성합니다 ----
       드래그앤드롭으로 컬럼 순서가 바뀌어도 이 루프가 그 순서를 따릅니다 */
    cols.forEach(([label, key])=>{
      switch(key || label){
        /* 드롭다운 셀들 */
        case 'status':    html+=tdDropdown(id,'status',   t.status,   'center'); break;
        case 'lead':      html+=tdDropdown(id,'lead',     t.lead,     'center'); break;
        case 'sub':       html+=tdSubCell(id, t.sub); break;  /* 복수선택 전용 셀 */
        case 'sales':     html+=tdDropdown(id,'sales',    t.sales,    'center'); break;
        case 'category':  html+=tdDropdown(id,'category', t.category, 'center'); break;
        /* 텍스트 직접입력 셀 */
        case 'title':     html+=tdText(id,'title',    t.title,    '업무내용 입력'); break;
        case 'location':  html+=tdText(id,'location', t.location, '출고지');       break;
        /* 날짜 셀 */
        case 'request_date': html+=tdDate(id,'request_date', t.request_date); break;
        case 'deadline':     html+=tdDate(id,'deadline',     t.deadline);     break;
        case 'start_date':   html+=tdDate(id,'start_date',   t.start_date);   break;
        case 'end_date':     html+=tdDate(id,'end_date',     t.end_date);     break;
        /* 읽기전용 파생값 */
        case 'dday':
          html+='<td><div class="c-box" style="justify-content:center;font-size:12px;'+ddayCalcStyle+'">'+ddayCalcTxt+'</div></td>'; break;
        case 'lead_time':
          html+='<td><div class="dval">'+(lt!==null?lt+'일':'-')+'</div></td>'; break;
        case 'work_time':
          html+='<td><div class="dval">'+(wt!==null?wt+'일':'-')+'</div></td>'; break;
        case 'save_time':
          html+='<td><div class="dval '+(st===null?'':(st>=0?'save-pos':'save-neg'))+'">'+(st!==null?st+'일':'-')+'</div></td>'; break;
        /* 진행상태 (모델링/제작도/매뉴얼 3줄) */
        case '진행상태':
          html+='<td><div class="prog-group">'
            + progRow(id,'modeling','모델링', t.modeling)
            + progRow(id,'drawing', '제작도', t.drawing)
            + progRow(id,'manual',  '매뉴얼', t.manual)
            + '</div></td>'; break;
        /* 강도 토글 */
        case 'intensity':
          html+='<td>'+togGroup(id,'intensity','intensity',t.intensity)+'</td>'; break;
        /* 삭제 버튼 */
        case '삭제':
          html+='<td style="padding:5px 6px;text-align:center">'
            +'<button class="btn-row-del" onclick="deleteTask(\''+id+'\')">🗑</button>'
            +'</td>'; break;
        default:
          html+='<td></td>';
      }
    });

    html+='</tr>';
  });

  html+='</tbody></table>';
  wrap.innerHTML=html;

  /* 표를 새로 그렸으니 컬럼 폭 조절 손잡이도 다시 붙임 */
  initColResize();
}

/* ============================================================
   ★ 셀 생성 헬퍼들 ★
   행 전체가 아니라 "셀 하나"만 편집되도록 만드는 부품들입니다.
============================================================ */

/* ---- 글자 입력 셀 ----
   contenteditable="true" → 클릭하면 그 자리에서 바로 타이핑
   onblur(칸 밖 클릭) 시 자동 저장 */
function tdText(id, field, value, placeholder){
  return '<td><div class="c-box"><div class="c-text" contenteditable="true"'
    +' data-ph="'+placeholder+'"'
    +' title="'+esc(value)+'"'
    +' onblur="saveField(\''+id+'\',\''+field+'\',this.innerText.trim())"'
    +' onkeydown="textCellKey(event,this)"'
    +'>'+esc(value)+'</div></div></td>';
}

/* 글자 셀에서 Enter=저장(줄바꿈 방지), Esc=취소 */
function textCellKey(e, el){
  if(e.key==='Enter'){ e.preventDefault(); el.blur(); }
  if(e.key==='Escape'){ e.preventDefault(); renderTask(); }
}

/* ---- 날짜 입력 셀 ---- */
function tdDate(id, field, value){
  return '<td><div class="c-box" style="justify-content:center">'
    +'<input type="date" class="c-date" value="'+(value||'')+'"'
    +' onchange="saveField(\''+id+'\',\''+field+'\',this.value||null)">'
    +'</div></td>';
}

/* ---- 드롭다운 셀 (상태/담당자/영업/분류) ----
   평소엔 뱃지만 보이다가, 클릭하면 팝업이 뜹니다.
   ★ 팝업은 표 밖(body)에 fixed로 뜨므로 절대 잘리지 않습니다 */
function tdDropdown(id, field, value, align='left'){
  const type = field;                 /* 필드명 = 옵션 종류명 (동일하게 맞춰둠) */
  const c = optColor(type, value);
  const l = value ? optLabel(type, value) : '-';
  const badge = value
    ? '<span class="badge" style="background:'+c.bg+';color:'+c.fg+'">'+esc(l)+'</span>'
    : '<span style="color:#CCC">-</span>';
  return '<td><div class="c-box" style="justify-content:'+align+'">'
    +'<span class="dd-btn" onclick="openDD(event,\''+id+'\',\''+field+'\')">'+badge+'</span>'
    +'</div></td>';
}


/* ---- 보조담당자 전용 셀 ----
   ★ 주담당자(tdDropdown)와 완전히 동일한 1줄 구조
   여러 명이어도 뱃지를 가로로 나란히 표시 (줄바꿈 없음 → 행 높이 항상 동일)
   이름이 많아 칸 폭을 넘치면 잘려 보임 — 컬럼 경계를 끌어 넓히면 다 보임 */
function tdSubCell(id, value){
  const names = value ? value.split(',').map(s=>s.trim()).filter(Boolean) : [];

  const inner = names.length
    ? names.map(n=>{
        const c = optColor('sub', n);
        return '<span class="badge" style="font-size:11px;background:'+c.bg+';color:'+c.fg+'">'+esc(n)+'</span>';
      }).join('')
    : '<span style="color:#CCC">-</span>';

  /* ▾ 화살표를 td 오른쪽 끝 + 수직 중앙에 absolute로 고정
     뱃지가 1줄이든 3줄이든 항상 셀 높이 기준 중앙에 위치함 */
  return '<td style="position:relative;padding-right:16px">'
    +'<div class="c-box" style="justify-content:center;align-items:flex-start;flex-wrap:wrap;gap:3px;padding:5px 8px;min-height:38px;cursor:pointer" onclick="openDD(event,\''+id+'\',\'sub\')">'
    +inner
    +'</div>'
    +'<span style="position:absolute;right:4px;top:50%;transform:translateY(-50%);font-size:9px;color:var(--muted);pointer-events:none">▾</span>'
    +'</td>';
}

/* ---- 토글 버튼 그룹 ----
   선택지를 전부 나열하고, 지금 값인 것만 색이 켜집니다. */
function togGroup(id, field, type, value, extraStyle=''){
  let h='<div class="tog-group" style="'+extraStyle+'">';
  (OPTIONS[type]||[]).forEach(o=>{
    const on = (value === o.value);
    /* 켜진 버튼만 DB에 저장된 색을 입힘 */
    const st = on ? 'background:'+o.color_bg+';color:'+o.color_fg+';border-color:'+o.color_bg+';' : '';
    h+='<span class="tog'+(on?' on':'')+'" style="'+st+'"'
      +' onclick="saveField(\''+id+'\',\''+field+'\',\''+esc(o.value).replace(/'/g,"\\'")+'\')">'
      +esc(o.label||o.value)+'</span>';
  });
  return h+'</div>';
}

/* ---- 진행상태 한 줄 (라벨 + 토글버튼들) ---- */
function progRow(id, field, label, value){
  return '<div class="prog-row"><span class="prog-lbl">'+label+'</span>'
    + togGroup(id, field, 'prog', value, 'padding:0;gap:2px;')
    + '</div>';
}

/* ============================================================
   ★ 셀 하나만 저장 (PATCH) ★
   예전엔 행 전체를 한꺼번에 저장했지만, 이제 바뀐 칸 하나만 저장합니다.
   id: 행 UUID / field: 컬럼명 / value: 새 값
============================================================ */
async function saveField(id, field, value){
  const row = taskData.find(x=>x.id===id);
  if(!row) return;
  const newVal = (value === '' ? null : value);
  if(row[field] === newVal) return;            /* 안 바뀌었으면 저장 안 함 */

  setSyncStatus('loading','저장중...');
  try{
    const res = await fetch(SB_URL+'/rest/v1/task_schedule?id=eq.'+id,
      {method:'PATCH', headers:H, body:JSON.stringify({[field]:newVal})});
    if(!res.ok) throw new Error(await res.text());

    /* 로컬 캐시 즉시 반영 → 새로고침 없이 화면에 바로 적용 */
    row[field] = newVal;

    renderTask();
    updateSummary();
    setSyncStatus('ok','연결됨');
  } catch(e){
    setSyncStatus('error','오류');
    toast('❌ 저장 실패: '+e.message);
  }
}

/* ============================================================
   ★ 표 맨 위 "+ 업무 추가" — 빈 행을 바로 추가 ★
   모달 없이 즉시 행이 생기고, 프로젝트명 칸에 커서가 갑니다.
============================================================ */
async function quickAddTask(){
  const firstStatus = OPTIONS.status[0] ? OPTIONS.status[0].value : '1. 요청';
  setSyncStatus('loading','추가중...');
  try{
    const res = await fetch(SB_URL+'/rest/v1/task_schedule',
      {method:'POST', headers:{...H,'Prefer':'return=representation'},
       body:JSON.stringify({status:firstStatus, year:activeYear})});
    if(!res.ok) throw new Error(await res.text());
    const [created] = await res.json();
    taskData.push(created);
    renderTask(); updateSummary();
    setSyncStatus('ok','연결됨');
    /* 새로 생긴 행의 프로젝트명 칸에 커서 놓기 */
    setTimeout(()=>{
      const tr = document.getElementById('row-'+created.id);
      if(tr){
        tr.scrollIntoView({block:'center', behavior:'smooth'});
        const cell = tr.querySelectorAll('.c-text')[0];
        if(cell) cell.focus();
      }
    }, 80);
  } catch(e){
    setSyncStatus('error','오류');
    toast('❌ 추가 실패: '+e.message);
  }
}

/* ============================================================
   업무 삭제
============================================================ */
async function deleteTask(id){
  if(!confirm('정말 삭제하시겠습니까?')) return;
  setSyncStatus('loading','삭제중...');
  try{
    const res=await fetch(SB_URL+'/rest/v1/task_schedule?id=eq.'+id,{method:'DELETE',headers:H});
    if(!res.ok) throw new Error();
    taskData=taskData.filter(x=>x.id!==id);
    renderTask(); updateSummary();
    setSyncStatus('ok','연결됨');
    toast('🗑️ 삭제되었습니다.');
  } catch(e){ setSyncStatus('error','오류'); toast('❌ 삭제 실패'); }
}

/* ============================================================
   업무 추가 모달 (+ 업무 추가 버튼)
============================================================ */

    +'<div class="field"><label>주담당자</label><select id="af-lead">'
    +mkOpts(optsFor('lead'),'','-')
    +'</select></div>'
    +'<div class="field"><label>보조담당자</label><select id="af-sub">'
    +mkOpts(optsFor('sub'),'','-')
    +'</select></div></div>'
    +'<div class="field"><label>프로젝트명 / 업무내용 *</label>'
    +'<input id="af-title" placeholder="업무내용을 입력하세요"></div>'
    +'<div class="field-row">'
    +'<div class="field"><label>출고지</label><input id="af-loc" placeholder="예: 김제, 태국"></div>'
    +'<div class="field"><label>영업담당</label><select id="af-sales">'
    +mkOpts(optsFor('sales'),'','-')
    +'</select></div></div>'
    +'<div class="field-row">'
    +'<div class="field"><label>요청일 (영업기준)</label><input type="date" id="af-request"></div>'

async function addTask(){
  const g=id=>(document.getElementById(id)||{}).value||null;
  const title=(g('af-title')||'').trim();
  if(!title){ toast('⚠️ 업무내용을 입력하세요.'); return; }
  const payload={
    status:g('af-status'), lead:g('af-lead'), sub:g('af-sub'), title,
    location:g('af-loc'), sales:g('af-sales'),
    request_date:g('af-request')||null,   /* 요청일 */
    deadline:g('af-deadline')||null,       /* 요청마감일 */
    start_date:g('af-start')||null,        /* 시작일 */
    end_date:g('af-end')||null,            /* 종료일 */
    category:g('af-cat'), nature:g('af-nature'),
    modeling:g('af-mod'), drawing:g('af-drw'), manual:g('af-man'),
    intensity:g('af-int'), memo:g('af-memo'),
  };
  setSyncStatus('loading','저장중...');
  try{
    const res=await fetch(SB_URL+'/rest/v1/task_schedule',{method:'POST',headers:H,body:JSON.stringify(payload)});
    if(!res.ok) throw new Error(await res.text());
    const added=await res.json();
    taskData.push(added[0]);
    closeModal(); renderTask(); updateSummary();
    setSyncStatus('ok','연결됨');
    toast('✅ 업무가 추가되었습니다.');
  } catch(e){ setSyncStatus('error','오류'); toast('❌ 추가 실패: '+e.message); }
}

/* ============================================================

============================================================ */
function updateBudget(){
  const spent=expData.reduce((s,e)=>s+(Number(e.amount)||0),0);
  const remain=budgetTotal-spent;
  const rate=budgetTotal?Math.min(100,Math.round(spent/budgetTotal*100)):0;
  document.getElementById('bTotal').textContent=fmtMoney(budgetTotal);
  document.getElementById('bSpent').textContent=fmtMoney(spent);
  document.getElementById('bRemain').textContent=fmtMoney(remain);
  document.getElementById('bRate').textContent=rate+'%';
  if(document.getElementById('bRateBar'))
    document.getElementById('bRateBar').textContent=rate+'%';
  document.getElementById('bBar').style.width=rate+'%';
}

============================================================ */
async function loadBudgetTotal(){
  try{
    const res = await fetch(

      {headers:H}
    );

      } else {
        budgetTotal = 1080000;   // 아직 이 연도 설정값이 없으면 기본값
        budgetTotalRowId = null;
      }
    }
  }catch(e){
    console.error('총 배정금액 로드 실패:', e);
    budgetTotal = 1080000;
    budgetTotalRowId = null;
  }
}

/* 총 배정금액 저장 + 기존 경비 행들의 한도/잔액 재계산 */
async function saveBudgetTotal(n){
  setSyncStatus('loading','저장중...');
  try{
    if(budgetTotalRowId){
      const res = await fetch(SB_URL+'/rest/v1/app_options?id=eq.'+budgetTotalRowId,
        {method:'PATCH',headers:H,body:JSON.stringify({value:String(n)})});
      if(!res.ok) throw new Error(await res.text());
    } else {
      const res = await fetch(SB_URL+'/rest/v1/app_options',
        {method:'POST',headers:{...H,'Prefer':'return=representation'},
         body:JSON.stringify({opt_type:'budget_total', label:String(activeYear), value:String(n)})});
      if(!res.ok) throw new Error(await res.text());
      const [created]=await res.json();
      budgetTotalRowId = created.id;
    }
    await recalcBudgetCascade();
    setSyncStatus('ok','연결됨');
  }catch(e){
    setSyncStatus('error','오류');
    toast('❌ 총 배정금액 저장 실패: '+e.message);
  }
}

/* 총 배정금액이 바뀌면 기존 행들의 경비한도·잔액을 seq 순서대로 다시 계산해서 저장
   (신규 행 추가할 때와 같은 방식 — 누적 집행액을 빼가며 순서대로 깎임) */
async function recalcBudgetCascade(){
  let prevSpent = 0;
  const sorted = [...expData].sort((a,b)=>(a.seq||0)-(b.seq||0));
  for(const row of sorted){
    const amt = Number(row.amount)||0;
    const newLimit = budgetTotal - prevSpent;
    const newBalance = budgetTotal - prevSpent - amt;
    prevSpent += amt;
    if(row.budget_limit!==newLimit || row.balance!==newBalance){
      try{
        const res = await fetch(SB_URL+'/rest/v1/dept_expense?id=eq.'+row.id,
          {method:'PATCH',headers:H,body:JSON.stringify({budget_limit:newLimit, balance:newBalance})});
        if(res.ok){ row.budget_limit=newLimit; row.balance=newBalance; }
      }catch(e){ console.error('잔액 재계산 실패:', row.id, e); }
    }
  }
  renderExpense();
  updateBudget();
}

/* 총 배정금액 카드 — 클릭하면 숫자만, 블러하면 포맷 + 저장 (참석인원/집행액과 동일 방식) */
function budgetTotalFocus(el){
  el.innerText = budgetTotal ? String(budgetTotal) : '';
}
function budgetTotalKey(e, el){
  if(e.key==='Enter'){ e.preventDefault(); el.blur(); }
  if(e.key==='Escape'){ e.preventDefault(); el.innerText=fmtMoney(budgetTotal); el.blur(); }
}
async function budgetTotalBlur(el){
  const n = Number(el.innerText.replace(/[^0-9]/g,'')) || 0;
  el.innerText = fmtMoney(n);
  if(n === budgetTotal) return;   // 변경 없으면 저장 스킵
  budgetTotal = n;
  await saveBudgetTotal(n);
}

/* ============================================================
   ★ 공휴일 관리 ★
   Supabase app_options 테이블에 저장
   opt_type = 'holiday'
   value    = 'YYYY-MM-DD'  (하루짜리 또는 범위의 각 날짜)
   label    = '공휴일명'
   color_bg = 'start'(범위 시작) or 'end'(범위 끝) or 'single'
   ※ 범위 입력(2026.01.01~2026.01.03)하면 각 날짜를 개별 레코드로 저장

   영업일 계산(diffBizDays)에서 HOLIDAYS Set을 참조합니다.
============================================================ */

/* 전역 공휴일 Set — 'YYYY-MM-DD' 문자열 */
let HOLIDAYS = new Set();

/* DB에서 공휴일 로드 → HOLIDAYS Set 갱신
   실패해도 HOLIDAYS = 빈 Set 유지 (앱 동작에 영향 없음) */
async function loadHolidays(){
  try{
    const res = await fetch(
      SB_URL+'/rest/v1/app_options?opt_type=eq.holiday&order=value.asc&limit=500',
      { headers:H }
    );
    if(!res.ok){ console.warn('공휴일 로드 HTTP 오류:', res.status); return; }
    const rows = await res.json();
    if(!Array.isArray(rows)){ console.warn('공휴일 데이터 형식 오류'); return; }
    HOLIDAYS = new Set(rows.map(r => r.value).filter(Boolean));
    if(taskData.length) renderTask();
  }catch(e){
    console.warn('공휴일 로드 실패(무시):', e);
    HOLIDAYS = new Set();   /* 실패 시 빈 Set — 주말만 제외로 동작 */
  }
}

/* 새 공휴일 저장 — 시작~종료 범위의 날짜를 각각 개별 레코드로 저장 */
async function saveNewHoliday(){
  const startVal = document.getElementById('hdate-start').value;
  const endVal   = document.getElementById('hdate-end').value;
  const name     = (document.getElementById('hname-new').value||'').trim() || '공휴일';
  if(!startVal){ toast('시작 날짜를 선택해주세요'); return; }

  /* 시작~종료 사이 날짜 목록 생성 */
  const dates = [];
  let cur = new Date(startVal + 'T00:00:00Z');
  const end = new Date((endVal||startVal) + 'T00:00:00Z');
  if(cur > end){ toast('종료일이 시작일보다 앞에 있습니다'); return; }
  while(cur <= end){
    dates.push(cur.toISOString().slice(0,10));
    cur.setUTCDate(cur.getUTCDate() + 1);
  }

  setSyncStatus('loading','공휴일 저장중...');
  try{
    /* 각 날짜를 개별 레코드로 upsert (이미 있으면 label만 업데이트) */
    const records = dates.map(d => ({
      opt_type : 'holiday',
      value    : d,
      label    : name,
      color_bg : '#FFF3CD',
      color_fg : '#856404',
      sort_order: 0
    }));
    await fetch(SB_URL+'/rest/v1/app_options', {
      method:'POST',
      headers:{ ...H, 'Prefer':'resolution=merge-duplicates,return=representation' },
      body:JSON.stringify(records)
    });
    setSyncStatus('ok','연결됨');
    toast('✅ 공휴일 '+dates.length+'일이 등록되었습니다');
    await renderHolidayList();
  }catch(e){
    setSyncStatus('error','오류');
    toast('❌ 저장 실패');
  }
}

/* ============================================================
   ★ 영수증 첨부 기능 (Supabase Storage) ★
   - 버킷 이름: receipts (public)
   - dept_expense.receipt_url  : 파일 공개 URL
   - dept_expense.receipt_name : 원본 파일명
============================================================ */
const RECEIPT_BUCKET = 'receipts';

/* 첨부 셀 HTML 만들기 — 파일 유무에 따라 다른 아이콘 표시 */
function attachCell(e){
  const eid = e.id;
  /* 숨겨진 파일 선택 input (이미지 + PDF만 허용) */
  const fileInput =
    '<input type="file" class="attach-file-input" id="attach-input-'+eid+'"'
    +' accept="image/*,application/pdf"'
    +' onchange="uploadReceipt(\''+eid+'\', this)">';

  if(e.receipt_url){
    /* 첨부됨: 보기 / 다운로드 / 교체 / 삭제 */
    return '<div class="exp-attach-box">'
      + fileInput
      + '<button class="attach-btn has-file" title="영수증 보기: '+esc(e.receipt_name||'')+'"'
      +  ' onclick="viewReceipt(\''+eid+'\')">👁</button>'
      + '<button class="attach-btn" title="다운로드"'
      +  ' onclick="downloadReceipt(\''+eid+'\')">⬇</button>'
      + '<button class="attach-btn del" title="첨부 삭제"'
      +  ' onclick="removeReceipt(\''+eid+'\')">✕</button>'
      + '</div>';
  } else {
    /* 첨부 없음: 클립 버튼(클릭 시 파일 선택) */
    return '<div class="exp-attach-box">'
      + fileInput
      + '<button class="attach-btn empty" title="영수증 첨부 (이미지·PDF)"'
      +  ' onclick="document.getElementById(\'attach-input-'+eid+'\').click()">📎</button>'
      + '</div>';
  }
}

/* Storage에 저장할 안전한 파일명 만들기 (경비ID + 타임스탬프 + 확장자) */
function makeReceiptPath(eid, originalName){
  const dot = originalName.lastIndexOf('.');
  const ext = dot !== -1 ? originalName.slice(dot).toLowerCase() : '';
  return eid + '_' + Date.now() + ext;
}

/* 파일 업로드 → Storage 저장 → DB에 URL/파일명 기록 */
async function uploadReceipt(eid, inputEl){
  const file = inputEl.files && inputEl.files[0];
  if(!file) return;

  /* 용량 제한 (10MB) — 너무 큰 파일 방지 */
  if(file.size > 10 * 1024 * 1024){
    toast('❌ 파일이 너무 큽니다 (최대 10MB)');
    inputEl.value = '';
    return;
  }

  /* 업로드 중 표시 */
  const cell = document.querySelector('#exprow-'+eid+' .exp-attach-box');
  if(cell) cell.innerHTML = '<span style="font-size:12px;color:var(--muted)">업로드중…</span>';
  setSyncStatus('loading','영수증 업로드중...');

  try{
    /* 기존 첨부가 있으면 Storage에서 먼저 삭제 (교체) */
    const exp = expData.find(x=>x.id===eid);
    if(exp && exp.receipt_path){
      await deleteFromStorage(exp.receipt_path);
    }

    const path = makeReceiptPath(eid, file.name);
    /* Storage 업로드 — POST /storage/v1/object/{bucket}/{path} */
    const upRes = await fetch(SB_URL+'/storage/v1/object/'+RECEIPT_BUCKET+'/'+encodeURIComponent(path), {
      method:'POST',
      headers:{
        'apikey':SB_KEY,
        'Authorization':'Bearer '+SB_KEY,
        'Content-Type':file.type || 'application/octet-stream',
        'x-upsert':'true'
      },
      body:file
    });
    if(!upRes.ok) throw new Error(await upRes.text());

    /* 공개 URL 만들기 */
    const publicUrl = SB_URL+'/storage/v1/object/public/'+RECEIPT_BUCKET+'/'+encodeURIComponent(path);

    /* DB에 저장 (URL, 원본파일명, storage 경로) */
    await fetch(SB_URL+'/rest/v1/dept_expense?id=eq.'+eid, {
      method:'PATCH', headers:H,
      body:JSON.stringify({ receipt_url:publicUrl, receipt_name:file.name, receipt_path:path })
    });

    /* 메모리 갱신 후 다시 그리기 */
    if(exp){ exp.receipt_url=publicUrl; exp.receipt_name=file.name; exp.receipt_path=path; }
    renderExpense();
    setSyncStatus('ok','연결됨');
    toast('✅ 영수증이 첨부되었습니다');
  }catch(err){
    setSyncStatus('error','오류');
    console.error(err);
    /* Storage 정책(RLS)·버킷 오류 안내 */
    const msg = (err.message||'');
    if(msg.includes('row-level security') || msg.includes('policy') || msg.includes('Unauthorized')){
      toast('❌ Storage 권한 오류 — receipts 버킷 정책을 확인하세요', 5000);
    } else if(msg.includes('Bucket not found') || msg.includes('not found')){
      toast('❌ receipts 버킷이 없습니다 — Supabase Storage에서 만들어주세요', 5000);
    } else {
      toast('❌ 업로드 실패: '+msg);
    }
    renderExpense();   /* 실패 시 원래 첨부 버튼 복구 */
  }
}

/* Storage에서 파일 삭제 (교체·삭제 시 사용) */
async function deleteFromStorage(path){
  try{
    await fetch(SB_URL+'/storage/v1/object/'+RECEIPT_BUCKET+'/'+encodeURIComponent(path), {
      method:'DELETE',
      headers:{ 'apikey':SB_KEY, 'Authorization':'Bearer '+SB_KEY }
    });
  }catch(e){ console.warn('Storage 삭제 실패(무시):', e); }
}

/* 영수증 보기 — 이미지면 팝업, PDF면 새 탭 */
function viewReceipt(eid){
  const exp = expData.find(x=>x.id===eid);
  if(!exp || !exp.receipt_url) return;
  const name = (exp.receipt_name||'').toLowerCase();
  const isPdf = name.endsWith('.pdf') || exp.receipt_url.toLowerCase().includes('.pdf');

  if(isPdf){
    /* PDF는 새 탭에서 열기 */
    window.open(exp.receipt_url, '_blank');
  } else {
    /* 이미지는 미리보기 모달 */
    const overlay = document.getElementById('receiptOverlay');
    const img = document.getElementById('receiptImg');
    img.src = exp.receipt_url;
    /* 다운로드 버튼에 현재 파일 정보 연결 */
    document.getElementById('receiptDlBtn').onclick = ()=>downloadReceipt(eid);
    /* body로 옮겨서 확실히 화면 중앙에 표시 */
    if(overlay.parentElement !== document.body) document.body.appendChild(overlay);
    overlay.classList.add('open');
  }
}

/* 영수증 미리보기 모달 닫기 */
function closeReceipt(){
  const overlay = document.getElementById('receiptOverlay');
  overlay.classList.remove('open');
  /* ★ src="" 로 비우면 브라우저가 "현재 페이지 자체"를 이미지로 다시 불러오려는
     버그가 있어(빈 문자열 src는 현재 문서 URL로 해석됨) removeAttribute로 완전히 제거함 */
  document.getElementById('receiptImg').removeAttribute('src');
}

/* 영수증 다운로드 — 원본 파일명으로 저장 */
async function downloadReceipt(eid){
  const exp = expData.find(x=>x.id===eid);
  if(!exp || !exp.receipt_url) return;
  try{
    /* fetch로 blob을 받아와 원본 파일명으로 저장 */
    const res = await fetch(exp.receipt_url);
    const blob = await res.blob();
    const url = URL.createObjectURL(blob);
    const a = document.createElement('a');
    a.href = url;
    a.download = exp.receipt_name || '영수증';
    document.body.appendChild(a);
    a.click();
    a.remove();
    URL.revokeObjectURL(url);
  }catch(e){
    /* 실패 시 새 탭으로 fallback */
    window.open(exp.receipt_url, '_blank');
  }
}

/* 영수증 삭제 — Storage 파일 + DB 기록 모두 제거 */
async function removeReceipt(eid){
  const exp = expData.find(x=>x.id===eid);
  if(!exp || !exp.receipt_url) return;
  if(!confirm('첨부된 영수증을 삭제할까요?')) return;

  setSyncStatus('loading','영수증 삭제중...');
  try{
    /* Storage 파일 삭제 */
    if(exp.receipt_path) await deleteFromStorage(exp.receipt_path);
    /* DB 필드 비우기 */
    await fetch(SB_URL+'/rest/v1/dept_expense?id=eq.'+eid, {
      method:'PATCH', headers:H,
      body:JSON.stringify({ receipt_url:null, receipt_name:null, receipt_path:null })
    });
    exp.receipt_url=null; exp.receipt_name=null; exp.receipt_path=null;
    renderExpense();
    setSyncStatus('ok','연결됨');
    toast('🗑 영수증이 삭제되었습니다');
  }catch(e){
    setSyncStatus('error','오류');
    toast('❌ 삭제 실패');
  }
}


async function quickAddExp(){
  const prevSpent=expData.reduce((s,e)=>s+(Number(e.amount)||0),0);
  const maxSeq=expData.length?Math.max(...expData.map(e=>e.seq||0)):0;
  const payload={ seq:maxSeq+1, budget_limit:budgetTotal-prevSpent, balance:budgetTotal-prevSpent, amount:0, year:activeYear };
  setSyncStatus('loading','추가중...');
  try{
    const res=await fetch(SB_URL+'/rest/v1/dept_expense',
      {method:'POST',headers:{...H,'Prefer':'return=representation'},body:JSON.stringify(payload)});
    if(!res.ok) throw new Error(await res.text());
    const [created]=await res.json();
    expData.push(created);
    renderExpense(); updateBudget();
    setSyncStatus('ok','연결됨');
    /* 새 행의 집행액 칸에 포커스 */
    setTimeout(()=>{
      const row=document.getElementById('exprow-'+created.id);
      if(row){ const c=row.querySelectorAll('.c-text')[1]; if(c) c.focus(); }
    },80);
  }catch(e){ setSyncStatus('error','오류'); toast('❌ 추가 실패: '+e.message); }
}

/* 집행액 셀 포커스 — 숫자만 표시 */
function expAmtFocus(el){

}

/* 집행액 셀 블러 — 포맷팅 후 저장 */
function expAmtBlur(el){
  const n = el.innerText.replace(/\D/g, '');
  el.dataset.raw = n;

/* ============================================================
   경비 — 셀 하나 저장
============================================================ */
async function saveExpField(id, field, value){
  const row=expData.find(x=>x.id===id);
  if(!row) return;
  const newVal=(value===''?null:value);
  if(String(row[field])===String(newVal)) return;
  setSyncStatus('loading','저장중...');
  try{
    const res=await fetch(SB_URL+'/rest/v1/dept_expense?id=eq.'+id,
      {method:'PATCH',headers:H,body:JSON.stringify({[field]:newVal})});
    if(!res.ok) throw new Error(await res.text());
    row[field]=newVal;
    renderExpense(); updateBudget();
    setSyncStatus('ok','연결됨');
  }catch(e){ setSyncStatus('error','오류'); toast('❌ 저장 실패: '+e.message); }
}

/* 집행액 변경 시 잔액 자동 재계산
   rawVal: 숫자 문자열 (쉼표/원 제거된 상태로 넘어옴) */
async function saveExpAmount(id, rawVal){
  /* 쉼표·원·공백 제거 후 숫자 변환 */
  const amount = Number((rawVal||'').replace(/[^0-9]/g,'')) || 0;
  const row = expData.find(x=>x.id===id);
  if(!row) return;
  if(row.amount === amount) return;
  /* 이 행 제외한 나머지 집행 합계 */
  const prevSpent = expData.filter(x=>x.id!==id).reduce((s,e)=>s+(Number(e.amount)||0),0);
  const balance = budgetTotal - prevSpent - amount;
  setSyncStatus('loading','저장중...');
  try{
    const res = await fetch(SB_URL+'/rest/v1/dept_expense?id=eq.'+id,
      {method:'PATCH', headers:H, body:JSON.stringify({amount, balance})});
    if(!res.ok) throw new Error(await res.text());
    row.amount = amount;
    row.balance = balance;
    renderExpense();
    updateBudget();
    setSyncStatus('ok','연결됨');
  }catch(e){ setSyncStatus('error','오류'); toast('❌ 저장 실패: '+e.message); }
}

/* ================================================================
   ★★★ 업무일지(주간일지/월간일지) JS — index.html(업무일지)에서 이식 ★★★
   openModal/refreshAll/setSyncStatus/switchTab 등 이름이 겹치는 함수는
   wl 접두어를 붙여 구분했습니다(wlOpenModal/wlRefreshAll/wlSwitchTab).
   setSyncStatus/toast는 base(위쪽)의 함수를 그대로 재사용합니다.
================================================================ */
/* ============================================================================
   [아래 script(스크립트) 태그 안은 "JS(자바스크립트)" 코드입니다]

   위쪽 CSS가 "생김새(모양)"를 담당한다면, 여기 JS는
   - 화면에 어떤 글자를 넣을지(예: 오늘 날짜가 몇 일인지 계산해서 "1(수)"라는 글자를 만듦)
   - 버튼을 눌렀을 때 무슨 일이 벌어지는지(예: 저장, 삭제, 화면 이동)
   - 서버(Supabase)에 데이터를 저장하고 불러오는 일
   을 담당합니다.

   글자의 "내용"이 이상하면 이 JS 부분을, 글자의 "생김새(크기/색/여백)"가 이상하면
   위쪽 style(스타일) CSS 부분을 고치면 됩니다.
   ============================================================================ */

/* ============================================================
   Supabase 설정 — 본인의 프로젝트 값으로 교체하세요.
   (Supabase = 이 앱이 데이터를 저장해두는 온라인 데이터베이스 서비스)

const SUPABASE_URL = 'https://zrhwdvuehaelintkfoqn.supabase.co'; // 우리 Supabase 프로젝트의 주소

/* ============================================================
   ★★★ 부서 구분 - 이 파일이 어느 부서용인지 정하는 값 (2개로 분리) ★★★
   Supabase 프로젝트(테이블)는 5개 부서가 전부 함께 쓰지만, 이 값들 덕분에
   이 파일은 항상 "기술전략부" 데이터만 불러오고/저장합니다.

   - DEPARTMENT_ID    : 실제로 서버에 데이터를 요청/저장할 때 쓰는 값.
                         다른 사람이 URL만 보고 다른 부서 값을 유추하기 어렵도록
                         짧은 임의 문자열을 씁니다. (화면에는 보이지 않음)
   - DEPARTMENT_LABEL : 화면에 실제로 보이는 부서 이름 (예: "기술전략부").
                         이건 사람이 보기 좋은 글자를 그대로 써도 안전합니다.

   다른 부서용 파일은 이 두 값만 다르고 나머지 코드는 전부 동일합니다.
   ============================================================ */
const DEPARTMENT_ID = '기술전략부';   // 서버 필터용 값 (기술전략부는 원래 쓰던 주소를 그대로 유지하기 위해 이름을 그대로 둠)

// URL 안에 한글이 그대로 들어가면 깨질 수 있어서, 필터에 쓸 때는 항상 이 인코딩된 값을 사용함

// -> 사람이 키보드로는 절대 입력할 수 없는 특수 문자(\u0001)를 구분자로 써서 이 문제를 원천적으로 막음.
const STAGE_SEP = '\u0001';

// 화면의 부서 타이틀 글자를 위 DEPARTMENT_LABEL 값으로 자동으로 맞춰줌
// (브라우저 탭 제목은 base(index.html)의 <title>을 그대로 유지 — 여기서 덮어쓰지 않음)

// Supabase에게 데이터를 "달라"(GET) 또는 "저장해라"(POST/PATCH/DELETE) 라고 요청하는 공통 함수.
// SDK(외부 라이브러리)를 쓰지 않고 fetch()로 직접 요청을 보내는 방식 - 다른 코드와 변수명이 겹치는 문제를 피하기 위함.
async function sb(path, method='GET', body=null, extraHeaders={}) {
  const res = await fetch(SUPABASE_URL + '/rest/v1/' + path, {
    method,
    headers: {
      'apikey': SUPABASE_KEY,
      'Authorization': 'Bearer ' + SUPABASE_KEY,
      'Content-Type': 'application/json',
      'Prefer': 'return=representation', // 저장/수정 후 결과 데이터를 바로 돌려받기 위한 옵션
      ...extraHeaders,
    },
    body: body ? JSON.stringify(body) : null,
  });
  if (!res.ok) throw new Error(await res.text()); // 요청이 실패하면 에러를 발생시킴
  const text = await res.text();
  return text ? JSON.parse(text) : []; // 응답 내용을 실제 자바스크립트 데이터(배열/객체)로 변환해서 돌려줌
}

/* ---------- 날짜 계산을 도와주는 함수들 ---------- */

// 어떤 날짜가 속한 "그 주의 월요일" 날짜를 구해줌
function startOfWeek(date){
  const d = new Date(date);
  const day = d.getDay(); // 0=일요일, 1=월요일, ... 6=토요일
  const diff = (day === 0 ? -6 : 1) - day; // 일요일이면 6일 전으로, 그 외엔 월요일까지 며칠을 빼야하는지 계산
  d.setDate(d.getDate() + diff);
  d.setHours(0,0,0,0);
  return d;
}
// 어떤 날짜에서 n일을 더한(음수면 뺀) 날짜를 구해줌
function addDays(date, n){
  const d = new Date(date);
  d.setDate(d.getDate() + n);
  return d;
}
// Date 객체를 'YYYY-MM-DD' 형태의 글자로 바꿔줌 (Supabase에 저장되는 날짜 형식과 맞추기 위함)
function toDateStr(d){
  const y = d.getFullYear();
  const m = String(d.getMonth()+1).padStart(2,'0');
  const day = String(d.getDate()).padStart(2,'0');
  return `${y}-${m}-${day}`;
}
function toDisplay(d){
  return `${d.getMonth()+1}.${d.getDate()}`;
}
function weekEnd(weekStart){ return addDays(weekStart, 6); } // 월요일 시작일 + 6일 = 그 주의 일요일
function daysInMonth(year, month){ return new Date(year, month, 0).getDate(); } // 그 달이 며칠까지 있는지 (28~31)
function monthFirstDate(year, month){ return new Date(year, month-1, 1); }      // 그 달의 1일
function monthLastDate(year, month){ return new Date(year, month-1, daysInMonth(year, month)); } // 그 달의 말일
function isSameDate(a, b){ // 두 날짜가 "같은 날"인지 비교 (연,월,일이 모두 같아야 true)
  return a.getFullYear()===b.getFullYear() && a.getMonth()===b.getMonth() && a.getDate()===b.getDate();
}

// 어떤 글자(업무 내용) 안에 "연차/휴가/반차" 관련 단어가 들어있는지 검사
function containsLeaveKeyword(text){
  if(!text) return false;
  return LEAVE_KEYWORDS.some(k => text.includes(k));
}

// [수정됨] 항목 하나(프로젝트+작업단계+내용+진행률)를 화면에 보여줄 "표시용 글자"로 만들어주는 함수.
// - 프로젝트+단계+내용이 다 있으면 "프로젝트 - 단계: 내용" (예: "GS-W805 - 모델링작업: 빠진 부분 추가")
// - 프로젝트+단계만 있으면 "프로젝트 - 단계"
// - 프로젝트(타이틀)만 있으면 프로젝트만 (예전 방식과 호환)
// - 아무 것도 없이 내용만 있는 예전 데이터는 내용만
function itemDisplayLabel(it){
  const title = (it.title || '').trim();
  const stageRaw = (it.stage || '').trim();
  const stage = stageRaw ? stageRaw.split(STAGE_SEP).map(s => s.trim()).filter(Boolean).join(' / ') : ''; // 구분자로 나눠서 " / "로 보기 좋게
  const content = (it.content || '').trim();
  const head = stage ? `${title} - ${stage}` : title; // 프로젝트-단계 조합 (단계 없으면 프로젝트만)
  if(head && content) return `${head}: ${content}`;
  if(head) return head;
  return content;
}

// [수정됨] "연차/휴가" 같은 키워드를 검사할 때, 프로젝트/단계/내용 전부에서 찾도록 합쳐주는 함수

                     아직 입력 안 한 단계는 0%로 계산됩니다 (예: 1단계만 80% -> 4단계 중 하나면 20%).
                     한 번 등록하면 다음부터 그 프로젝트명을 적을 때 자동으로 기억되어, 매번 다시 고를 필요 없음.

                     인원별로 따로 저장됩니다. { "인원ID": ["최근이름1","최근이름2",...] } 형태이며,

   부서(department)마다 이 데이터가 한 줄(row)씩 project_options 테이블에 저장됨.
