          await wlRefreshAll();
          close();
        } catch(e) { console.error(e); showToast('저장 실패'); }
      });
      document.getElementById('deleteEmpBtn').addEventListener('click', async () => {
        if(!confirm('정말 삭제하시겠습니까?')) return; // 브라우저 기본 확인창으로 한 번 더 확인
        try {
          await sb(`employees?id=eq.${emp.id}`, 'DELETE');
          await wlRefreshAll();
          close();
        } catch(e) { console.error(e); showToast('삭제 실패'); }
      });
    }
  });
}

/* ============================================================
   앱이 처음 켜졌을 때 실행되는 초기화 코드 + 각종 버튼 클릭 이벤트 연결
   ============================================================ */
document.addEventListener('DOMContentLoaded', () => {
  // 연도 이동 버튼(« / »)
  document.getElementById('prevYearBtn').addEventListener('click', () => { currentYear--; wlRefreshAll(); });
  document.getElementById('nextYearBtn').addEventListener('click', () => { currentYear++; wlRefreshAll(); });
  // 월 이동 버튼(‹ / ›) - 1월에서 이전으로 가면 작년 12월로, 12월에서 다음으로 가면 내년 1월로 자동 이동
  document.getElementById('prevMonthBtn').addEventListener('click', () => {
    currentMonth--;
    if(currentMonth < 1) { currentMonth = 12; currentYear--; }
    wlRefreshAll();
  });
  document.getElementById('nextMonthBtn').addEventListener('click', () => {
    currentMonth++;
    if(currentMonth > 12) { currentMonth = 1; currentYear++; }
    wlRefreshAll();
  });
  // "오늘" 버튼 - 오늘이 속한 연/월로 즉시 이동
  document.getElementById('todayBtn').addEventListener('click', () => {
    currentYear = TODAY.getFullYear();
    currentMonth = TODAY.getMonth() + 1;
    wlRefreshAll();
  });

  // "↻ 새로고침" 버튼 - 지금 보고 있는 연/월은 그대로 두고, 서버에서 데이터만 다시 불러옴
  document.getElementById('wlRefreshBtn').addEventListener('click', () => {
    wlRefreshAll();
  });

  // "+ 인원 추가" 버튼을 눌렀을 때 뜨는 팝업
  document.getElementById('addEmployeeBtn').addEventListener('click', () => {
    wlOpenModal({
      title: '인원 추가',
      bodyHtml: `
        <div class="field">
          <label>이름</label>
          <input type="text" id="newEmpName" placeholder="홍길동" />
        </div>
        <div class="field">
          <label>직책</label>
          <input type="text" id="newEmpPos" placeholder="연구원" />
        </div>
      `,
      footerHtml: `
        <button class="btn" id="cancelAddEmpBtn">취소</button>
        <button class="btn primary" id="saveAddEmpBtn">추가</button>
      `,
      onMount: (close) => {
        document.getElementById('cancelAddEmpBtn').addEventListener('click', close);
        document.getElementById('saveAddEmpBtn').addEventListener('click', async () => {
          const name = document.getElementById('newEmpName').value.trim();
          const pos = document.getElementById('newEmpPos').value.trim();
          if (!name) return showToast('이름을 입력하세요');
          try {
            await sb('employees', 'POST', { name, position: pos, department: DEPARTMENT_ID, sort_order: employees.length, active: true });
            await wlRefreshAll();
            close();
          } catch(e) { console.error(e); showToast('추가 실패'); }
        });
      }
    });
  });

  // 앱이 켜지자마자 딱 한 번, 서버에서 데이터를 불러와 화면을 처음으로 그림
  wlRefreshAll();
});

/* ============================================================
   ★ 표/목록 스크롤 처리
   [변경됨] 예전엔 JS(adjustScrollAreas)로 화면 남은 공간을 직접 재서 max-height를
   지정하는 방식이었지만, 통합 앱에서는 업무일정표/경비사용내역 탭과 동일하게
   CSS flex 레이아웃(.wl-main → .grid-wrap{flex:1;overflow:auto})으로 통일했습니다.
   그래서 이 JS 계산이 더 이상 필요 없어 제거되었습니다.
   ============================================================ */

/* ============================================================
   헤더 실시간 시계 - 재고관리 앱과 같은 방식.
   "2026-07-02 13:42:27" 처럼 초 단위까지 표시하고, 1초마다 갱신함.
   ============================================================ */
function updateLiveClock(){
  const el = document.getElementById('live-clock');
  if(!el) return;
  const d = new Date();
  const p = n => String(n).padStart(2,'0'); // 한 자리 숫자 앞에 0을 붙여서 두 자리로 맞춤 (예: 3 -> "03")
  el.textContent = `${d.getFullYear()}-${p(d.getMonth()+1)}-${p(d.getDate())} ${p(d.getHours())}:${p(d.getMinutes())}:${p(d.getSeconds())}`;
}
updateLiveClock();                       // 페이지 열리자마자 한 번 즉시 표시
setInterval(updateLiveClock, 1000);      // 이후 1초(1000ms)마다 계속 갱신

/* ============================================================
   앱 시작
============================================================ */
init();

/* ============================================================
   ★ 드롭다운 팝업 ★
   뱃지를 클릭하면 그 뱃지 바로 아래에 선택지 목록이 뜹니다.
   팝업은 표 안이 아니라 화면(body) 기준으로 뜨기 때문에
   표 바깥으로 나가도 잘리지 않습니다. (position:fixed)
============================================================ */
let ddCtx = { id:null, field:null };   /* 지금 어느 셀의 팝업이 열려있는지 */

/* ============================================================
   ★ 드롭다운 팝업 ★
   - 단일선택 필드(status/lead/sales/category): 항목 클릭 시 즉시 닫힘
   - 복수선택 필드(sub): 항목 클릭해도 안 닫힘 → 바깥 클릭/ESC 시 닫힘
     선택값은 "주종현,김태훈" 처럼 쉼표 구분 저장
============================================================ */
function openDD(e, id, field){
  e.stopPropagation();
  const popup = document.getElementById('ddPopup');

  /* 같은 셀을 또 누르면 닫기 */
  if(popup.classList.contains('open') && ddCtx.id===id && ddCtx.field===field){
    closeDD(); return;
  }
  ddCtx = { id, field };

  const row = taskData.find(x=>x.id===id);

  if(field === 'sub'){
    /* ---- 복수선택 모드 (보조담당자) ---- */
    /* 현재 선택된 이름 Set */
    const names = (row && row.sub) ? row.sub.split(',').map(s=>s.trim()).filter(Boolean) : [];

    function buildSubContent(){
      /* data-sub-id / data-sub-val 속성으로 값 전달 → onclick 이스케이프 문제 원천 차단 */
      let h = '<div class="dd-item" data-sub-id="'+esc(id)+'" data-sub-val="" onclick="pickSubDD(this)">'
            + '<span style="color:#BBB;font-size:12px">— 비우기 —</span></div>';
      (OPTIONS['sub']||[]).forEach(o=>{
        const curNames = (row && row.sub) ? row.sub.split(',').map(s=>s.trim()).filter(Boolean) : [];
        const on = curNames.includes(o.value);
        h += '<div class="dd-item'+(on?' selected':'')+'" style="display:flex;align-items:center"'
           + ' data-sub-id="'+esc(id)+'" data-sub-val="'+esc(o.value)+'" onclick="pickSubDD(this)">'
           + '<span class="badge" style="background:'+o.color_bg+';color:'+o.color_fg+'">'
           + esc(o.label||o.value)+'</span>'
           + (on ? '<span style="margin-left:auto;padding-left:8px;color:var(--blueprint);font-size:13px;font-weight:700">✓</span>' : '')
           + '</div>';
      });
      return h;
    }
    popup.innerHTML = buildSubContent();

  } else {
    /* ---- 단일선택 모드 (status/lead/sales/category) ---- */
    const cur = row ? row[field] : null;
    let h = '<div class="dd-item'+(!cur?' selected':'')+'" onclick="pickDD(null)">'
          + '<span style="color:#BBB;font-size:12px">— 비우기 —</span></div>';
    (OPTIONS[field]||[]).forEach(o=>{
      const sel = (cur===o.value) ? ' selected' : '';
      h += '<div class="dd-item'+sel+'" onclick="pickDD(\''+esc(o.value).replace(/'/g,"\\'")+'\')">'+
           '<span class="badge" style="background:'+o.color_bg+';color:'+o.color_fg+'">'+
           esc(o.label||o.value)+'</span></div>';
    });
    popup.innerHTML = h;
  }

  /* 클릭한 뱃지 바로 아래에 팝업 위치시키기 */
  const r = e.currentTarget.getBoundingClientRect();
  popup.classList.add('open');
  const ph = popup.offsetHeight || 200;
  const top = (r.bottom + ph + 8 > window.innerHeight) ? (r.top - ph - 4) : (r.bottom + 4);
  popup.style.top  = Math.max(4, top) + 'px';
  popup.style.left = Math.min(r.left, window.innerWidth - popup.offsetWidth - 8) + 'px';
}

/* 단일선택: 고르면 바로 닫고 저장 */
function pickDD(value){
  const { id, field } = ddCtx;
  closeDD();
  if(id && field) saveField(id, field, value);
}

/* 복수선택(sub): 클릭해도 닫히지 않음
   ★ el.dataset으로 id/value를 읽어 onclick 이스케이프 문제 완전 제거
   ★ saveField를 먼저 호출하고 로컬캐시는 saveField 내부에서 갱신
      (pickSubDD에서 row.sub를 먼저 바꾸면 saveField가 "변경없음"으로 건너뜀) */
function pickSubDD(el){
  const id    = el.dataset.subId;
  const value = el.dataset.subVal || null;
  const row   = taskData.find(x=>x.id===id);
  if(!row) return;

  let newVal;
  if(!value){
    newVal = null;   /* 비우기 */
  } else {
    let names = (row.sub||'').split(',').map(s=>s.trim()).filter(Boolean);
    const idx = names.indexOf(value);
    if(idx === -1) names.push(value);
    else           names.splice(idx, 1);
    newVal = names.length ? names.join(',') : null;
  }

  /* ★ saveField를 먼저 호출해야 내부의 '변경없음' 체크를 통과합니다.
     saveField 내부에서 row[field] = newVal 로 로컬 캐시를 갱신합니다. */
  saveField(id, 'sub', newVal);

  if(!value){ closeDD(); return; }

  /* 팝업 전체 재렌더 — saveField가 비동기이므로 newVal로 직접 계산 */
  const popup = document.getElementById('ddPopup');
  let h = '<div class="dd-item" data-sub-id="'+esc(id)+'" data-sub-val="" onclick="pickSubDD(this)">'
        + '<span style="color:#BBB;font-size:12px">— 비우기 —</span></div>';
  const curNames = newVal ? newVal.split(',').map(s=>s.trim()).filter(Boolean) : [];
  (OPTIONS['sub']||[]).forEach(o=>{
    const on = curNames.includes(o.value);
    h += '<div class="dd-item'+(on?' selected':'')+'" style="display:flex;align-items:center"'
       + ' data-sub-id="'+esc(id)+'" data-sub-val="'+esc(o.value)+'" onclick="pickSubDD(this)">'
       + '<span class="badge" style="background:'+o.color_bg+';color:'+o.color_fg+'">'
       + esc(o.label||o.value)+'</span>'
       + (on ? '<span style="margin-left:auto;padding-left:8px;color:var(--blueprint);font-size:13px;font-weight:700">✓</span>' : '')
       + '</div>';
  });
  popup.innerHTML = h;
}

function closeDD(){
  document.getElementById('ddPopup').classList.remove('open');
  ddCtx = { id:null, field:null };
}

/* 빈 곳을 클릭하면 팝업 닫기 */
document.addEventListener('click', e=>{
  if(!e.target.closest('.dd-btn') && !e.target.closest('#ddPopup')) closeDD();
});
/* 스크롤하면 팝업 위치가 틀어지므로 닫기 */
window.addEventListener('scroll', closeDD, true);

/* ============================================================
   ★ ESC 키로 모든 팝업·모달 닫기 ★
   - 드롭다운 팝업 (dd-popup)
   - ⚙ 옵션 관리 모달 (opt-overlay)
   - 경비 추가 / 업무 추가 모달 (modal-overlay)
   우선순위: 가장 위에 열린 것부터 하나씩 닫습니다.
============================================================ */
document.addEventListener('keydown', e=>{
  if(e.key !== 'Escape') return;

  /* 1순위: 드롭다운 팝업이 열려 있으면 먼저 닫기 */
  const ddPopup = document.getElementById('ddPopup');
  if(ddPopup && ddPopup.classList.contains('open')){
    closeDD(); return;
  }

  /* 2순위: ⚙ 옵션 관리 모달 */
  const optOverlay = document.getElementById('optOverlay');
  if(optOverlay && optOverlay.classList.contains('open')){
    closeOptModal(); return;
  }

  /* 3순위: 일반 모달 (업무추가 / 경비추가 등) */
  const modalOverlay = document.querySelector('.modal-overlay.open');
  if(modalOverlay){ closeModal(); return; }
});


/* ============================================================
   ★ ⚙ 옵션 관리 모달 ★
   상태/담당자/영업/분류/진행상태/강도의 선택지를
   추가·삭제·색상변경·순서변경 할 수 있습니다. 전부 Supabase에 저장됩니다.
============================================================ */

/* ★ PALETTES 배열 제거됨 — 자유 색상 피커(input[type=color])로 교체
   setOptColorFree() / previewOptColor() 함수가 대신 처리합니다 */

let optType = '';          /* 지금 관리 중인 옵션 종류 */

function openOptModal(type){
  optType = type;
  document.getElementById('optTitle').textContent = OPT_TITLE[type] + ' 옵션 관리';
  document.getElementById('optInput').value = '';
  renderPaletteBar();
  renderOptList();
  /* ★ overlay를 body 직속 자식으로 이동 — overflow:auto 조상이 있으면
     position:fixed 기준이 틀어져서 모달이 한쪽으로 밀리는 문제 방지 */
  const overlay = document.getElementById('optOverlay');
  if(overlay.parentElement !== document.body) document.body.appendChild(overlay);
  overlay.classList.add('open');
  setTimeout(()=>document.getElementById('optInput').focus(), 50);
}

/* ★ 배경(어두운 부분)을 눌러도 닫히지 않습니다. X 버튼으로만 닫힘 */
function closeOptModal(){
  document.getElementById('optOverlay').classList.remove('open');
  renderTask();              /* 바뀐 옵션을 표에 반영 */
  applyStatusFilterColors(); /* 상태 색상이 바뀌었을 수 있으므로 필터 버튼도 재적용 */
}

/* 모달 안의 옵션 목록 그리기 */
function renderOptList(){
  const list = OPTIONS[optType] || [];
  renderLeadFilterOptions();   /* 담당자 옵션이 바뀌었을 수도 있으니 필터도 같이 갱신 */

  /* 목록이 비어있으면 안내 문구를 표시합니다.
     app_options 테이블에 데이터가 없거나 RLS로 읽기가 막힌 경우입니다. */
  if(list.length === 0){
    document.getElementById('optList').innerHTML =
      '<div style="text-align:center;padding:24px 0;color:#B0BEC5;font-size:13px">'
      +'📭 옵션이 없습니다. 아래에서 새 항목을 추가하세요.'
      +'<br><span style="font-size:11px;color:#CFD8DC;margin-top:6px;display:block">'
      +'※ 목록이 계속 비어있으면 Supabase의 app_options 테이블<br>RLS 정책을 확인하세요.'
      +'</span></div>';
    return;
  }

  document.getElementById('optList').innerHTML = list.map((o,i)=>{
    const label = o.label || o.value;
    /* 상태 종류만 DB 실제값이 표시명과 달라서 괄호로 같이 보여줌 */
    const raw = (o.value !== label) ? '<span style="font-size:11px;color:var(--muted)">('+esc(o.value)+')</span>' : '';
    /* 배경색·글자색 각각 자유롭게 고를 수 있는 컬러피커
       동그라미를 팔레트로 드래그하면 그 색이 팔레트에 저장됩니다 */
    const pickers =
      '<div class="color-pick-pair"'
      +' ondragover="event.preventDefault()" ondrop="onPickerDrop(event,'+i+',\'bg\')">'
      +'<span>배경</span>'
      +'<input type="color" id="pick-bg-'+i+'" value="'+esc(o.color_bg||'#F0F0F0')+'"'
      +' title="팔레트로 드래그하면 저장 / 클릭하면 색 변경"'
      +' draggable="true"'
      +' ondragstart="onPickerDragStart(event,\'pick-bg-'+i+'\')"'
      +' oninput="previewOptColor('+i+',this.value,null,this)"'
      +' onchange="setOptColorFree('+i+',\'bg\',this.value)">'
      +'</div>'
      +'<div class="color-pick-pair"'
      +' ondragover="event.preventDefault()" ondrop="onPickerDrop(event,'+i+',\'fg\')">'
      +'<span>글자</span>'
      +'<input type="color" id="pick-fg-'+i+'" value="'+esc(o.color_fg||'#555555')+'"'
      +' title="팔레트로 드래그하면 저장 / 클릭하면 색 변경"'
      +' draggable="true"'
      +' ondragstart="onPickerDragStart(event,\'pick-fg-'+i+'\')"'
      +' oninput="previewOptColor('+i+',null,this.value,this)"'
      +' onchange="setOptColorFree('+i+',\'fg\',this.value)">'
      +'</div>';

    return '<div class="opt-item" draggable="true"'
      +' ondragstart="optDragStart(event,'+i+')" ondragover="optDragOver(event,'+i+')"'
      +' ondragleave="optDragLeave(event)" ondrop="optDrop(event,'+i+')" ondragend="optDragEnd(event)">'
      +'<div class="opt-top">'
      +'<span class="drag-handle" title="끌어서 순서 변경">⠿</span>'
      +'<span class="badge" id="opt-badge-'+i+'" style="background:'+o.color_bg+';color:'+o.color_fg+'">'+esc(label)+'</span>'
      +raw
      +'<button class="opt-del" onclick="delOpt('+i+')" title="삭제">✕</button>'
      +'</div>'
      +'<div class="color-row">'+pickers+'</div>'
      +'</div>';
  }).join('');
}

/* ============================================================
   상태 필터 버튼 색상 동기화
   ⚙ 옵션 모달에서 상태 뱃지 색을 바꾸면 필터 버튼도 같이 바뀝니다.

   STATUS_MAP: 상태 DB값(value)의 키워드 → 필터 버튼 id
   예) '1. 요청' → '요청' 키워드 포함 → 'flt-req' 버튼
============================================================ */
const STATUS_FILTER_MAP = [
  { keyword:'요청',  id:'flt-req'  },
  { keyword:'진행중', id:'flt-ing'  },
  { keyword:'지속',  id:'flt-cont' },
  { keyword:'보류',  id:'flt-hold' },
  { keyword:'완료',  id:'flt-done' },
];

/* 상태값(value 문자열)에 해당하는 필터 버튼 요소를 반환 */
function getFltBtn(statusValue){
  const v = statusValue || '';
  const match = STATUS_FILTER_MAP.find(m => v.includes(m.keyword));
  return match ? document.getElementById(match.id) : null;
}

/* 필터 버튼 하나에 배경색/글자색 적용
   - 비활성(기본): bg를 연하게, fg를 글자색으로
   - 활성(.active): bg/fg 그대로 채워진 스타일
   CSS .active{ color:#fff } 보다 inline style이 우선하므로
   활성 색도 inline으로 넣어야 합니다 */
function applyFltBtnColor(btn, bg, fg){
  if(!btn) return;
  /* 비활성 기본 스타일 */
  btn.style.background   = bg;
  btn.style.color        = fg;
  btn.style.borderColor  = fg;   /* 테두리도 글자색 계열로 */
  /* 활성(.active)일 때는 배경을 글자색으로, 글자를 흰색으로 */
  btn.dataset.colorBg = bg;
  btn.dataset.colorFg = fg;
  /* 현재 활성 상태라면 즉시 활성 스타일도 반영 */
  if(btn.classList.contains('active')){
    btn.style.background  = fg;
    btn.style.color       = '#fff';
    btn.style.borderColor = fg;
  }
}

/* 앱 로딩 시 / ⚙ 모달 닫힐 때 OPTIONS.status 전체를 필터 버튼에 반영 */
function applyStatusFilterColors(){
  (OPTIONS.status || []).forEach(o => {
    const btn = getFltBtn(o.value);
    applyFltBtnColor(btn, o.color_bg, o.color_fg);
  });
}

/* setStatusFilter 호출 시 활성/비활성 전환에 맞춰 색상도 유지되어야 함
   기존 setStatusFilter 를 래핑해서 전환 직후 색상 재적용 */
const _origSetStatusFilter = typeof setStatusFilter === 'function' ? setStatusFilter : null;

/* ============================================================
   공용 색상 팔레트 — 옵션 관리 모달 상단에 1개만 표시 (20칸 고정)
   피커 동그라미를 팔레트 슬롯으로 드래그해서 직접 저장 (같은 색 중복 허용)
   localStorage 키: taskMgr_colorPalette
   팔레트 동그라미 클릭 → 마지막으로 조작한 피커(배경 or 글자)에 적용
============================================================ */
const COLOR_PAL_KEY = 'taskMgr_colorPalette';
const COLOR_PAL_MAX = 20;   /* 팔레트 슬롯 수 (항상 이 길이 고정) */

/* 팔레트 불러오기 — 항상 길이 20짜리 배열로 정규화해서 반환
   (빈 칸은 null). 예전 형식(짧은 배열)도 자동으로 20칸으로 맞춰줌 */
function getColorPalette(){
  let raw;
  try{ raw = JSON.parse(localStorage.getItem(COLOR_PAL_KEY)||'[]'); }
  catch(e){ raw = []; }
  if(!Array.isArray(raw)) raw = [];
  /* 길이 20으로 강제 정규화 — 부족하면 null 채우고, 넘치면 자름 */
  const pal = [];
  for(let i = 0; i < COLOR_PAL_MAX; i++){
    pal[i] = (raw[i] === undefined || raw[i] === null) ? null : raw[i];
  }
  return pal;
}

/* 팔레트 배열을 그대로 저장 (항상 길이 20 유지) */
function saveColorPalette(pal){
  try{
    /* 안전하게 20칸으로 정규화 후 저장 */
    const fixed = [];
    for(let i = 0; i < COLOR_PAL_MAX; i++){
      fixed[i] = (pal[i] === undefined || pal[i] === null) ? null : pal[i];
    }
    localStorage.setItem(COLOR_PAL_KEY, JSON.stringify(fixed));
  }catch(e){}
}

/* 특정 슬롯(idx)에 색 저장 — 같은 색이 다른 칸에 있어도 그대로 둠(중복 허용) */
function setPaletteSlot(idx, color){
  const pal = getColorPalette();
  pal[idx] = color;
  saveColorPalette(pal);
}

/* 빈 슬롯 중 가장 앞쪽에 색 추가 (여백 드롭용) — 중복 허용 */
function addToFirstEmptySlot(color){
  const pal = getColorPalette();
  const empty = pal.indexOf(null);
  if(empty === -1) return;             /* 빈 칸 없으면 무시 */
  pal[empty] = color;
  saveColorPalette(pal);
}

/* 특정 슬롯 비우기 */
function clearPaletteSlot(idx){
  const pal = getColorPalette();
  pal[idx] = null;
  saveColorPalette(pal);
}

/* 팔레트 바 렌더링 — 항상 COLOR_PAL_MAX개 슬롯 표시 (빈 자리는 점선 원)
   각 슬롯은 드롭 타겟 — 피커 동그라미를 끌어다 놓으면 그 색이 저장됩니다 */
function renderPaletteBar(){
  const bar = document.getElementById('optPaletteBar');
  if(!bar) return;
  const slots = getColorPalette();   /* 항상 길이 20 (빈칸은 null) */

  /* 슬롯을 10개씩 두 줄로 나눔 */
  const makeSlot = (c, idx) => {
    const base = ' ondragover="onPalDragOver(event,'+idx+')"'
               + ' ondragleave="onPalDragLeave(event)"'
               + ' ondrop="onPalDrop(event,'+idx+')"';
    const draggable = c ? ' draggable="true" ondragstart="onPalDotDragStart(event,\''+c+'\',' + idx + ')"' : '';
    return c
      ? '<span class="pal-dot" style="background:'+c+'" title="'+c+' | 피커로 드래그하거나 클릭해서 적용"'
        + base + draggable +' onclick="applyPalColor(\''+c+'\')"></span>'
      : '<span class="pal-dot empty" title="피커 동그라미를 여기로 드래그해서 저장"'
        + base +'></span>';
  };

  const row1 = slots.slice(0, 10).map((c,i) => makeSlot(c, i)).join('');
  const row2 = slots.slice(10, 20).map((c,i) => makeSlot(c, i+10)).join('');

  bar.innerHTML =
    '<span class="pal-label">팔레트</span>'
    +'<div class="pal-row">'+row1+'</div>'
    +'<div class="pal-row">'+row2+'</div>';

  /* 팔레트 바 자체도 드롭 타겟 (슬롯 사이 여백 드롭 시 빈 슬롯 첫 번째에 저장) */
  bar.ondragover = e => { e.preventDefault(); bar.classList.add('drag-active'); };
  bar.ondragleave = e => { if(!bar.contains(e.relatedTarget)) bar.classList.remove('drag-active'); };
  bar.ondrop = e => {
    e.preventDefault();
    bar.classList.remove('drag-active');
    /* 슬롯의 drop이 먼저 처리되므로, 여기 도달하면 슬롯 사이 여백에 떨어진 것 */
    const color = e.dataTransfer.getData('text/plain');
    const source = e.dataTransfer.getData('application/x-drag-source');
    /* 팔레트 dot을 여백에 떨어뜨린 경우는 아무것도 안 함 (제자리 유지) */
    if(source === 'palette') return;
    if(!color) return;
    addToFirstEmptySlot(color);
    renderPaletteBar();
  };
}

/* ---- 피커 동그라미 dragstart (피커→팔레트) ---- */
function onPickerDragStart(e, inputId){
  const input = document.getElementById(inputId);
  if(!input) return;
  e.dataTransfer.setData('text/plain', input.value);
  e.dataTransfer.setData('application/x-drag-source', 'picker'); /* 출처 표시 */
  e.dataTransfer.effectAllowed = 'copy';
  const bar = document.getElementById('optPaletteBar');
  if(bar) bar.classList.add('drag-active');
}

/* ---- 팔레트 dot dragstart (팔레트→피커 또는 팔레트 슬롯 이동) ---- */
function onPalDotDragStart(e, color, fromIdx){
  e.dataTransfer.setData('text/plain', color);
  e.dataTransfer.setData('application/x-drag-source', 'palette'); /* 출처 표시 */
  e.dataTransfer.setData('application/x-pal-from', String(fromIdx)); /* 출발 슬롯 */
  e.dataTransfer.effectAllowed = 'copyMove';
  e.stopPropagation(); /* opt-item draggable 이벤트와 충돌 방지 */
}

/* ---- 피커 div에 드롭 (팔레트→피커) ---- */
function onPickerDrop(e, i, which){
  e.preventDefault();
  e.stopPropagation();
  const color = e.dataTransfer.getData('text/plain');
  if(!color) return;
  /* 피커 input 값 변경 */
  const input = document.getElementById('pick-'+which+'-'+i);
  if(input) input.value = color;
  /* 미리보기 + DB 저장 */
  const bgVal = which === 'bg' ? color : null;
  const fgVal = which === 'fg' ? color : null;
  previewOptColor(i, bgVal, fgVal, input);
  setOptColorFree(i, which, color);
}

/* ---- 팔레트 슬롯 dragover / dragleave / drop ---- */
function onPalDragOver(e, idx){
  e.preventDefault();
  e.stopPropagation();
  /* 해당 슬롯 강조 */
  const dots = document.querySelectorAll('#optPaletteBar .pal-dot');
  dots.forEach(d => d.classList.remove('drag-over'));
  if(dots[idx]) dots[idx].classList.add('drag-over');
}

function onPalDragLeave(e){
  e.currentTarget.classList.remove('drag-over');
}

function onPalDrop(e, idx){
  e.preventDefault();
  e.stopPropagation();
  /* 모든 강조 제거 */
  document.querySelectorAll('#optPaletteBar .pal-dot').forEach(d => d.classList.remove('drag-over'));
  document.getElementById('optPaletteBar').classList.remove('drag-active');

  const color = e.dataTransfer.getData('text/plain');
  const source = e.dataTransfer.getData('application/x-drag-source');
  if(!color) return;

  /* 팔레트 dot을 다른 슬롯으로 옮긴 경우 → 원래 슬롯 비우고 새 슬롯에 넣기 (자리 이동) */
  if(source === 'palette'){
    const fromIdx = parseInt(e.dataTransfer.getData('application/x-pal-from'), 10);
    if(!isNaN(fromIdx) && fromIdx !== idx){
      const pal = getColorPalette();
      /* 대상 슬롯에 이미 색이 있으면 서로 자리 교환(swap), 없으면 이동 */
      const tmp = pal[idx];
      pal[idx] = color;
      pal[fromIdx] = tmp;    /* 비어있었으면 null이 들어가 원래 자리는 비워짐 */
      saveColorPalette(pal);
    }
    renderPaletteBar();
    return;
  }

  /* 피커에서 끌어온 색을 해당 슬롯에 저장 (덮어쓰기) */
  setPaletteSlot(idx, color);
  renderPaletteBar();
}

/* 팔레트 동그라미 클릭 — 마지막으로 조작한 피커에 색 적용 */
let _lastPickTarget = null;   /* { i(옵션인덱스), which('bg'|'fg') } */

function applyPalColor(color){
  if(!_lastPickTarget) return;
  const { i, which } = _lastPickTarget;
  const input = document.getElementById('pick-'+which+'-'+i);
  if(input){ input.value = color; }
  const bgVal = which === 'bg' ? color : null;
  const fgVal = which === 'fg' ? color : null;
  previewOptColor(i, bgVal, fgVal, input);
  setOptColorFree(i, which, color);
}

/* ---- 색상 실시간 미리보기 (피커 드래그 중 — DB 저장 안 함) ---- */
function previewOptColor(i, bgVal, fgVal, inputEl){
  /* 어느 피커를 조작 중인지 기억 (히스토리 클릭 시 같은 타겟에 적용하기 위해) */
  if(inputEl){
    _lastPickTarget = {
      i,
      which: inputEl.id && inputEl.id.startsWith('pick-fg') ? 'fg' : 'bg'
    };
  }
  const badge = document.getElementById('opt-badge-'+i);
  if(!badge) return;
  if(bgVal !== null) badge.style.background = bgVal;
  if(fgVal !== null) badge.style.color = fgVal;
  /* 상태 옵션이면 필터 버튼도 실시간 미리보기 */
  if(optType === 'status'){
    const o = OPTIONS.status[i];
    if(o){
      const bg = bgVal !== null ? bgVal : o.color_bg;
      const fg = fgVal !== null ? fgVal : o.color_fg;
      applyFltBtnColor(getFltBtn(o.value), bg, fg);
    }
  }
}

/* ---- 색상 확정 저장 (input change — 피커 닫힐 때) ---- */
async function setOptColorFree(i, which, val){
  const o = OPTIONS[optType][i];
  if(!o) return;
  /* 메모리 업데이트 */
  if(which === 'bg') o.color_bg = val;
  if(which === 'fg') o.color_fg = val;
  /* ★ 팔레트 자동저장 없음 — 피커 동그라미를 직접 드래그해서 팔레트에 추가하는 방식 */
  /* DB 저장 */
  await patchOpt(o.id, {color_bg: o.color_bg, color_fg: o.color_fg});
  /* 상태 옵션이면 필터 버튼도 확정 반영 */
  if(optType === 'status'){
    applyFltBtnColor(getFltBtn(o.value), o.color_bg, o.color_fg);
  }
  /* 히스토리 동그라미 갱신 (모든 opt-item의 히스토리 줄 새로 그리기) */
  renderOptList();
}

/* ---- 옵션 추가 ---- */
async function addOpt(){
  const val = document.getElementById('optInput').value.trim();
  if(!val) return;
  if((OPTIONS[optType]||[]).some(o=>o.value===val)){ toast('❗ 이미 있는 항목입니다'); return; }
  const order = (OPTIONS[optType]||[]).length + 1;
  setSyncStatus('loading','추가중...');
  try{
    const res = await fetch(SB_URL+'/rest/v1/app_options',
      {method:'POST', headers:{...H,'Prefer':'return=representation'},
       body:JSON.stringify({opt_type:optType, value:val, label:val,
                            color_bg:'#F0F0F0', color_fg:'#555555', sort_order:order})});
    if(!res.ok) throw new Error(await res.text());
    const [created] = await res.json();
    OPTIONS[optType].push(created);
    document.getElementById('optInput').value='';
    renderOptList();
    setSyncStatus('ok','연결됨');
  }catch(e){
    setSyncStatus('error','오류');
    /* RLS(Row Level Security) 정책 위반 오류인지 확인 */
    const msg = e.message || '';
    if(msg.includes('42501') || msg.includes('row-level security')){
      /* RLS 때문에 막힌 경우: Supabase에서 실행할 SQL을 안내합니다 */
      toast('❌ RLS 오류 — Supabase SQL에서 아래 명령을 실행하세요 (콘솔에 출력됨)', 5000);
      console.error(
        '▼▼▼ Supabase SQL Editor에서 아래 SQL을 실행하세요 ▼▼▼\n\n'
        +'-- app_options 테이블 RLS 비활성화\n'
        +'ALTER TABLE app_options DISABLE ROW LEVEL SECURITY;\n\n'
        +'-- 또는 anon 역할에 모든 권한 부여\n'
        +'GRANT ALL ON app_options TO anon;\n'
        +'GRANT ALL ON app_options TO authenticated;\n'
        +'▲▲▲▲▲▲▲▲▲▲▲▲▲▲▲▲▲▲▲▲▲▲▲▲▲▲▲▲▲▲▲▲▲▲▲▲▲▲▲▲'
      );
    } else {
      toast('❌ 추가 실패: '+msg);
    }
  }
}

/* ---- 옵션 삭제 ---- */
async function delOpt(i){
  const o = OPTIONS[optType][i];
  if(!confirm('"'+(o.label||o.value)+'" 항목을 삭제할까요?\n\n※ 이미 이 값을 쓰고 있는 업무는 그대로 남아있지만,\n   목록에서는 더 이상 고를 수 없게 됩니다.')) return;
  setSyncStatus('loading','삭제중...');
  try{
    const res = await fetch(SB_URL+'/rest/v1/app_options?id=eq.'+o.id, {method:'DELETE', headers:H});
    if(!res.ok) throw new Error(await res.text());
    OPTIONS[optType].splice(i,1);
    renderOptList();
    setSyncStatus('ok','연결됨');
  }catch(e){ setSyncStatus('error','오류'); toast('❌ 삭제 실패'); }
}

/* 옵션 한 건 수정 (PATCH) */
async function patchOpt(optId, payload){
  try{
    await fetch(SB_URL+'/rest/v1/app_options?id=eq.'+optId,
      {method:'PATCH', headers:H, body:JSON.stringify(payload)});
  }catch(e){ toast('❌ 저장 실패'); }
}


/* ============================================================
   ★ 옵션 순서 드래그앤드롭 ★
   ⠿ 손잡이를 잡고 끌어서 순서를 바꿉니다.
   위/아래 절반을 따지지 않고, 그냥 "놓은 자리"로 이동시킵니다.
   (splice가 방향을 알아서 처리해줍니다)
============================================================ */
let optDragFrom = null;

function optDragStart(e, i){
  optDragFrom = i;
  e.currentTarget.classList.add('dragging');
  e.dataTransfer.effectAllowed = 'move';
}
function optDragOver(e, i){
  e.preventDefault();                       /* 이게 없으면 drop이 안 일어남 */
  if(optDragFrom===null || optDragFrom===i) return;
  clearOptMarks();
  e.currentTarget.classList.add('drop-target');   /* 놓일 자리에 파란 테두리 */
}
function optDragLeave(e){ e.currentTarget.classList.remove('drop-target'); }
function optDragEnd(e){ e.currentTarget.classList.remove('dragging'); clearOptMarks(); optDragFrom=null; }
function clearOptMarks(){
  document.querySelectorAll('.opt-item').forEach(el=>el.classList.remove('drop-target'));
}

async function optDrop(e, i){
  e.preventDefault();
  clearOptMarks();
  if(optDragFrom===null || optDragFrom===i) return;

  const arr = OPTIONS[optType];
  const [moved] = arr.splice(optDragFrom, 1);   /* 빼서 */
  arr.splice(i, 0, moved);                      /* 놓은 자리에 끼워넣기 */
  optDragFrom = null;
  renderOptList();

  /* 바뀐 순서를 DB에 저장 (sort_order 를 1,2,3... 으로 다시 매김) */
  setSyncStatus('loading','순서 저장중...');
  try{
    await Promise.all(arr.map((o,idx)=>{
      o.sort_order = idx+1;
      return patchOpt(o.id, {sort_order: idx+1});
    }));
    setSyncStatus('ok','연결됨');
  }catch(err){ setSyncStatus('error','오류'); }
}


/* ============================================================
   ★ 컬럼 폭 조절 (엑셀처럼 경계선 끌기) ★
   - 표 전체 폭은 고정 (양끝은 안 움직임)
   - 어떤 경계선을 끌면, 왼쪽 칸이 넓어진 만큼 오른쪽 칸이 좁아짐
   - 너비는 th가 아니라 colgroup>col 로 조절해야 브라우저가 확실히 따릅니다
   - localStorage에 저장해서 새로고침해도 유지됩니다
   - 헤더 클릭 정렬도 여기서 addEventListener로 붙입니다
     (th onclick="" 방식은 핸들 드래그와 충돌하므로 사용하지 않습니다)
============================================================ */

/* 로컬스토리지 키 — 이 이름으로 컬럼 폭이 저장됩니다 */
/* 컬럼 순서 드래그앤드롭 중 여부 — 드래그 후 click(정렬) 실수 실행 방지 */
let _colDragDragging = false;

function initColResize(){
  const tbl = document.querySelector('#taskTableWrap table');
  if(!tbl) return;

  /* thead 안에 "추가 버튼 줄"과 "진짜 헤더 줄" 2개가 있으므로
     :last-child 로 진짜 헤더 줄만 정확히 집습니다 */
  const ths = [...tbl.querySelectorAll('thead tr:last-child th')];
  if(ths.length < 2) return;

  /* ---- colgroup 생성 또는 재사용 ----
     renderTask()가 innerHTML로 표를 새로 그리므로 colgroup도 매번 새로 만듭니다.
     단, 로컬스토리지에 저장된 폭이 있으면 그걸로 복원합니다. */
  let cg = tbl.querySelector('colgroup');
  if(!cg){
    cg = document.createElement('colgroup');
    ths.forEach(()=>{
      cg.appendChild(document.createElement('col'));
    });
    tbl.insertBefore(cg, tbl.firstChild);
  }
  const cols = [...cg.querySelectorAll('col')];

  /* requestAnimationFrame 2중 중첩 — 브라우저가 레이아웃을 완전히 계산한 뒤 실행 */
  requestAnimationFrame(()=>{
    requestAnimationFrame(()=>{
      /* ★ 항상 COL_DEFS의 px 고정값으로 컬럼 폭 설정
         프로젝트명(값=0)은 다른 컬럼 합산 후 남는 공간 전부 채움 */
      const tableW = tbl.getBoundingClientRect().width || window.innerWidth;
      const fixedTotal = COL_DEFS.reduce((s,c)=>s+(c[2]||0), 0);
      const flexPx = Math.max(120, tableW - fixedTotal);
      cols.forEach((col, i)=>{
        const defPx = COL_DEFS[i] ? COL_DEFS[i][2] : 0;
        col.style.width = (defPx === 0 ? flexPx : defPx) + 'px';
      });

      /* ---- 정렬 클릭 이벤트 부착 ----
         th에 onclick="" 직접 넣으면 리사이즈 핸들 드래그 후 mouseup 시점에
         click 이벤트가 실수로 발생합니다.
         addEventListener로 붙이고, 드래그 중이면 차단합니다. */
      ths.forEach(th=>{
        const key = th.dataset.sortKey;  /* data-sort-key 속성값 */
        if(!key) return;
        th.addEventListener('click', e=>{
          /* 컬럼 드래그 직후에 발생하는 click이면 무시 */
          if(_colDragDragging) return;
          sortBy(key);
        });
      });

      /* ---- 컬럼 헤더 드래그앤드롭 ----
         th를 잡아 끌어서 컬럼 순서를 바꿉니다.
         고정 컬럼(삭제 버튼 등)은 이동 불가입니다.
      ---- */
      let colDragFrom = null;   /* 드래그 시작한 컬럼 인덱스 */

      ths.forEach((th, i)=>{
        const colDef = COL_DEFS[i];
        const isFixed = colDef && colDef[4];   /* 5번째 요소 = 고정 여부 */

        if(isFixed){
          th.classList.add('col-fixed');
          return;   /* 고정 컬럼은 드래그 이벤트 안 붙임 */
        }

        th.setAttribute('draggable', 'true');

        /* 드래그 시작 */
        th.addEventListener('dragstart', e=>{
          colDragFrom = i;
          _colDragDragging = false;
          e.dataTransfer.effectAllowed = 'move';
          setTimeout(()=>th.classList.add('col-dragging'), 0);
        });

        /* 드래그 중 — 다른 th 위를 지날 때 */
        th.addEventListener('dragover', e=>{
          e.preventDefault();
          if(colDragFrom === null || colDragFrom === i) return;
          _colDragDragging = true;
          /* 모든 th에서 drop 표시 제거 후 현재 위치에만 표시 */
          ths.forEach(t=>t.classList.remove('col-drop-left','col-drop-right'));
          /* 드래그 출발 컬럼이 현재보다 왼쪽에 있으면 오른쪽 테두리, 반대면 왼쪽 테두리 */
          th.classList.add(colDragFrom < i ? 'col-drop-right' : 'col-drop-left');
        });

        th.addEventListener('dragleave', e=>{
          th.classList.remove('col-drop-left','col-drop-right');
        });

        /* 드롭 완료 */
        th.addEventListener('drop', e=>{
          e.preventDefault();
          ths.forEach(t=>t.classList.remove('col-drop-left','col-drop-right','col-dragging'));
          if(colDragFrom === null || colDragFrom === i){ colDragFrom=null; return; }

          /* COL_DEFS 배열에서 꺼내서 새 위치에 끼워넣기 */
          const [moved] = COL_DEFS.splice(colDragFrom, 1);
          /* 고정 컬럼(삭제) 바로 앞까지만 허용 */
          const fixedIdx = COL_DEFS.findIndex(c=>c[4]);
          let targetIdx = i > colDragFrom ? i - 1 : i;   /* splice 후 인덱스 보정 */
          if(fixedIdx !== -1) targetIdx = Math.min(targetIdx, fixedIdx);
          COL_DEFS.splice(targetIdx, 0, moved);

          colDragFrom = null;
          /* 순서 저장 후 표 다시 그리기 */
          saveColOrder();
          renderTask();
        });

        /* 드래그 끝 (드롭 안 되고 취소된 경우도 포함) */
        th.addEventListener('dragend', e=>{
          th.classList.remove('col-dragging');
          ths.forEach(t=>t.classList.remove('col-drop-left','col-drop-right'));
          colDragFrom = null;
          /* dragend 직후 click 이벤트(정렬) 차단 */
          setTimeout(()=>{ _colDragDragging = false; }, 100);
        });
      });
    });
  });
}

</script>
