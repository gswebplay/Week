<!DOCTYPE html>
<html lang="ko">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1" />
<title>업무일지</title>

<link rel="preconnect" href="https://cdn.jsdelivr.net" crossorigin>
<link rel="stylesheet" as="style" crossorigin
  href="https://cdn.jsdelivr.net/gh/orioncactus/pretendard@v1.3.9/dist/web/static/pretendard.css" />
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=JetBrains+Mono:wght@400;500;600&display=swap" rel="stylesheet">

<style>
  :root{
    --navy:#0B1220;
    --navy-light:#16213A;
    --blueprint:#2B6CB0;
    --blueprint-strong:#1B4D89;
    --blueprint-bg:#EAF2FB;
    --line:#D3DEE9;
    --paper:#F5F7FA;
    --ink:#1A2332;
    --muted:#64748B;
    --amber:#B9781F;
    --amber-bg:#FDF6EC; /* 기존 #FBEEDA 에서 더 밝게 화사한 톤으로 수정 */
    --amber-line:#E8C08B;
    --danger:#C0392B;
    --radius:10px;
    --sans:'Pretendard', -apple-system, BlinkMacSystemFont, 'Malgun Gothic', sans-serif;
    --mono:'JetBrains Mono', 'D2Coding', monospace;
  }
  *{ box-sizing:border-box; }
  html,body{ margin:0; padding:0; }
  body{
    background:var(--paper);
    color:var(--ink);
    font-family:var(--sans);
    -webkit-font-smoothing:antialiased;
  }

  /* ---------- Header ---------- */
  header.app-header{
    background:var(--navy);
    color:#fff;
    padding:16px 20px;
    position:sticky; top:0; z-index:30;
  }
  .header-row{
    display:flex; align-items:center; justify-content:space-between;
    max-width:1400px; margin:0 auto;
    flex-wrap:wrap; gap:10px;
  }
  .app-title{
    font-size:17px; font-weight:700; letter-spacing:0.2px;
    display:flex; align-items:center; gap:8px;
  }
  .app-title .tag{
    font-family:var(--mono); font-size:11px; color:var(--blueprint-bg);
    background:rgba(255,255,255,0.08); padding:2px 6px; border-radius:4px;
    letter-spacing:0.5px;
  }

  .month-nav{
    display:flex; align-items:center; gap:8px;
  }
  .month-nav button.nav-btn{
    background:rgba(255,255,255,0.08);
    border:1px solid rgba(255,255,255,0.15);
    color:#fff; width:30px; height:30px; border-radius:7px;
    cursor:pointer; font-size:14px; display:flex; align-items:center; justify-content:center;
    transition:background .15s;
  }
  .month-nav button.nav-btn:hover{ background:rgba(255,255,255,0.18); }

  .year-label{
    font-family:var(--mono); font-size:13px; letter-spacing:0.3px; min-width:44px; text-align:center;
  }

  .today-btn{
    background:none; border:1px solid rgba(255,255,255,0.3); color:#fff;
    font-size:12px; padding:6px 12px; border-radius:7px; cursor:pointer;
    font-family:var(--sans);
  }
  .today-btn:hover{ background:rgba(255,255,255,0.1); }

  .add-employee-btn{
    background:var(--blueprint); color:#fff; border:none;
    font-size:13px; padding:8px 14px; border-radius:7px; cursor:pointer;
    font-weight:600; display:flex; align-items:center; gap:6px;
  }
  .add-employee-btn:hover{ background:var(--blueprint-strong); }

  /* ---------- Grid ---------- */
  main{ max-width:1400px; margin:0 auto; padding:20px; }

  .grid-wrap{
    overflow:auto; 
    max-height:calc(100vh - var(--header-h, 64px) - 40px); 
    border:1px solid var(--line);
    border-radius:var(--radius);
    background:#fff;
  }
  table.log-grid{
    border-collapse:separate; border-spacing:0;
    width:100%; min-width:640px;
  }
  table.log-grid th, table.log-grid td{
    border-bottom:1px solid var(--line);
    border-right:1px solid var(--line);
    vertical-align:top;
  }
  table.log-grid th:last-child, table.log-grid td:last-child{ border-right:none; }

  .day-label-col{
    width:78px; min-width:78px;
    position:sticky; left:0; z-index:5;
    background:var(--blueprint-bg);
  }
  thead .day-label-col{ z-index:15; }

  thead th{
    background:#fff;
    position:sticky; top:0; 
    z-index:10;
    padding:0;
  }
  .emp-head{
    padding:12px 14px; min-width:190px;
    display:flex; align-items:center; justify-content:space-between; gap:6px;
  }
  .emp-name{ font-weight:700; font-size:14px; }
  .emp-pos{ font-size:11px; color:var(--muted); font-weight:500; margin-top:2px; }
  .emp-menu-btn{
    border:none; background:none; color:var(--muted); cursor:pointer;
    font-size:16px; padding:2px 6px; border-radius:5px; line-height:1;
  }
  .emp-menu-btn:hover{ background:var(--paper); color:var(--ink); }

  thead th.dragging{ opacity:0.4; }
  thead th.drag-over{ background:var(--blueprint-bg); box-shadow:inset 0 0 0 2px var(--blueprint); }
  .emp-head{ cursor:grab; }
  .emp-head:active{ cursor:grabbing; }

  .day-cell-label{
    padding:10px 8px; text-align:center;
    font-size:12px; font-weight:700; color:var(--blueprint-strong);
    font-family:var(--mono);
  }
  .day-cell-label .dow{ display:block; font-size:11px; color:var(--muted); font-weight:500; margin-top:1px; }
  
  /* 주말 색상 변경 (휴가와 동일하게 처리, 날짜 라벨칸 포함) */
  tr.weekend .day-cell-label{ color:var(--muted); }
  tr.weekend td { background:var(--amber-bg); } /* 날짜 칸(.day-label-col)까지 포함하여 배경색 적용 */
  tr.weekend td.day-cell:hover{ background:#FBEEDA; } /* 호버 시 색상도 밝게 수정 */

  tr.is-today .day-label-col{ background:var(--blueprint); color:#fff; }
  tr.is-today .day-cell-label{ color:#fff; }
  tr.is-today .day-cell-label .dow{ color:rgba(255,255,255,0.8); }

  .day-cell{
    padding:8px 10px; min-width:190px; cursor:pointer;
    transition:background .12s;
  }
  .day-cell:hover{ background:var(--blueprint-bg); }
  .day-cell.is-leave{ background:var(--amber-bg); }
  .day-cell.is-leave:hover{ background:#FBEEDA; } /* 호버 시 색상 밝게 수정 */

  .log-item{
    font-size:12.5px; line-height:1.5; margin-bottom:4px;
    display:flex; gap:5px; align-items:baseline;
  }
  .log-item .dot{ color:var(--blueprint); flex-shrink:0; }
  .log-item .txt{
    overflow:hidden; text-overflow:ellipsis; white-space:nowrap; max-width:150px;
  }
  .log-item .pct{
    font-family:var(--mono); font-size:11px; color:var(--muted); flex-shrink:0;
  }
  .is-leave .log-item .dot{ color:var(--amber); }

  .more-link{
    font-size:11px; color:var(--blueprint); font-weight:600; margin-top:2px;
  }
  .empty-hint{
    font-size:11.5px; color:#B8C0CC;
  }

  /* summary row */
  tr.summary-row .day-label-col{
    font-size:12px; font-weight:700; color:var(--navy);
    background:var(--blueprint-bg);
    padding:10px 8px;
    text-align:center;
    vertical-align:middle;
    line-height:1.3;
  }
  tr.summary-row td:not(.day-label-col){
    background:#FBFCFE;
    padding:10px 12px;
    font-size:12.5px; line-height:1.5;
  }
  .summary-text{ color:var(--ink); white-space:pre-wrap; }
  .summary-text.auto{ color:var(--muted); }
  .summary-edit-btn{
    font-size:11px; color:var(--blueprint); background:none; border:none;
    cursor:pointer; padding:0; margin-top:4px; font-weight:600;
  }
  .summary-textarea{
    width:100%; min-height:56px; font-family:var(--sans); font-size:12.5px;
    border:1px solid var(--line); border-radius:6px; padding:6px 8px; resize:vertical;
  }
  .summary-actions{ display:flex; gap:8px; margin-top:6px; }
  .summary-actions button{
    font-size:11px; padding:4px 9px; border-radius:5px; border:1px solid var(--line);
    background:#fff; cursor:pointer;
  }
  .summary-actions button.primary{ background:var(--blueprint); color:#fff; border-color:var(--blueprint); }

  .empty-state{
    text-align:center; padding:60px 20px; color:var(--muted);
  }

  /* ---------- Modal ---------- */
  .modal-overlay{
    position:fixed; inset:0; background:rgba(11,18,32,0.45);
    display:flex; align-items:center; justify-content:center;
    z-index:100; padding:16px;
  }
  .modal-panel{
    background:#fff; border-radius:12px; width:100%; max-width:460px;
    max-height:86vh; overflow-y:auto;
    box-shadow:0 20px 50px rgba(0,0,0,0.25);
  }
  .modal-header{
    padding:16px 20px; border-bottom:1px solid var(--line);
    display:flex; align-items:center; justify-content:space-between;
  }
  .modal-header h3{ margin:0; font-size:15px; }
  .modal-close{ border:none; background:none; font-size:18px; cursor:pointer; color:var(--muted); }
  .modal-body{ padding:16px 20px; }
  .modal-footer{
    padding:14px 20px; border-top:1px solid var(--line);
    display:flex; justify-content:flex-end; gap:8px;
  }
  .btn{
    font-size:13px; padding:8px 16px; border-radius:7px; border:1px solid var(--line);
    background:#fff; cursor:pointer; font-family:var(--sans);
  }
  .btn:hover{ background:var(--paper); }
  .btn.primary{ background:var(--blueprint); border-color:var(--blueprint); color:#fff; font-weight:600; }
  .btn.primary:hover{ background:var(--blueprint-strong); }
  .btn.danger{ color:var(--danger); border-color:#F0CBC5; }
  .btn.danger:hover{ background:#FDEEEC; }

  .field{ margin-bottom:12px; }
  .field label{ display:block; font-size:12px; color:var(--muted); margin-bottom:5px; font-weight:600; }
  .field input[type=text], .field input[type=number], .field textarea{
    width:100%; padding:9px 11px; border:1px solid var(--line); border-radius:7px;
    font-family:var(--sans); font-size:13.5px;
  }
  .field textarea{ min-height:64px; resize:vertical; }
  .field-row{ display:flex; gap:10px; }
  .field-row .field{ flex:1; }

  .item-row{
    border:1px solid var(--line); border-radius:8px; padding:10px 12px; margin-bottom:8px;
    position:relative;
  }
  .item-row .item-remove{
    position:absolute; top:8px; right:8px; border:none; background:none;
    color:var(--muted); cursor:pointer; font-size:14px;
  }
  .item-row .item-remove:hover{ color:var(--danger); }
  .add-item-btn{
    width:100%; padding:9px; border:1px dashed var(--line); border-radius:8px;
    background:none; color:var(--blueprint); font-size:13px; cursor:pointer; font-weight:600;
  }
  .add-item-btn:hover{ background:var(--blueprint-bg); }

  .hint-text{ font-size:11.5px; color:var(--muted); margin-top:4px; }

  .toast{
    position:fixed; bottom:22px; left:50%; transform:translateX(-50%);
    background:var(--navy); color:#fff; padding:10px 18px; border-radius:8px;
    font-size:13px; z-index:200; opacity:0; transition:opacity .2s;
    pointer-events:none;
  }
  .toast.show{ opacity:1; }

  @media (max-width:640px){
    .header-row{ align-items:flex-start; }
    .emp-head{ min-width:140px; padding:10px; }
    .day-cell{ min-width:140px; }
    .log-item .txt{ max-width:100px; }
  }
</style>
</head>
<body>

<header class="app-header">
  <div class="header-row">
    <div class="app-title">업무일지 <span class="tag">기술전략부</span></div>
    <div class="month-nav">
      <button class="nav-btn" id="prevYearBtn" title="이전 해">«</button>
      <span class="year-label" id="yearLabel">-</span>
      <button class="nav-btn" id="nextYearBtn" title="다음 해">»</button>
      
      <button class="nav-btn" id="prevMonthBtn" title="이전 달">‹</button>
      <span class="year-label" id="monthLabel">-</span>
      <button class="nav-btn" id="nextMonthBtn" title="다음 달">›</button>
      
      <button class="today-btn" id="todayBtn">오늘</button>
    </div>
    <button class="add-employee-btn" id="addEmployeeBtn">+ 인원 추가</button>
  </div>
</header>

<main>
  <div class="grid-wrap">
    <table class="log-grid" id="logGrid">
      <thead>
        <tr id="headRow">
          <th class="day-label-col"></th>
        </tr>
      </thead>
      <tbody id="gridBody">
        </tbody>
    </table>
  </div>
</main>

<div id="modalRoot"></div>
<div class="toast" id="toast"></div>

<script>
/* ============================================================
   Supabase 설정 — 본인의 프로젝트 값으로 교체하세요.
   ============================================================ */
const SUPABASE_URL = 'https://zrhwdvuehaelintkfoqn.supabase.co';
const SUPABASE_KEY = 'sb_publishable_oQ7F4Q9KRS22lpiE9uILFA_zN7n2V4V';

async function sb(path, method='GET', body=null, extraHeaders={}) {
  const res = await fetch(SUPABASE_URL + '/rest/v1/' + path, {
    method,
    headers: {
      'apikey': SUPABASE_KEY,
      'Authorization': 'Bearer ' + SUPABASE_KEY,
      'Content-Type': 'application/json',
      'Prefer': 'return=representation',
      ...extraHeaders,
    },
    body: body ? JSON.stringify(body) : null,
  });
  if (!res.ok) throw new Error(await res.text());
  const text = await res.text();
  return text ? JSON.parse(text) : [];
}

/* ---------- 상태 ---------- */
const TODAY = new Date();
let currentYear = TODAY.getFullYear();
let currentMonth = TODAY.getMonth() + 1; // 1~12
let didInitialScroll = false;
let employees = [];
let logsByEmpDate = {};      
let summariesByEmp = {};     

const LEAVE_KEYWORDS = ['연차', '휴가', '반차', '연 차', '휴 가', '반 차', '연휴', '연 휴'];
const DOW_LABELS = ['월', '화', '수', '목', '금', '토', '일'];

/* ---------- 날짜 유틸 ---------- */
function startOfWeek(date){
  const d = new Date(date);
  const day = d.getDay();
  const diff = (day === 0 ? -6 : 1) - day;
  d.setDate(d.getDate() + diff);
  d.setHours(0,0,0,0);
  return d;
}
function addDays(date, n){
  const d = new Date(date);
  d.setDate(d.getDate() + n);
  return d;
}
function toDateStr(d){
  const y = d.getFullYear();
  const m = String(d.getMonth()+1).padStart(2,'0');
  const day = String(d.getDate()).padStart(2,'0');
  return `${y}-${m}-${day}`;
}
function toDisplay(d){
  return `${d.getMonth()+1}.${d.getDate()}`;
}
function weekEnd(weekStart){ return addDays(weekStart, 6); }
function daysInMonth(year, month){ return new Date(year, month, 0).getDate(); }
function monthFirstDate(year, month){ return new Date(year, month-1, 1); }
function monthLastDate(year, month){ return new Date(year, month-1, daysInMonth(year, month)); }
function isSameDate(a, b){
  return a.getFullYear()===b.getFullYear() && a.getMonth()===b.getMonth() && a.getDate()===b.getDate();
}

function containsLeaveKeyword(text){
  if(!text) return false;
  return LEAVE_KEYWORDS.some(k => text.includes(k));
}

function showToast(msg){
  const t = document.getElementById('toast');
  t.textContent = msg;
  t.classList.add('show');
  clearTimeout(showToast._timer);
  showToast._timer = setTimeout(()=> t.classList.remove('show'), 2200);
}

/* ============================================================
   데이터 로딩
   ============================================================ */
async function loadEmployees(){
  try {
    employees = await sb('employees?active=eq.true&order=sort_order.asc');
  } catch(e){ console.error(e); showToast('인원 목록을 불러오지 못했습니다'); }
}

async function loadMonthData(){
  const first = monthFirstDate(currentYear, currentMonth);
  const last  = monthLastDate(currentYear, currentMonth);
  const rangeStart = startOfWeek(first);
  const rangeEnd   = weekEnd(startOfWeek(last));
  const startStr = toDateStr(rangeStart);
  const endStr   = toDateStr(rangeEnd);

  logsByEmpDate = {};
  try {
    const logs = await sb(`work_logs?log_date=gte.${startStr}&log_date=lte.${endStr}&order=sort_order.asc`);
    logs.forEach(l => {
      const key = `${l.employee_id}_${l.log_date}`;
      if(!logsByEmpDate[key]) logsByEmpDate[key] = [];
      logsByEmpDate[key].push(l);
    });
  } catch(e){ console.error(e); showToast('업무 기록을 불러오지 못했습니다'); }

  summariesByEmp = {};
  try {
    const summaries = await sb(`weekly_summaries?week_start=gte.${startStr}&week_start=lte.${endStr}`);
    summaries.forEach(s => { summariesByEmp[`${s.employee_id}_${s.week_start}`] = s; });
  } catch(e){ console.error(e); }
}

async function refreshAll(){
  await loadEmployees();
  await loadMonthData();
  render();
}

/* ============================================================
   렌더링
   ============================================================ */
function render(){
  renderMonthNav();
  renderHead();
  renderBody();
}

function renderMonthNav(){
  document.getElementById('yearLabel').textContent = `${currentYear}년`;
  document.getElementById('monthLabel').textContent = `${currentMonth}월`;
}

let dragSrcId = null;

function renderHead(){
  const row = document.getElementById('headRow');
  row.innerHTML = '<th class="day-label-col"></th>';
  if(employees.length === 0){
    row.innerHTML += `<th style="padding:14px;color:var(--muted);font-weight:500;font-size:13px;">
      인원이 없습니다. 우측 상단 '+ 인원 추가'로 시작하세요.</th>`;
    return;
  }
  employees.forEach(emp => {
    const th = document.createElement('th');
    th.draggable = true;
    th.innerHTML = `
      <div class="emp-head">
        <div>
          <div class="emp-name">${escapeHtml(emp.name)}</div>
          ${emp.position ? `<div class="emp-pos">${escapeHtml(emp.position)}</div>` : ''}
        </div>
        <button class="emp-menu-btn" data-emp="${emp.id}" title="관리">⋯</button>
      </div>`;
    th.querySelector('.emp-menu-btn').addEventListener('click', () => openEmployeeMenu(emp));

    th.addEventListener('dragstart', () => {
      dragSrcId = emp.id;
      th.classList.add('dragging');
    });
    th.addEventListener('dragend', () => { th.classList.remove('dragging'); });
    th.addEventListener('dragover', (e) => { e.preventDefault(); th.classList.add('drag-over'); });
    th.addEventListener('dragleave', () => { th.classList.remove('drag-over'); });
    th.addEventListener('drop', async (e) => {
      e.preventDefault();
      th.classList.remove('drag-over');
      if(!dragSrcId || dragSrcId === emp.id) return;
      const fromIdx = employees.findIndex(x => x.id === dragSrcId);
      const toIdx = employees.findIndex(x => x.id === emp.id);
      if(fromIdx === -1 || toIdx === -1) return;
      const [moved] = employees.splice(fromIdx, 1);
      employees.splice(toIdx, 0, moved);
      dragSrcId = null;
      render();
      try {
        await Promise.all(employees.map((e2, idx) => sb(`employees?id=eq.${e2.id}`, 'PATCH', { sort_order: idx })));
      } catch(err){ console.error(err); showToast('순서 저장 실패'); }
    });

    row.appendChild(th);
  });
}

function renderBody(){
  const body = document.getElementById('gridBody');
  body.innerHTML = '';

  if(employees.length === 0){
    body.innerHTML = `<tr><td class="day-label-col"></td><td class="empty-state">인원을 먼저 추가해주세요.</td></tr>`;
    return;
  }

  const totalDays = daysInMonth(currentYear, currentMonth);

  function appendSummaryRow(weekStartDate){
    const sumTr = document.createElement('tr');
    sumTr.className = 'summary-row';
    const sumLabelTd = document.createElement('td');
    sumLabelTd.className = 'day-label-col';
    sumLabelTd.textContent = '주간정리';
    sumTr.appendChild(sumLabelTd);

    const weekStartStr = toDateStr(weekStartDate);
    employees.forEach(emp => {
      const td = document.createElement('td');
      td.dataset.empId = emp.id;
      renderSummaryCell(td, emp, weekStartStr);
      sumTr.appendChild(td);
    });
    body.appendChild(sumTr);
  }

  let weekStartOfCurrentRun = null;

  for(let d = 1; d <= totalDays; d++){
    const date = new Date(currentYear, currentMonth-1, d);
    const dateStr = toDateStr(date);
    const dowIdx = (date.getDay()+6) % 7; // 0=월 ... 6=일
    const isWeekend = dowIdx >= 5;
    const isToday = isSameDate(date, TODAY);

    if(weekStartOfCurrentRun === null) weekStartOfCurrentRun = startOfWeek(date);

    const tr = document.createElement('tr');
    tr.className = (isWeekend ? 'weekend' : '') + (isToday ? ' is-today' : '');
    tr.dataset.date = dateStr;

    const labelTd = document.createElement('td');
    labelTd.className = 'day-label-col';
    labelTd.innerHTML = `<div class="day-cell-label">${date.getDate()}<span class="dow">(${DOW_LABELS[dowIdx]})</span></div>`;
    tr.appendChild(labelTd);

    employees.forEach(emp => {
      const key = `${emp.id}_${dateStr}`;
      const items = logsByEmpDate[key] || [];
      const hasLeave = items.some(it => containsLeaveKeyword(it.content));

      const td = document.createElement('td');
      td.className = 'day-cell' + (hasLeave ? ' is-leave' : '');
      td.addEventListener('click', () => openDayModal(emp, date));

      if(items.length === 0){
        td.innerHTML = `<div class="empty-hint">+ 항목 추가</div>`;
      } else {
        const shown = items.slice(0, 2);
        let html = shown.map(it => `
          <div class="log-item">
            <span class="dot">·</span>
            <span class="txt" title="${escapeHtml(it.content)}">${escapeHtml(it.content)}</span>
            ${it.progress !== null && it.progress !== undefined ? `<span class="pct">${it.progress}%</span>` : ''}
          </div>`).join('');
        if(items.length > 2){
          html += `<div class="more-link">+${items.length - 2}개 더보기</div>`;
        }
        td.innerHTML = html;
      }
      tr.appendChild(td);
    });

    body.appendChild(tr);

    const isLastDayOfWeek = dowIdx === 6;
    const isLastDayOfMonth = d === totalDays;
    if(isLastDayOfWeek || isLastDayOfMonth){
      appendSummaryRow(weekStartOfCurrentRun);
      weekStartOfCurrentRun = null;
    }
  }

  if(!didInitialScroll){
    didInitialScroll = true;
    setTimeout(() => {
      const todayStr = toDateStr(TODAY);
      const row = body.querySelector(`tr[data-date="${todayStr}"]`);
      if(row) row.scrollIntoView({ block:'center', behavior:'auto' });
    }, 30);
  }
}

function computeAutoSummary(empId, weekStartDate){
  let count = 0;
  let progressSum = 0;
  let progressCount = 0;
  let leaveDays = 0;
  for(let i=0;i<7;i++){
    const dateStr = toDateStr(addDays(weekStartDate, i));
    const items = logsByEmpDate[`${empId}_${dateStr}`] || [];
    count += items.length;
    let dayHasLeave = false;
    items.forEach(it => {
      if(it.progress !== null && it.progress !== undefined){
        progressSum += it.progress; progressCount++;
      }
      if(containsLeaveKeyword(it.content)) dayHasLeave = true;
    });
    if(dayHasLeave) leaveDays++;
  }
  if(count === 0) return '이번 주 입력된 항목이 없습니다.';
  let text = `총 ${count}건 입력`;
  if(progressCount > 0){
    text += ` · 평균 진행률 ${Math.round(progressSum/progressCount)}%`;
  }
  if(leaveDays > 0){
    text += ` · 연차/휴가 ${leaveDays}일`;
  }
  return text;
}

function renderSummaryCell(td, emp, weekStartStr){
  const weekStartDate = new Date(weekStartStr + 'T00:00:00');
  const key = `${emp.id}_${weekStartStr}`;
  const existing = summariesByEmp[key];
  const isManual = existing && existing.is_manual && existing.summary_text;
  const text = isManual ? existing.summary_text : computeAutoSummary(emp.id, weekStartDate);

  td.innerHTML = `
    <div class="summary-text ${isManual ? '' : 'auto'}">${escapeHtml(text)}</div>
    <button class="summary-edit-btn" data-emp="${emp.id}">${isManual ? '수정' : '직접 작성'}</button>
    ${isManual ? `<button class="summary-edit-btn" data-emp="${emp.id}" data-reset="1" style="margin-left:8px;">자동요약으로 되돌리기</button>` : ''}
  `;
  td.querySelectorAll('.summary-edit-btn').forEach(btn => {
    btn.addEventListener('click', (e) => {
      e.stopPropagation();
      if(btn.dataset.reset){
        resetSummaryToAuto(emp.id, weekStartStr, td);
      } else {
        editSummaryInline(emp, td, weekStartStr);
      }
    });
  });
}

function editSummaryInline(emp, td, weekStartStr){
  const weekStartDate = new Date(weekStartStr + 'T00:00:00');
  const key = `${emp.id}_${weekStartStr}`;
  const existing = summariesByEmp[key];
  const startVal = (existing && existing.is_manual) ? existing.summary_text : '';
  td.innerHTML = `
    <textarea class="summary-textarea" placeholder="${escapeHtml(computeAutoSummary(emp.id, weekStartDate))}">${escapeHtml(startVal)}</textarea>
    <div class="summary-actions">
      <button class="cancel-sum">취소</button>
      <button class="primary save-sum">저장</button>
    </div>
  `;
  const textarea = td.querySelector('textarea');
  textarea.focus();
  td.querySelector('.cancel-sum').addEventListener('click', () => renderSummaryCell(td, emp, weekStartStr));
  td.querySelector('.save-sum').addEventListener('click', async () => {
    const val = textarea.value.trim();
    await saveSummary(emp.id, weekStartStr, val);
    renderSummaryCell(td, emp, weekStartStr);
  });
}

async function saveSummary(empId, weekStartStr, text){
  const payload = {
    employee_id: empId,
    week_start: weekStartStr,
    summary_text: text || null,
    is_manual: !!text,
    updated_at: new Date().toISOString()
  };
  try {
    const rows = await sb(
      'weekly_summaries?on_conflict=employee_id,week_start',
      'POST',
      payload,
      { 'Prefer': 'resolution=merge-duplicates,return=representation' }
    );
    summariesByEmp[`${empId}_${weekStartStr}`] = rows[0];
    showToast('주간정리를 저장했습니다');
  } catch(e){ console.error(e); showToast('주간정리 저장 실패'); }
}

async function resetSummaryToAuto(empId, weekStartStr, td){
  try {
    await sb(`weekly_summaries?employee_id=eq.${empId}&week_start=eq.${weekStartStr}`, 'DELETE');
    delete summariesByEmp[`${empId}_${weekStartStr}`];
    const emp = employees.find(e => e.id === empId);
    renderSummaryCell(td, emp, weekStartStr);
    showToast('자동 요약으로 되돌렸습니다');
  } catch(e){ console.error(e); showToast('되돌리기 실패'); }
}

function escapeHtml(str){
  if(str === null || str === undefined) return '';
  return String(str)
    .replaceAll('&','&amp;').replaceAll('<','&lt;').replaceAll('>','&gt;')
    .replaceAll('"','&quot;');
}

function openModal({ title, bodyHtml, footerHtml, onMount }){
  const root = document.getElementById('modalRoot');
  root.innerHTML = `
    <div class="modal-overlay" id="modalOverlay">
      <div class="modal-panel">
        <div class="modal-header">
          <h3>${title}</h3>
          <button class="modal-close" id="modalCloseBtn">✕</button>
        </div>
        <div class="modal-body" id="modalBody">${bodyHtml}</div>
        ${footerHtml ? `<div class="modal-footer">${footerHtml}</div>` : ''}
      </div>
    </div>
  `;
  const close = () => { root.innerHTML = ''; };
  const overlay = document.getElementById('modalOverlay');
  document.getElementById('modalCloseBtn').addEventListener('click', close);
  overlay.addEventListener('keydown', (e) => {
    if(e.key !== 'Enter') return;
    const tag = e.target.tagName;
    if(tag === 'TEXTAREA' || tag === 'BUTTON') return; 
    e.preventDefault();
    const primaryBtn = overlay.querySelector('.modal-footer .btn.primary');
    if(primaryBtn) primaryBtn.click();
  });
  if(onMount) onMount(close);
  return close;
}
